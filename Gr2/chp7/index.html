<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gender Noun Adventure</title>

<style>
body{
    margin:0;
    font-family: Comic Sans MS;
    background: url("assets/image1.png") no-repeat center center fixed;
    background-size: cover;
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
}

/* GAME */
#game{
    display:none;
    text-align:center;
    padding:15px;
}

/* INSTRUCTION */
#instruction{
    background:#fff7c2;
    padding:10px;
    font-size:18px;
    border-radius:10px;
    margin:10px;
}

/* SPINNER */
#spinner{
    width:180px;
    margin:10px auto;
}

/* WORD BOX */
#wordBox{
    font-size:32px;
    background:white;
    display:inline-block;
    padding:12px 20px;
    border-radius:10px;
    margin:10px;
}

/* BUTTONS */
button{
    font-size:18px;
    padding:10px 15px;
    margin:8px;
    border-radius:10px;
    border:none;
}

/* OPTIONS */
.option{
    width:70%;
    background:#2196f3;
    color:white;
}

/* CLASSIFY */
.classify{
    background:#4caf50;
    color:white;
}

#level2{
    display:none;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovinelogo.png" width="250">
</div>

<!-- GAME -->
<div id="game">

    <!-- LEVEL 1 -->
    <div id="level1">

        <div id="instruction">
            Level 1: Spin the wheel, classify noun and find opposite.
        </div>

        <img id="spinner" src="assets/spinner.png">

        <div id="wordBox">Press SPIN</div>

        <br>

        <button onclick="spin()">SPIN 🎡</button>

        <div>
            <button class="classify" onclick="checkGender('male')">Masculine</button>
            <button class="classify" onclick="checkGender('female')">Feminine</button>
        </div>

        <h3>Find Opposite</h3>
        <div id="options"></div>

        <button onclick="goLevel2()" id="nextBtn" style="display:none;background:orange;">NEXT LEVEL</button>

    </div>

    <!-- LEVEL 2 -->
    <div id="level2">

        <div id="instruction">
            Level 2: WHO AM I?
        </div>

        <div id="questionBox"></div>

        <div id="mcq"></div>

    </div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
},5000);

// ---------------- LEVEL 1 ----------------

let words = [
    {word:"king", gender:"male", opposite:"queen"},
    {word:"queen", gender:"female", opposite:"king"},
    {word:"boy", gender:"male", opposite:"girl"},
    {word:"girl", gender:"female", opposite:"boy"},
    {word:"actor", gender:"male", opposite:"actress"},
    {word:"actress", gender:"female", opposite:"actor"},
    {word:"lion", gender:"male", opposite:"lioness"},
    {word:"lioness", gender:"female", opposite:"lion"}
];

let current = {};
let attempts = 3;

function spin(){
    current = words[Math.floor(Math.random()*words.length)];
    document.getElementById("wordBox").innerText = current.word;
    generateOptions();
    attempts = 3;
}

function checkGender(choice){
    if(choice === current.gender){
        document.getElementById("correctSound").play();
        alert("Correct!");
    }else{
        attempts--;
        document.getElementById("wrongSound").play();

        if(attempts<=0){
            alert("Correct Answer: " + current.gender);
        }else{
            alert("Try Again. Attempts left: " + attempts);
        }
    }
}

// MCQ opposite
function generateOptions(){

    let correct = current.opposite;

    let pool = ["queen","king","girl","boy","actress","actor","lion","lioness"];

    let options = [correct];

    while(options.length < 3){
        let r = pool[Math.floor(Math.random()*pool.length)];
        if(!options.includes(r)){
            options.push(r);
        }
    }

    options.sort(()=>Math.random()-0.5);

    let box = document.getElementById("options");
    box.innerHTML = "";

    options.forEach(o=>{
        let btn = document.createElement("button");
        btn.className="option";
        btn.innerText=o;

        btn.onclick=()=>{
            checkOpposite(o);
        };

        box.appendChild(btn);
    });
}

function checkOpposite(ans){
    if(ans === current.opposite){
        document.getElementById("correctSound").play();
        document.getElementById("nextBtn").style.display="inline-block";
    }else{
        document.getElementById("wrongSound").play();
        alert("Wrong! Try Again");
    }
}

// ---------------- LEVEL SWITCH ----------------

function goLevel2(){
    document.getElementById("level1").style.display="none";
    document.getElementById("spinner").style.display="none";
    document.getElementById("level2").style.display="block";
    loadLevel2();
}

// ---------------- LEVEL 2 ----------------

let qIndex = 0;
let attempts2 = 3;

let questions = [
    {
        q:"I am masculine. I am your parent's brother. Who am I?",
        options:["Uncle","Father","Brother"],
        answer:"Uncle"
    },
    {
        q:"I am a masculine animal with a giant furry mane. King of jungle. Who am I?",
        options:["Tiger","Lion","Leopard"],
        answer:"Lion"
    },
    {
        q:"I am feminine. I give milk and say moo. Who am I?",
        options:["Cow","Goat","Buffalo"],
        answer:"Cow"
    },
    {
        q:"I am feminine. I am your father's daughter. Who am I?",
        options:["Sister","Aunt","Mother"],
        answer:"Sister"
    },
    {
        q:"I am feminine. I wear a crown and rule a kingdom. Who am I?",
        options:["Queen","Princess","Lady"],
        answer:"Queen"
    },
    {
        q:"I am a boy. My aunt and uncle love me. Who am I?",
        options:["Boy","Son","Cousin"],
        answer:"Boy"
    },
    {
        q:"I am a male chicken. I say cock-a-doodle-doo. Who am I?",
        options:["Hen","Rooster","Duck"],
        answer:"Rooster"
    }
];

function loadLevel2(){

    if(qIndex >= questions.length){
        document.getElementById("questionBox").innerHTML="🎉 Level Complete!";
        document.getElementById("mcq").innerHTML="";
        document.getElementById("clapSound").play();
        return;
    }

    attempts2 = 3;

    let q = questions[qIndex];

    document.getElementById("questionBox").innerText = q.q;

    let box = document.getElementById("mcq");
    box.innerHTML="";

    q.options.forEach(o=>{
        let btn = document.createElement("button");
        btn.className="option";
        btn.innerText=o;

        btn.onclick=()=>{
            checkLevel2(o);
        };

        box.appendChild(btn);
    });
}

function checkLevel2(ans){

    let correct = questions[qIndex].answer;

    if(ans === correct){
        document.getElementById("correctSound").play();
        qIndex++;
        loadLevel2();
    }else{
        attempts2--;
        document.getElementById("wrongSound").play();

        if(attempts2<=0){
            alert("Correct Answer: " + correct);
            qIndex++;
            loadLevel2();
        }else{
            alert("Try Again! Attempts left: " + attempts2);
        }
    }
}

</script>

</body>
</html>
