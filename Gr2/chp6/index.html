<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentence Adventure Click Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f6ff;
    text-align:center;
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
}

/* SCREEN */
.screen{display:none;padding:10px}

/* IMAGE */
img{
    width:90%;
    max-width:850px;
    border-radius:12px;
    margin-top:10px;
}

/* SCOREBOARD */
#scoreBoard{
    display:flex;
    justify-content:center;
    gap:30px;
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

/* MARQUEE AREA */
#flowArea{
    position:relative;
    height:180px;
    margin-top:20px;
    overflow:hidden;
    background:#ffffff;
    border-radius:12px;
}

/* FLOATING SENTENCE */
.sentence{
    position:absolute;
    white-space:nowrap;
    font-size:18px;
    font-weight:bold;
    padding:10px 18px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    cursor:pointer;
    top:20px;
    animation: moveLeft 8s linear forwards;
}

/* LEFT TO RIGHT FLOW */
@keyframes moveLeft{
    from{left:100%;}
    to{left:-300px;}
}

/* BUTTON */
button{
    margin-top:10px;
    padding:10px 18px;
    font-size:16px;
    border:none;
    background:#4CAF50;
    color:white;
    border-radius:8px;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    background:red;
    top:0;
    animation: fall 2s linear infinite;
}

@keyframes fall{
    to{transform:translateY(100vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovinelogo.png" style="max-width:300px;">
</div>

<!-- INSTRUCTION -->
<div id="instruction" class="screen">
    <h2>Click the correct sentences</h2>
    <p>Observe the picture carefully and select correct sentences.</p>
    <img src="assets/image2.jpg">
    <br>
    <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <img id="mainImg" src="assets/image1.jpg">

    <div id="scoreBoard">
        <div>✔ <span id="correctCount">0</span></div>
        <div>✖ <span id="wrongCount">0</span></div>
    </div>

    <div id="flowArea"></div>

</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>

/* SPLASH */
setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("instruction").style.display="block";
},5000);

/* DATA */
let gameData = [
{
    image:"assets/image1.jpg",
    sentences:[
        {text:"This girl is reading a book.", correct:true},
        {text:"Those birds are flying above the school building.", correct:true},
        {text:"This children are playing football in the field.", correct:false},
        {text:"These flowers are bright and beautiful.", correct:true},
        {text:"Those bag are colourful.", correct:false},
        {text:"That school building has a red roof.", correct:true},
        {text:"That boy is watering the flowers.", correct:true}
    ]
},
{
    image:"assets/image2.jpg",
    sentences:[
        {text:"This market is full of colourful shops and people.", correct:true},
        {text:"These fruits and vegetables are fresh.", correct:true},
        {text:"These girl is looking at the flowers.", correct:false},
        {text:"That woman is buying vegetables from the shopkeeper.", correct:true},
        {text:"Those children are going towards the book store.", correct:true},
        {text:"This clothing shop is selling bright dresses.", correct:true},
        {text:"Those kid have balloons in their hand.", correct:false}
    ]
}];

let level = 0;
let correct = 0;
let wrong = 0;
let index = 0;
let flowInterval;

/* START */
function startGame(){
    document.getElementById("instruction").style.display="none";
    document.getElementById("game").style.display="block";

    loadLevel();
}

/* LOAD LEVEL */
function loadLevel(){
    document.getElementById("mainImg").src = gameData[level].image;

    let arr = shuffle([...gameData[level].sentences]);

    index = 0;
    startFlow(arr);
}

/* SHUFFLE */
function shuffle(a){
    return a.sort(()=>Math.random()-0.5);
}

/* FLOW SENTENCES */
function startFlow(arr){

    let area = document.getElementById("flowArea");
    area.innerHTML = "";

    flowInterval = setInterval(()=>{

        if(index >= arr.length){
            clearInterval(flowInterval);
            nextLevel();
            return;
        }

        let s = arr[index];

        let div = document.createElement("div");
        div.className="sentence";
        div.innerText = s.text;

        div.onclick = ()=>{

            if(s.correct){
                correct++;
                document.getElementById("correctSound").play();
                document.getElementById("clapSound").play();
            } else {
                wrong++;
                document.getElementById("wrongSound").play();
            }

            updateScore();
            div.remove();
        };

        area.appendChild(div);

        index++;

    },1200);
}

/* SCORE */
function updateScore(){
    document.getElementById("correctCount").innerText = correct;
    document.getElementById("wrongCount").innerText = wrong;
}

/* NEXT LEVEL */
function nextLevel(){

    if(level === 0){
        level = 1;
        loadLevel();
    } else {
        endGame();
    }
}

/* END GAME */
function endGame(){

    document.getElementById("flowArea").innerHTML =
    "<h2>🎉 Game Completed 🎉</h2>";

    if(correct >= 10){
        launchConfetti();
        document.getElementById("clapSound").play();
    }
}

/* CONFETTI */
function launchConfetti(){

    for(let i=0;i<80;i++){
        let c = document.createElement("div");
        c.className="confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["#ff0","#0ff","#f0f","#0f0","#f66"][Math.floor(Math.random()*5)];
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),2000);
    }
}

</script>

</body>
</html>
