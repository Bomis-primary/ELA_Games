<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Sentence Adventure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f6ff;
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
}

/* INSTRUCTION */
#instruction{
    display:none;
    text-align:center;
    padding:10px;
    font-weight:bold;
    background:#fff6d8;
}

/* GAME */
#game{
    display:none;
    text-align:center;
}

/* IMAGE */
#mainImg{
    width:70%;
    max-width:600px;
    margin-top:10px;
    border-radius:12px;
}

/* SCORE */
#score{
    font-size:20px;
    font-weight:bold;
    margin-top:5px;
}

/* PROGRESS BAR */
#progressBar{
    width:80%;
    height:12px;
    background:#ddd;
    margin:10px auto;
    border-radius:20px;
    overflow:hidden;
}
#progress{
    height:100%;
    width:0%;
    background:#4CAF50;
    transition:width 0.5s;
}

/* CONTROLS */
#controls{
    margin-top:10px;
}
button{
    padding:8px 14px;
    margin:5px;
    font-size:14px;
    border:none;
    border-radius:6px;
    background:#4CAF50;
    color:white;
}

/* TICKER */
#tickerContainer{
    position:fixed;
    bottom:0;
    width:100%;
    height:85px;
    background:white;
    border-top:2px solid #ddd;
    overflow:hidden;
}

#tickerTrack{
    display:flex;
    gap:20px;
    padding-left:100%;
}

/* SENTENCE */
.sentence{
    display:inline-block;
    background:#fff;
    padding:10px 16px;
    border-radius:10px;
    font-weight:bold;
    font-size:17px;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
    cursor:pointer;
    white-space:nowrap;
    animation:move 14s linear forwards;
}

@keyframes move{
    from{transform:translateX(0);}
    to{transform:translateX(-120%);}
}

/* HIGHLIGHT CORRECT */
.correctGlow{
    background:#c8f7c5 !important;
}

/* WRONG */
.wrongGlow{
    background:#ffcccc !important;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovinelogo.png" style="max-width:300px;">
</div>

<!-- INSTRUCTION -->
<div id="instruction">
    📌 Read carefully and click ONLY correct sentences
</div>

<!-- GAME -->
<div id="game">

    <div id="score">✔ <span id="c">0</span> | ✖ <span id="w">0</span></div>

    <div id="progressBar">
        <div id="progress"></div>
    </div>

    <img id="mainImg" src="">

    <div id="controls">
        <button onclick="toggleTicker()">⏸ Pause / ▶ Play</button>
    </div>

</div>

<!-- TICKER -->
<div id="tickerContainer">
    <div id="tickerTrack"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>

/* SPLASH */
setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("instruction").style.display="block";
    setTimeout(startGame,3000);
},5000);

/* DATA */
let levels=[
{
 image:"assets/image1.jpg",
 sentences:[
 {t:"This girl is reading a book.",c:true},
 {t:"Those birds are flying above the school building.",c:true},
 {t:"This children are playing football in the field.",c:false},
 {t:"These flowers are bright and beautiful.",c:true},
 {t:"Those bag are colourful.",c:false},
 {t:"That school building has a red roof.",c:true},
 {t:"That boy is watering the flowers.",c:true}
 ]
},
{
 image:"assets/image2.jpg",
 sentences:[
 {t:"This market is full of colourful shops and people.",c:true},
 {t:"These fruits and vegetables are fresh.",c:true},
 {t:"These girl is looking at the flowers.",c:false},
 {t:"That woman is buying vegetables from the shopkeeper.",c:true},
 {t:"Those children are going towards the book store.",c:true},
 {t:"This clothing shop is selling bright dresses.",c:true},
 {t:"Those kid have balloons in their hand.",c:false}
 ]
}
];

let level=0;
let correct=0;
let wrong=0;
let running=true;

/* START */
function startGame(){
 document.getElementById("instruction").style.display="none";
 document.getElementById("game").style.display="block";
 loadLevel();
}

/* LOAD */
function loadLevel(){

 document.getElementById("mainImg").src=levels[level].image;

 let arr=[...levels[level].sentences].sort(()=>Math.random()-0.5);

 buildTicker(arr);
 updateProgress();
}

/* PROGRESS */
function updateProgress(){
 let p = ((level)/levels.length)*100;
 document.getElementById("progress").style.width=p+"%";
}

/* TICKER */
function buildTicker(arr){

 let track=document.getElementById("tickerTrack");
 track.innerHTML="";

 arr.forEach(item=>{

 let div=document.createElement("div");
 div.className="sentence";
 div.innerText=item.t;

 div.onclick=()=>{

 if(item.c){
 correct++;
 document.getElementById("correctSound").play();
 document.getElementById("clapSound").play();
 div.classList.add("correctGlow");
 }else{
 wrong++;
 document.getElementById("wrongSound").play();
 div.classList.add("wrongGlow");
 }

 updateScore();
 };

 track.appendChild(div);
 });

 /* AUTO HIGHLIGHT AFTER TIMEOUT */
 setTimeout(()=>{
 highlightAnswers(arr);
 nextLevel();
 },15000);
}

/* HIGHLIGHT */
function highlightAnswers(arr){

 document.querySelectorAll(".sentence").forEach((el,i)=>{
 if(arr[i].c){
 el.classList.add("correctGlow");
 }
 });
}

/* SCORE */
function updateScore(){
 document.getElementById("c").innerText=correct;
 document.getElementById("w").innerText=wrong;
}

/* NEXT */
function nextLevel(){
 level++;
 if(level>=levels.length){
 endGame();
 return;
 }
 loadLevel();
}

/* END GAME */
function endGame(){
 document.getElementById("tickerTrack").innerHTML="";

 document.getElementById("game").innerHTML+=`
 <h2>🎉 Game Completed</h2>
 <h3>Score: ${correct} ✔ | ${wrong} ✖</h3>
 <button onclick="location.reload()">Play Again</button>
 `;

 if(correct>8){
 document.getElementById("clapSound").play();
 }
}

/* PAUSE PLAY */
function toggleTicker(){
 let track=document.getElementById("tickerTrack");
 if(running){
 track.style.animationPlayState="paused";
 running=false;
 }else{
 track.style.animationPlayState="running";
 running=true;
 }
}

</script>

</body>
</html>
