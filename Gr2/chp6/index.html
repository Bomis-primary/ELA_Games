<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gender Noun Spinner Game</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
    background: url("assets/image1.png") no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    overflow-y: auto;
    color: #333;
}

.main-wrapper {
    box-sizing: border-box;
    padding-bottom: 50px;
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

/* GAME CONTAINER */
#game {
    display: none;
    text-align: center;
    padding: 10px;
    max-width: 900px;
    margin: 0 auto;
}

/* INSTRUCTION */
#instruction {
    background: rgba(255, 246, 199, 0.95);
    padding: 12px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 15px;
    margin: 10px auto;
    border: 3px solid #ff9800;
    max-width: 600px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

/* GAME LAYOUT */
.game-container {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 40px;
    margin-top: 15px;
    flex-wrap: wrap;
}

.wheel-section {
    position: relative;
    width: 360px;
    height: 360px;
}

.controls-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 300px;
}

/* WHEEL ELEMENTS */
#wheel-outer-ring {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, #0084c2 60%, #004b7c 100%);
    border: 12px solid #005a96;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* CSS handles layout size perfectly */
#wheel-canvas {
    width: 330px;
    height: 330px;
    border-radius: 50%;
    transition: transform 6s cubic-bezier(0.25, 1, 0.5, 1);
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    transform: translateZ(0);
    backface-visibility: hidden;
}

#wheel-center {
    position: absolute;
    width: 75px;
    height: 75px;
    background: radial-gradient(circle, #2196f3 30%, #0d47a1 100%);
    border: 4px solid #ffffff;
    border-radius: 50%;
    z-index: 3;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

#wheel-pointer {
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; 
    height: 0; 
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 32px solid #ff1744;
    z-index: 4;
    filter: drop-shadow(0px 4px 2px rgba(0,0,0,0.3));
}

/* WORD DISPLAY */
#wordBox {
    font-size: 38px;
    font-weight: bold;
    color: #2c3e50;
    background: white;
    display: inline-block;
    padding: 10px 40px;
    border-radius: 20px;
    margin-bottom: 10px;
    box-shadow: 0 6px 0px #bdc3c7, 0 10px 20px rgba(0,0,0,0.15);
    border: 2px solid #ecf0f1;
    min-width: 200px;
}

/* CRISP FEEDBACK TEXT CONTAINER */
#feedbackBox {
    min-height: 35px;
    font-size: 24px;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 2px 2px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000;
    margin-bottom: 10px;
}

/* BUTTONS */
button {
    font-family: 'Comic Sans MS', sans-serif;
    font-size: 20px;
    font-weight: bold;
    padding: 12px 24px;
    margin: 6px;
    border-radius: 18px;
    border: none;
    cursor: pointer;
    transition: all 0.1s ease;
    box-shadow: 0 6px 0px rgba(0,0,0,0.2);
}
button:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0px rgba(0,0,0,0.2);
}

.btn-spin { background: #e040fb; color: white; box-shadow: 0 6px 0px #aa00ff; width: 130px; }
.btn-stop { background: #ff5252; color: white; box-shadow: 0 6px 0px #d50000; width: 130px; }

.gender-row {
    margin: 10px 0;
    display: flex;
    gap: 10px;
}
.classify { width: 140px; color: white; font-size: 18px; }
.classify.male { background: #2196f3; box-shadow: 0 6px 0px #0b7dda; }
.classify.female { background: #ff4081; box-shadow: 0 6px 0px #f50057; }

/* OPPOSITES LIST */
#options {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    margin-top: 10px;
    padding: 0 20px;
    min-height: 60px;
}
.option {
    min-width: 160px;
    background: #00bcd4;
    color: white;
    font-size: 22px;
    box-shadow: 0 6px 0px #008ba3;
}
.option:disabled {
    background: #9e9e9e !important;
    box-shadow: 0 6px 0px #757575 !important;
    cursor: not-allowed;
    opacity: 0.6;
}

/* LEVEL 2 */
#questionBox {
    background: white;
    padding: 20px;
    font-size: 26px;
    border-radius: 15px;
    margin: 15px auto;
    font-weight: bold;
    max-width: 650px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    border-bottom: 5px solid #e0e0e0;
}
.l2option {
    width: 55%;
    background: #ff9800;
    color: white;
    font-size: 22px;
    box-shadow: 0 6px 0px #e65100;
}

#level2 { display: none; }
</style>
</head>

<body>

<div class="main-wrapper">

    <div id="splash">
        <img src="assets/innovinelogo.png" width="250">
    </div>

    <div id="game">

    <div id="level1">

        <div id="instruction">
            Level 1: Spin the wheel, classify the noun, and choose its opposite!
        </div>

        <div class="game-container">
            
            <div class="wheel-section">
                <div id="wheel-pointer"></div>
                <div id="wheel-outer-ring">
                    <div id="wheel-center"></div>
                    <canvas id="wheel-canvas"></canvas>
                </div>
            </div>

            <div class="controls-section">
                <div id="wordBox">READY?</div>
                <div id="feedbackBox">Press SPIN to start!</div>
                
                <div>
                    <button class="btn-spin" onclick="spin()">SPIN 🎡</button>
                    <button class="btn-stop" onclick="stopWheel()">STOP 🛑</button>
                </div>

                <div class="gender-row">
                    <button class="classify male" onclick="checkGender('male')">Masculine</button>
                    <button class="classify female" onclick="checkGender('female')">Feminine</button>
                </div>
            </div>
        </div>

        <h3 style="color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); font-size:24px; margin-top:25px; margin-bottom:10px;">Find Opposite</h3>
        <div id="options"></div>

        <button onclick="goLevel2()" id="nextBtn" style="display:none; background:#4caf50; box-shadow: 0 6px 0px #388e3c; color:white; margin-top:25px;">NEXT LEVEL ➔</button>

    </div>

    <div id="level2">
        <div id="instruction">Level 2: WHO AM I?</div>
        <div id="questionBox"></div>
        <div id="mcq"></div>
    </div>

    </div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("game").style.display = "block";
    setupHighDPIWheel(); 
}, 3000);

// ---------------- LEVEL 1 DATA ----------------
let words = [
    {word:"king", gender:"male", opposite:"queen", color: "#ff5722", visited: false},
    {word:"fox", gender:"male", opposite:"vixen", color: "#e91e63", visited: false},
    {word:"boy", gender:"male", opposite:"girl", color: "#9c27b0", visited: false},
    {word:"mare", gender:"female", opposite:"horse", color: "#2196f3", visited: false},
    {word:"gander", gender:"male", opposite:"goose", color: "#009688", visited: false},
    {word:"cow", gender:"female", opposite:"bull", color: "#8bc34a", visited: false},
    {word:"prince", gender:"male", opposite:"princess", color: "#ffc107", visited: false},
    {word:"rooster", gender:"male", opposite:"hen", color: "#ff9800", visited: false},
    {word:"uncle", gender:"male", opposite:"aunt", color: "#00bcd4", visited: false},
    {word:"lioness", gender:"female", opposite:"lion", color: "#e11d48", visited: false},
    {word:"tiger", gender:"male", opposite:"tigress", color: "#4f46e5", visited: false},
    {word:"daughter", gender:"female", opposite:"son", color: "#059669", visited: false}
];

let current = {};
let attempts = 3;
let currentRotation = 0;
let isSpinning = false;
let genderIdentified = false;

// HIGH-DPI/RETINA CRITICAL RENDER SCALE MANAGEMENT
function setupHighDPIWheel() {
    const canvas = document.getElementById("wheel-canvas");
    const dpr = window.devicePixelRatio || 1;
    
    // Set internal render resolution base grid multi-scaled
    canvas.width = 500 * dpr;
    canvas.height = 500 * dpr;
    
    // Scale tracking context matrix systems
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    
    renderCanvasWheel();
}

function showFeedback(text, isCorrect = null) {
    const box = document.getElementById("feedbackBox");
    box.innerText = text;
    if(isCorrect === true) box.style.color = "#4caf50";
    else if(isCorrect === false) box.style.color = "#ff5252";
    else box.style.color = "#ffffff";
}

function toggleOppositeButtons(enable) {
    const optionButtons = document.querySelectorAll("#options .option");
    optionButtons.forEach(btn => {
        btn.disabled = !enable;
    });
}

function renderCanvasWheel() {
    const canvas = document.getElementById("wheel-canvas");
    const ctx = canvas.getContext("2d");
    const numSegments = words.length;
    const segmentAngle = (2 * Math.PI) / numSegments;
    
    // Match logic layout base
    const baseSize = canvas.width / (window.devicePixelRatio || 1);
    const radius = baseSize / 2;

    ctx.clearRect(0, 0, baseSize, baseSize);
    ctx.textBaseline = "middle";
    ctx.textAlign = "right";

    words.forEach((w, i) => {
        const startAngle = i * segmentAngle;
        const endAngle = startAngle + segmentAngle;

        ctx.beginPath();
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = w.visited ? "#9e9e9e" : w.color;
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.6)";
        ctx.lineWidth = 2.5;
        ctx.stroke();

        ctx.save();
        ctx.translate(radius, radius);
        ctx.rotate(startAngle + segmentAngle / 2);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 20px 'Comic Sans MS'";
        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.shadowBlur = 3;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        
        ctx.fillText(w.word.toUpperCase(), radius - 35, 0);
        ctx.restore();
    });
}

function spin(){
    if(isSpinning) return;
    
    let availableWords = words.filter(w => !w.visited);
    if(availableWords.length === 0) {
        words.forEach(w => w.visited = false);
        availableWords = words;
    }
    
    current = availableWords[Math.floor(Math.random() * availableWords.length)];
    let targetIndex = words.indexOf(current);
    
    let segmentDegrees = 360 / words.length;
    let targetSliceCenter = (targetIndex * segmentDegrees) + (segmentDegrees / 2);
    let finalAngle = (270 - targetSliceCenter + 360) % 360;
    
    currentRotation += 1440 + finalAngle - (currentRotation % 360);
    
    isSpinning = true;
    genderIdentified = false;
    
    let wheel = document.getElementById("wheel-canvas");
    wheel.style.transform = `rotate(${currentRotation}deg)`;
    
    document.getElementById("wordBox").innerText = "???";
    showFeedback("Spinning...");
    document.getElementById("options").innerHTML = "";
    document.getElementById("nextBtn").style.display = "none";
    
    setTimeout(() => {
        if(isSpinning) stopWheel();
    }, 6000);
}

function stopWheel() {
    if(!isSpinning) return;
    isSpinning = false;
    
    current.visited = true;
    renderCanvasWheel();
    
    document.getElementById("wordBox").innerText = current.word.toUpperCase();
    showFeedback("Classify the noun's gender first!");
    generateOptions();
    attempts = 3;
}

function checkGender(choice){
    if(!current.word) {
        showFeedback("Please spin the wheel first!");
        return;
    }
    if(choice === current.gender){
        document.getElementById("correctSound").play();
        showFeedback(`Correct! Now find its opposite below!`, true);
        genderIdentified = true; 
        toggleOppositeButtons(true);
    }else{
        attempts--;
        document.getElementById("wrongSound").play();
        if(attempts <= 0){
            showFeedback(`It is ${current.gender}. Now try the opposites!`, false);
            genderIdentified = true;
            toggleOppositeButtons(true);
        }else{
            showFeedback(`Try Again! Attempts left: ${attempts}`, false);
        }
    }
}

function generateOptions(){
    let correct = current.opposite;
    let pool = ["queen","king","girl","boy","mare","horse","cow","bull","goose","gander","princess","prince","vixen","fox","hen","rooster","uncle","aunt","lioness","lion","tiger","tigress","daughter","son"];
    let options = [correct];

    while(options.length < 3){
        let r = pool[Math.floor(Math.random() * pool.length)];
        if(!options.includes(r) && r !== current.word){
            options.push(r);
        }
    }

    options.sort(() => Math.random() - 0.5);

    let box = document.getElementById("options");
    box.innerHTML = "";

    options.forEach(o => {
        let btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = o.charAt(0).toUpperCase() + o.slice(1);
        btn.onclick = () => checkOpposite(o);
        box.appendChild(btn);
    });

    toggleOppositeButtons(false);
}

function checkOpposite(ans){
    if(!genderIdentified){
        showFeedback("Identify the core gender selection parameters above first!");
        return;
    }
    
    if(ans === current.opposite){
        document.getElementById("correctSound").play();
        document.getElementById("clapSound").play();
        document.getElementById("nextBtn").style.display = "inline-block";
        showFeedback("Wonderful! Perfect match!", true);
    }else{
        document.getElementById("wrongSound").play();
        showFeedback("Oops! Wrong choice, try another!", false);
    }
}

// ---------------- LEVEL SWITCH ----------------
function goLevel2(){
    document.getElementById("level1").style.display = "none";
    document.getElementById("level2").style.display = "block";
    loadLevel2();
}

// ---------------- LEVEL 2 DATA ----------------
let qIndex = 0;
let attempts2 = 3;

// Corrected sentences precisely according to grammar specs
let questions = [
    { q:"I am masculine. This boy is watering the plants. Who am I?", options:["Uncle","Father","Brother"], answer:"Uncle" },
    { q:"I am a masculine animal with a giant furry mane. I am king of the jungle. Who am I?", options:["Lion","Tiger","Leopard"], answer:"Lion" },
    { q:"I am feminine. That clothing shop is selling clothes. Who am I?", options:["Cow","Goat","Buffalo"], answer:"Cow" },
    { q:"I am feminine. I am your father's daughter. Who am I?", options:["Sister","Aunt","Mother"], answer:"Sister" },
    { q:"I am feminine. I wear a crown and rule a kingdom. Who am I?", options:["Queen","Princess","Lady"], answer:"Queen" },
    { q:"I am a boy. My aunt and uncle love me. Who am I?", options:["Boy","Son","Cousin"], answer:"Boy" },
    { q:"I am a male chicken. I say cock-a-doodle-doo. Who am I?", options:["Hen","Rooster","Duck"], answer:"Rooster" }
];

function loadLevel2(){
    if(qIndex >= questions.length){
        document.getElementById("questionBox").innerHTML = "🎉 Level Complete!";
        document.getElementById("mcq").innerHTML = "";
        document.getElementById("clapSound").play();
        return;
    }

    attempts2 = 3;
    let q = questions[qIndex];
    document.getElementById("questionBox").innerText = q.q;

    let box = document.getElementById("mcq");
    box.innerHTML = "";

    q.options.forEach(o => {
        let btn = document.createElement("button");
        btn.className = "l2option";
        btn.innerText = o;
        btn.onclick = () => checkLevel2(o);
        box.appendChild(btn);
    });
}

function checkLevel2(ans){
    let correct = questions[qIndex].answer;
    if(ans === correct){
        document.getElementById("correctSound").play();
        document.getElementById("clapSound").play();
        qIndex++;
        loadLevel2();
    }else{
        attempts2--;
        document.getElementById("wrongSound").play();
        if(attempts2 <= 0){
            qIndex++;
            loadLevel2();
        }
    }
}
</script>

</body>
</html>
