<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentence Adventure Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f6ff;
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

/* INSTRUCTION */
#instruction{
    display:none;
    text-align:center;
    padding:10px;
    font-weight:bold;
    font-size:18px;
    background:#fff7d6;
}

/* GAME */
#game{
    display:none;
    text-align:center;
}

/* IMAGE (REDUCED SIZE) */
#mainImg{
    width:75%;
    max-width:600px;
    margin-top:10px;
    border-radius:12px;
}

/* SCORE */
#score{
    font-size:20px;
    font-weight:bold;
    margin-top:8px;
}

/* TICKER */
#tickerContainer{
    position:fixed;
    bottom:0;
    width:100%;
    height:80px;
    background:white;
    border-top:2px solid #ddd;
    overflow:hidden;
    display:flex;
    align-items:center;
}

#tickerTrack{
    display:flex;
    gap:25px;
    padding-left:100%;
}

/* SLOWER SPEED */
.sentence{
    display:inline-block;
    background:white;
    padding:10px 16px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    cursor:pointer;
    white-space:nowrap;
    animation:move 12s linear forwards;
}

/* SLOWER MOVE */
@keyframes move{
    from{transform:translateX(0);}
    to{transform:translateX(-120%);}
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:0;
    animation:fall 2s linear forwards;
}
@keyframes fall{
    to{transform:translateY(100vh) rotate(360deg);}
}

button{
    padding:10px 18px;
    font-size:16px;
    margin-top:10px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovinelogo.png" style="max-width:300px;">
</div>

<!-- INSTRUCTION -->
<div id="instruction">
    <p>📌 Read the instructions carefully</p>
    <p>✔ Click only the correct sentences based on the picture</p>
    <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="game">

    <div id="score">✔ <span id="c">0</span> | ✖ <span id="w">0</span></div>

    <img id="mainImg" src="" />

</div>

<!-- TICKER -->
<div id="tickerContainer">
    <div id="tickerTrack"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>

/* SPLASH */
setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("instruction").style.display="block";
},5000);

/* DATA */
let levels=[
{
 image:"assets/image1.jpg",
 sentences:[
 {t:"This girl is reading a book.",c:true},
 {t:"Those birds are flying above the school building.",c:true},
 {t:"This children are playing football in the field.",c:false},
 {t:"These flowers are bright and beautiful.",c:true},
 {t:"Those bag are colourful.",c:false},
 {t:"That school building has a red roof.",c:true},
 {t:"That boy is watering the flowers.",c:true}
 ]
},
{
 image:"assets/image2.jpg",
 sentences:[
 {t:"This market is full of colourful shops and people.",c:true},
 {t:"These fruits and vegetables are fresh.",c:true},
 {t:"These girl is looking at the flowers.",c:false},
 {t:"That woman is buying vegetables from the shopkeeper.",c:true},
 {t:"Those children are going towards the book store.",c:true},
 {t:"This clothing shop is selling bright dresses.",c:true},
 {t:"Those kid have balloons in their hand.",c:false}
 ]
}
];

let level=0;
let correct=0;
let wrong=0;

/* START */
function startGame(){
 document.getElementById("instruction").style.display="none";
 document.getElementById("game").style.display="block";
 loadLevel();
}

/* LOAD LEVEL */
function loadLevel(){

 document.getElementById("mainImg").src=levels[level].image;

 let arr=[...levels[level].sentences].sort(()=>Math.random()-0.5);

 buildTicker(arr);
}

/* TICKER BUILDER */
function buildTicker(arr){

 let track=document.getElementById("tickerTrack");
 track.innerHTML="";

 arr.forEach(item=>{

 let div=document.createElement("div");
 div.className="sentence";
 div.innerText=item.t;

 div.onclick=()=>{

 if(item.c){
 correct++;
 document.getElementById("correctSound").play();
 document.getElementById("clapSound").play();
 launchConfetti();
 }else{
 wrong++;
 document.getElementById("wrongSound").play();
 }

 updateScore();
 div.style.opacity="0.5";
 div.onclick=null;
 };

 track.appendChild(div);
 });

 /* LEVEL TIMER */
 setTimeout(()=>{
 nextLevel();
 },12000);
}

/* SCORE */
function updateScore(){
 document.getElementById("c").innerText=correct;
 document.getElementById("w").innerText=wrong;
}

/* NEXT LEVEL */
function nextLevel(){

 level++;

 if(level>=levels.length){
 document.getElementById("tickerTrack").innerHTML=
 "<h2>🎉 Game Completed 🎉</h2>";

 if(correct>=10) launchConfetti();
 return;
 }

 loadLevel();
}

/* CONFETTI */
function launchConfetti(){
 for(let i=0;i<50;i++){
 let c=document.createElement("div");
 c.className="confetti";
 c.style.left=Math.random()*100+"vw";
 c.style.background=["red","blue","green","yellow","purple"][Math.floor(Math.random()*5)];
 document.body.appendChild(c);
 setTimeout(()=>c.remove(),2000);
 }
}

</script>

</body>
</html>
