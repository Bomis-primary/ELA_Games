<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Sentence Game Slow</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f6ff;
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

/* INSTRUCTION */
#instruction{
    display:none;
    text-align:center;
    padding:12px;
    font-weight:bold;
    background:#fff5cc;
}

/* GAME */
#game{
    display:none;
    text-align:center;
}

/* IMAGE */
#mainImg{
    width:70%;
    max-width:600px;
    margin-top:10px;
    border-radius:12px;
}

/* SCORE */
#score{
    font-size:20px;
    font-weight:bold;
}

/* TICKER */
#tickerContainer{
    position:fixed;
    bottom:0;
    width:100%;
    height:85px;
    background:white;
    border-top:2px solid #ddd;
    overflow:hidden;
}

/* TRACK */
#tickerTrack{
    display:flex;
    gap:25px; /* more spacing = easier reading */
    width:max-content;
    animation: scroll 20s linear infinite; /* 🔥 SLOWER SPEED */
}

/* SLOW SMOOTH FLOW */
@keyframes scroll{
    0%{transform:translateX(100%);}
    100%{transform:translateX(-100%);}
}

/* SENTENCE */
.sentence{
    display:inline-block;
    background:#fff;
    padding:10px 16px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
    cursor:pointer;
    white-space:nowrap;
}

/* HIGHLIGHTS */
.correctGlow{background:#c8f7c5 !important;}
.wrongGlow{background:#ffcccc !important;}

button{
    padding:10px 15px;
    margin-top:10px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovinelogo.png" style="max-width:300px;">
</div>

<!-- INSTRUCTION -->
<div id="instruction">
    📌 Click correct sentences while reading carefully
</div>

<!-- GAME -->
<div id="game">

    <div id="score">
        ✔ <span id="c">0</span> | ✖ <span id="w">0</span>
    </div>

    <img id="mainImg">

</div>

<!-- TICKER -->
<div id="tickerContainer">
    <div id="tickerTrack"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>

/* SPLASH */
setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("instruction").style.display="block";
    setTimeout(startGame,2500);
},5000);

/* DATA */
let levels=[
{
 image:"assets/image1.jpg",
 sentences:[
 {t:"This girl is reading a book.",c:true},
 {t:"Those birds are flying above the school building.",c:true},
 {t:"This children are playing football in the field.",c:false},
 {t:"These flowers are bright and beautiful.",c:true},
 {t:"Those bag are colourful.",c:false},
 {t:"That school building has a red roof.",c:true},
 {t:"That boy is watering the flowers.",c:true}
 ]
},
{
 image:"assets/image2.jpg",
 sentences:[
 {t:"This market is full of colourful shops and people.",c:true},
 {t:"These fruits and vegetables are fresh.",c:true},
 {t:"These girl is looking at the flowers.",c:false},
 {t:"That woman is buying vegetables from the shopkeeper.",c:true},
 {t:"Those children are going towards the book store.",c:true},
 {t:"This clothing shop is selling bright dresses.",c:true},
 {t:"Those kid have balloons in their hand.",c:false}
 ]
}
];

let level=0;
let correct=0;
let wrong=0;

/* START */
function startGame(){
 document.getElementById("instruction").style.display="none";
 document.getElementById("game").style.display="block";
 loadLevel();
}

/* LOAD LEVEL */
function loadLevel(){
 document.getElementById("mainImg").src=levels[level].image;

 let arr=[...levels[level].sentences].sort(()=>Math.random()-0.5);

 buildTicker(arr);
}

/* TICKER */
function buildTicker(arr){

 let track=document.getElementById("tickerTrack");
 track.innerHTML="";

/* duplicate for smooth flow */
 let loopArr=[...arr, ...arr];

 loopArr.forEach(item=>{

 let div=document.createElement("div");
 div.className="sentence";
 div.innerText=item.t;

 div.onclick=()=>{

 if(item.c){
 correct++;
 document.getElementById("correctSound").play();
 document.getElementById("clapSound").play();
 div.classList.add("correctGlow");
 }else{
 wrong++;
 document.getElementById("wrongSound").play();
 div.classList.add("wrongGlow");
 }

 updateScore();
 };

 track.appendChild(div);
 });

 /* level duration increased for reading comfort */
 setTimeout(()=>{
 level++;
 if(level>=levels.length){
 endGame();
 }else{
 loadLevel();
 }
 },18000); /* 🔥 SLOWER + MORE TIME */
}

/* SCORE */
function updateScore(){
 document.getElementById("c").innerText=correct;
 document.getElementById("w").innerText=wrong;
}

/* END */
function endGame(){
 document.getElementById("tickerContainer").innerHTML=
 `<div style="padding:20px;">
 <h2>🎉 Game Completed 🎉</h2>
 <h3>Score: ${correct} ✔ | ${wrong} ✖</h3>
 <button onclick="location.reload()">Play Again</button>
 </div>`;

 if(correct>=10){
 document.getElementById("clapSound").play();
 }
}

</script>

</body>
</html>
