<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Express Station PRO</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
overflow:hidden;
background:black;
}

/* Splash */
#splash{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}
#splash img{width:300px;max-width:80%;}

/* Instructions */
#instructions{
display:none;
position:absolute;
top:0;
width:100%;
background:#fff3cd;
padding:12px;
font-size:20px;
font-weight:bold;
text-align:center;
z-index:20;
}

/* Game */
#game{
display:none;
width:100%;
height:100vh;
background:url('assets/railwaystationbackground.png') center/cover no-repeat;
position:relative;
}

/* Score */
#score{
position:absolute;
top:60px;
left:10px;
background:white;
padding:10px 14px;
border-radius:10px;
font-weight:bold;
z-index:20;
}

/* Message */
#msg{
position:absolute;
top:110px;
width:100%;
text-align:center;
font-size:26px;
font-weight:bold;
z-index:20;
}

/* TRAIN */
#train{
position:absolute;
bottom:40px;
left:-300px;
width:230px;
height:130px;
z-index:5;
}

#train img{
width:100%;
height:100%;
object-fit:contain;
}

/* Move LEFT → RIGHT */
.move{
animation:moveTrain 4s linear forwards;
}

@keyframes moveTrain{
0%{left:-300px;}
100%{left:110%;}
}

/* Tickets */
.ticket{
position:absolute;
width:260px;
min-height:150px;
background:
linear-gradient(rgba(255,255,255,0.5),rgba(255,255,255,0.5)),
url('assets/trainticket.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:12px;
font-size:18px;
font-weight:bold;
border-radius:12px;
cursor:grab;
user-select:none;
touch-action:none;
z-index:10;

/* FIX TEXT OVERFLOW */
word-wrap:break-word;
overflow-wrap:break-word;
white-space:normal;
line-height:1.2;
}

#ticket1{top:180px;left:10%;}
#ticket2{top:180px;left:38%;}
#ticket3{top:180px;left:66%;}

/* Shake */
.shake{animation:shake .3s;}
@keyframes shake{
0%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
100%{transform:translateX(0);}
}

/* Responsive */
@media(max-width:900px){
.ticket{width:30%;font-size:14px}
}
</style>
</head>

<body>

<div id="splash">
<img src="assets/innovinelogo.png">
</div>

<div id="instructions">
🚂 Drag the correct sentence ticket onto the moving train!
</div>

<div id="game">
<div id="score">Score: 0</div>
<div id="msg"></div>

<div id="train"></div>

<div class="ticket" id="ticket1"></div>
<div class="ticket" id="ticket2"></div>
<div class="ticket" id="ticket3"></div>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="whistle" src="assets/trainwhistle.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

const statements=[
"The giraffe is a tall animal.",
"My brother plays football every evening.",
"We visited the zoo yesterday.",
"The flowers are blooming in the garden.",
"I enjoy reading storybooks."
];

const questions=[
"When is your birthday?",
"Why is the sky blue?",
"Can you help me?",
"Why are you laughing?",
"Did you finish your homework?"
];

const exclamations=[
"What a beautiful rainbow!",
"Hurray! We won the match!",
"Wow! This cake is delicious!",
"Oh no! I lost my pencil!",
"What an amazing performance!"
];

const trainTypes=["statement","question","exclamation"];

let current=0;
let score=0;
let attempts=0;

/* SOUND HELPERS */
function play(id){
let a=document.getElementById(id);
a.currentTime=0;
a.play().catch(()=>{});
}

/* INIT TICKETS */
function initTickets(){
let arr=[
{type:"statement",text:statements[Math.floor(Math.random()*statements.length)]},
{type:"question",text:questions[Math.floor(Math.random()*questions.length)]},
{type:"exclamation",text:exclamations[Math.floor(Math.random()*exclamations.length)]}
];

arr.sort(()=>Math.random()-0.5);

for(let i=0;i<3;i++){
let t=document.getElementById("ticket"+(i+1));
t.innerText=arr[i].text;
t.dataset.type=arr[i].type;
t.style.top="180px";
t.style.left=i===0?"10%":i===1?"38%":"66%";
t.style.display="flex";
}
}

/* TRAIN CONTROL */
function startTrain(){
let train=document.getElementById("train");
train.className="move";

/* WHISTLE WHILE MOVING */
play("whistle");

/* LOOP RESET */
setTimeout(()=>{
train.className="";
train.style.left="-300px";
nextLevel();
},4000);
}

/* NEXT LEVEL */
function nextLevel(){
current++;
attempts=0;
loadTrain();
initTickets();
startTrain();
}

/* LOAD TRAIN IMAGE */
function loadTrain(){
let type=trainTypes[current%3];
document.getElementById("train").innerHTML=
`<img src="assets/${type}train.png">`;
}

/* RESET POSITION */
function resetTicket(t,id){
t.style.top="180px";
t.style.left=id==="ticket1"?"10%":id==="ticket2"?"38%":"66%";
}

/* CHECK */
function check(ticket){
let correct=trainTypes[current%3];

if(ticket.dataset.type===correct){

play("correct");
play("whistle"); // correct answer sound

score++;
document.getElementById("score").innerText="Score: "+score;
document.getElementById("msg").innerText="Correct!";

ticket.style.display="none";

setTimeout(()=>{
/* CLAP ONLY AT END */
play("clap");
},3500);

}else{

play("wrong");
attempts++;

ticket.classList.add("shake");
setTimeout(()=>ticket.classList.remove("shake"),300);

if(attempts>=2){
document.getElementById("msg").innerText="Correct Answer: "+correct.toUpperCase();
setTimeout(()=>nextLevel(),1500);
}else{
document.getElementById("msg").innerText="Try Again!";
resetTicket(ticket,ticket.id);
}
}
}

/* DRAG */
function drag(el){
let dx=0,dy=0;

el.addEventListener("pointerdown",e=>{
el.setPointerCapture(e.pointerId);
dx=e.clientX-el.offsetLeft;
dy=e.clientY-el.offsetTop;
});

el.addEventListener("pointermove",e=>{
if(e.pressure===0)return;
el.style.left=(e.clientX-dx)+"px";
el.style.top=(e.clientY-dy)+"px";
});

el.addEventListener("pointerup",()=>{
let train=document.getElementById("train").getBoundingClientRect();
let r=el.getBoundingClientRect();

let cx=r.left+r.width/2;
let cy=r.top+r.height/2;

if(cx>train.left && cx<train.right && cy>train.top && cy<train.bottom){
check(el);
}else{
resetTicket(el,el.id);
}
});
}

/* INIT */
document.querySelectorAll(".ticket").forEach(drag);

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("instructions").style.display="block";
document.getElementById("game").style.display="block";

loadTrain();
initTickets();
startTrain();

},5000);

</script>

</body>
</html>
