<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentence Express Station PRO</title>

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
background:black;
}

#splash{
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#instructions{
display:none;
position:absolute;
top:0;
width:100%;
background:#fff3cd;
padding:12px;
font-weight:bold;
text-align:center;
z-index:10;
}

#game{
display:none;
width:100%;
height:100vh;
background:url('assets/railwaystationbackground.png') center/cover no-repeat;
position:relative;
}

#score{
position:absolute;
top:60px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
font-weight:bold;
}

#starBoard{
position:absolute;
top:60px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
}

#ticket{
position:absolute;
bottom:42%;
left:50%;
transform:translateX(-50%);
width:240px;
min-height:120px;
background:url('assets/trainticket.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:15px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.train{
position:absolute;
bottom:40px;
width:210px;
transition:0.3s;
}

.train img{width:100%;}

#statementTrain{left:5%;}
#questionTrain{left:40%;}
#exclamationTrain{left:75%;}

#msg{
position:absolute;
top:120px;
width:100%;
text-align:center;
font-size:22px;
font-weight:bold;
}

.glow{
filter:drop-shadow(0px 0px 10px gold);
}

.shake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
100%{transform:translateX(0);}
}

.depart{
animation:depart 0.8s ease;
}

@keyframes depart{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateX(200px);}
}
</style>
</head>

<body>

<div id="splash">
<img src="assets/innovinelogo.png" style="width:300px;">
</div>

<div id="instructions">
🚂 Drag or tap the ticket into the correct train
</div>

<div id="game">

<div id="score">Score: 0</div>
<div id="starBoard">⭐⭐⭐</div>
<div id="msg"></div>

<div id="ticket"></div>

<div class="train" id="statementTrain">
<img src="assets/statementtrain.jpg">
</div>

<div class="train" id="questionTrain">
<img src="assets/questiontrain.jpg">
</div>

<div class="train" id="exclamationTrain">
<img src="assets/exclamationtrain.jpg">
</div>

</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="whistle" src="assets/trainwhistle.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

let score=0;
let index=0;
let attempts=0;

const data=[
{type:"statement",text:"The giraffee is a tall animal."},
{type:"statement",text:"My brother plays football every evening."},
{type:"statement",text:"We visited the zoo yesterday."},
{type:"statement",text:"The flowers are blooming in the garden."},
{type:"statement",text:"I enjoy reading storybooks."},

{type:"question",text:"When is your birthday?"},
{type:"question",text:"Why is the sky blue?"},
{type:"question",text:"Can you help me?"},
{type:"question",text:"Why are you laughing?"},
{type:"question",text:"Did you finish your homework?"},

{type:"exclamation",text:"What a beautiful rainbow!"},
{type:"exclamation",text:"Hurray! We won the match!"},
{type:"exclamation",text:"Wow! This cake is delicious!"},
{type:"exclamation",text:"Oh no! I lost my pencil!"},
{type:"exclamation",text:"What an amazing performance!"}
];

function load(){
attempts=0;
let q=data[index%data.length];
document.getElementById("ticket").innerText=q.text;
document.getElementById("ticket").dataset.type=q.type;
}

function check(type){

let correct=document.getElementById("ticket").dataset.type;

if(type===correct){

document.getElementById("correct").play();
document.getElementById("whistle").play();
document.getElementById("clap").play();

score++;
document.getElementById("score").innerText="Score: "+score;

document.getElementById(type+"Train").classList.add("depart");

setTimeout(()=>{
document.getElementById(type+"Train").classList.remove("depart");
},800);

index++;
load();

}else{

document.getElementById("wrong").play();
document.getElementById(type+"Train").classList.add("shake");

setTimeout(()=>{
document.getElementById(type+"Train").classList.remove("shake");
},300);

attempts++;

if(attempts>=2){
document.getElementById("msg").innerText="Correct Answer: "+correct.toUpperCase();
index++;
setTimeout(load,1200);
}else{
document.getElementById("msg").innerText="Try Again!";
}
}
}

document.getElementById("statementTrain").onclick=()=>check("statement");
document.getElementById("questionTrain").onclick=()=>check("question");
document.getElementById("exclamationTrain").onclick=()=>check("exclamation");

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("instructions").style.display="block";
document.getElementById("game").style.display="block";
load();
},5000);

</script>

</body>
</html>
