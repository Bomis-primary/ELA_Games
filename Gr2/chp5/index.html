<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentence Express Station - Multi Ticket</title>
<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
background:black;
}

/* Splash */
#splash{
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

/* Instructions */
#instructions{
display:none;
position:absolute;
top:0; width:100%;
background:#fff3cd;
padding:12px;
font-weight:bold;
text-align:center;
z-index:10;
}

/* Game area */
#game{
display:none;
width:100%;
height:100vh;
background:url('assets/railwaystationbackground.png') center/cover no-repeat;
position:relative;
}

/* Score board */
#score{
position:absolute;
top:60px; left:10px;
background:white;
padding:10px;
border-radius:10px;
font-weight:bold;
z-index:10;
}

/* Train */
#train{
position:absolute;
bottom:40px;
width:210px;
transition:all 0.5s ease;
}

/* Ticket styling */
.ticket{
position:absolute;
width:260px;
min-height:120px;
background:url('assets/trainticket.png') center/cover no-repeat;
opacity:0.8;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:10px;
font-weight:bold;
cursor:grab;
transition:0.3s;
}

/* Three tickets side by side */
#ticket1{top:200px; left:10%;}
#ticket2{top:200px; left:38%;}
#ticket3{top:200px; left:66%;}

/* Feedback message */
#msg{
position:absolute;
top:120px;
width:100%;
text-align:center;
font-size:22px;
font-weight:bold;
color:black;
}

/* Correct and shake animations */
.glow{
filter:drop-shadow(0px 0px 10px gold);
}
.shake{
animation:shake 0.3s;
}
@keyframes shake{
0%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
100%{transform:translateX(0);}
}
.depart{
animation:depart 0.8s ease;
}
@keyframes depart{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateX(400px);}
}
</style>
</head>
<body>

<div id="splash"><img src="assets/innovinelogo.png" style="width:300px;"></div>

<div id="instructions">
🚂 Drag the correct sentence ticket onto the train!
</div>

<div id="game">
<div id="score">Score: 0</div>
<div id="msg"></div>

<!-- Train -->
<div id="train"><img src="assets/statementtrain.jpg"></div>

<!-- Tickets -->
<div class="ticket" id="ticket1"></div>
<div class="ticket" id="ticket2"></div>
<div class="ticket" id="ticket3"></div>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="whistle" src="assets/trainwhistle.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>
// Game data
const statements = [
"The giraffee is a tall animal.",
"My brother plays football every evening.",
"We visited the zoo yesterday.",
"The flowers are blooming in the garden.",
"I enjoy reading storybooks."
];
const questions = [
"When is your birthday?",
"Why is the sky blue?",
"Can you help me?",
"Why are you laughing?",
"Did you finish your homework?"
];
const exclamations = [
"What a beautiful rainbow!",
"Hurray! We won the match!",
"Wow! This cake is delicious!",
"Oh no! I lost my pencil!",
"What an amazing performance!"
];

let tickets = [];
let currentTrainType = "statement";
let index = 0;
let score = 0;
let attempts = 0;

// Initialize tickets with one sentence each
function initTickets(){
let arr = [
{type:"statement", text:statements[Math.floor(Math.random()*statements.length)]},
{type:"question", text:questions[Math.floor(Math.random()*questions.length)]},
{type:"exclamation", text:exclamations[Math.floor(Math.random()*exclamations.length)]}
];
// Shuffle array
arr.sort(()=>Math.random()-0.5);

for(let i=0;i<3;i++){
let t = document.getElementById("ticket"+(i+1));
t.innerText = arr[i].text;
t.dataset.type = arr[i].type;
tickets.push(t);
dragElement(t);
}
}

// Load next train
function loadTrain(){
attempts=0;
const trainDiv = document.getElementById("train");
if(index===0) {currentTrainType="statement"; trainDiv.innerHTML='<img src="assets/statementtrain.jpg">';}
else if(index===1){currentTrainType="question"; trainDiv.innerHTML='<img src="assets/questiontrain.jpg">';}
else if(index===2){currentTrainType="exclamation"; trainDiv.innerHTML='<img src="assets/exclamationtrain.jpg">';}
}

// Check drop
function checkAnswer(type){
if(type===currentTrainType){
document.getElementById("correct").play();
document.getElementById("whistle").play();
document.getElementById("clap").play();
score++;
document.getElementById("score").innerText="Score: "+score;
document.getElementById("train").classList.add("depart");
setTimeout(()=>{
document.getElementById("train").classList.remove("depart");
index++;
if(index>2){index=0;} // loop or reset
loadTrain();
initTickets();
},800);
}else{
document.getElementById("wrong").play();
attempts++;
if(attempts<2){document.getElementById("msg").innerText="Try Again!";}
else{
document.getElementById("msg").innerText="Correct Answer: "+currentTrainType.toUpperCase();
index++;
if(index>2){index=0;}
setTimeout(()=>{
loadTrain();
initTickets();
document.getElementById("msg").innerText="";
},1200);
}
}
}

// Drag functionality
function dragElement(el){
let offsetX=0, offsetY=0;
el.onmousedown=dragMouseDown;
el.ontouchstart=dragMouseDown;

function dragMouseDown(e){
e=e||window.event;
e.preventDefault();
offsetX = e.clientX - el.offsetLeft;
offsetY = e.clientY - el.offsetTop;
document.onmouseup=closeDragElement;
document.onmousemove=elementDrag;
document.ontouchend=closeDragElement;
document.ontouchmove=elementDrag;

function elementDrag(ev){
ev=ev||window.event;
let clientX = ev.clientX || ev.touches[0].clientX;
let clientY = ev.clientY || ev.touches[0].clientY;
el.style.left = clientX - offsetX + "px";
el.style.top = clientY - offsetY + "px";
}
function closeDragElement(){
document.onmouseup=null;
document.onmousemove=null;
document.ontouchend=null;
document.ontouchmove=null;

// Check drop overlap
let trainDiv = document.getElementById("train");
let rectTrain = trainDiv.getBoundingClientRect();
let rectEl = el.getBoundingClientRect();
if(rectEl.left+rectEl.width/2>rectTrain.left && rectEl.left+rectEl.width/2<rectTrain.right &&
rectEl.top+rectEl.height/2>rectTrain.top && rectEl.top+rectEl.height/2<rectTrain.bottom){
checkAnswer(el.dataset.type);
}
}
}
}

// Splash and start
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("instructions").style.display="block";
document.getElementById("game").style.display="block";
initTickets();
loadTrain();
},5000);
</script>
</body>
</html>
