<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Express Station FIXED</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
overflow:hidden;
background:black;
}

/* Splash */
#splash{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

/* Instructions */
#instructions{
display:none;
position:absolute;
top:0;
width:100%;
background:#fff3cd;
padding:12px;
font-size:20px;
font-weight:bold;
text-align:center;
z-index:20;
}

/* Game */
#game{
display:none;
width:100%;
height:100vh;
background:url('assets/railwaystationbackground.png') center/cover no-repeat;
position:relative;
}

/* Score */
#score{
position:absolute;
top:60px;
left:10px;
background:white;
padding:10px 14px;
border-radius:10px;
font-weight:bold;
z-index:20;
}

/* Message */
#msg{
position:absolute;
top:110px;
width:100%;
text-align:center;
font-size:26px;
font-weight:bold;
z-index:20;
}

/* TRAIN */
#train{
position:absolute;
bottom:40px;
left:110%;
width:240px;
height:130px;
z-index:5;
}

#train img{
width:100%;
height:100%;
object-fit:contain;
transition:all 2.2s ease;
}

/* Tickets */
.ticket{
position:absolute;
width:260px;
min-height:150px;
background:
linear-gradient(rgba(255,255,255,0.55),rgba(255,255,255,0.55)),
url('assets/trainticket.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:12px;
font-size:18px;
font-weight:bold;
border-radius:12px;
cursor:grab;
user-select:none;
touch-action:none;
z-index:10;

word-wrap:break-word;
overflow-wrap:break-word;
white-space:normal;
line-height:1.2;
}

#ticket1{top:180px;left:10%;}
#ticket2{top:180px;left:38%;}
#ticket3{top:180px;left:66%;}

.shake{animation:shake .3s;}

@keyframes shake{
0%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div id="splash">
<img src="assets/innovinelogo.png">
</div>

<div id="instructions">
🚂 Drag the correct ticket INTO the train when it stops!
</div>

<div id="game">
<div id="score">Score: 0</div>
<div id="msg"></div>

<div id="train"><img id="trainImg"></div>

<div class="ticket" id="ticket1"></div>
<div class="ticket" id="ticket2"></div>
<div class="ticket" id="ticket3"></div>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="whistle" src="assets/trainwhistle.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

/* DATA */
const statements=[
"The giraffe is a tall animal.",
"My brother plays football every evening.",
"We visited the zoo yesterday."
];

const questions=[
"When is your birthday?",
"Why is the sky blue?",
"Can you help me?"
];

const exclamations=[
"What a beautiful rainbow!",
"Hurray! We won the match!",
"Wow! This cake is delicious!"
];

const trainTypes=["statement","question","exclamation"];

/* STATE */
let current=0;
let score=0;
let trainState="idle";

/* SOUND */
function play(id){
let a=document.getElementById(id);
a.currentTime=0;
a.play().catch(()=>{});
}

/* TRAIN ENTER */
function startTrain(){
let train=document.getElementById("train");

trainState="entering";
document.getElementById("msg").innerText="Train is arriving...";

train.style.left="110%";

setTimeout(()=>{
train.style.transition="left 2.2s ease";
train.style.left="50%";
},50);

train.addEventListener("transitionend",function handler(e){
if(e.propertyName==="left"){
trainState="waiting";
document.getElementById("msg").innerText="Drop ticket into train!";
train.removeEventListener("transitionend",handler);
}
});
}

/* TRAIN EXIT */
function exitTrain(){
let train=document.getElementById("train");

trainState="exiting";
document.getElementById("msg").innerText="Train is leaving...";

play("whistle");

setTimeout(()=>{
train.style.transition="left 2.2s ease";
train.style.left="-300px";
},200);

train.addEventListener("transitionend",function handler(e){
if(e.propertyName==="left"){

train.removeEventListener("transitionend",handler);

play("clap");

setTimeout(()=>{
nextLevel();
},800);
}
});
}

/* NEXT LEVEL */
function nextLevel(){
current++;
loadTrain();
initTickets();
startTrain();
}

/* TRAIN TYPE */
function loadTrain(){
let type=trainTypes[current%3];
document.getElementById("trainImg").src=`assets/${type}train.png`;
}

/* INIT TICKETS (IMPORTANT FIX HERE) */
function initTickets(){

document.getElementById("msg").innerText="";

let arr=[
{type:"statement",text:statements[Math.floor(Math.random()*statements.length)]},
{type:"question",text:questions[Math.floor(Math.random()*questions.length)]},
{type:"exclamation",text:exclamations[Math.floor(Math.random()*exclamations.length)]}
];

arr.sort(()=>Math.random()-0.5);

for(let i=1;i<=3;i++){
let t=document.getElementById("ticket"+i);

t.style.display="flex";        // 🔥 FIX: reset visibility
t.style.position="absolute";   // 🔥 FIX: reset position

t.innerText=arr[i-1].text;
t.dataset.type=arr[i-1].type;

/* 🔥 FIX: RESET DRAG POSITION */
t.style.left = "";
t.style.top = "";
}
}

/* CHECK ANSWER */
function check(ticket){

if(trainState!=="waiting")return;

let correct=trainTypes[current%3];

if(ticket.dataset.type===correct){

score++;
document.getElementById("score").innerText="Score: "+score;
document.getElementById("msg").innerText="Correct!";

play("correct");

ticket.style.display="none"; // 🔥 FIX: REMOVE ticket after correct

setTimeout(()=>{
exitTrain();
},700);

}else{

play("wrong");
ticket.classList.add("shake");

setTimeout(()=>ticket.classList.remove("shake"),300);

document.getElementById("msg").innerText="Try Again!";
}
}

/* DRAG */
function drag(el){

let dx=0,dy=0;

el.addEventListener("pointerdown",e=>{
if(trainState!=="waiting")return;

el.setPointerCapture(e.pointerId);

dx=e.clientX-el.offsetLeft;
dy=e.clientY-el.offsetTop;
});

el.addEventListener("pointermove",e=>{
if(trainState!=="waiting")return;
if(e.pressure===0)return;

el.style.left=(e.clientX-dx)+"px";
el.style.top=(e.clientY-dy)+"px";
});

el.addEventListener("pointerup",()=>{

let train=document.getElementById("train").getBoundingClientRect();
let r=el.getBoundingClientRect();

let cx=r.left+r.width/2;
let cy=r.top+r.height/2;

if(cx>train.left && cx<train.right && cy>train.top && cy<train.bottom){
check(el);
}
});
}

/* INIT */
document.querySelectorAll(".ticket").forEach(drag);

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("instructions").style.display="block";
document.getElementById("game").style.display="block";

loadTrain();
initTickets();
startTrain();

},5000);

</script>

</body>
</html>
