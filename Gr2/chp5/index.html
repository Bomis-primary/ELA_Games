<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Express Station</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial, sans-serif;
overflow:hidden;
background:black;
}

#splash{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}
#splash img{width:320px;max-width:80%;}

#instructions{
display:none;
position:absolute;
top:0;
width:100%;
background:#fff3cd;
padding:12px;
font-size:22px;
font-weight:bold;
text-align:center;
z-index:10;
color:#111;
}

#game{
display:none;
width:100%;
height:100vh;
background:url('assets/railwaystationbackground.png') center/cover no-repeat;
position:relative;
}

#score{
position:absolute;
top:62px;
left:12px;
background:white;
padding:10px 16px;
border-radius:12px;
font-size:20px;
font-weight:bold;
z-index:10;
}

#msg{
position:absolute;
top:110px;
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
color:#000;
z-index:10;
}

#train{
position:absolute;
bottom:45px;
left:50%;
transform:translateX(-50%);
width:300px;
height:170px;
z-index:4;
}
#train img{
width:100%;
height:100%;
object-fit:contain;
}

.ticket{
position:absolute;
width:280px;
min-height:155px;
background:
linear-gradient(rgba(255,255,255,0.45),rgba(255,255,255,0.45)),
url('assets/trainticket.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
color:#000;
cursor:grab;
border-radius:14px;
z-index:8;
box-shadow:0 8px 18px rgba(0,0,0,0.25);
touch-action:none;
user-select:none;
}

#ticket1{top:185px;left:8%;}
#ticket2{top:185px;left:38%;}
#ticket3{top:185px;left:68%;}

.shake{animation:shake .3s;}
@keyframes shake{
0%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
100%{transform:translateX(0);}
}

.depart{
animation:depart .9s ease forwards;
}
@keyframes depart{
0%{left:50%;}
100%{left:120%;}
}

@media(max-width:900px){
.ticket{
width:30%;
min-height:135px;
font-size:18px;
padding:10px;
}
#ticket1{left:3%;}
#ticket2{left:35%;}
#ticket3{left:67%;}
#train{width:260px;}
}
</style>
</head>

<body>

<div id="splash">
<img src="assets/innovinelogo.png">
</div>

<div id="instructions">
🚂 Drag the correct sentence ticket onto the train!
</div>

<div id="game">
<div id="score">Score: 0</div>
<div id="msg"></div>

<div id="train"></div>

<div class="ticket" id="ticket1"></div>
<div class="ticket" id="ticket2"></div>
<div class="ticket" id="ticket3"></div>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="whistle" src="assets/trainwhistle.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>
const statements=[
"The giraffe is a tall animal.",
"My brother plays football every evening.",
"We visited the zoo yesterday.",
"The flowers are blooming in the garden.",
"I enjoy reading storybooks."
];

const questions=[
"When is your birthday?",
"Why is the sky blue?",
"Can you help me?",
"Why are you laughing?",
"Did you finish your homework?"
];

const exclamations=[
"What a beautiful rainbow!",
"Hurray! We won the match!",
"Wow! This cake is delicious!",
"Oh no! I lost my pencil!",
"What an amazing performance!"
];

const trainTypes=["statement","question","exclamation"];
let currentTrainIndex=0;
let score=0;
let attempts=0;

const originalPositions=[
{top:"185px",left:"8%"},
{top:"185px",left:"38%"},
{top:"185px",left:"68%"}
];

function randomItem(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function playSound(id){
const audio=document.getElementById(id);
audio.currentTime=0;
audio.play().catch(()=>{});
}

function initTickets(){
document.getElementById("msg").innerText="";

let arr=[
{type:"statement",text:randomItem(statements)},
{type:"question",text:randomItem(questions)},
{type:"exclamation",text:randomItem(exclamations)}
];

arr.sort(()=>Math.random()-0.5);

for(let i=0;i<3;i++){
const t=document.getElementById("ticket"+(i+1));
t.innerText=arr[i].text;
t.dataset.type=arr[i].type;
t.style.top=originalPositions[i].top;
t.style.left=originalPositions[i].left;
t.style.display="flex";
}
}

function loadTrain(){
attempts=0;
const type=trainTypes[currentTrainIndex%3];
const train=document.getElementById("train");
train.classList.remove("depart");
train.style.left="50%";
train.innerHTML=`<img src="assets/${type}train.png">`;
}

function checkAnswer(ticket){
const selectedType=ticket.dataset.type;
const trainType=trainTypes[currentTrainIndex%3];

if(selectedType===trainType){
playSound("correct");
playSound("whistle");
playSound("clap");

score++;
document.getElementById("score").innerText="Score: "+score;
document.getElementById("msg").innerText="Correct!";

ticket.style.display="none";
document.getElementById("train").classList.add("depart");

setTimeout(()=>{
currentTrainIndex++;
loadTrain();
initTickets();
},900);

}else{
playSound("wrong");
attempts++;
ticket.classList.add("shake");
setTimeout(()=>ticket.classList.remove("shake"),300);

if(attempts<2){
document.getElementById("msg").innerText="Try Again!";
resetTicket(ticket);
}else{
document.getElementById("msg").innerText="Correct Answer: "+trainType.toUpperCase();
setTimeout(()=>{
currentTrainIndex++;
loadTrain();
initTickets();
},1300);
}
}
}

function resetTicket(ticket){
const id=Number(ticket.id.replace("ticket",""))-1;
ticket.style.top=originalPositions[id].top;
ticket.style.left=originalPositions[id].left;
}

function makeDraggable(el){
let offsetX=0, offsetY=0;

el.addEventListener("pointerdown",e=>{
el.setPointerCapture(e.pointerId);
offsetX=e.clientX-el.offsetLeft;
offsetY=e.clientY-el.offsetTop;
el.style.cursor="grabbing";
});

el.addEventListener("pointermove",e=>{
if(e.buttons!==1)return;
el.style.left=(e.clientX-offsetX)+"px";
el.style.top=(e.clientY-offsetY)+"px";
});

el.addEventListener("pointerup",()=>{
el.style.cursor="grab";

const train=document.getElementById("train").getBoundingClientRect();
const rect=el.getBoundingClientRect();

const centerX=rect.left+rect.width/2;
const centerY=rect.top+rect.height/2;

if(centerX>train.left && centerX<train.right && centerY>train.top && centerY<train.bottom){
checkAnswer(el);
}else{
resetTicket(el);
}
});
}

document.querySelectorAll(".ticket").forEach(makeDraggable);

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("instructions").style.display="block";
document.getElementById("game").style.display="block";
loadTrain();
initTickets();
},5000);
</script>

</body>
</html>
