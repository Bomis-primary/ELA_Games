<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronoun Meteor Shooter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
margin:0;
padding:0;
overflow:hidden;
background: radial-gradient(circle at bottom, #000814, #000000);
font-family: Arial;
}

/* 🌌 STARFIELD */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.7;
animation: fall 4s linear infinite;
}

@keyframes fall{
from{transform:translateY(-10vh);}
to{transform:translateY(110vh);}
}

/* HUD */
#hud{
position:absolute;
top:10px;
left:10px;
z-index:50;
background:rgba(0,0,0,0.5);
color:white;
padding:8px 12px;
border-radius:10px;
}

/* QUESTION */
#sentence{
position:absolute;
top:10%;
width:100%;
text-align:center;
font-size:24px;
color:white;
z-index:50;
}

/* ASTRONAUT */
#ship{
position:absolute;
bottom:40px;
left:50%;
width:110px;
transform:translateX(-50%);
z-index:100;
filter:drop-shadow(0 0 12px #00e5ff);
}

/* LASER */
.laser{
position:absolute;
width:4px;
height:20px;
background:yellow;
bottom:80px;
left:50%;
transform:translateX(-50%);
}

/* METEOR */
.meteor{
position:absolute;
top:-50px;
padding:10px 15px;
background:white;
color:black;
border-radius:12px;
font-size:20px;
font-weight:bold;
z-index:20;
animation: drop linear;
}

@keyframes drop{
from{transform:translateY(-50px);}
to{transform:translateY(110vh);}
}

/* SCORE */
#scoreBoard{
position:absolute;
top:10px;
right:10px;
z-index:50;
background:rgba(0,0,0,0.5);
color:white;
padding:8px 12px;
border-radius:10px;
}

/* END */
#end{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:28px;
display:none;
text-align:center;
}
</style>
</head>

<body>

<div id="hud"></div>
<div id="scoreBoard">Score: 0</div>
<div id="sentence"></div>

<img id="ship"
src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">

<div id="end"></div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

let score=0;
let current=0;

const sentences=[
{q:"Ravi is playing. ___ is happy.",a:"He"},
{q:"Sita is singing. ___ is joyful.",a:"She"},
{q:"The dog is barking. ___ is loud.",a:"It"},
{q:"Rahul and Amit are friends. ___ are playing.",a:"They"},
{q:"The cat is sleeping. ___ is on bed.",a:"It"},
{q:"Meena is dancing. ___ is on stage.",a:"She"},
{q:"Bird is flying. ___ is in sky.",a:"It"},
{q:"Aarav is running. ___ is fast.",a:"He"},
{q:"Teacher is teaching students. ___ helps them.",a:"He/She"},
{q:"Cars are moving. ___ are fast.",a:"They"},
{q:"Riya is drawing. ___ is creative.",a:"She"},
{q:"Elephant is big. ___ is strong.",a:"It"},
{q:"John and Tom are here. ___ are late.",a:"They"},
{q:"Boy is hungry. ___ wants food.",a:"He"},
{q:"Sun is bright. ___ is hot.",a:"It"}
];

const options=["He","She","It","They"];

let activeMeteors=[];

/* STAR BACKGROUND */
for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(s);
}

function load(){
if(current>=sentences.length){
document.getElementById("end").style.display="block";
document.getElementById("end").innerHTML="🚀 Mission Complete!<br>Score: "+score;
return;
}

document.getElementById("sentence").innerText=sentences[current].q;

spawnMeteors();
}

function spawnMeteors(){
activeMeteors.forEach(m=>m.remove());
activeMeteors=[];

options.forEach(opt=>{
let m=document.createElement("div");
m.className="meteor";
m.innerText=opt;

m.style.left=Math.random()*90+"vw";
m.style.animationDuration=(5+Math.random()*3)+"s";

m.onclick=()=>check(opt);

document.body.appendChild(m);
activeMeteors.push(m);

setTimeout(()=>m.remove(),8000);
});
}

function check(opt){

let ans=sentences[current].a;

if(ans==="He/She"){
if(opt==="He"||opt==="She") correct();
else wrong();
}
else if(opt===ans){
correct();
}
else wrong();

current++;
load();
}

function correct(){
score++;
document.getElementById("scoreBoard").innerText="Score: "+score;
document.getElementById("correctSound").play().catch(()=>{});
}

function wrong(){
document.getElementById("wrongSound").play().catch(()=>{});
}

/* MOVEMENT */
let ship=document.getElementById("ship");

document.addEventListener("keydown",(e)=>{
let left=ship.offsetLeft;

if(e.key==="ArrowLeft") ship.style.left=(left-20)+"px";
if(e.key==="ArrowRight") ship.style.left=(left+20)+"px";

if(e.key===" "){
shoot();
}
});

function shoot(){
let laser=document.createElement("div");
laser.className="laser";
document.body.appendChild(laser);

setTimeout(()=>laser.remove(),300);
}

load();

</script>

</body>
</html>
