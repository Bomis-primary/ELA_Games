<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronoun Space Station Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
color:white;
background: radial-gradient(circle at bottom,#020111,#0a1b3d,#000);
}

/* ⭐ STAR FIELD */
.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation: floatStars linear infinite;
opacity:0.8;
}

@keyframes floatStars{
0%{transform:translateY(0px);}
100%{transform:translateY(100vh);}
}

/* 🪐 PLANETS */
.planet{
position:absolute;
border-radius:50%;
opacity:0.6;
animation: drift 20s linear infinite;
}

@keyframes drift{
0%{transform:translateX(-100px);}
100%{transform:translateX(120vw);}
}

/* UI */
#gameBox{
position:relative;
z-index:10;
text-align:center;
padding:20px;
}

h1{
font-size:28px;
margin:10px;
}

#sentence{
font-size:28px;
margin:40px 20px;
min-height:60px;
}

.options{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
}

.option{
background:white;
color:black;
padding:14px 22px;
border-radius:12px;
font-size:20px;
cursor:pointer;
transition:0.2s;
min-width:80px;
}

.option:hover{
transform:scale(1.1);
}

#scoreBoard{
font-size:18px;
margin-top:10px;
}

#feedback{
margin-top:15px;
font-size:22px;
height:30px;
}

button{
margin-top:20px;
padding:10px 18px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

#restartBtn{
display:none;
background:#ffcc00;
}
</style>
</head>

<body>

<div id="gameBox">

<h1>🚀 Pronoun Space Station Challenge</h1>

<div id="scoreBoard">
Score: <span id="score">0</span> | Mission: <span id="qno">1</span>/15
</div>

<div id="sentence"></div>

<div class="options" id="options"></div>

<div id="feedback"></div>

<button id="restartBtn" onclick="restartGame()">Play Again 🔄</button>

</div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

/* 🌌 CREATE STARS */
for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(s);
}

/* 🪐 PLANETS */
const colors=["#ffcc00","#66ccff","#ff6699","#99ff99","#c299ff"];
for(let i=0;i<5;i++){
let p=document.createElement("div");
p.className="planet";
p.style.width=(40+Math.random()*60)+"px";
p.style.height=p.style.width;
p.style.background=colors[i];
p.style.top=Math.random()*80+"vh";
p.style.left="-100px";
p.style.animationDuration=(15+Math.random()*10)+"s";
document.body.appendChild(p);
}

/* ❓ QUESTIONS (15) */
const questions=[
{t:"Ravi is reading. ___ is happy.",a:"He"},
{t:"Sita is singing. ___ is joyful.",a:"She"},
{t:"The dog is barking. ___ is loud.",a:"It"},
{t:"Rahul and Amit are playing. ___ are friends.",a:"They"},
{t:"The cat is sleeping. ___ is on the bed.",a:"It"},
{t:"Meena is dancing. ___ is on stage.",a:"She"},
{t:"The bird is flying. ___ is in the sky.",a:"It"},
{t:"Aarav is running. ___ is fast.",a:"He"},
{t:"The teacher is teaching. ___ is kind.",a:"She"},
{t:"The cars are moving. ___ are fast.",a:"They"},
{t:"Riya is drawing. ___ is creative.",a:"She"},
{t:"The elephant is big. ___ is strong.",a:"It"},
{t:"John and Tom are here. ___ are late.",a:"They"},
{t:"The boy is hungry. ___ wants food.",a:"He"},
{t:"The sun is bright. ___ is hot.",a:"It"}
];

let current=0;
let score=0;

const sentence=document.getElementById("sentence");
const options=document.getElementById("options");
const scoreBox=document.getElementById("score");
const qnoBox=document.getElementById("qno");
const feedback=document.getElementById("feedback");

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");

function loadQ(){

if(current>=questions.length){
endGame();
return;
}

let q=questions[current];

sentence.innerText=q.t;
options.innerHTML="";
feedback.innerText="";

["He","She","It","They"].forEach(opt=>{
let btn=document.createElement("div");
btn.className="option";
btn.innerText=opt;
btn.onclick=()=>check(opt);
options.appendChild(btn);
});

qnoBox.innerText=current+1;
}

function check(ans){
let q=questions[current];

if(ans===q.a){
score++;
scoreBox.innerText=score;
feedback.innerText="✨ Correct!";
correctSound.play();
}
else{
feedback.innerText="❌ Try again!";
wrongSound.play();
return;
}

current++;
setTimeout(loadQ,700);
}

function endGame(){
sentence.innerText="🚀 Mission Completed!";
options.innerHTML="";
feedback.innerText="Final Score: "+score+"/15";
document.getElementById("restartBtn").style.display="inline-block";
}

function restartGame(){
current=0;
score=0;
document.getElementById("restartBtn").style.display="none";
scoreBox.innerText=0;
loadQ();
}

loadQ();

</script>

</body>
</html>
