<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astronaut Pronoun Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background: radial-gradient(circle at bottom,#000814,#001d3d,#000);
color:white;
}

/* ⭐ STAR BACKGROUND */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation: floatStars linear infinite;
opacity:0.8;
z-index:0;
}

@keyframes floatStars{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

/* HUD */
#hud{
position:absolute;
top:10px;
left:10px;
font-size:18px;
z-index:10;
background:rgba(0,0,0,0.3);
padding:8px 12px;
border-radius:10px;
}

/* SENTENCE */
#block{
position:absolute;
top:18%;
left:50%;
transform:translateX(-50%);
background:white;
color:black;
padding:20px;
border-radius:15px;
font-size:22px;
min-width:300px;
text-align:center;
z-index:10;
box-shadow:0 0 10px rgba(255,255,255,0.4);
}

/* OPTIONS */
#options{
position:absolute;
bottom:120px;
width:100%;
display:flex;
justify-content:center;
gap:15px;
z-index:10;
flex-wrap:wrap;
}

.opt{
background:white;
color:black;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-size:20px;
min-width:70px;
text-align:center;
transition:0.2s;
}

.opt:hover{
transform:scale(1.1);
}

/* FEEDBACK */
#feedback{
position:absolute;
top:80px;
width:100%;
text-align:center;
font-size:22px;
z-index:10;
height:30px;
}

/* ASTRONAUT */
#ship{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:90px;
z-index:20;
transition:0.1s;
filter:drop-shadow(0 0 10px white);
}

/* RESTART */
#restart{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
display:none;
padding:14px 22px;
font-size:18px;
background:#ffcc00;
border:none;
border-radius:10px;
cursor:pointer;
z-index:20;
}
</style>
</head>

<body>

<div id="hud">
Score: <span id="score">0</span> | Mission: <span id="qno">1</span>/15
</div>

<div id="feedback"></div>
<div id="block"></div>
<div id="options"></div>

<img id="ship"
src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">

<button id="restart" onclick="restartGame()">🚀 Restart Mission</button>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

/* ⭐ STARS */
for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(s);
}

/* QUESTIONS */
const q=[
{t:"Ravi is playing. ___ is happy.",a:"He"},
{t:"Sita is singing. ___ is joyful.",a:"She"},
{t:"The dog is barking. ___ is loud.",a:"It"},
{t:"Rahul and Amit are friends. ___ are playing.",a:"They"},
{t:"The cat is sleeping. ___ is on bed.",a:"It"},
{t:"Meena is dancing. ___ is on stage.",a:"She"},
{t:"Bird is flying. ___ is in sky.",a:"It"},
{t:"Aarav is running. ___ is fast.",a:"He"},
{t:"Teacher is kind. ___ helps students.",a:"She"},
{t:"Cars are moving. ___ are fast.",a:"They"},
{t:"Riya is drawing. ___ is creative.",a:"She"},
{t:"Elephant is big. ___ is strong.",a:"It"},
{t:"John and Tom are here. ___ are late.",a:"They"},
{t:"Boy is hungry. ___ wants food.",a:"He"},
{t:"Sun is bright. ___ is hot.",a:"It"}
];

let i=0;
let score=0;

/* ELEMENTS */
const block=document.getElementById("block");
const options=document.getElementById("options");
const scoreBox=document.getElementById("score");
const qno=document.getElementById("qno");
const feedback=document.getElementById("feedback");
const ship=document.getElementById("ship");

/* LOAD */
function load(){
if(i>=q.length){
end();
return;
}

block.innerText=q[i].t;
options.innerHTML="";
feedback.innerText="";

["He","She","It","They"].forEach(v=>{
let d=document.createElement("div");
d.className="opt";
d.innerText=v;
d.onclick=()=>check(v);
options.appendChild(d);
});

qno.innerText=i+1;
}

/* CHECK */
function check(val){
let ans=q[i].a;

if(val===ans){
score++;
scoreBox.innerText=score;
feedback.innerText="✨ Correct!";
document.getElementById("correctSound").play();
}
else{
feedback.innerText="❌ Try Again!";
document.getElementById("wrongSound").play();
return;
}

i++;
setTimeout(load,700);
}

/* END */
function end(){
block.innerText="🚀 Mission Completed!";
options.innerHTML="";
feedback.innerText="Final Score: "+score+"/15";
document.getElementById("restart").style.display="block";
}

/* RESTART */
function restartGame(){
i=0;
score=0;
document.getElementById("restart").style.display="none";
scoreBox.innerText=0;
load();
}

/* MOVE SHIP */
document.addEventListener("keydown",(e)=>{
let left=ship.offsetLeft;

if(e.key==="ArrowLeft"){
ship.style.left=(left-25)+"px";
}
if(e.key==="ArrowRight"){
ship.style.left=(left+25)+"px";
}
});

load();
</script>

</body>
</html>
