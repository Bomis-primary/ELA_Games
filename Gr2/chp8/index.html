<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronoun Astronaut Mission FIXED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background: radial-gradient(circle at bottom,#000814,#001d3d,#000);
}

/* 🌌 BACKGROUND LAYER */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
overflow:hidden;
}

/* ⭐ STARS */
.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
}

@keyframes fall{
from{transform:translateY(-10vh);}
to{transform:translateY(110vh);}
}

/* 🪐 PLANET */
.planet{
position:absolute;
border-radius:50%;
opacity:0.5;
animation: drift 25s linear infinite;
}

@keyframes drift{
from{transform:translateX(-200px);}
to{transform:translateX(120vw);}
}

/* HUD */
#hud{
position:absolute;
top:10px;
left:10px;
z-index:10;
color:white;
background:rgba(0,0,0,0.4);
padding:8px 12px;
border-radius:10px;
}

/* SENTENCE */
#block{
position:absolute;
top:18%;
left:50%;
transform:translateX(-50%);
background:white;
color:black;
padding:18px;
border-radius:12px;
font-size:22px;
min-width:300px;
text-align:center;
z-index:10;
}

/* OPTIONS */
#options{
position:absolute;
bottom:120px;
width:100%;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
z-index:10;
}

.opt{
background:white;
color:black;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-size:20px;
}

/* FEEDBACK */
#feedback{
position:absolute;
top:80px;
width:100%;
text-align:center;
font-size:22px;
z-index:10;
}

/* ASTRONAUT */
#ship{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:85px;
z-index:10;
filter:drop-shadow(0 0 10px white);
}

/* BUTTON */
#restart{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
display:none;
padding:14px 22px;
background:#ffcc00;
border:none;
border-radius:10px;
z-index:20;
font-size:18px;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="hud">Score: <span id="score">0</span> | Mission: <span id="qno">1</span>/15</div>

<div id="feedback"></div>
<div id="block"></div>
<div id="options"></div>

<img id="ship"
src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">

<button id="restart" onclick="restartGame()">🚀 Restart Mission</button>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

document.addEventListener("DOMContentLoaded", function(){

/* 🌌 BUILD BACKGROUND */
const bg=document.getElementById("bg");

for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(3+Math.random()*6)+"s";
bg.appendChild(s);
}

for(let i=0;i<5;i++){
let p=document.createElement("div");
p.className="planet";
p.style.width=(40+Math.random()*60)+"px";
p.style.height=p.style.width;
p.style.background=["#ffcc00","#66ccff","#ff6699","#99ff99","#c299ff"][i];
p.style.top=Math.random()*80+"vh";
p.style.left="-100px";
p.style.animationDuration=(15+Math.random()*10)+"s";
bg.appendChild(p);
}

/* QUESTIONS */
const q=[
{t:"Ravi is playing. ___ is happy.",a:"He"},
{t:"Sita is singing. ___ is joyful.",a:"She"},
{t:"Dog is barking. ___ is loud.",a:"It"},
{t:"Rahul and Amit are friends. ___ are playing.",a:"They"},
{t:"Cat is sleeping. ___ is on bed.",a:"It"},
{t:"Meena is dancing. ___ is on stage.",a:"She"},
{t:"Bird is flying. ___ is in sky.",a:"It"},
{t:"Aarav is running. ___ is fast.",a:"He"},
{t:"Teacher is kind. ___ helps students.",a:"She"},
{t:"Cars are moving. ___ are fast.",a:"They"},
{t:"Riya is drawing. ___ is creative.",a:"She"},
{t:"Elephant is big. ___ is strong.",a:"It"},
{t:"John and Tom are here. ___ are late.",a:"They"},
{t:"Boy is hungry. ___ wants food.",a:"He"},
{t:"Sun is bright. ___ is hot.",a:"It"}
];

let i=0,score=0;

/* UI */
const block=document.getElementById("block");
const options=document.getElementById("options");
const scoreBox=document.getElementById("score");
const qno=document.getElementById("qno");
const feedback=document.getElementById("feedback");
const ship=document.getElementById("ship");

function load(){
if(i>=q.length){ end(); return; }

block.innerText=q[i].t;
options.innerHTML="";
feedback.innerText="";

["He","She","It","They"].forEach(v=>{
let d=document.createElement("div");
d.className="opt";
d.innerText=v;
d.onclick=()=>check(v);
options.appendChild(d);
});

qno.innerText=i+1;
}

function check(v){
if(v===q[i].a){
score++;
scoreBox.innerText=score;
feedback.innerText="✨ Correct!";
safePlay("correctSound");
i++;
setTimeout(load,600);
}else{
feedback.innerText="❌ Try Again!";
safePlay("wrongSound");
}
}

function safePlay(id){
let a=document.getElementById(id);
if(a){
a.currentTime=0;
a.play().catch(()=>{});
}
}

function end(){
block.innerText="🚀 Mission Completed!";
options.innerHTML="";
feedback.innerText="Final Score: "+score+"/15";
document.getElementById("restart").style.display="block";
}

window.restartGame=function(){
i=0;score=0;
scoreBox.innerText=0;
document.getElementById("restart").style.display="none";
load();
};

document.addEventListener("keydown",(e)=>{
let left=ship.offsetLeft;
if(e.key==="ArrowLeft") ship.style.left=(left-20)+"px";
if(e.key==="ArrowRight") ship.style.left=(left+20)+"px";
});

load();

});

</script>

</body>
</html>
