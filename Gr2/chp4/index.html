<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Adjective Tower Builder</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
overflow:hidden;
text-align:center;
background:black;
}

/* BACKGROUND FIX */
#gameScreen{
background:url('assets/buidlingbackground.png') center/cover no-repeat fixed;
height:100vh;
}

.overlay{
background:rgba(0,0,0,0.55);
height:100vh;
padding:10px;
color:white;
}

#logoScreen{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:white;
}

#logoScreen img{
width:220px;
}

.hidden{display:none;}

h1{margin:10px 0;}

#tower{
display:flex;
flex-direction:column-reverse;
align-items:center;
height:260px;
margin:10px auto;
}

.block{
font-size:28px;
margin:2px;
animation:grow 0.4s ease-out;
}

@keyframes grow{
from{transform:scale(0);}
to{transform:scale(1);}
}

.question-box{
background:white;
color:black;
padding:15px;
border-radius:15px;
max-width:700px;
margin:auto;
}

button{
padding:10px 14px;
margin:6px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:#ffd166;
font-weight:bold;
}

#feedback{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.topbar{
color:white;
margin-bottom:10px;
font-size:18px;
}

#confetti{
display:none;
font-size:40px;
margin-top:20px;
}

.confettiPiece{
position:fixed;
font-size:22px;
animation:fall 2s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- LOGO SCREEN -->
<div id="logoScreen">
<img src="assets/innovinelogo.png">
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="hidden">
<div class="overlay">

<h1>🧱 Adjective Tower Builder</h1>

<div class="topbar">
Score: <span id="score">0</span>/20 |
Progress: <span id="progress">1</span>/20
</div>

<div id="tower"></div>

<div class="question-box">
<h2 id="question"></h2>
<div id="options"></div>
<div id="feedback"></div>
</div>

<div id="confetti">
🎉🏆 ADJECTIVE ARCHITECT 🏆🎉
<br><button onclick="location.reload()">Play Again</button>
</div>

</div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>

/* 20 QUESTIONS */
const questions=[
/* Colour (5) */
{q:"Which word is colour?",a:["red","run","ball","jump"],c:0,type:"🟥"},
{q:"Find colour word:",a:["blue","big","eat","dog"],c:0,type:"🟦"},
{q:"Which is colour?",a:["green","sit","pen","car"],c:0,type:"🟩"},
{q:"Choose colour:",a:["yellow","book","play","table"],c:0,type:"🟨"},
{q:"Colour word:",a:["pink","run","chair","eat"],c:0,type:"🩷"},

/* Size (5) */
{q:"Which shows size?",a:["tiny","ball","dog","run"],c:0,type:"📏"},
{q:"Find size word:",a:["huge","pen","book","sit"],c:0,type:"📦"},
{q:"Which is size?",a:["big","eat","car","pen"],c:0,type:"📐"},
{q:"Choose size:",a:["small","jump","dog","run"],c:0,type:"🔷"},
{q:"Size word:",a:["large","book","pen","sit"],c:0,type:"📊"},

/* Shape (5) */
{q:"Shape word:",a:["round","red","run","pen"],c:0,type:"⚪"},
{q:"Find shape:",a:["square","eat","dog","car"],c:0,type:"⬜"},
{q:"Which is shape?",a:["circle","book","run","sit"],c:0,type:"⭕"},
{q:"Choose shape:",a:["oval","pen","jump","eat"],c:0,type:"🥚"},
{q:"Shape word:",a:["triangle","dog","run","car"],c:0,type:"🔺"},

/* Feelings (5) */
{q:"Feeling word:",a:["happy","car","pen","run"],c:0,type:"😊"},
{q:"Find feeling:",a:["sad","book","eat","pen"],c:0,type:"😢"},
{q:"Which shows feeling?",a:["angry","dog","run","sit"],c:0,type:"😡"},
{q:"Feeling word:",a:["excited","car","pen","book"],c:0,type:"🤩"},
{q:"Choose feeling:",a:["tired","run","dog","pen"],c:0,type:"😴"}
];

let i=0,score=0;

setTimeout(()=>{
document.getElementById("logoScreen").style.display="none";
document.getElementById("gameScreen").classList.remove("hidden");
load();
},5000);

function load(){
if(i>=questions.length){
end();
return;
}

document.getElementById("progress").innerText=i+1;
document.getElementById("score").innerText=score;

let q=questions[i];
document.getElementById("question").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.a.forEach((v,idx)=>{
let b=document.createElement("button");
b.innerText=v;
b.onclick=()=>check(idx);
box.appendChild(b);
});

document.getElementById("feedback").innerText="";
}

function check(idx){
let q=questions[i];

if(idx===q.c){
score++;
document.getElementById("correctSound").play();
document.getElementById("feedback").innerText="✔ Correct!";
add(q.type);
}else{
document.getElementById("wrongSound").play();
document.getElementById("feedback").innerText="✖ Wrong!";
}

i++;
setTimeout(load,800);
}

function add(type){
let t=document.getElementById("tower");
let d=document.createElement("div");
d.className="block";
d.innerText=type;
t.appendChild(d);
}

function end(){
document.querySelector(".question-box").style.display="none";
document.getElementById("clapSound").play();
document.getElementById("confetti").style.display="block";

for(let x=0;x<40;x++){
let c=document.createElement("div");
c.className="confettiPiece";
c.innerText=["🎉","⭐","🌟","🎊"][Math.floor(Math.random()*4)];
c.style.left=Math.random()*100+"vw";
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}
</script>

</body>
</html>
