<script>

/* =========================
   QUESTIONS (20 SENTENCE BASED)
========================= */
let questions = [
{type:"colour",q:"The sky turned deep blue during sunset over the city.",a:["blue","run","eat","car"],c:"blue"},
{type:"colour",q:"She wore a bright red dress to the school function.",a:["red","jump","sit","run"],c:"red"},
{type:"colour",q:"Fresh green leaves moved gently in the wind.",a:["green","dog","eat","run"],c:"green"},
{type:"colour",q:"The warm yellow sunlight filled the classroom.",a:["yellow","sit","car","run"],c:"yellow"},
{type:"colour",q:"A soft pink flower bloomed near the window.",a:["pink","run","eat","car"],c:"pink"},

{type:"size",q:"The giant elephant slowly walked across the forest path.",a:["big","run","eat","sit"],c:"big"},
{type:"size",q:"The tiny mouse hid behind the wooden box.",a:["small","car","run","eat"],c:"small"},
{type:"size",q:"A huge building stood tall in the busy city.",a:["huge","dog","sit","run"],c:"huge"},
{type:"size",q:"The large suitcase was heavy for the child.",a:["large","eat","run","car"],c:"large"},
{type:"size",q:"The little toy car rolled under the sofa.",a:["tiny","sit","run","car"],c:"tiny"},

{type:"shape",q:"The round ball bounced across the playground.",a:["round","run","eat","car"],c:"round"},
{type:"shape",q:"The square box was placed on the shelf.",a:["square","dog","run","eat"],c:"square"},
{type:"shape",q:"The oval egg rolled off the table.",a:["oval","car","sit","run"],c:"oval"},
{type:"shape",q:"The circle moon shone in the night sky.",a:["circle","eat","run","dog"],c:"circle"},
{type:"shape",q:"The triangle sign warned drivers on the road.",a:["triangle","sit","car","run"],c:"triangle"},

{type:"feeling",q:"The happy children celebrated their victory.",a:["happy","run","eat","car"],c:"happy"},
{type:"feeling",q:"The sad boy sat near the window.",a:["sad","dog","run","sit"],c:"sad"},
{type:"feeling",q:"The excited students waited for the picnic.",a:["excited","car","run","eat"],c:"excited"},
{type:"feeling",q:"The tired girl rested after the journey.",a:["tired","sit","run","car"],c:"tired"},
{type:"feeling",q:"The angry teacher spoke firmly in class.",a:["angry","dog","run","eat"],c:"angry"}
];

let index = 0;
let score = 0;

/* =========================
   CRANE POSITION MAP
========================= */
const cranePositions = {
  colour: "15%",
  size: "38%",
  shape: "62%",
  feeling: "85%"
};

/* =========================
   START FLOW (SAFE)
========================= */
window.addEventListener("load",()=>{

setTimeout(()=>{

document.getElementById("logoScreen").style.display="none";
document.getElementById("instructionScreen").style.display="flex";

setTimeout(()=>{

document.getElementById("instructionScreen").style.display="none";
document.getElementById("gameScreen").style.display="block";

loadQuestion();

},5000);

},5000);

});

/* =========================
   LOAD QUESTION
========================= */
function loadQuestion(){

if(index >= questions.length){
endGame();
return;
}

let q = questions[index];

document.getElementById("question").innerText = q.q;
document.getElementById("progress").innerText = index+1;
document.getElementById("score").innerText = score;

let box = document.getElementById("options");
box.innerHTML="";

shuffle([...q.a]).forEach(v=>{
let btn = document.createElement("button");
btn.innerText = v;
btn.onclick = ()=>checkAnswer(v,q);
box.appendChild(btn);
});

}

/* =========================
   CHECK ANSWER
========================= */
function checkAnswer(value,q){

if(value === q.c){
score++;
document.getElementById("feedback").innerText="✔ Correct! Crane is moving...";

moveCraneAndDrop(q.type, q.c);

}else{
document.getElementById("feedback").innerText="✖ Try again!";
document.getElementById("wrongSound").play();
}

index++;
setTimeout(loadQuestion,1200);
}

/* =========================
   CRANE MOVE + DROP (NEW FEATURE)
========================= */
function moveCraneAndDrop(type, answer){

const crane = document.getElementById("crane");

/* STEP 1: MOVE CRANE */
crane.style.transition = "left 0.8s ease-in-out";
crane.style.left = cranePositions[type];

/* STEP 2: AFTER MOVE → DROP BLOCK */
setTimeout(()=>{

dropBlock(type);

/* SOUND SYNC (CLICK EFFECT) */
document.getElementById("correctSound").currentTime = 0;
document.getElementById("correctSound").play();

},800);
}

/* =========================
   DROP BLOCK INTO TOWER
========================= */
function dropBlock(type){

let tower = document.getElementById(type+"Tower");

let block = document.createElement("div");
block.className = "block";

/* random construction color */
let colors = ["c1","c2","c3","c4","c5"];
block.classList.add(colors[Math.floor(Math.random()*colors.length)]);

/* drop animation */
block.classList.add("dropAnim");

tower.appendChild(block);
}

/* =========================
   END GAME
========================= */
function endGame(){

document.getElementById("gameScreen").style.display="none";
document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerText =
"Score: "+score+"/20";

document.getElementById("clapSound").play();
}

/* =========================
   SHUFFLE
========================= */
function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*i);
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

</script>
