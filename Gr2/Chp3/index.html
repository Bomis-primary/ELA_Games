<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monkey Swing Adventure - Verbs</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
  overflow: hidden;
  background: #dff7ff;
  color: #243b28;
}

.screen {
  width: 100vw;
  height: 100vh;
  display: none;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.active {
  display: flex;
}

#logoScreen {
  background: white;
}

#logoScreen img {
  max-width: 70%;
  max-height: 70%;
  animation: logoPop 1s ease-in-out;
}

@keyframes logoPop {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

#titleScreen,
#gameScreen,
#endScreen {
  background-image: url("assets/junglebackground.png");
  background-size: cover;
  background-position: center;
}

.overlay {
  background: rgba(255, 255, 255, 0.86);
  padding: 25px;
  border-radius: 25px;
  border: 5px solid #7ac943;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  width: min(90%, 650px);
}

h1 {
  font-size: clamp(2rem, 6vw, 4rem);
  color: #2f7d32;
  margin-bottom: 15px;
}

h2 {
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  color: #ff8c00;
  margin-bottom: 15px;
}

button {
  cursor: pointer;
  border: none;
  border-radius: 18px;
  padding: 14px 24px;
  font-size: clamp(1rem, 3vw, 1.3rem);
  font-weight: bold;
  background: #ffcc4d;
  color: #3b2f00;
  box-shadow: 0 5px 0 #c79817;
  margin: 8px;
}

button:active {
  transform: translateY(4px);
  box-shadow: 0 1px 0 #c79817;
}

.topBar {
  position: absolute;
  top: 8px;
  left: 8px;
  right: 8px;
  background: rgba(255,255,255,0.9);
  border-radius: 18px;
  padding: 8px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  z-index: 5;
  font-size: clamp(0.85rem, 2.5vw, 1rem);
  font-weight: bold;
}

.volumeBox {
  display: flex;
  align-items: center;
  gap: 6px;
}

input[type="range"] {
  width: 90px;
}

.gameArea {
  width: 100%;
  height: 100%;
  position: relative;
  padding-top: 65px;
}

.questionCard {
  position: absolute;
  top: 75px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.95);
  border: 4px solid #ffb347;
  border-radius: 22px;
  padding: 16px;
  width: min(92%, 760px);
  z-index: 4;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

.question {
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  font-weight: bold;
  margin-bottom: 12px;
  color: #284b2a;
}

.options {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.optionBtn {
  background: #8be0ff;
  box-shadow: 0 5px 0 #3498bd;
  color: #06394a;
  min-width: 120px;
}

.optionBtn.correct {
  background: #8ee37d;
  box-shadow: 0 5px 0 #3d9d32;
}

.optionBtn.wrong {
  background: #ff8d8d;
  box-shadow: 0 5px 0 #c74343;
}

.tree {
  position: absolute;
  bottom: 0;
  width: 85px;
  height: 45vh;
  background: #8b5a2b;
  border-radius: 35px 35px 0 0;
  box-shadow: inset -8px 0 rgba(0,0,0,0.15);
}

.tree::before {
  content: "🌳";
  position: absolute;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 110px;
}

.tree1 { left: 10%; }
.tree2 { left: 45%; }
.tree3 { right: 10%; }

.vine {
  position: absolute;
  top: 220px;
  left: 15%;
  right: 15%;
  height: 6px;
  border-top: 6px dashed #2e8b57;
  opacity: 0.8;
}

#monkey {
  position: absolute;
  bottom: 34vh;
  left: 10%;
  font-size: clamp(3.5rem, 10vw, 6rem);
  transition: left 0.8s ease, bottom 0.5s ease, transform 0.5s ease;
  z-index: 3;
}

.swing {
  animation: swing 0.8s ease-in-out;
}

@keyframes swing {
  0% { transform: rotate(-12deg) scale(1); }
  50% { transform: rotate(14deg) scale(1.1); }
  100% { transform: rotate(0deg) scale(1); }
}

.slip {
  animation: slip 0.7s ease-in-out;
}

@keyframes slip {
  0% { transform: translateY(0) rotate(0deg); }
  40% { transform: translateY(70px) rotate(-18deg); }
  100% { transform: translateY(0) rotate(0deg); }
}

.feedback {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.92);
  padding: 10px 18px;
  border-radius: 15px;
  font-size: clamp(1rem, 3vw, 1.5rem);
  font-weight: bold;
  z-index: 5;
  min-height: 48px;
}

.star {
  position: absolute;
  font-size: 28px;
  animation: starPop 1s forwards;
  pointer-events: none;
  z-index: 20;
}

@keyframes starPop {
  from { transform: scale(0.3) translateY(0); opacity: 1; }
  to { transform: scale(1.5) translateY(-120px); opacity: 0; }
}

.confetti {
  position: absolute;
  font-size: 26px;
  animation: fall 2.5s linear forwards;
  z-index: 20;
}

@keyframes fall {
  from { transform: translateY(-50px) rotate(0deg); opacity: 1; }
  to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

.finalMonkey {
  font-size: 5rem;
  margin: 10px 0;
}

@media (max-height: 560px) {
  .questionCard {
    top: 55px;
    padding: 10px;
  }

  .tree {
    height: 35vh;
  }

  .tree::before {
    font-size: 80px;
    top: -60px;
  }

  #monkey {
    bottom: 28vh;
  }
}
</style>
</head>

<body>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<section id="logoScreen" class="screen active">
  <img src="assets/innovinelogo.png" alt="Innovine Logo">
</section>

<section id="titleScreen" class="screen">
  <div class="overlay">
    <h1>🐵 Monkey Swing Adventure</h1>
    <h2>Verbs: Action Words</h2>
    <p style="font-size:1.25rem; margin-bottom:15px;">
      Help the monkey cross the jungle by choosing the correct action word!
    </p>
    <button onclick="startGame()">Start Game</button>
  </div>
</section>

<section id="gameScreen" class="screen">
  <div class="topBar">
    <div id="progressText">Question: 1/18</div>
    <div id="scoreText">Score: 0</div>
    <div class="volumeBox">
      🔊
      <input id="volumeControl" type="range" min="0" max="1" step="0.1" value="1">
      <button onclick="toggleMute()" style="padding:7px 10px; font-size:0.9rem;">Mute</button>
    </div>
  </div>

  <div class="gameArea">
    <div class="questionCard">
      <div id="questionText" class="question"></div>
      <div id="optionsBox" class="options"></div>
    </div>

    <div class="vine"></div>
    <div class="tree tree1"></div>
    <div class="tree tree2"></div>
    <div class="tree tree3"></div>
    <div id="monkey">🐵</div>
    <div id="feedback" class="feedback"></div>
  </div>
</section>

<section id="endScreen" class="screen">
  <div class="overlay">
    <h1>🎉 Good Job! 🎉</h1>
    <div class="finalMonkey">🐵🌴🏆</div>
    <h2 id="finalScore"></h2>
    <p style="font-size:1.2rem;">You helped the monkey cross the jungle!</p>
    <button onclick="restartGame()">Play Again</button>
  </div>
</section>

<script>
const questions = [
  { question:"Ravi can ______ high.", options:["jump","apple","book"], answer:"jump" },
  { question:"Birds ______ in the sky.", options:["fly","chair","pencil"], answer:"fly" },
  { question:"We ______ water every day.", options:["drink","table","bag"], answer:"drink" },
  { question:"Children ______ in the park.", options:["play","window","shoe"], answer:"play" },
  { question:"I ______ my homework.", options:["write","banana","door"], answer:"write" },
  { question:"The dog can ______ fast.", options:["run","box","plate"], answer:"run" },
  { question:"We ______ a song.", options:["sing","tree","cup"], answer:"sing" },
  { question:"The baby will ______.", options:["sleep","pencil","book"], answer:"sleep" },
  { question:"They ______ football.", options:["kick","apple","desk"], answer:"kick" },
  { question:"I ______ to school.", options:["walk","chair","eraser"], answer:"walk" },
  { question:"The fish can ______.", options:["swim","clock","bag"], answer:"swim" },
  { question:"Mother will ______ food.", options:["cook","window","shirt"], answer:"cook" },
  { question:"We ______ the teacher.", options:["listen","banana","shoe"], answer:"listen" },
  { question:"The cat can ______.", options:["climb","table","cap"], answer:"climb" },
  { question:"Children ______ stories.", options:["read","apple","ball"], answer:"read" },
  { question:"The boy can ______ a bicycle.", options:["ride","pillow","door"], answer:"ride" },
  { question:"The girl will ______.", options:["dance","plate","box"], answer:"dance" },
  { question:"We ______ our hands.", options:["wash","chair","pencil"], answer:"wash" }
];

let gameQuestions = [];
let currentQuestion = 0;
let score = 0;
let monkeyStep = 0;
let muted = false;

const screens = {
  logo: document.getElementById("logoScreen"),
  title: document.getElementById("titleScreen"),
  game: document.getElementById("gameScreen"),
  end: document.getElementById("endScreen")
};

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");
const volumeControl = document.getElementById("volumeControl");

window.onload = () => {
  setTimeout(() => {
    showScreen("title");
  }, 5000);
};

volumeControl.addEventListener("input", () => {
  const vol = Number(volumeControl.value);
  correctSound.volume = vol;
  wrongSound.volume = vol;
  clapSound.volume = vol;
});

function showScreen(name) {
  Object.values(screens).forEach(screen => screen.classList.remove("active"));
  screens[name].classList.add("active");
}

function startGame() {
  gameQuestions = shuffle([...questions]);
  currentQuestion = 0;
  score = 0;
  monkeyStep = 0;
  moveMonkey();
  showScreen("game");
  loadQuestion();
}

function loadQuestion() {
  if (currentQuestion >= gameQuestions.length) {
    endGame();
    return;
  }

  document.getElementById("feedback").textContent = "";
  document.getElementById("progressText").textContent =
    `Question: ${currentQuestion + 1}/${gameQuestions.length}`;
  document.getElementById("scoreText").textContent = `Score: ${score}`;

  const q = gameQuestions[currentQuestion];
  document.getElementById("questionText").textContent = q.question;

  const optionsBox = document.getElementById("optionsBox");
  optionsBox.innerHTML = "";

  shuffle([...q.options]).forEach(option => {
    const btn = document.createElement("button");
    btn.className = "optionBtn";
    btn.textContent = option;
    btn.onclick = () => checkAnswer(btn, option);
    optionsBox.appendChild(btn);
  });
}

function checkAnswer(button, selected) {
  const q = gameQuestions[currentQuestion];
  const buttons = document.querySelectorAll(".optionBtn");
  buttons.forEach(btn => btn.disabled = true);

  if (selected === q.answer) {
    button.classList.add("correct");
    score++;
    monkeyStep++;
    playSound(correctSound);
    document.getElementById("feedback").textContent = "Great! That is an action word!";
    swingMonkey();
    createStars();
  } else {
    button.classList.add("wrong");
    playSound(wrongSound);
    document.getElementById("feedback").textContent = "Oops! Monkey slipped!";
    slipMonkey();
  }

  setTimeout(() => {
    currentQuestion++;
    loadQuestion();
  }, 1500);
}

function swingMonkey() {
  const monkey = document.getElementById("monkey");
  monkey.classList.add("swing");
  moveMonkey();
  setTimeout(() => monkey.classList.remove("swing"), 850);
}

function slipMonkey() {
  const monkey = document.getElementById("monkey");
  monkey.classList.add("slip");
  setTimeout(() => monkey.classList.remove("slip"), 750);
}

function moveMonkey() {
  const monkey = document.getElementById("monkey");
  const positions = ["10%", "45%", "78%"];
  monkey.style.left = positions[monkeyStep % 3];
}

function createStars() {
  const symbols = ["⭐", "🌟", "✨"];
  for (let i = 0; i < 12; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    star.style.left = Math.random() * 90 + "vw";
    star.style.top = 45 + Math.random() * 25 + "vh";
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 1000);
  }
}

function endGame() {
  showScreen("end");
  document.getElementById("finalScore").textContent =
    `Your Score: ${score}/${gameQuestions.length}`;
  playSound(clapSound);
  createConfetti();
}

function createConfetti() {
  const confettiItems = ["🎉", "⭐", "🌟", "✨", "🍃"];
  for (let i = 0; i < 45; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.textContent = confettiItems[Math.floor(Math.random() * confettiItems.length)];
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-40px";
    c.style.animationDelay = Math.random() * 1.5 + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3500);
  }
}

function restartGame() {
  startGame();
}

function playSound(sound) {
  if (muted) return;
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

function toggleMute() {
  muted = !muted;
  document.querySelector(".volumeBox button").textContent = muted ? "Unmute" : "Mute";
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}
</script>

</body>
</html>
