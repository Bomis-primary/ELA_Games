<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunny's Word Catch — Interjections: Oh & Alas | Grade 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#8ECAE6;
    --sky-bottom:#CDEAF7;
    --grass-dark:#3A7D44;
    --grass-light:#5CA85E;
    --sun:#FFB703;
    --sun-glow:#FFD968;
    --card:#FFF8ED;
    --ink:#2B3A2E;
    --oh-color:#4C9AFF;
    --alas-color:#FF6B6B;
    --happy:#3FA34D;
  }
  *{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Nunito',sans-serif;
    background:linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 45%, var(--grass-light) 46%, var(--grass-dark) 100%);
    min-height:100vh;
    display:flex; justify-content:center; align-items:center;
    padding:12px; color:var(--ink);
  }
  h1,.display{font-family:'Baloo 2',cursive;}

  /* ---------- Splash ---------- */
  .splash{
    position:fixed; inset:0; z-index:999;
    background:linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; transition:opacity .5s ease;
  }
  .splash.hidden{opacity:0; pointer-events:none;}
  .splash img{max-width:220px; width:55%; animation:bob 2.4s ease-in-out infinite;}
  .splash-title{font-size:24px; text-align:center; padding:0 20px;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .splash-rules{font-size:14px; text-align:center; max-width:340px; line-height:1.6; background:rgba(255,255,255,.6); padding:14px 18px; border-radius:14px;}
  .start-btn{
    font-family:'Baloo 2',cursive; font-size:22px; font-weight:700; color:#fff;
    background:var(--happy); border:none; border-radius:50px; padding:16px 44px;
    box-shadow:0 6px 0 #2c7a37, 0 10px 18px rgba(0,0,0,.18); cursor:pointer; transition:transform .1s;
  }
  .start-btn:active{transform:translateY(4px); box-shadow:0 2px 0 #2c7a37;}

  /* ---------- Main ---------- */
  .container{
    max-width:640px; width:100%; background:var(--card); border-radius:26px;
    box-shadow:0 14px 40px rgba(0,0,0,.22); overflow:hidden;
    opacity:0; transition:opacity .5s ease;
  }
  .container.visible{opacity:1;}
  .header{
    background:linear-gradient(135deg, var(--sun) 0%, #FF9F1C 100%);
    color:#fff; padding:16px 20px; text-align:center;
  }
  .header h1{font-size:23px; text-shadow:0 2px 0 rgba(0,0,0,.12);}
  .header p{font-size:13px; margin-top:2px; opacity:.95;}

  .scoreboard{
    display:flex; justify-content:space-around; padding:10px;
    background:rgba(255,255,255,.28); border-radius:14px; margin:12px 16px 0;
  }
  .score-item{text-align:center; font-size:12px; font-weight:700;}
  .score-item span{display:block; font-family:'Baloo 2',cursive; font-size:20px; margin-top:1px;}
  .lives{display:flex; gap:3px; justify-content:center; font-size:18px;}

  /* ---------- Scenario banner ---------- */
  .scenario-banner{
    margin:12px 16px 0; padding:12px 14px; background:#FFF0D6;
    border:2px dashed #FFB703; border-radius:14px; text-align:center;
  }
  .scenario-emoji{font-size:30px;}
  .scenario-text{font-size:16px; font-weight:700; margin-top:4px;}
  .blank{color:#FF7A1C;}

  /* ---------- Game canvas ---------- */
  .game-wrap{padding:14px 16px; position:relative;}
  #gameCanvas{
    width:100%; height:300px; display:block; margin:0 auto;
    background:linear-gradient(to bottom, #BFE3F3 0%, #DFF1DB 70%, #C7E8B0 100%);
    border-radius:16px; border:3px solid #FFD968; touch-action:none;
  }
  .toast{
    position:absolute; left:50%; top:40%; transform:translate(-50%,-50%) scale(0.5);
    font-family:'Baloo 2',cursive; font-size:26px; font-weight:800; color:#fff;
    padding:10px 24px; border-radius:16px; opacity:0; pointer-events:none;
    transition:all .25s ease; z-index:5; text-align:center;
  }
  .toast.show{opacity:1; transform:translate(-50%,-50%) scale(1);}
  .toast.good{background:#3FA34D;}
  .toast.bad{background:#E05656;}

  .controls{display:flex; justify-content:center; gap:16px; margin-top:12px;}
  .move-btn{
    width:64px; height:52px; border:none; border-radius:12px;
    background:linear-gradient(135deg,#8ECAE6,#4C9AFF); color:#fff;
    font-size:24px; font-weight:800; cursor:pointer;
    box-shadow:0 4px 0 #2f6fb0; user-select:none;
  }
  .move-btn:active{transform:translateY(3px); box-shadow:0 1px 0 #2f6fb0;}

  /* ---------- Sunflower reward panel ---------- */
  .garden{
    position:relative; height:150px; margin:6px 16px 0;
    border-radius:14px; overflow:hidden;
    background:linear-gradient(to bottom, #DFF1DB 0%, #C7E8B0 60%, #9FD37E 100%);
    border:2px solid #FFD968;
  }
  .pot{position:absolute; bottom:10px; left:50%; transform:translateX(-50%); width:56px; height:38px;
    background:linear-gradient(180deg,#C97B4A,#A85F35); border-radius:4px 4px 14px 14px;}
  .stem{position:absolute; bottom:44px; left:50%; transform:translateX(-50%); width:6px;
    background:linear-gradient(180deg,#6FBF6C,#3F8F45); border-radius:6px; height:0px;
    transition:height .6s cubic-bezier(.34,1.56,.64,1);}
  .leaf{position:absolute; opacity:0; width:22px; height:13px; background:#4CA652; transition:all .5s ease;}
  .leaf-left{bottom:70px; left:calc(50% - 4px); border-radius:0 40px 0 40px; transform:translateX(-100%) scale(0);}
  .leaf-right{bottom:90px; left:calc(50% + 4px); border-radius:40px 0 40px 0; transform:scale(0);}
  .flower-head{
    position:absolute; left:50%; bottom:0; width:88px; height:88px;
    transform:translate(-50%,0) scale(0); opacity:0;
    transition:transform .6s cubic-bezier(.34,1.56,.64,1), opacity .4s ease, bottom .6s cubic-bezier(.34,1.56,.64,1);
    filter:drop-shadow(0 4px 6px rgba(60,40,10,.25));
  }
  .flower-head svg{width:100%; height:100%; overflow:visible;}
  .flower-head.happy{transform:translate(-50%,0) scale(1.08) rotate(-2deg);}
  .flower-head.sad .sun-eye{transform:translateY(2px) scaleY(.7);}
  .flower-head.sad #mouthHappy{opacity:0;} .flower-head.sad #mouthSad{opacity:1;}
  .flower-head.happy #mouthHappy{opacity:1;} .flower-head.happy #mouthSad{opacity:0;}
  .sun-eye{transition:transform .2s ease; transform-origin:center;}
  #mouthSad{opacity:0; transition:opacity .2s;} #mouthHappy{opacity:1; transition:opacity .2s;}

  .garden.stage-1 .stem{height:24px;}
  .garden.stage-2 .stem{height:42px;}
  .garden.stage-2 .leaf{opacity:1; transform:scale(1);}
  .garden.stage-2 .leaf-left{transform:translateX(-100%) scale(1);}
  .garden.stage-3 .stem{height:60px;}
  .garden.stage-3 .leaf{opacity:1; transform:scale(1);}
  .garden.stage-3 .leaf-left{transform:translateX(-100%) scale(1);}
  .garden.stage-4 .stem, .garden.stage-5 .stem{height:78px;}
  .garden.stage-4 .leaf, .garden.stage-5 .leaf{opacity:1; transform:scale(1);}
  .garden.stage-4 .leaf-left, .garden.stage-5 .leaf-left{transform:translateX(-100%) scale(1);}
  .garden.stage-4 .flower-head, .garden.stage-5 .flower-head{opacity:1; transform:translate(-50%,0) scale(1); bottom:70px;}
  .garden.stage-5 .flower-head{transform:translate(-50%,0) scale(1.15); bottom:90px;}
  .growth-label{text-align:center; margin-top:4px; font-weight:800; color:#3F8F45; font-size:12px; padding-bottom:8px;}

  .volume-row{display:flex; align-items:center; justify-content:center; gap:8px; padding:10px 16px 16px; font-size:12px; font-weight:700;}
  .volume-row input{width:120px;}

  /* ---------- End modal ---------- */
  .end-modal{
    display:none; position:fixed; inset:0; background:rgba(30,50,30,.75); z-index:1000;
    justify-content:center; align-items:center; padding:20px;
  }
  .end-box{
    background:var(--card); border-radius:22px; padding:28px; max-width:420px; width:100%;
    text-align:center; animation:pop .3s ease-out; box-shadow:0 16px 40px rgba(0,0,0,.3);
  }
  @keyframes pop{from{transform:scale(.85); opacity:0;} to{transform:scale(1); opacity:1;}}
  .big-score{font-family:'Baloo 2',cursive; font-size:44px; color:#FF9F1C; margin:8px 0;}
  .end-msg{font-size:16px; line-height:1.6; margin-bottom:10px;}
  .restart-btn{
    margin-top:14px; padding:14px 36px; font-family:'Baloo 2',cursive; font-size:18px; font-weight:700;
    color:#fff; background:var(--happy); border:none; border-radius:50px; cursor:pointer; box-shadow:0 5px 0 #2c7a37;
  }
  .restart-btn:active{transform:translateY(3px); box-shadow:0 2px 0 #2c7a37;}

  @media (max-width:480px){
    .header h1{font-size:19px;}
    #gameCanvas{height:260px;}
    .scenario-text{font-size:14px;}
  }
</style>
</head>
<body>

  <div class="splash" id="splash">
    <img src="assets/logo.png" alt="Logo" onerror="this.style.display='none'">
    <div class="splash-title">🌻 Sunny's Word Catch</div>
    <div class="splash-rules">
      Read the sentence, then <strong>move the basket</strong> to catch the word that fits —
      <strong>"Oh"</strong> or <strong>"Alas"</strong>! Catch the wrong word and you'll lose a life. 🧺
    </div>
    <button class="start-btn" id="startBtn">Start Catching! 🌱</button>
  </div>

  <div class="container" id="mainContainer">
    <div class="header">
      <h1>🌻 Sunny's Word Catch</h1>
      <p>Catch the correct interjection before it falls!</p>
    </div>

    <div class="scoreboard">
      <div class="score-item">Score<span id="scoreVal">0</span></div>
      <div class="score-item">Round<span id="roundVal">0/10</span></div>
      <div class="score-item">Lives<div class="lives" id="livesVal">🌻🌻🌻</div></div>
    </div>

    <div class="scenario-banner">
      <div class="scenario-emoji" id="scenarioEmoji">😲</div>
      <div class="scenario-text" id="scenarioText"></div>
    </div>

    <div class="game-wrap">
      <canvas id="gameCanvas"></canvas>
      <div class="toast" id="toast"></div>
      <div class="controls">
        <button class="move-btn" id="leftBtn">◀</button>
        <button class="move-btn" id="rightBtn">▶</button>
      </div>
    </div>

    <div class="garden stage-0" id="garden">
      <div class="pot"></div>
      <div class="stem"></div>
      <div class="leaf leaf-left"></div>
      <div class="leaf leaf-right"></div>
      <div class="flower-head" id="flowerHead">
        <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="petalBackGrad" cx="50%" cy="20%" r="80%">
              <stop offset="0%" stop-color="#F7931E"/><stop offset="100%" stop-color="#E07A0A"/>
            </radialGradient>
            <radialGradient id="petalFrontGrad" cx="50%" cy="20%" r="80%">
              <stop offset="0%" stop-color="#FFDE6B"/><stop offset="100%" stop-color="#FFC93C"/>
            </radialGradient>
            <radialGradient id="centerGrad" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#A9702E"/><stop offset="55%" stop-color="#7C4A1E"/><stop offset="100%" stop-color="#5C3315"/>
            </radialGradient>
          </defs>
          <g id="petalsBack"></g>
          <g id="petalsFront"></g>
          <circle cx="70" cy="70" r="26" fill="url(#centerGrad)"/>
          <g id="seedSpiral"></g>
          <circle cx="70" cy="70" r="26" fill="none" stroke="#4A2A10" stroke-width="1.5" opacity=".5"/>
          <g id="faceGroup">
            <ellipse class="sun-eye" cx="61" cy="66" rx="2.6" ry="3.6" fill="#2B1B0C"/>
            <ellipse class="sun-eye" cx="79" cy="66" rx="2.6" ry="3.6" fill="#2B1B0C"/>
            <path id="mouthHappy" d="M60 76 Q70 84 80 76" stroke="#2B1B0C" stroke-width="2.6" fill="none" stroke-linecap="round"/>
            <path id="mouthSad" d="M60 80 Q70 74 80 80" stroke="#2B1B0C" stroke-width="2.6" fill="none" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
    </div>
    <div class="growth-label" id="growthLabel">Sunny is a tiny seed 🌱</div>

    <div class="volume-row">
      🔊 <input type="range" id="volumeSlider" min="0" max="100" value="80"> <span id="volumeLabel">80%</span>
    </div>
  </div>

  <div class="end-modal" id="endModal">
    <div class="end-box">
      <div style="font-size:40px;">🌻</div>
      <div class="big-score" id="finalScore">0/10</div>
      <div class="end-msg" id="finalMsg"></div>
      <button class="restart-btn" id="restartBtn">🔄 Play Again</button>
    </div>
  </div>

<script>
  /* ================= AUDIO ================= */
  const correctSound = new Audio('assets/correct.mp3');
  const wrongSound = new Audio('assets/wrong.mp3');
  const celebrationSound = new Audio('assets/freesound_community-claps-44774.mp3');
  let volume = 0.8;
  [correctSound, wrongSound, celebrationSound].forEach(a => a.volume = volume);
  document.getElementById('volumeSlider').addEventListener('input', e => {
    volume = e.target.value / 100;
    [correctSound, wrongSound, celebrationSound].forEach(a => a.volume = volume);
    document.getElementById('volumeLabel').textContent = e.target.value + '%';
  });
  function playCorrect(){ correctSound.currentTime = 0; correctSound.play().catch(()=>{}); }
  function playWrong(){ wrongSound.currentTime = 0; wrongSound.play().catch(()=>{}); }
  function playCelebration(){ celebrationSound.currentTime = 0; celebrationSound.play().catch(()=>{}); }

  /* ================= SUNFLOWER (SVG, real phyllotaxis spiral) ================= */
  function buildSunflower(){
    const svgNS = 'http://www.w3.org/2000/svg';
    const cx = 70, cy = 70;
    function makePetal(len, width){
      return `M0,0 C${-width/2},${-len*0.35} ${-width/2},${-len*0.75} 0,${-len} C${width/2},${-len*0.75} ${width/2},${-len*0.35} 0,0 Z`;
    }
    const backGroup = document.getElementById('petalsBack');
    const frontGroup = document.getElementById('petalsFront');
    const backCount = 14, frontCount = 14;
    for(let i=0;i<backCount;i++){
      const angle = (360/backCount) * i;
      const p = document.createElementNS(svgNS,'path');
      p.setAttribute('d', makePetal(52, 22));
      p.setAttribute('fill', 'url(#petalBackGrad)');
      p.setAttribute('transform', `translate(${cx},${cy}) rotate(${angle})`);
      backGroup.appendChild(p);
    }
    for(let i=0;i<frontCount;i++){
      const angle = (360/frontCount) * i + (360/frontCount)/2;
      const p = document.createElementNS(svgNS,'path');
      p.setAttribute('d', makePetal(40, 17));
      p.setAttribute('fill', 'url(#petalFrontGrad)');
      p.setAttribute('transform', `translate(${cx},${cy}) rotate(${angle})`);
      frontGroup.appendChild(p);
    }
    const seedGroup = document.getElementById('seedSpiral');
    const seedCount = 110, goldenAngle = 137.50776, maxRadius = 23;
    for(let n=0;n<seedCount;n++){
      const r = maxRadius * Math.sqrt(n / seedCount);
      const theta = n * goldenAngle * Math.PI / 180;
      const x = cx + r * Math.cos(theta), y = cy + r * Math.sin(theta);
      const seed = document.createElementNS(svgNS,'ellipse');
      seed.setAttribute('cx', x.toFixed(2)); seed.setAttribute('cy', y.toFixed(2));
      seed.setAttribute('rx', 1.6); seed.setAttribute('ry', 2.2);
      seed.setAttribute('transform', `rotate(${(theta*180/Math.PI + 90).toFixed(1)} ${x.toFixed(2)} ${y.toFixed(2)})`);
      seed.setAttribute('fill', n % 3 === 0 ? '#3F2410' : '#5A3418');
      seed.setAttribute('opacity', '0.85');
      seedGroup.appendChild(seed);
    }
  }
  buildSunflower();

  const growthLabels = [
    'Sunny is a tiny seed 🌱','A sprout is peeking out! 🌿','Growing taller! 🌿',
    'Leaves unfurling! 🍃','A bud is forming! 🌼','Sunny is in full bloom! 🌻'
  ];
  function setGrowthStage(stage){
    document.getElementById('garden').className = 'garden stage-' + stage;
    document.getElementById('growthLabel').textContent = growthLabels[stage];
  }

  /* ================= QUESTIONS ================= */
  const questions = [
    { emoji:'😲', text:'<span class="blank">___</span>! A butterfly landed right on my nose!', answer:'oh' },
    { emoji:'😢', text:'<span class="blank">___</span>! My kite got stuck in the tall tree.', answer:'alas' },
    { emoji:'😮', text:'<span class="blank">___</span>! I didn\'t know you were coming to visit today!', answer:'oh' },
    { emoji:'😔', text:'<span class="blank">___</span>! I forgot my homework at home.', answer:'alas' },
    { emoji:'🌻', text:'<span class="blank">___</span>! Look how tall the sunflower grew overnight!', answer:'oh' },
    { emoji:'🌧️', text:'<span class="blank">___</span>! The rain ruined our picnic in the park.', answer:'alas' },
    { emoji:'🌈', text:'<span class="blank">___</span>! There\'s a rainbow in the sky after the rain!', answer:'oh' },
    { emoji:'💔', text:'<span class="blank">___</span>! My favorite mug slipped and broke.', answer:'alas' },
    { emoji:'😱', text:'<span class="blank">___</span>! You scared me when you jumped out like that!', answer:'oh' },
    { emoji:'🚌', text:'<span class="blank">___</span>! We ran outside just as the school bus left.', answer:'alas' }
  ];
  function shuffle(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  /* ================= GAME STATE ================= */
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  function resizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
  }
  window.addEventListener('resize', resizeCanvas);

  let order = [];
  let roundIndex = 0;
  let score = 0;
  let lives = 3;
  const MAX_LIVES = 3;
  let basketX = 0;
  const basketW = 74, basketH = 46;
  let moveLeft = false, moveRight = false;
  const moveSpeed = 6.2;
  let fallingWords = [];
  let spawnTimer = null;
  let rafId = null;
  let spawnCount = 0;
  let baseFallSpeed = 1.7;
  let roundActive = false;
  let gameRunning = false;

  function updateHUD(){
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('roundVal').textContent = roundIndex + '/10';
    document.getElementById('livesVal').textContent = '🌻'.repeat(lives) + '🥀'.repeat(MAX_LIVES-lives);
  }

  function initGame(){
    order = shuffle(questions);
    roundIndex = 0; score = 0; lives = 3;
    setGrowthStage(0);
    updateHUD();
    resizeCanvas();
    basketX = canvas.width/2 - basketW/2;
    document.getElementById('endModal').style.display = 'none';
    gameRunning = true;
    startRound();
    if(!rafId) gameLoop();
  }

  function startRound(){
    if(roundIndex >= order.length){ endGame(true); return; }
    const q = order[roundIndex];
    document.getElementById('scenarioEmoji').textContent = q.emoji;
    document.getElementById('scenarioText').innerHTML = q.text;
    fallingWords = [];
    spawnCount = 0;
    baseFallSpeed = 1.7 + roundIndex * 0.12;
    roundActive = true;
    clearInterval(spawnTimer);
    spawnTimer = setInterval(spawnWord, 1300);
    spawnWord();
  }

  function spawnWord(){
    if(!roundActive) return;
    if(fallingWords.length >= 3) return;
    const q = order[roundIndex];
    spawnCount++;
    let type;
    if(spawnCount % 3 === 0){ type = q.answer; }
    else { type = Math.random() < 0.5 ? 'oh' : 'alas'; }
    const w = 78, h = 40;
    const x = Math.random() * (canvas.width - w);
    fallingWords.push({ x, y: -h, w, h, type, vy: baseFallSpeed + Math.random()*0.4 });
  }

  function showToast(text, good){
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.className = 'toast show ' + (good ? 'good' : 'bad');
    setTimeout(() => toast.classList.remove('show'), 700);
  }

  function flashFlower(happy){
    const fh = document.getElementById('flowerHead');
    fh.classList.add(happy ? 'happy' : 'sad');
    setTimeout(() => fh.classList.remove(happy ? 'happy' : 'sad'), 800);
  }

  function handleCatch(word, isCorrect){
    fallingWords = fallingWords.filter(w => w !== word);
    if(isCorrect){
      score++;
      playCorrect();
      showToast('Correct! 🎉', true);
      flashFlower(true);
      roundActive = false;
      clearInterval(spawnTimer);
      fallingWords = [];
      roundIndex++;
      setGrowthStage(Math.min(5, Math.ceil(roundIndex/2)));
      updateHUD();
      setTimeout(startRound, 1100);
    } else {
      lives--;
      playWrong();
      showToast('Not that one!', false);
      flashFlower(false);
      updateHUD();
      if(lives <= 0){
        roundActive = false;
        clearInterval(spawnTimer);
        endGame(false);
      }
    }
  }

  function endGame(completed){
    gameRunning = false;
    roundActive = false;
    clearInterval(spawnTimer);
    const modal = document.getElementById('endModal');
    const pct = Math.round((score/order.length)*100);
    let msg = '';
    if(completed && pct >= 80){ msg = '🌟 Amazing! Sunny bloomed beautifully — you really know "Oh" and "Alas"!'; playCelebration(); }
    else if(completed && pct >= 50){ msg = '👍 Nice work! A little more practice and you\'ll be an expert!'; }
    else if(completed){ msg = '💪 Good try! Play again to help Sunny bloom fully.'; }
    else { msg = '🥀 Sunny ran out of energy! Take a breath and try again — you can do it!'; }
    document.getElementById('finalScore').textContent = score + '/' + order.length;
    document.getElementById('finalMsg').textContent = msg;
    modal.style.display = 'flex';
  }

  /* ================= DRAW LOOP ================= */
  function drawBasket(){
    const y = canvas.height - basketH - 8;
    ctx.fillStyle = '#A85F35';
    ctx.beginPath();
    ctx.moveTo(basketX, y);
    ctx.lineTo(basketX + basketW, y);
    ctx.lineTo(basketX + basketW - 8, y + basketH);
    ctx.lineTo(basketX + 8, y + basketH);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7A4526';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,.25)';
    ctx.lineWidth = 1.5;
    for(let i=1;i<4;i++){
      ctx.beginPath();
      ctx.moveTo(basketX + i*basketW/4, y+2);
      ctx.lineTo(basketX + i*basketW/4 - 2, y + basketH - 2);
      ctx.stroke();
    }
  }

  function drawWord(w){
    ctx.save();
    ctx.fillStyle = w.type === 'oh' ? '#4C9AFF' : '#FF6B6B';
    roundRect(ctx, w.x, w.y, w.w, w.h, 14);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '800 20px Baloo 2, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(w.type === 'oh' ? 'Oh' : 'Alas', w.x + w.w/2, w.y + w.h/2 + 1);
    ctx.restore();
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function gameLoop(){
    rafId = requestAnimationFrame(gameLoop);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(gameRunning){
      if(moveLeft) basketX -= moveSpeed;
      if(moveRight) basketX += moveSpeed;
      basketX = Math.max(4, Math.min(canvas.width - basketW - 4, basketX));
    }

    ctx.fillStyle = 'rgba(159,211,126,.5)';
    ctx.fillRect(0, canvas.height-6, canvas.width, 6);

    if(roundActive){
      const q = order[roundIndex];
      const basketY = canvas.height - basketH - 8;
      fallingWords.forEach(w => { w.y += w.vy; });

      fallingWords.slice().forEach(w => {
        const caughtX = w.x + w.w/2 > basketX && w.x + w.w/2 < basketX + basketW;
        const caughtY = w.y + w.h >= basketY && w.y + w.h <= basketY + basketH + 10;
        if(caughtX && caughtY){
          handleCatch(w, w.type === q.answer);
        } else if(w.y > canvas.height){
          fallingWords = fallingWords.filter(fw => fw !== w);
        }
      });

      fallingWords.forEach(drawWord);
    }

    drawBasket();
  }

  /* ================= CONTROLS ================= */
  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft'){ moveLeft = true; e.preventDefault(); }
    if(e.key === 'ArrowRight'){ moveRight = true; e.preventDefault(); }
  });
  document.addEventListener('keyup', e => {
    if(e.key === 'ArrowLeft'){ moveLeft = false; }
    if(e.key === 'ArrowRight'){ moveRight = false; }
  });

  function bindHold(btn, onFn, offFn){
    btn.addEventListener('pointerdown', e => { e.preventDefault(); onFn(); });
    btn.addEventListener('pointerup', offFn);
    btn.addEventListener('pointerleave', offFn);
    btn.addEventListener('pointercancel', offFn);
  }
  bindHold(document.getElementById('leftBtn'), () => moveLeft = true, () => moveLeft = false);
  bindHold(document.getElementById('rightBtn'), () => moveRight = true, () => moveRight = false);

  canvas.addEventListener('pointerdown', e => { canvas.setPointerCapture(e.pointerId); dragMove(e); });
  canvas.addEventListener('pointermove', e => { if(e.pressure > 0 || e.buttons > 0) dragMove(e); });
  function dragMove(e){
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    basketX = Math.max(4, Math.min(canvas.width - basketW - 4, x - basketW/2));
  }

  /* ================= START / RESTART ================= */
  document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('mainContainer').classList.add('visible');
    resizeCanvas();
    initGame();
  });
  document.getElementById('restartBtn').addEventListener('click', () => {
    initGame();
  });
</script>
</body>
</html>
