<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 4 Nouns - Spin the Wheel</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
}

#splash {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:white;
    display:flex; justify-content:center; align-items:center;
    z-index: 10;
}

#wheel-container {
    position: relative;
    width: 400px;
    height: 400px;
    margin: auto;
    top: 50px;
}

#wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 5px solid white;
    position: relative;
    transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
}

#wheel span {
    position: absolute;
    width: 50%;
    height: 50%;
    left: 50%;
    top: 50%;
    transform-origin: 0% 0%;
    text-align: right;
    font-size: 18px;
    color: white;
    font-weight: bold;
}

#pin {
    position: absolute;
    top: -20px;
    left: 50%;
    margin-left: -15px;
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-bottom: 30px solid red;
    z-index: 2;
}

#sentence {
    text-align:center;
    margin-top: 20px;
    font-size: 24px;
    font-weight:bold;
    color:white;
}

#buttons {
    text-align:center;
    margin-top: 20px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    font-weight:bold;
    border: none;
    border-radius: 6px;
    cursor:pointer;
}

#correctBtn {background-color: green; color:white;}
#wrongBtn {background-color: red; color:white;}

#pinLanded {
    text-align:center;
    margin-top:10px;
    font-size: 20px;
    color:white;
    font-weight:bold;
}

#spinBtn {
    display:block;
    margin:20px auto;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background-color: orange;
    font-weight:bold;
}

#background {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: linear-gradient(to bottom right, #1e3c72, #2a5298); /* royal blue shade */
    z-index:-1;
    overflow:hidden;
}

/* bubbles */
.bubble {
    position: absolute;
    border-radius: 50%;
    background: #fdfd96;
    opacity: 0.6;
    pointer-events:none;
    animation: float 10s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-1100px);}
}
</style>
</head>
<body>

<div id="background"></div>

<div id="splash">
    <img src="assets/logo.png" alt="Innovine Logo" style="width:200px;">
</div>

<div id="wheel-container">
    <div id="pin"></div>
    <div id="wheel">
        <span style="transform:rotate(0deg)">Common</span>
        <span style="transform:rotate(72deg)">Proper</span>
        <span style="transform:rotate(144deg)">Abstract</span>
        <span style="transform:rotate(216deg)">Collective</span>
        <span style="transform:rotate(288deg)">Concrete</span>
    </div>
</div>

<div id="sentence">Courage is necessary.</div>

<button id="spinBtn">Spin the Wheel</button>

<div id="buttons">
    <button id="correctBtn">Correct</button>
    <button id="wrongBtn">Wrong</button>
</div>

<div id="pinLanded"></div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const splash = document.getElementById('splash');
setTimeout(()=>{ splash.style.display='none'; }, 5000);

const wheel = document.getElementById('wheel');
const sentence = document.getElementById('sentence');
const pinLanded = document.getElementById('pinLanded');
const correctBtn = document.getElementById('correctBtn');
const wrongBtn = document.getElementById('wrongBtn');
const spinBtn = document.getElementById('spinBtn');

const nouns = ["Common", "Proper", "Abstract", "Collective", "Concrete"];
const sentences = [
    "Courage is necessary.",
    "The cat is sleeping.",
    "Paris is beautiful.",
    "A flock of birds flew away.",
    "Happiness is important."
];

function randomInt(max){ return Math.floor(Math.random()*max); }

function createBubbles(){
    for(let i=0;i<15;i++){
        let bubble = document.createElement('div');
        bubble.classList.add('bubble');
        bubble.style.width = bubble.style.height = (10 + Math.random()*30) + 'px';
        bubble.style.left = Math.random()*window.innerWidth + 'px';
        bubble.style.top = window.innerHeight + 'px';
        bubble.style.animationDuration = (6 + Math.random()*6) + 's';
        document.body.appendChild(bubble);
    }
}
createBubbles();

spinBtn.addEventListener('click', ()=>{
    let randIndex = randomInt(nouns.length);
    let randSentence = sentences[randIndex];
    sentence.textContent = randSentence;

    let degree = 360/5 * randIndex + 360*5 + 36; // align with pin
    wheel.style.transform = `rotate(${degree}deg)`;

    pinLanded.textContent = "Pin landed on: " + nouns[randIndex];
});
correctBtn.addEventListener('click', ()=>{
    document.getElementById('correctSound').play();
});
wrongBtn.addEventListener('click', ()=>{
    document.getElementById('wrongSound').play();
});
</script>
</body>
</html>
