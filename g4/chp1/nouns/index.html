<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 4 Nouns - Spin the Wheel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Arbutus+Slab&display=swap');

  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Arbutus Slab', serif;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(to right, #40E0D0, #4169E1);
    position: relative;
  }

  /* Splash */
  #splash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }

  #splash img {
    width: 250px;
  }

  /* Floating bubbles */
  .bubble {
    position: absolute;
    width: 15px;
    height: 15px;
    background: yellow;
    border-radius: 50%;
    opacity: 0.7;
    animation: floatBubble linear infinite;
  }

  @keyframes floatBubble {
    0% { transform: translateY(100vh) translateX(0);}
    100% { transform: translateY(-50px) translateX(50px);}
  }

  /* Container */
  #container {
    text-align: center;
    padding-top: 20px;
  }

  h1 {
    font-size: 2rem;
    color: #fff;
    margin-bottom: 20px;
  }

  #wheel-container {
    position: relative;
    display: inline-block;
    margin-bottom: 20px;
  }

  #wheel {
    width: 350px;
    height: 350px;
    border-radius: 50%;
    border: 6px solid white;
    position: relative;
    overflow: hidden;
    transform: rotate(0deg);
    transition: transform 5s cubic-bezier(0.33, 1, 0.68, 1);
  }

  .segment {
    position: absolute;
    width: 50%;
    height: 50%;
    top: 50%;
    left: 50%;
    transform-origin: 0% 0%;
    text-align: right;
    font-size: 1.2rem;
    color: #fff;
    padding-right: 10px;
  }

  #pin {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-bottom: 30px solid red;
    top: -30px;
    left: calc(50% - 15px);
  }

  #sentence {
    font-size: 1.5rem;
    font-weight: bold;
    color: #fff;
    margin-bottom: 15px;
  }

  #input-block {
    margin-top: 10px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  button {
    padding: 10px 20px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    cursor: pointer;
    border-radius: 5px;
  }

  #correctBtn { background: green; color: #fff; }
  #wrongBtn { background: red; color: #fff; }

  #nounType {
    color: #fff;
    margin-top: 10px;
  }
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <img src="assets/logo.png" alt="Innovine Logo">
</div>

<!-- Bubbles -->
<script>
  for(let i=0;i<25;i++){
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.left = Math.random()*100+'vw';
    b.style.animationDuration = 5+Math.random()*5+'s';
    b.style.width = 10+Math.random()*10+'px';
    b.style.height = 10+Math.random()*10+'px';
    document.body.appendChild(b);
  }
</script>

<div id="container">
  <h1>Grade 4 Nouns - Spin the Wheel</h1>

  <div id="wheel-container">
    <div id="wheel">
      <div class="segment" style="transform: rotate(0deg)">Common</div>
      <div class="segment" style="transform: rotate(72deg)">Proper</div>
      <div class="segment" style="transform: rotate(144deg)">Abstract</div>
      <div class="segment" style="transform: rotate(216deg)">Collective</div>
      <div class="segment" style="transform: rotate(288deg)">Concrete</div>
    </div>
    <div id="pin"></div>
  </div>

  <button onclick="spinWheel()">Spin the Wheel</button>

  <div id="sentence"></div>
  <div id="nounType"></div>

  <div id="input-block">
    <button id="correctBtn">Correct</button>
    <button id="wrongBtn">Wrong</button>
  </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const wheel = document.getElementById('wheel');
const sentenceDiv = document.getElementById('sentence');
const nounDiv = document.getElementById('nounType');
const correctBtn = document.getElementById('correctBtn');
const wrongBtn = document.getElementById('wrongBtn');
const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const clapSound = document.getElementById('clapSound');

let sentences = {
  "Common": ["The dog barked loudly.", "I ate an apple.", "The boy runs fast.", "She opened the book.", "The car stopped."],
  "Proper": ["John is my friend.", "London is a city.", "Mount Everest is tall.", "I met Alice.", "The Nile flows."],
  "Abstract": ["Love is powerful.", "Happiness is contagious.", "Courage is necessary.", "Freedom is precious.", "Honesty is key."],
  "Collective": ["The team won the match.", "A flock of birds flew.", "The class listened carefully.", "A pack of wolves hunted.", "The choir sang well."],
  "Concrete": ["I saw a chair.", "The pencil is blue.", "The river flows.", "The house is big.", "She bought a cake."]
};

let currentNoun = "";
let spinning = false;

function spinWheel(){
  if(spinning) return;
  spinning = true;
  const randomSegment = Math.floor(Math.random()*5);
  const degrees = 720 + randomSegment*72 + 36; // multiple spins + half segment
  wheel.style.transform = `rotate(${degrees}deg)`;

  setTimeout(()=>{
    spinning = false;
    const keys = Object.keys(sentences);
    currentNoun = keys[randomSegment];
    nounDiv.textContent = "Pin landed on: " + currentNoun;
    const senArr = sentences[currentNoun];
    sentenceDiv.textContent = senArr[Math.floor(Math.random()*senArr.length)];
  }, 5200);
}

correctBtn.onclick = () => {
  correctSound.play();
  clapSound.play();
  alert("Teacher marked correct! Next spin.");
}

wrongBtn.onclick = () => {
  wrongSound.play();
  alert("Teacher marked wrong! Try again.");
}

// Splash timeout
setTimeout(()=>{ document.getElementById('splash').style.display='none'; }, 3000);
</script>

</body>
</html>
