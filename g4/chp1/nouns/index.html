<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade 4 Nouns - Spin the Wheel</title>
<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
}
#logo {
    display: block;
    margin: 20px auto;
    width: 150px;
}
#wheelContainer {
    position: relative;
    width: 400px;
    height: 400px;
    margin: 30px auto;
}
#wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 5px solid white;
    position: relative;
    overflow: hidden;
    transform: rotate(0deg);
    transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
}
.sector {
    position: absolute;
    width: 50%;
    height: 50%;
    top: 0; left: 50%;
    transform-origin: left bottom;
    background: rgba(255,255,255,0.2);
    text-align: right;
    padding-right: 10px;
    box-sizing: border-box;
    font-weight: bold;
    font-size: 18px;
    color: white;
}
#pin {
    position: absolute;
    top: -20px;
    left: 50%;
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-bottom: 30px solid red;
    transform: translateX(-50%);
    z-index: 10;
}
#sentenceContainer {
    text-align: center;
    margin-top: 30px;
}
#sentenceContainer h2 {
    font-size: 22px;
    color: #fff;
    margin-bottom: 15px;
}
#typingBox {
    width: 80%;
    padding: 10px;
    font-size: 18px;
    border-radius: 10px;
    border: 2px solid #fff;
    outline: none;
}
#buttons {
    margin-top: 15px;
}
#buttons button {
    font-size: 18px;
    padding: 10px 20px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
#correctBtn { background-color: green; color: white;}
#wrongBtn { background-color: red; color: white;}
#spinBtn { font-size: 20px; padding: 10px 30px; margin-top: 20px; background-color: orange; color: white; border-radius: 10px; border: none; cursor: pointer; font-weight: bold;}

.bubble {
    position: absolute;
    border-radius: 50%;
    background-color: yellow;
    opacity: 0.7;
    pointer-events: none;
}
</style>
</head>
<body>

<img id="logo" src="assets/logo.png" alt="Innovine Logo">

<div id="wheelContainer">
    <div id="pin"></div>
    <div id="wheel">
        <div class="sector" style="transform: rotate(0deg);">Proper</div>
        <div class="sector" style="transform: rotate(72deg);">Abstract</div>
        <div class="sector" style="transform: rotate(144deg);">Collective</div>
        <div class="sector" style="transform: rotate(216deg);">Concrete</div>
        <div class="sector" style="transform: rotate(288deg);">Common</div>
    </div>
</div>

<div id="sentenceContainer">
    <h2>Pin landed on: <span id="nounType">--</span></h2>
    <input type="text" id="typingBox" placeholder="Type a sentence using the noun type">
    <div id="buttons">
        <button id="correctBtn">Correct</button>
        <button id="wrongBtn">Wrong</button>
    </div>
    <button id="spinBtn">Spin the Wheel</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="applauseSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// Bubbles effect
function createBubble() {
    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    const size = Math.random() * 20 + 10;
    bubble.style.width = size + 'px';
    bubble.style.height = size + 'px';
    bubble.style.left = Math.random() * window.innerWidth + 'px';
    bubble.style.top = window.innerHeight + 'px';
    document.body.appendChild(bubble);
    let speed = Math.random() * 2 + 1;
    function move() {
        let top = parseFloat(bubble.style.top);
        if(top + size < 0) {
            bubble.remove();
        } else {
            bubble.style.top = (top - speed) + 'px';
            requestAnimationFrame(move);
        }
    }
    move();
}
setInterval(createBubble, 300);

// Wheel logic
const wheel = document.getElementById('wheel');
const spinBtn = document.getElementById('spinBtn');
const nounTypeSpan = document.getElementById('nounType');
const nounTypes = ["Proper","Abstract","Collective","Concrete","Common"];
let isSpinning = false;

spinBtn.addEventListener('click', () => {
    if(isSpinning) return;
    isSpinning = true;
    const randomDegree = Math.floor(Math.random()*360) + 720; // 2-3 rotations
    wheel.style.transform = `rotate(${randomDegree}deg)`;
    setTimeout(() => {
        const actualDegree = randomDegree % 360;
        const sectorSize = 360 / nounTypes.length;
        const index = Math.floor(actualDegree / sectorSize);
        const landed = nounTypes[index];
        nounTypeSpan.textContent = landed;
        isSpinning = false;
    }, 4200);
});

// Teacher buttons logic
const correctBtn = document.getElementById('correctBtn');
const wrongBtn = document.getElementById('wrongBtn');
const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const applauseSound = document.getElementById('applauseSound');

correctBtn.addEventListener('click', () => {
    correctSound.play();
    applauseSound.play();
    alert("Correct! Well done!");
    document.getElementById('typingBox').value = '';
});

wrongBtn.addEventListener('click', () => {
    wrongSound.play();
    alert("Wrong! Try again.");
});
</script>

</body>
</html>
