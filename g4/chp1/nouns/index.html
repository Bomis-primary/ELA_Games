<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 4 Nouns - Spin the Wheel</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #2e3192, #1bffff);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #fff;
    overflow-x: hidden;
  }

  /* Safe Dedicated Splash Container for Logo Presentation */
  #splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #2e3192, #1bffff);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease, visibility 0.5s;
  }

  #logo {
    width: 250px;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0px 4px 15px rgba(0,0,0,0.3));
  }

  #game-container {
    display: none;
    flex-direction: column;
    align-items: center;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    border: 2px solid rgba(255,255,255,0.2);
    width: 90%;
    max-width: 450px;
    text-align: center;
  }

  #score-board {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding-bottom: 10px;
  }

  #wheel-wrapper {
    position: relative;
    width: 260px;
    height: 260px;
    margin-bottom: 25px;
  }

  /* The Selector Pointer Pin */
  #indicator {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 24px solid #ff4757;
    z-index: 10;
    filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.4));
  }

  #wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 8px solid #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    transform: rotate(0deg);
  }

  .segment {
    position: absolute;
    width: 100%;
    height: 100%;
    left: 0;
    top: 0;
    transform-origin: 50% 50%;
    /* Clips the divs into exact 72-degree pie slices */
    clip-path: polygon(50% 50%, 50% 0%, 100% 36%, 50% 50%);
  }

  /* Distinct color themes per noun type */
  .segment:nth-child(1) { background-color: #ff6b6b; transform: rotate(0deg); }
  .segment:nth-child(2) { background-color: #feca57; transform: rotate(72deg); }
  .segment:nth-child(3) { background-color: #1dd1a1; transform: rotate(144deg); }
  .segment:nth-child(4) { background-color: #54a0ff; transform: rotate(216deg); }
  .segment:nth-child(5) { background-color: #9c88ff; transform: rotate(288deg); }

  .segment-text {
    position: absolute;
    top: 17%;
    left: 64%;
    transform: rotate(36deg);
    font-weight: bold;
    font-size: 13px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
  }

  #spin-btn {
    padding: 12px 35px;
    background: linear-gradient(135deg, #ff9f43, #ff6b6b);
    border: none;
    border-radius: 25px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }

  #spin-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255, 107, 107, 0.6);
  }

  #spin-btn:disabled {
    background: #cccccc;
    box-shadow: none;
    cursor: not-allowed;
  }

  #sentence-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  #target-prompt {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 12px;
    min-height: 24px;
    color: #feca57;
  }

  #noun-input {
    padding: 12px;
    font-size: 16px;
    width: 100%;
    max-width: 320px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 2px solid transparent;
    outline: none;
    text-align: center;
    box-sizing: border-box;
    transition: border 0.3s;
  }

  #noun-input:focus {
    border: 2px solid #ff9f43;
  }

  #submit-btn {
    padding: 10px 25px;
    background-color: #1dd1a1;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }

  #submit-btn:disabled {
    background-color: #7f8c8d;
    cursor: not-allowed;
  }

  #feedback {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    min-height: 25px;
  }

  .success-text { color: #2ed573; }
  .error-text { color: #ff4757; }

  .bubble {
    position: absolute;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    animation: floatUp 8s infinite linear;
    bottom: -50px;
    z-index: -1;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.5; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="splash-screen">
  <img src="g4/chp1/nouns/assets/logo.png" id="logo" alt="Innovine Logo">
</div>

<div id="game-container">
  <div id="score-board">
    <div id="round-display">Round: 1/--</div>
    <div id="score-display">Score: 0</div>
  </div>

  <div id="wheel-wrapper">
    <div id="indicator"></div>
    <div id="wheel">
      <div class="segment"><span class="segment-text">Common</span></div>
      <div class="segment"><span class="segment-text">Proper</span></div>
      <div class="segment"><span class="segment-text">Abstract</span></div>
      <div class="segment"><span class="segment-text">Collective</span></div>
      <div class="segment"><span class="segment-text">Concrete</span></div>
    </div>
  </div>

  <button id="spin-btn">Spin the Wheel</button>

  <div id="sentence-container">
    <div id="target-prompt">Spin the wheel to begin!</div>
    <input type="text" id="noun-input" placeholder="Type your sentence here..." disabled>
    <button id="submit-btn" disabled>Submit Answer</button>
    <div id="feedback"></div>
  </div>
</div>

<script>
const splashScreen = document.getElementById('splash-screen');
const gameContainer = document.getElementById('game-container');
const wheel = document.getElementById('wheel');
const spinBtn = document.getElementById('spin-btn');
const feedback = document.getElementById('feedback');
const nounInput = document.getElementById('noun-input');
const submitBtn = document.getElementById('submit-btn');
const targetPrompt = document.getElementById('target-prompt');
const scoreDisplay = document.getElementById('score-display');
const roundDisplay = document.getElementById('round-display');

// Instantiate Audios using Asset Folder System Paths
const sndCorrect = new Audio('g4/chp1/nouns/assets/correct.mp3');
const sndWrong = new Audio('g4/chp1/nouns/assets/wrong.mp3');
const sndClaps = new Audio('g4/chp1/nouns/assets/freesound_community-claps-44774.mp3');

const nouns = ['Common', 'Proper', 'Abstract', 'Collective', 'Concrete'];

const nounValidationBanks = {
  common: ['boy', 'girl', 'dog', 'cat', 'house', 'car', 'tree', 'book', 'school', 'city', 'country', 'river', 'chair', 'table', 'apple', 'teacher', 'student', 'friend', 'bird', 'toy'],
  proper: ['john', 'mary', 'london', 'paris', 'monday', 'tuesday', 'january', 'february', 'christmas', 'halloween', 'india', 'america', 'nike', 'disney', 'microsoft', 'amazon', 'earth', 'mars'],
  abstract: ['love', 'hate', 'anger', 'joy', 'peace', 'courage', 'fear', 'honesty', 'trust', 'friendship', 'happiness', 'sadness', 'bravery', 'kindness', 'patience', 'wisdom', 'beauty', 'truth'],
  collective: ['team', 'family', 'class', 'flock', 'herd', 'pack', 'swarm', 'bunch', 'band', 'choir', 'group', 'crowd', 'gang', 'army', 'pride', 'collection', 'set'],
  concrete: ['dog', 'cat', 'rock', 'water', 'ice', 'phone', 'computer', 'pizza', 'milk', 'ball', 'shoe', 'flower', 'tree', 'sand', 'desk', 'pencil', 'window', 'door', 'coin', 'cake']
};

let rotation = 0;
let score = 0;
let currentRoundIndex = 0;

// Set Max Rounds anywhere between 10 to 12 dynamically
const maxRounds = Math.floor(Math.random() * 3) + 10; 
let gameSequence = [];

function generateGameSequence() {
  let baseList = [...nouns, ...nouns]; 
  while(baseList.length < maxRounds) {
    baseList.push(nouns[Math.floor(Math.random() * nouns.length)]);
  }
  for (let i = baseList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [baseList[i], baseList[j]] = [baseList[j], baseList[i]];
  }
  return baseList;
}

gameSequence = generateGameSequence();
roundDisplay.textContent = `Round: 1/${maxRounds}`;

setTimeout(() => {
  splashScreen.style.opacity = '0';
  setTimeout(() => {
    splashScreen.style.display = "none";
    gameContainer.style.display = "flex";
  }, 500);
}, 2500);

// Centered Alignment Landings
spinBtn.addEventListener('click', () => {
  spinBtn.disabled = true;
  nounInput.value = '';
  nounInput.disabled = true;
  submitBtn.disabled = true;
  feedback.textContent = '';
  
  const targetNoun = gameSequence[currentRoundIndex];
  const targetIndex = nouns.indexOf(targetNoun);
  
  const segmentArc = 72;
  const targetDegrees = 360 - (targetIndex * segmentArc) - 36; // -36 centers it exactly away from edges
  
  const totalSpins = 1440; 
  rotation += totalSpins + ((targetDegrees - (rotation % 360) + 360) % 360);
  
  wheel.style.transition = 'transform 3.5s cubic-bezier(0.15, 0.85, 0.35, 1)';
  wheel.style.transform = `rotate(${rotation}deg)`;
  
  setTimeout(() => {
    targetPrompt.textContent = `Write a sentence using a ${targetNoun} Noun:`;
    nounInput.disabled = false;
    submitBtn.disabled = false;
    nounInput.focus();
  }, 3540);
});

// Self-Assessment and Asset Audio Engine Playbacks
submitBtn.addEventListener('click', () => {
  const userInput = nounInput.value.trim();
  if (!userInput) {
    feedback.className = "error-text";
    feedback.textContent = "Please write a sentence first!";
    return;
  }

  const currentNoun = gameSequence[currentRoundIndex];
  const cleanWords = userInput.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/);
  const targetBank = nounValidationBanks[currentNoun.toLowerCase()];
  
  let isCorrect = cleanWords.some(word => targetBank.includes(word));

  if (currentNoun === 'Proper') {
    const rawWords = userInput.split(/\s+/);
    const hasCapital = rawWords.some(word => {
      const cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
      return cleanWord && cleanWord[0] === cleanWord[0].toUpperCase() && isNaN(cleanWord[0]);
    });
    if (!hasCapital) isCorrect = false; 
  }

  if (isCorrect) {
    sndCorrect.play().catch(e => console.log("Audio play blocked"));
    feedback.className = "success-text";
    feedback.textContent = "✨ Correct! +10 Points.";
    score += 10;
    scoreDisplay.textContent = `Score: ${score}`;
  } else {
    sndWrong.play().catch(e => console.log("Audio play blocked"));
    feedback.className = "error-text";
    feedback.textContent = `❌ That didn't seem to contain a ${currentNoun} noun.`;
  }

  submitBtn.disabled = true;
  nounInput.disabled = true;

  setTimeout(() => {
    if (currentRoundIndex < maxRounds - 1) {
      currentRoundIndex++;
      roundDisplay.textContent = `Round: ${currentRoundIndex + 1}/${maxRounds}`;
      targetPrompt.textContent = "Spin the wheel for the next round!";
      feedback.textContent = "";
      spinBtn.disabled = false;
    } else {
      sndClaps.play().catch(e => console.log("Audio play blocked"));
      targetPrompt.innerHTML = `🎉 Game Completed!<br>Final Score: ${score}/${maxRounds * 10}`;
      feedback.textContent = "";
      nounInput.style.display = "none";
      submitBtn.style.display = "none";
      
      spinBtn.textContent = "Play Again";
      spinBtn.disabled = false;
      spinBtn.onclick = () => { location.reload(); };
    }
  }, 2500);
});

for (let i = 0; i < 15; i++) {
  const bubble = document.createElement('div');
  bubble.classList.add('bubble');
  bubble.style.left = Math.random() * 100 + 'vw';
  bubble.style.width = (Math.random() * 25 + 10) + 'px';
  bubble.style.height = bubble.style.width;
  bubble.style.animationDuration = (Math.random() * 4 + 5) + 's';
  bubble.style.animationDelay = (Math.random() * 4) + 's';
  document.body.appendChild(bubble);
}
</script>
</body>
</html>
