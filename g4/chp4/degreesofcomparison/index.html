<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Degree of Comparison Detective</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#141e30;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px;}
.splash-screen{position:fixed;inset:0;background:#fff;display:flex;justify-content:center;align-items:center;z-index:9999;transition:opacity 0.5s;}
.splash-screen.hidden{opacity:0;pointer-events:none;}
.splash-screen img{max-width:480px;width:90%;height:auto;animation:logoFloat 2s ease-in-out infinite;}
@keyframes logoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.container{max-width:1200px;width:100%;background:#0b1020;border-radius:20px;border:3px solid #ffd700;overflow:hidden;opacity:0;transition:opacity 0.6s;}
.container.visible{opacity:1;display:flex;flex-direction:column;}
.header{padding:20px;text-align:center;background:linear-gradient(135deg,#ffd700,#ff9f1c);color:#1a1a2e;}
.header h1{font-size:28px;letter-spacing:1px;text-shadow:1px 1px 3px rgba(0,0,0,0.3);}
.stage-indicator{margin-top:5px;display:inline-block;padding:6px 16px;border-radius:20px;background:rgba(26,26,46,0.9);border:2px solid #ffd700;color:#ffd700;font-weight:bold;font-size:14px;}
.game-wrapper{display:flex;flex-direction:row;gap:20px;padding:20px;}
.left-panel{flex:1;background:#1e293b;border-radius:12px;padding:20px;position:relative;min-width:350px;}
.right-panel{flex:1;background:#1f2937;border-radius:12px;padding:20px;min-width:350px;display:flex;flex-direction:column;}
.scenario-title{font-weight:bold;font-size:16px;color:#facc15;margin-bottom:10px;}
.scenario-text{font-size:15px;color:#e5e7eb;}
.options{margin-top:10px;display:flex;flex-direction:column;gap:10px;}
.option-btn{border-radius:6px;border:1px solid #94a3b8;background:#0f172a;color:#e5e7eb;padding:10px;cursor:pointer;transition:all 0.2s;}
.option-btn:hover{background:#1e293b;}
.option-btn.correct{background:#16a34a;color:#ecfdf5;border-color:#4ade80;}
.option-btn.wrong{background:#b91c1c;color:#fee2e2;border-color:#f87171;}
.option-btn.disabled{pointer-events:none;opacity:0.7;}
.feedback{margin-top:6px;font-size:13px;padding:6px;border-radius:6px;display:none;}
.feedback.correct{background:rgba(22,163,74,0.2);border:1px solid #4ade80;color:#bbf7d0;}
.feedback.wrong{background:rgba(185,28,28,0.2);border:1px solid #fca5a5;color:#fecaca;}
.controls{margin-top:10px;}
.btn-next{padding:8px 16px;border-radius:16px;background:#facc15;border:none;color:#111827;display:none;cursor:pointer;}
.btn-next:hover{background:#eab308;}
.timer{font-size:14px;color:#facc15;font-weight:bold;margin-top:5px;}
.score-panel{margin-top:10px;font-size:14px;color:#e5e7eb;}
.final-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;flex-direction:column;z-index:999;}
.final-title{font-size:28px;color:#facc15;margin-bottom:12px;}
.final-score{font-size:22px;margin-bottom:8px;}
.final-rank{font-size:20px;font-weight:bold;margin-bottom:12px;}
.btn-playagain{padding:10px 20px;background:#16a34a;border:none;color:#ecfdf5;border-radius:16px;cursor:pointer;}
.btn-playagain:hover{background:#22c55e;}
</style>
</head>
<body>

<!-- Splash -->
<div class="splash-screen" id="splashScreen"><img src="assets/logo.png" alt="Logo"></div>

<div class="container" id="mainContainer">
<div class="header">
<h1>🕵️ Degree of Comparison Detective 🕵️</h1>
<div class="stage-indicator" id="stageIndicator">Case 1 of 12</div>
</div>

<div class="game-wrapper">
<div class="left-panel">
<div class="scenario-title">Situation:</div>
<div class="scenario-text" id="scenarioText"></div>
<div class="timer" id="timerText">Time Left: 60s</div>
</div>

<div class="right-panel">
<div class="options" id="optionsContainer"></div>
<div class="feedback" id="feedback"></div>
<button class="btn-next" id="nextBtn">Next Case →</button>
<div class="score-panel" id="scorePanel">Score: 0 / 0</div>
</div>
</div>
</div>

<div class="final-screen" id="finalScreen">
<div class="final-title">🏆 Game Complete!</div>
<div class="final-score" id="finalScore"></div>
<div class="final-rank" id="finalRank"></div>
<button class="btn-playagain" id="playAgainBtn">Play Again</button>
</div>

<script>
// Assets
const correctSound=new Audio('assets/correct.mp3');
const wrongSound=new Audio('assets/wrong.mp3');
const celebrationSound=new Audio('assets/freesound_community-claps-44774.mp3');

// Game Data
const questionBank=[
{scenario:"Today is ___ than yesterday.",options:["hot","hotter","hottest","more hot"],correct:1},
{scenario:"This puzzle is ___ than the last one.",options:["easy","easier","easiest","more easy"],correct:1},
{scenario:"My house is ___ than my friend’s.",options:["big","bigger","biggest","more big"],correct:1},
{scenario:"She is the ___ player on the team.",options:["fast","faster","fastest","more fast"],correct:2},
{scenario:"Math is ___ than English for me.",options:["hard","harder","hardest","more hard"],correct:1},
{scenario:"This movie is ___ than the one we watched yesterday.",options:["interesting","more interesting","most interesting","interestinger"],correct:1},
{scenario:"Ali runs ___ than Sam.",options:["quick","quicker","quickest","more quick"],correct:1},
{scenario:"This cake is the ___ of all.",options:["delicious","more delicious","most delicious","deliciouser"],correct:2},
{scenario:"Summer is ___ than winter.",options:["hot","hotter","hottest","more hot"],correct:1},
{scenario:"This book is ___ than the last one I read.",options:["good","better","best","more good"],correct:1},
{scenario:"My car is ___ than my brother’s.",options:["fast","faster","fastest","more fast"],correct:1},
{scenario:"Today is the ___ day of the week.",options:["bright","brighter","brightest","more bright"],correct:2}
];

let currentCase=0,score=0,timer,timeLeft=60;

// Splash init
setTimeout(()=>{document.getElementById('splashScreen').classList.add('hidden');document.getElementById('mainContainer').classList.add('visible');loadCase();},3000);

function loadCase(){
const q=questionBank[currentCase];
document.getElementById('scenarioText').textContent=q.scenario;
const container=document.getElementById('optionsContainer');
container.innerHTML='';
document.getElementById('feedback').style.display='none';
q.options.forEach((opt,i)=>{
const btn=document.createElement('button');
btn.className='option-btn';
btn.textContent=opt;
btn.onclick=()=>selectOption(i);
container.appendChild(btn);
});
document.getElementById('nextBtn').style.display='none';
document.getElementById('stageIndicator').textContent=`Case ${currentCase+1} of 12`;
document.getElementById('scorePanel').textContent=`Score: ${score} / ${currentCase}`;
timeLeft=60;
document.getElementById('timerText').textContent=`Time Left: ${timeLeft}s`;
clearInterval(timer);
timer=setInterval(()=>{
timeLeft--;
document.getElementById('timerText').textContent=`Time Left: ${timeLeft}s`;
if(timeLeft<=0){clearInterval(timer);autoNext();}
},1000);
}

function selectOption(idx){
clearInterval(timer);
const q=questionBank[currentCase];
const buttons=document.querySelectorAll('.option-btn');
buttons.forEach(b=>b.disabled=true);
if(idx===q.correct){buttons[idx].classList.add('correct');document.getElementById('feedback').textContent='Correct!';document.getElementById('feedback').className='feedback correct';correctSound.play();score++;}
else{buttons[idx].classList.add('wrong');document.getElementById('feedback').textContent='Wrong!';document.getElementById('feedback').className='feedback wrong';wrongSound.play();}
document.getElementById('feedback').style.display='block';
document.getElementById('nextBtn').style.display='inline-block';
document.getElementById('nextBtn').onclick=nextCase;
}

function autoNext(){document.getElementById('feedback').textContent='Time up!';document.getElementById('feedback').className='feedback wrong';document.getElementById('feedback').style.display='block';document.getElementById('nextBtn').style.display='inline-block';document.getElementById('nextBtn').onclick=nextCase;}

function nextCase(){currentCase++;if(currentCase<questionBank.length){loadCase();}else{endGame();}}

function endGame(){
document.getElementById('mainContainer').style.display='none';
const final=document.getElementById('finalScreen');
document.getElementById('finalScore').textContent=`You scored ${score} / ${questionBank.length}`;
let rank='';
if(score>=10) rank='Master Detective';
else if(score>=7) rank='Skilled Investigator';
else if(score>=4) rank='Novice Detective';
else rank='Apprentice';
document.getElementById('finalRank').textContent=rank;
celebrationSound.play();
final.style.display='flex';
document.getElementById('playAgainBtn').onclick=()=>{location.reload();}
}
</script>
</body>
</html>
