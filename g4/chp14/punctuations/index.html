<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Punctuation Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#2d1b4e;
  --violet-deep:#3a2568;
  --violet:#6c4fc7;
  --lilac:#a985e8;
  --coral:#ff8a65;
  --gold:#ffca28;
  --mint:#5fd3b0;
  --cream:#fff8ec;
  --card:#ffffff;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Nunito',Arial,sans-serif;background:var(--violet-deep);color:var(--ink);overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:16px;position:relative}
.active{display:flex;flex-direction:column;align-items:center}

/* SPLASH */
#splashScreen{
  background:#fff;
  display:none;
  align-items:center;
  justify-content:center;
  position:fixed;
  inset:0;
  z-index:9999;
}
#splashScreen.active{display:flex}
#splashScreen img{
  width:45%;
  max-width:380px;
  min-width:160px;
  height:auto;
  object-fit:contain;
}

/* GAME BACKGROUND - custom CSS, no image asset */
.game-container{
  max-width:820px;
  width:100%;
  margin:0 auto;
  position:relative;
  background:
    radial-gradient(circle at 15% 10%, rgba(255,255,255,0.16) 0, rgba(255,255,255,0) 38%),
    radial-gradient(circle at 90% 85%, rgba(255,255,255,0.12) 0, rgba(255,255,255,0) 42%),
    linear-gradient(160deg, var(--violet-deep) 0%, var(--violet) 55%, #8b6fd9 100%);
  border-radius:32px;
  padding:20px;
  box-shadow:0 16px 40px rgba(0,0,0,0.35);
  min-height:92vh;
  overflow:hidden;
}
/* floating decorative punctuation marks */
.game-container::before{
  content:"! ? , . ' \" ! ? , .";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Baloo 2',sans-serif;
  font-size:100px;
  font-weight:800;
  letter-spacing:30px;
  color:rgba(255,255,255,0.06);
  white-space:nowrap;
  transform:rotate(-6deg) scale(1.5);
  pointer-events:none;
  z-index:0;
}
.game-container > *{position:relative;z-index:1}

h1{font-family:'Baloo 2',sans-serif;font-size:clamp(28px,5vw,46px);color:#fff;margin:8px 0;text-align:center;text-shadow:0 3px 0 rgba(0,0,0,0.15);letter-spacing:0.5px}
.subtitle{font-size:17px;text-align:center;max-width:480px;line-height:1.5;color:#f1ebff;margin-bottom:6px}

button{border:none;border-radius:20px;padding:14px 30px;margin:8px;font-family:'Baloo 2',sans-serif;font-size:20px;cursor:pointer;background:var(--gold);box-shadow:0 5px 0 #c99416;font-weight:700;color:#4a2e00;transition:transform 0.1s}
button:active{transform:translateY(3px);box-shadow:0 2px 0 #c99416}
button:disabled{background:#cbd5e1!important;box-shadow:0 4px 0 #94a3b8!important;cursor:not-allowed;color:#64748b!important}

.topbar{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.95);padding:10px 18px;border-radius:20px;margin-bottom:14px;width:100%}
.badge{padding:8px 14px;border-radius:12px;font-weight:700;font-size:18px;background:var(--cream);box-shadow:0 2px 5px rgba(0,0,0,0.08);font-family:'Baloo 2',sans-serif}

.main-layout{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%}

/* PATH / LEVEL MAP */
.path-box{position:relative;width:100%;max-width:520px;aspect-ratio:400/320;margin:6px auto;background:rgba(255,255,255,0.08);border-radius:22px;padding:8px;box-shadow:inset 0 2px 8px rgba(0,0,0,0.2)}
#pathSvg{width:100%;height:100%;display:block}
.stone-num{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:11px}
.avatar{
  position:absolute;
  font-size:26px;
  transform:translate(-50%,-60%);
  transition:left 0.7s cubic-bezier(0.34,1.56,0.64,1), top 0.7s cubic-bezier(0.34,1.56,0.64,1);
  filter:drop-shadow(0 3px 3px rgba(0,0,0,0.35));
  z-index:5;
}

.quiz-card{background:var(--card);border-radius:24px;padding:18px;width:100%;max-width:520px;box-shadow:0 8px 20px rgba(0,0,0,0.2);text-align:center}
.question-text{font-family:'Baloo 2',sans-serif;font-size:clamp(17px,3vw,22px);font-weight:700;color:var(--violet-deep);margin-bottom:12px;line-height:1.45}
.hint-banner{min-height:32px;font-size:16px;font-weight:700;color:#c9660b;background:#fff3e0;padding:8px;border-radius:14px;margin:8px 0;display:none}
.hint-banner.visible{display:block}
.msg-banner{min-height:30px;font-size:19px;font-weight:700;margin:6px 0;font-family:'Baloo 2',sans-serif}

.options-zone{display:grid;grid-template-columns:1fr;gap:10px;width:100%;margin-top:12px}
.opt-btn{background:#f1e9ff;border:3px solid #d9c8fb;color:var(--violet-deep);border-radius:16px;padding:13px;font-size:19px;font-family:'Baloo 2',sans-serif;font-weight:700;box-shadow:0 4px 0 #c3aef0}
.opt-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c3aef0}
.opt-btn.correct{background:#c3f0dd!important;border-color:#5fd3b0!important;color:#0d5b41!important;box-shadow:0 4px 0 #3fb897!important}
.opt-btn.wrong{background:#ffd4c9!important;border-color:#ff8a65!important;color:#9a3412!important;box-shadow:0 4px 0 #e8714a!important}
.opt-btn.flash-clue{outline:4px solid #4fc3f7!important;box-shadow:0 0 12px #4fc3f7!important}

.confetti{position:fixed;top:-20px;width:12px;height:12px;pointer-events:none;animation:fall 2.5s linear forwards;z-index:999}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div id="splashScreen" class="screen active">
  <img src="assets/logo.png" alt="Logo">
</div>

<div id="startScreen" class="screen">
  <div class="game-container" style="display:flex;flex-direction:column;justify-content:center;align-items:center">
    <h1>Punctuation Path</h1>
    <p class="subtitle">Walk the path one stone at a time! Answer each question correctly to move your traveler forward all the way to the finish flag.</p>
    <button onclick="startGame()">▶ Start Game</button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="game-container">
    <div class="topbar">
      <div class="badge">⭐ Score: <span id="scoreLabel">0</span></div>
      <div class="badge" id="heartBox">❤️❤️❤️</div>
    </div>

    <div class="main-layout">
      <div class="path-box">
        <svg id="pathSvg" viewBox="0 0 400 320"></svg>
        <div class="avatar" id="avatarToken">🚶</div>
      </div>

      <div class="quiz-card" id="quizCard">
        <div class="question-text" id="qText">Question appears here...</div>
        <div class="hint-banner" id="hintBox"></div>
        <div class="msg-banner" id="msgBox"></div>
        <div class="options-zone" id="optionsBox"></div>
        <div style="margin-top:12px;text-align:right">
          <button id="nextBtn" onclick="advanceStep()" style="display:none">Next ➡️</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="endScreen" class="screen">
  <div class="game-container" style="display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">
    <h1 id="endTitle">Journey Complete!</h1>
    <h2 style="font-family:'Baloo 2',sans-serif;font-size:26px;color:#fff">Final Score: <span id="endScore">0</span>/12</h2>
    <button onclick="startGame()">🔄 Play Again</button>
  </div>
</div>

<audio id="sndRight" preload="auto" src="assets/correct.mp3"></audio>
<audio id="sndWrong" preload="auto" src="assets/wrong.mp3"></audio>

<script>
const dataset = [
  { sentence: 'My name is Sam___', q: 'Which punctuation mark ends this sentence?', a: '.', o: ['.', ',', '?'], h: 'Hint: Use this mark to end a sentence that simply tells something!' },
  { sentence: 'Where is my backpack___', q: 'Which punctuation mark ends this sentence?', a: '?', o: ['.', '?', '!'], h: 'Hint: Use this mark when a sentence is asking something!' },
  { sentence: 'Watch out for that car___', q: 'Which punctuation mark ends this sentence?', a: '!', o: ['.', '!', ','], h: 'Hint: Use this mark to show strong feeling or excitement!' },
  { sentence: 'I have a dog, a cat___ and a fish.', q: 'Which punctuation mark is missing before "and"?', a: ',', o: [',', '.', "'"], h: 'Hint: Use this mark to separate items in a list!' },
  { sentence: 'We packed sandwiches, apples___ and juice for the picnic.', q: 'Which punctuation mark is missing before "and"?', a: ',', o: ["'", ',', '!'], h: 'Hint: Use this mark to separate three or more things in a row!' },
  { sentence: 'I can___t find my shoes.', q: "Which punctuation mark is missing to make a contraction?", a: "'", o: ["'", ',', '.'], h: 'Hint: This mark joins two words together and shows a letter is missing!' },
  { sentence: "That is Marias___ backpack.", q: 'Which punctuation mark shows the backpack belongs to Maria?', a: "'", o: ["'", ',', '?'], h: 'Hint: This mark shows something belongs to someone!' },
  { sentence: 'Its raining outside, so bring an umbrella___', q: 'Which punctuation mark ends this sentence?', a: '.', o: ['.', '!', '?'], h: 'Hint: This sentence is just telling information, not asking or shouting!' },
  { sentence: 'Did you finish your homework___', q: 'Which punctuation mark ends this sentence?', a: '?', o: ['?', '!', '.'], h: 'Hint: This sentence is asking a question!' },
  { sentence: 'The teacher said, ___Please sit down.___', q: "Which punctuation marks show someone's exact words?", a: '" "', o: ['" "', "' '", ', ,'], h: 'Hint: Use these marks around the exact words someone says!' },
  { sentence: 'Wow___ that rocket is fast!', q: 'Which punctuation mark shows excitement right after "Wow"?', a: ',', o: [',', '.', '!'], h: 'Hint: Use this mark after an interjection like "Wow" or "Oh"!' },
  { sentence: 'My favorite subjects are math, science___ and art.', q: 'Which punctuation mark is missing before "and"?', a: ',', o: [',', "'", '.'], h: 'Hint: Use this mark to separate three or more items in a list!' }
];

// Snake-layout stone coordinates in a 400x320 viewBox
const stonePoints = [
  {x:40,y:50}, {x:150,y:50}, {x:260,y:50}, {x:370,y:50},
  {x:370,y:170}, {x:260,y:170}, {x:150,y:170}, {x:40,y:170},
  {x:40,y:290}, {x:150,y:290}, {x:260,y:290}, {x:370,y:290}
];

let step = 0, score = 0, lives = 3, busy = false, hintTimer = null;

const sndRight = document.getElementById('sndRight');
const sndWrong = document.getElementById('sndWrong');

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function drawPath(currentIndex, results) {
  const svg = document.getElementById('pathSvg');
  svg.innerHTML = '';

  // connecting line through all stones
  const linePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const d = 'M ' + stonePoints.map(p => `${p.x} ${p.y}`).join(' L ');
  linePath.setAttribute('d', d);
  linePath.setAttribute('fill', 'none');
  linePath.setAttribute('stroke', 'rgba(255,255,255,0.55)');
  linePath.setAttribute('stroke-width', '6');
  linePath.setAttribute('stroke-linecap', 'round');
  linePath.setAttribute('stroke-dasharray', '2 14');
  svg.appendChild(linePath);

  stonePoints.forEach((p, i) => {
    const status = results[i]; // undefined, 'correct', 'wrong'
    let fill = '#ffffff';
    let stroke = '#c3aef0';
    if (status === 'correct') { fill = '#5fd3b0'; stroke = '#2f9c7c'; }
    else if (status === 'wrong') { fill = '#ff8a65'; stroke = '#d95f3a'; }

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', p.x);
    circle.setAttribute('cy', p.y);
    circle.setAttribute('r', i === currentIndex ? 22 : 18);
    circle.setAttribute('fill', fill);
    circle.setAttribute('stroke', stroke);
    circle.setAttribute('stroke-width', i === currentIndex ? 4 : 3);
    svg.appendChild(circle);

    if (i === currentIndex) {
      const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      pulse.setAttribute('cx', p.x);
      pulse.setAttribute('cy', p.y);
      pulse.setAttribute('r', 28);
      pulse.setAttribute('fill', 'none');
      pulse.setAttribute('stroke', '#ffca28');
      pulse.setAttribute('stroke-width', '3');
      pulse.setAttribute('opacity', '0.85');
      svg.appendChild(pulse);
    }

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', p.x);
    label.setAttribute('y', p.y + 4);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('class', 'stone-num');
    label.setAttribute('fill', status ? '#ffffff' : '#4a3a75');
    label.textContent = (i + 1);
    svg.appendChild(label);
  });

  // finish flag beyond last stone
  const flag = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  const last = stonePoints[stonePoints.length - 1];
  flag.setAttribute('x', last.x + 28);
  flag.setAttribute('y', last.y + 6);
  flag.setAttribute('font-size', '22');
  flag.textContent = '🏁';
  svg.appendChild(flag);

  moveAvatar(currentIndex);
}

function moveAvatar(index) {
  const p = stonePoints[index];
  const avatar = document.getElementById('avatarToken');
  avatar.style.left = (p.x / 400 * 100) + '%';
  avatar.style.top = (p.y / 320 * 100) + '%';
}

let results = [];

function startGame() {
  step = 0;
  score = 0;
  lives = 3;
  busy = false;
  results = new Array(dataset.length).fill(undefined);

  document.getElementById('scoreLabel').textContent = score;
  updateLivesDisplay();
  showScreen('gameScreen');
  drawPath(0, results);
  loadQuestion(step);
}

function updateLivesDisplay() {
  let str = '';
  for(let i=0; i<3; i++) {
    str += (i < lives) ? '❤️' : '🖤';
  }
  document.getElementById('heartBox').textContent = str;
}

function loadQuestion(index) {
  const item = dataset[index];
  document.getElementById('qText').textContent = `"${item.sentence}"  —  ${item.q}`;
  document.getElementById('msgBox').textContent = '';

  const hintBox = document.getElementById('hintBox');
  hintBox.textContent = '';
  hintBox.classList.remove('visible');

  const box = document.getElementById('optionsBox');
  box.innerHTML = '';

  const randomizedOptions = shuffle([...item.o]);
  randomizedOptions.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => evaluateAnswer(btn, opt === item.a, index);
    box.appendChild(btn);
  });

  document.getElementById('nextBtn').style.display = 'none';

  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => {
    hintBox.textContent = item.h;
    hintBox.classList.add('visible');
    document.querySelectorAll('.opt-btn').forEach(b => {
      if (b.textContent === item.a) {
        b.classList.add('flash-clue');
      }
    });
  }, 10000);
}

function confettiEffect() {
  for (let i = 0; i < 25; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = ['#ff4081','#ffeb3b','#00e676','#304ffe','#aa00ff'][Math.floor(Math.random() * 5)];
    c.style.animationDelay = Math.random() * 0.3 + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2600);
  }
}

function evaluateAnswer(selectedBtn, isCorrect, index) {
  if (busy) return;
  busy = true;
  clearTimeout(hintTimer);
  document.getElementById('hintBox').classList.remove('visible');

  const item = dataset[index];
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    b.classList.remove('flash-clue');
    if (b.textContent === item.a) {
      b.classList.add('correct');
    }
  });

  const msg = document.getElementById('msgBox');
  if (isCorrect) {
    score++;
    document.getElementById('scoreLabel').textContent = score;
    msg.style.color = '#2f9c7c';
    msg.textContent = 'Correct! Onward you go!';
    results[index] = 'correct';
    sndRight.currentTime = 0;
    sndRight.play().catch(() => {});
    confettiEffect();
  } else {
    selectedBtn.classList.add('wrong');
    msg.style.color = '#c0431e';
    msg.textContent = `Oops! The correct answer was: ${item.a}`;
    results[index] = 'wrong';
    lives--;
    updateLivesDisplay();
    sndWrong.currentTime = 0;
    sndWrong.play().catch(() => {});
  }

  drawPath(index, results);
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function advanceStep() {
  busy = false;
  if (lives <= 0) {
    concludeGame();
    return;
  }
  step++;
  if (step >= dataset.length) {
    concludeGame();
    return;
  }
  drawPath(step, results);
  loadQuestion(step);
}

function concludeGame() {
  showScreen('endScreen');
  document.getElementById('endScore').textContent = score;

  const title = document.getElementById('endTitle');
  if (lives <= 0) {
    title.textContent = 'Journey Paused! Try Again! 💔';
    title.style.color = '#ffab91';
  } else if (score === dataset.length) {
    title.textContent = 'Perfect Score! Punctuation Champion! 🏆';
    title.style.color = '#ffd54f';
    confettiEffect();
  } else {
    title.textContent = 'Great Journey! 🌟';
    title.style.color = '#fff';
    confettiEffect();
  }
}

window.addEventListener('load', () => {
  setTimeout(() => {
    showScreen('startScreen');
  }, 5000);
});
</script>
</body>
</html>
