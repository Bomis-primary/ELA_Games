<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word Blast Shooter FINAL FIXED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    background:linear-gradient(to bottom,#c8e6c9,#bbdefb);
}

/* ================= SPLASH ================= */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ================= INSTRUCTIONS (CENTER FIXED) ================= */
#instructions{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:#fff8e1;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
    box-sizing:border-box;
}

#instructions h1{
    font-size:32px;
    margin:10px 0;
}

#instructions p{
    font-size:20px;
    font-weight:bold;
    max-width:500px;
}

#startBtn{
    display:none;
    padding:15px 25px;
    font-size:20px;
    background:#444;
    color:white;
    border:none;
    border-radius:10px;
    margin-top:20px;
}

/* ================= TOP ================= */
#topBar{
    position:absolute;
    top:0;
    width:100%;
    background:#607d8b;
    color:white;
    text-align:center;
    padding:8px;
    font-weight:bold;
    display:none;
}

/* ================= HUD ================= */
#hud{
    position:absolute;
    top:40px;
    width:100%;
    display:none;
    justify-content:space-around;
    background:#eceff1;
    padding:6px;
    font-weight:bold;
}

/* ================= GAME ================= */
#game{
    position:absolute;
    top:90px;
    width:100%;
    height:calc(100% - 90px);
    overflow:hidden;
    display:none;
}

#target{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    margin-top:10px;
}

/* WORD */
.word{
    position:absolute;
    padding:12px 18px;
    background:#fff176;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
}

/* BLAST */
.blast{
    transform:scale(2);
    opacity:0;
    transition:0.3s;
}

/* CANNON */
#cannon{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:80px;
    transition:0.3s;
}

/* TIMER */
#timer{
    position:absolute;
    right:10px;
    top:5px;
}

/* END */
#end{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:#fff8e1;
    text-align:center;
    padding-top:80px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- INSTRUCTIONS -->
<div id="instructions">
    <h1>🎯 Word Blast Shooter</h1>
    <p>Shoot the correct describing word!</p>
    <button id="startBtn">START GAME</button>
</div>

<!-- TOP -->
<div id="topBar">🎯 Tap word → aim → blast!</div>

<!-- HUD -->
<div id="hud">
<div id="progress">0/15</div>
<div id="timer">30</div>
</div>

<!-- GAME -->
<div id="game">
<div id="target"></div>
<div id="cannon">🔫</div>
</div>

<!-- END -->
<div id="end">
<h1>🎉 Great Job!</h1>
<p id="finalScore"></p>
<button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

/* ================= DATA ================= */
const questions=[
{obj:"🐱 Cat",ans:"furry",wrong:["fast","hard","hot"]},
{obj:"🚗 Car",ans:"fast",wrong:["thin","hot","soft"]},
{obj:"🌳 Tree",ans:"tall",wrong:["sweet","blue","golden"]},
{obj:"🐶 Dog",ans:"loyal",wrong:["sharp","hard","bright"]},
{obj:"🍎 Apple",ans:"red",wrong:["orange","happy","tall"]},

{obj:"🚌 Bus",ans:"big",wrong:["tiny","soft","round"]},
{obj:"🌙 Moon",ans:"bright",wrong:["dark","fast","spicy"]},
{obj:"🐟 Fish",ans:"slippery",wrong:["rosy","smart","slow"]},
{obj:"🏠 House",ans:"large",wrong:["light","furry","juicy"]},
{obj:"🦋 Butterfly",ans:"colorful",wrong:["sharp","sticky","heavy"]},

{obj:"🦁 Lion",ans:"strong",wrong:["pink","soft","slow"]},
{obj:"❄️ Ice",ans:"cold",wrong:["hot","fast","black"]},
{obj:"☀️ Sun",ans:"hot",wrong:["cold","sad","square"]},
{obj:"🌊 Water",ans:"wet",wrong:["dry","happy","sharp"]},
{obj:"🎈 Balloon",ans:"light",wrong:["heavy","sad","big"]}
];

let questionIndex=0;
let correctCount=0;
let words=[];
let frozen=false;
let lastTime=0;

/* ================= START FLOW ================= */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("instructions").style.display="flex";

setTimeout(()=>{
document.getElementById("startBtn").style.display="inline-block";
},3000);
},5000);

/* ================= START ================= */
document.getElementById("startBtn").onclick=()=>{
document.getElementById("instructions").style.display="none";
document.getElementById("topBar").style.display="block";
document.getElementById("hud").style.display="flex";
document.getElementById("game").style.display="block";

load();
requestAnimationFrame(fall);
startTimer();
};

/* ================= LOAD ================= */
function load(){

document.querySelectorAll(".word").forEach(w=>w.remove());
words=[];

let q = questions[questionIndex];
document.getElementById("target").innerText = q.obj;

let options=[q.ans,...q.wrong].sort(()=>Math.random()-0.5);

options.forEach((w,i)=>{
let div=document.createElement("div");
div.className="word";
div.innerText=w;

div.style.left=(15+i*20)+"%";
div.style.top="120px";

/* FIXED SPEED */
div.speed = 0.4;

div.onclick=()=>handleClick(div,w,q.ans);

game.appendChild(div);
words.push(div);
});

updateHUD();
}

/* ================= STABLE SMOOTH FALL (FIXED GLITCH) ================= */
function fall(timestamp){
if(!lastTime) lastTime = timestamp;
let delta = (timestamp - lastTime)/16;
lastTime = timestamp;

if(!frozen){
words.forEach(w=>{
let top=parseFloat(w.style.top);
top += 0.4 * delta;   // CONSTANT SPEED ALWAYS
w.style.top = top + "px";
});
}

requestAnimationFrame(fall);
}

/* ================= CLICK ================= */
function handleClick(el,word,ans){

if(frozen) return;
frozen=true;

/* cannon aim */
let cannon=document.getElementById("cannon");
cannon.style.transform="translateX(-50%) rotate(20deg)";

setTimeout(()=>{

if(word===ans){
correctCount++;
correct.play();
el.classList.add("blast");
setTimeout(()=>el.remove(),300);
}else{
wrong.play();
}

cannon.style.transform="translateX(-50%) rotate(0deg)";

setTimeout(()=>{
next();
frozen=false;
},600);

},1000);
}

/* ================= NEXT ================= */
function next(){

questionIndex++;

if(questionIndex>=15){
end();
return;
}

load();
}

/* ================= HUD ================= */
function updateHUD(){
document.getElementById("progress").innerText = correctCount + "/15";
}

/* ================= TIMER ================= */
function startTimer(){
let time=30;

setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;

if(time<=0){
next();
time=30;
}
},1000);
}

/* ================= END ================= */
function end(){
document.getElementById("game").style.display="none";
document.getElementById("end").style.display="block";
document.getElementById("finalScore").innerText =
"Correct Answers: " + correctCount + "/15";

clap.play();
}

</script>

</body>
</html>
