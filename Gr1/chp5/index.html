<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkey Banana Grab Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:linear-gradient(#c8facc,#e8fff0);
}

/* SPLASH */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* INSTRUCTIONS */
#instructions{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:#fff8e1;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* GAME */
#game{
    display:none;
}

/* HUD */
#hud{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#2e7d32;
    color:white;
    font-weight:bold;
    box-sizing:border-box;
}

/* QUESTION */
#question{
    position:absolute;
    top:60px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* MONKEY */
#monkey{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:70px;
}

/* BANANA FALLING ITEMS */
.banana{
    position:absolute;
    font-size:35px;
    top:-50px;
}

/* END */
#end{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo_Final.png" style="width:250px;">
</div>

<!-- INSTRUCTIONS -->
<div id="instructions">
    <h1>🐵 Monkey Banana Grab</h1>
    <p>Move the monkey left and right to catch the correct grammar banana!</p>
    <button id="startBtn">START GAME</button>
</div>

<!-- GAME -->
<div id="game">

    <div id="hud">
        <div id="score">Score: 0/15</div>
        <div id="timer">⏱ 45</div>
    </div>

    <div id="question"></div>

    <div id="monkey">🐵</div>

</div>

<!-- END -->
<div id="end">
    <h1>🎉 Great Job!</h1>
    <p id="final"></p>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

/* ================= DATA ================= */
const bank = [
{q:"Which word shows something near you?", ans:"THIS"},
{q:"Which word shows many near things?", ans:"THESE"},
{q:"Which word shows far object?", ans:"THAT"},
{q:"Which word shows far objects?", ans:"THOSE"},
{q:"Pick correct near object word", ans:"THIS"},
{q:"Pick correct plural near objects word", ans:"THESE"},
{q:"Pick correct far object word", ans:"THAT"},
{q:"Pick correct far plural objects word", ans:"THOSE"},
{q:"What do you use for one close thing?", ans:"THIS"},
{q:"What do you use for many close things?", ans:"THESE"},
{q:"What do you use for one far thing?", ans:"THAT"},
{q:"What do you use for many far things?", ans:"THOSE"},
{q:"A single nearby banana uses which word?", ans:"THIS"},
{q:"Many nearby bananas use which word?", ans:"THESE"},
{q:"A banana far away uses which word?", ans:"THAT"},
{q:"Many bananas far away use which word?", ans:"THOSE"},
{q:"Near object singular word?", ans:"THIS"},
{q:"Near objects plural word?", ans:"THESE"},
{q:"Far object singular word?", ans:"THAT"},
{q:"Far objects plural word?", ans:"THOSE"}
];

const options = ["THIS","THAT","THESE","THOSE"];

let gameQuestions=[];
let index=0;
let score=0;
let monkeyX=50;

/* ================= START ================= */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("instructions").style.display="flex";
},5000);

document.getElementById("startBtn").onclick=()=>{
document.getElementById("instructions").style.display="none";
document.getElementById("game").style.display="block";

gameQuestions = bank.sort(()=>Math.random()-0.5).slice(0,15);

spawnLoop();
startTimer();
};

/* ================= MONKEY MOVE ================= */
document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft") monkeyX-=5;
if(e.key==="ArrowRight") monkeyX+=5;

if(monkeyX<0) monkeyX=0;
if(monkeyX>100) monkeyX=100;

document.getElementById("monkey").style.left=monkeyX+"%";
});

/* ================= SPAWN BANANAS ================= */
function spawnLoop(){
if(index>=gameQuestions.length){
endGame();
return;
}

document.getElementById("question").innerText =
gameQuestions[index].q;

let correct = gameQuestions[index].ans;

/* spawn 4 bananas */
for(let i=0;i<4;i++){
let b=document.createElement("div");
b.className="banana";
b.innerText=options[i];

b.style.left=(10+i*20)+"%";
b.style.top="-50px";

b.speed = 2 + Math.random()*2;

document.getElementById("game").appendChild(b);

fall(b, correct);
}

setTimeout(()=>{
index++;
spawnLoop();
},4000);
}

/* ================= FALL ================= */
function fall(el, correct){

let fallInt = setInterval(()=>{

let top = parseFloat(el.style.top);
top += 4;
el.style.top = top+"px";

/* collision */
let monkey = document.getElementById("monkey").getBoundingClientRect();
let rect = el.getBoundingClientRect();

if(rect.bottom > monkey.top &&
rect.left < monkey.right &&
rect.right > monkey.left){

if(el.innerText === correct){
score++;
document.getElementById("correct").play();
document.getElementById("score").innerText =
"Score: "+score+"/15";
}else{
document.getElementById("wrong").play();
}

el.remove();
clearInterval(fallInt);
}

if(top>600){
el.remove();
clearInterval(fallInt);
}

},30);
}

/* ================= TIMER ================= */
function startTimer(){
let time=45;

let t=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱ "+time;

if(time<=0){
clearInterval(t);
endGame();
}
},1000);
}

/* ================= END ================= */
function endGame(){
document.getElementById("game").style.display="none";
document.getElementById("end").style.display="flex";

document.getElementById("final").innerText =
"Score: "+score+"/15";

document.getElementById("clap").play();
}

</script>

</body>
</html>
