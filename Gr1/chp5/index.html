<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkey Jungle Grammar Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= GLOBAL ================= */
body{
    margin:0;
    font-family:"Comic Sans MS", Arial;
    overflow:hidden;
    background:#b3e5fc;
}

/* ================= SCREEN SYSTEM (EVS STYLE) ================= */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#splash{
    background:white;
    display:flex;
}

#titleScreen{
    background:linear-gradient(#c8e6c9,#e8f5e9);
}

#gameScreen{
    background:linear-gradient(#b9f6ca,#e8f5e9);
}

/* ================= HUD (FIXED LIKE EVS GAME) ================= */
#hud{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
    box-sizing:border-box;
    background:rgba(255,255,255,0.9);
    font-weight:bold;
    z-index:10;
}

/* ================= QUESTION BAR ================= */
#question{
    position:absolute;
    top:55px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#1b5e20;
}

/* ================= GAME AREA ================= */
#arena{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* ================= MONKEY (FIXED + FRIENDLY) ================= */
#monkey{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    font-size:70px;
}

/* replace scary face with soft one */
.monkeySafe{
    filter: saturate(1.1);
}

/* ================= OBJECTS ================= */
.obj{
    position:absolute;
    font-size:38px;
}

/* ================= CONTROLS (EVS STYLE) ================= */
#controls{
    position:absolute;
    bottom:10px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
}

.btn{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:white;
    font-weight:bold;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* ================= END ================= */
#end{
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    background:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>
</head>

<body>

<!-- ================= SPLASH ================= -->
<div id="splash" class="screen">
    <img src="assets/innovine-logo.png" style="width:240px;">
</div>

<!-- ================= TITLE ================= -->
<div id="titleScreen" class="screen">
    <h1>🐵 Monkey Jungle Grammar Explorer</h1>
    <button onclick="startGame()" style="padding:12px 20px;">START</button>
</div>

<!-- ================= GAME ================= -->
<div id="gameScreen" class="screen">

<div id="hud">
<div>Score: <span id="score">0</span>/15</div>
<div>⏱ <span id="timer">45</span></div>
</div>

<div id="question">Loading...</div>

<div id="arena">

<div id="monkey" class="monkeySafe">🐵</div>

<div id="controls">
<button class="btn" onclick="move(-1)">⬅ Left</button>
<button class="btn" onclick="move(1)">Right ➡</button>
</div>

</div>

</div>

<!-- ================= END ================= -->
<div id="end" class="screen">
<h1>🎉 Jungle Master!</h1>
</div>

<script>

/* ================= ENGINE STATE ================= */
let screen = "splash";
let score = 0;
let x = 50;
let questions = [];
let i = 0;

/* ================= QUESTION BANK ================= */
const bank=[
{q:"A banana is near you. Which word?",a:"THIS"},
{q:"Bananas near you. Which word?",a:"THESE"},
{q:"Far object. Which word?",a:"THAT"},
{q:"Far objects. Which word?",a:"THOSE"},
{q:"One close thing?",a:"THIS"},
{q:"Many close things?",a:"THESE"},
{q:"One far thing?",a:"THAT"},
{q:"Many far things?",a:"THOSE"},
{q:"Jungle fruit near you?",a:"THIS"},
{q:"Jungle fruits near you?",a:"THESE"},
{q:"Animal far away?",a:"THAT"},
{q:"Animals far away?",a:"THOSE"},
{q:"Single object close?",a:"THIS"},
{q:"Multiple objects close?",a:"THESE"},
{q:"Single object far?",a:"THAT"},
{q:"Multiple objects far?",a:"THOSE"}
];

/* ================= SCREEN ENGINE (FIXED FLOW) ================= */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="flex";
screen=id;
}

/* ================= SPLASH FLOW (FIXED 5 SEC GUARANTEE) ================= */
window.onload=()=>{

show("splash");

setTimeout(()=>{
show("titleScreen");
},5000);
};

/* ================= START GAME ================= */
function startGame(){
show("gameScreen");

questions = bank.sort(()=>Math.random()-0.5).slice(0,15);

document.getElementById("question").innerText = questions[0].q;

timer();
spawnLoop();
}

/* ================= MOVE MONKEY ================= */
function move(dir){
x += dir*6;
if(x<0)x=0;
if(x>95)x=95;
document.getElementById("monkey").style.left=x+"%";
}

/* ================= SPAWN SYSTEM ================= */
function spawnLoop(){

if(i>=questions.length){
endGame();
return;
}

document.getElementById("question").innerText = questions[i].q;

/* spawn 4 options */
["THIS","THAT","THESE","THOSE"].forEach(opt=>{

let o=document.createElement("div");
o.className="obj";
o.innerText=opt;

o.style.left=Math.random()*90+"%";
o.style.top="-40px";

document.getElementById("arena").appendChild(o);

let fall=setInterval(()=>{

let top=parseFloat(o.style.top);
top += 3;
o.style.top=top+"px";

let m=document.getElementById("monkey").getBoundingClientRect();
let r=o.getBoundingClientRect();

if(r.bottom>m.top && r.left<m.right && r.right>m.left){

if(opt===questions[i].a){
score++;
document.getElementById("score").innerText=score;
}

o.remove();
clearInterval(fall);
}

if(top>700){
o.remove();
clearInterval(fall);
}

},30);

});

setTimeout(()=>{
i++;
spawnLoop();
},5000);
}

/* ================= TIMER ================= */
function timer(){
let t=45;

let x=setInterval(()=>{
if(screen!=="gameScreen") return;

t--;
document.getElementById("timer").innerText=t;

if(t<=0){
clearInterval(x);
endGame();
}

},1000);
}

/* ================= END ================= */
function endGame(){
show("end");
}

</script>

</body>
</html>
