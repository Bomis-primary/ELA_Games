<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkey Jungle Grammar Explorer - FIXED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= BASE ================= */
body{
    margin:0;
    overflow:hidden;
    font-family:"Comic Sans MS", Arial;
    background:linear-gradient(#b9f6ca,#e8f5e9);
}

/* ================= SCREEN SYSTEM ================= */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#splash{
    background:white;
}

#title{
    background:linear-gradient(#c8e6c9,#e8f5e9);
}

#game{
    background:linear-gradient(#b3e5fc,#e8f5e9);
}

/* ================= HUD (EVS STYLE CLEAN) ================= */
#hud{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
    box-sizing:border-box;
    background:rgba(255,255,255,0.9);
    font-weight:bold;
    z-index:10;
}

.box{
    background:white;
    padding:8px 12px;
    border-radius:10px;
}

/* ================= QUESTION ================= */
#question{
    position:absolute;
    top:60px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* ================= GAME AREA ================= */
#arena{
    position:absolute;
    top:120px;
    width:100%;
    height:70%;
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

/* LANE */
.lane{
    position:relative;
    border-left:1px dashed rgba(0,0,0,0.1);
}

/* OBJECT */
.obj{
    position:absolute;
    font-size:35px;
    left:50%;
    transform:translateX(-50%);
}

/* ================= MONKEY (FRIENDLY SVG STYLE) ================= */
#monkey{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    font-size:75px;
}

/* ================= CONTROLS ================= */
#controls{
    position:absolute;
    bottom:10px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:white;
    font-weight:bold;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen">
    <img src="assets/innovine-logo.png" style="width:220px;">
</div>

<!-- TITLE -->
<div id="title" class="screen">
    <h1>🐵 Monkey Jungle Grammar Explorer</h1>
    <button onclick="startGame()">START</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div id="hud">
<div class="box">Score: <span id="score">0</span>/15</div>
<div class="box">⏱ 45</div>
</div>

<div id="question"></div>

<div id="arena">
<div class="lane"></div>
<div class="lane"></div>
<div class="lane"></div>
<div class="lane"></div>
</div>

<div id="monkey">🐵</div>

<div id="controls">
<button class="btn" onclick="move(-1)">⬅ Left</button>
<button class="btn" onclick="move(1)">Right ➡</button>
</div>

</div>

<script>

/* ================= ENGINE ================= */
let score=0;
let x=50;
let qIndex=0;

const bank=[
{q:"A banana is near you?",a:"THIS"},
{q:"Bananas near you?",a:"THESE"},
{q:"Far object?",a:"THAT"},
{q:"Far objects?",a:"THOSE"},
{q:"One near thing?",a:"THIS"},
{q:"Many near things?",a:"THESE"},
{q:"One far thing?",a:"THAT"},
{q:"Many far things?",a:"THOSE"}
];

let current=[];

/* ================= START ================= */
function startGame(){

document.getElementById("splash").style.display="none";
document.getElementById("title").style.display="none";
document.getElementById("game").style.display="block";

current = bank.sort(()=>Math.random()-0.5).slice(0,15);

nextQ();
}

/* ================= MOVE ================= */
function move(dir){
x += dir*10;
if(x<0)x=0;
if(x>100)x=100;
document.getElementById("monkey").style.left=x+"%";
}

/* ================= FIXED LANE SPAWN ================= */
function spawn(){

let lanes=document.querySelectorAll(".lane");

["THIS","THAT","THESE","THOSE"].forEach((w,i)=>{

let o=document.createElement("div");
o.className="obj";
o.innerText=w;

o.style.top="-40px";

lanes[i].appendChild(o);

/* smooth fall (controlled) */
let y=0;

let t=setInterval(()=>{

y += 2;
o.style.top=y+"px";

if(y>500){
o.remove();
clearInterval(t);
}

},30);

});

}

/* ================= QUESTION ================= */
function nextQ(){

if(qIndex>=current.length){
return;
}

document.getElementById("question").innerText=current[qIndex].q;

spawn();

qIndex++;
}

</script>

</body>
</html>
