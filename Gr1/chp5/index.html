<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkey Banana Catch Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:linear-gradient(#c8facc,#e8fff0);
}

/* SPLASH */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* INSTRUCTIONS */
#instructions{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:#fff8e1;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* HUD */
#hud{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#2e7d32;
    color:white;
    font-weight:bold;
    box-sizing:border-box;
}

/* QUESTION */
#question{
    position:absolute;
    top:60px;
    width:100%;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

/* GAME AREA */
#game{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* 🐵 FULL MONKEY GIF */
#monkey{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:120px;
}

/* 🍌 BANANA */
.banana{
    position:absolute;
    font-size:35px;
    top:-50px;
}

/* END */
#end{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo_Final.png" style="width:250px;">
</div>

<!-- INSTRUCTIONS -->
<div id="instructions">
    <h1>🐵 Monkey Banana Catch</h1>
    <p>Move the monkey using ⬅ ➡ keys and catch the correct answer!</p>
    <button id="startBtn">START GAME</button>
</div>

<!-- HUD -->
<div id="hud">
    <div id="score">Score: 0/15</div>
    <div id="timer">⏱ 45</div>
</div>

<div id="question"></div>

<div id="game">

    <!-- 🐵 FULL BODY MONKEY GIF -->
    <img id="monkey" src="assets/monkey_full.gif">

</div>

<!-- END -->
<div id="end">
    <h1>🎉 Great Job!</h1>
    <p id="final"></p>
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

/* ================= QUESTION BANK ================= */
const bank = [
{q:"Which word shows something near you?", ans:"THIS"},
{q:"Which word shows many near things?", ans:"THESE"},
{q:"Which word shows far object?", ans:"THAT"},
{q:"Which word shows far objects?", ans:"THOSE"},
{q:"What do you use for one close thing?", ans:"THIS"},
{q:"What do you use for many close things?", ans:"THESE"},
{q:"What do you use for far thing?", ans:"THAT"},
{q:"What do you use for many far things?", ans:"THOSE"}
];

const options=["THIS","THAT","THESE","THOSE"];

let questions=[];
let index=0;
let score=0;
let monkeyX=50;

/* ================= START ================= */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("instructions").style.display="flex";
},5000);

document.getElementById("startBtn").onclick=()=>{
document.getElementById("instructions").style.display="none";
document.getElementById("game").style.display="block";

questions = bank.sort(()=>Math.random()-0.5).slice(0,15);

spawn();
startTimer();
};

/* ================= MONKEY MOVE ================= */
document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft") monkeyX-=6;
if(e.key==="ArrowRight") monkeyX+=6;

if(monkeyX<0) monkeyX=0;
if(monkeyX>100) monkeyX=100;

document.getElementById("monkey").style.left=monkeyX+"%";
});

/* ================= SPAWN BANANAS ================= */
function spawn(){

if(index>=questions.length){
endGame();
return;
}

document.getElementById("question").innerText = questions[index].q;

/* 4 falling options */
options.forEach((opt,i)=>{

let b=document.createElement("div");
b.className="banana";
b.innerText=opt;

b.style.left=(10+i*20)+"%";
b.style.top="-60px";

document.getElementById("game").appendChild(b);

fall(b, questions[index].ans);

});

setTimeout(()=>{
index++;
spawn();
},4000);
}

/* ================= FALL + COLLISION ================= */
function fall(el, correct){

let t=setInterval(()=>{

let top=parseFloat(el.style.top);
top += 4;
el.style.top=top+"px";

let monkey = document.getElementById("monkey").getBoundingClientRect();
let rect = el.getBoundingClientRect();

if(rect.bottom > monkey.top &&
rect.left < monkey.right &&
rect.right > monkey.left){

if(el.innerText === correct){
score++;
document.getElementById("correct").play();
document.getElementById("score").innerText="Score: "+score+"/15";
}else{
document.getElementById("wrong").play();
}

el.remove();
clearInterval(t);
}

if(top>700){
el.remove();
clearInterval(t);
}

},30);
}

/* ================= TIMER ================= */
function startTimer(){
let time=45;

let t=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱ "+time;

if(time<=0){
clearInterval(t);
endGame();
}
},1000);
}

/* ================= END ================= */
function endGame(){
document.getElementById("game").style.display="none";
document.getElementById("end").style.display="flex";

document.getElementById("final").innerText =
"Score: "+score+"/15";

document.getElementById("clap").play();
}

</script>

</body>
</html>
