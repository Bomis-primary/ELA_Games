<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkey Jungle Grammar Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:"Comic Sans MS", Arial;
    background:linear-gradient(#b9f6ca,#e8f5e9);
}

/* CONTAINER */
#gameContainer{
    width:100%;
    height:100vh;
    position:relative;
}

/* SPLASH */
#logoScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

/* TITLE */
#titleScreen{
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#a5d6a7,#e8f5e9);
    z-index:900;
}

#titleScreen h1{
    font-size:32px;
    text-align:center;
}

/* HUD */
#hud{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px;
    box-sizing:border-box;
    z-index:10;
}

.box{
    background:white;
    padding:8px 12px;
    border-radius:10px;
    font-weight:bold;
}

/* QUESTION */
#question{
    position:absolute;
    top:70px;
    width:100%;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* GAME AREA */
#game{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* MONKEY */
#monkey{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    font-size:60px;
}

/* OBJECTS */
.obj{
    position:absolute;
    font-size:40px;
}

/* BUTTON */
#startBtn{
    padding:12px 20px;
    font-size:18px;
    margin-top:20px;
}
</style>
</head>

<body>

<div id="gameContainer">

<!-- SPLASH -->
<div id="logoScreen">
    <img src="assets/innovine-logo.png" style="width:220px;">
</div>

<!-- TITLE -->
<div id="titleScreen">
    <h1>🐵 Monkey Jungle Grammar Explorer</h1>
    <button id="startBtn">START GAME</button>
</div>

<!-- HUD -->
<div id="hud">
    <div class="box">Score: <span id="score">0</span>/15</div>
    <div class="box">⏱ <span id="timer">45</span></div>
</div>

<div id="question">Loading...</div>

<div id="game">
    <div id="monkey">🐵</div>
</div>

</div>

<script>

/* ================= SAFETY INIT ================= */
let gameStarted = false;
let score = 0;
let x = 50;
let questions = [];
let index = 0;

const bank = [
{q:"A banana is near you. Which word?",a:"THIS"},
{q:"Bananas near you. Which word?",a:"THESE"},
{q:"Object far away. Which word?",a:"THAT"},
{q:"Objects far away. Which word?",a:"THOSE"},
{q:"One near thing?",a:"THIS"},
{q:"Many near things?",a:"THESE"},
{q:"One far thing?",a:"THAT"},
{q:"Many far things?",a:"THOSE"}
];

/* ================= FIXED START FLOW ================= */
window.addEventListener("load",()=>{

setTimeout(()=>{
document.getElementById("logoScreen").style.display="none";
document.getElementById("titleScreen").style.display="flex";
},5000);

/* SAFE BUTTON BINDING (IMPORTANT FIX) */
document.getElementById("startBtn").addEventListener("click",startGame);

});

/* ================= START GAME ================= */
function startGame(){

if(gameStarted) return;
gameStarted = true;

document.getElementById("titleScreen").style.display="none";

questions = bank.sort(()=>Math.random()-0.5).slice(0,15);

document.getElementById("question").innerText = questions[0].q;

spawnLoop();
timer();
}

/* ================= MOVE MONKEY ================= */
document.addEventListener("keydown",(e)=>{

if(!gameStarted) return;

if(e.key==="ArrowLeft") x-=5;
if(e.key==="ArrowRight") x+=5;

if(x<0) x=0;
if(x>95) x=95;

document.getElementById("monkey").style.left = x + "%";
});

/* ================= SPAWN OBJECTS ================= */
function spawnLoop(){

if(index>=questions.length){
end();
return;
}

document.getElementById("question").innerText = questions[index].q;

/* create 4 objects */
["THIS","THAT","THESE","THOSE"].forEach(opt=>{

let o=document.createElement("div");
o.className="obj";
o.innerText=opt;

o.style.left = Math.random()*85 + "%";
o.style.top = "-50px";

document.getElementById("game").appendChild(o);

/* fall */
let fall=setInterval(()=>{

let top=parseFloat(o.style.top);
top += 3;
o.style.top = top + "px";

/* collision */
let m=document.getElementById("monkey").getBoundingClientRect();
let r=o.getBoundingClientRect();

if(r.bottom>m.top && r.left<m.right && r.right>m.left){

if(o.innerText === questions[index].a){
score++;
document.getElementById("score").innerText=score;
}

o.remove();
clearInterval(fall);
}

if(top>700){
o.remove();
clearInterval(fall);
}

},30);

});

/* next question */
setTimeout(()=>{
index++;
spawnLoop();
},5000);
}

/* ================= TIMER ================= */
function timer(){
let t=45;

let interval=setInterval(()=>{
if(!gameStarted) return;

t--;
document.getElementById("timer").innerText=t;

if(t<=0){
clearInterval(interval);
end();
}

},1000);
}

/* ================= END ================= */
function end(){
document.getElementById("game").innerHTML =
"<h1 style='text-align:center;margin-top:200px;'>🎉 Game Over</h1>";
}

</script>

</body>
</html>
