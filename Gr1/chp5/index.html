<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkey Jungle Grammar Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#bae1ff;
    font-family:"Comic Sans MS", sans-serif;
}

/* 📦 MAIN GAME CONTAINER (REFERENCE STYLE) */
#gameContainer{
    position:relative;
    width:100%;
    height:100%;
    max-width:600px;
    max-height:900px;
    margin:0 auto;
    background:linear-gradient(#b9f6ca,#e8f5e9);
    overflow:hidden;
}

/* 🌟 SPLASH */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#logoScreen{
    background:#fff;
    z-index:100;
}

#titleScreen{
    display:none;
    background:linear-gradient(#a5d6a7,#e8f5e9);
    z-index:90;
    text-align:center;
}

#titleScreen h1{
    font-size:34px;
    color:#1b5e20;
}

/* 🎮 HUD */
#hud{
    position:absolute;
    top:10px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px;
    z-index:10;
}

.hudBox{
    background:rgba(255,255,255,0.9);
    padding:10px 15px;
    border-radius:12px;
    font-weight:bold;
    font-size:16px;
}

/* 🧠 QUESTION */
#question{
    position:absolute;
    top:70px;
    width:100%;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#1b5e20;
    padding:10px;
}

/* 🎮 GAME AREA */
#game{
    position:absolute;
    width:100%;
    height:100%;
}

/* 🐵 MONKEY */
#monkey{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    font-size:60px;
}

/* 🌿 OBJECTS */
.obj{
    position:absolute;
    font-size:40px;
}

/* 📱 CONTROLS (REFERENCE STYLE) */
#controls{
    position:absolute;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    padding:10px;
    background:rgba(255,255,255,0.9);
}

.btn{
    width:45%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:12px;
    font-weight:bold;
}

/* END */
#end{
    position:absolute;
    width:100%;
    height:100%;
    background:#fff;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>
</head>

<body>

<div id="gameContainer">

<!-- SPLASH -->
<div id="logoScreen">
    <img src="assets/innovine-logo.png" style="width:220px;">
</div>

<!-- TITLE -->
<div id="titleScreen">
    <h1>🐵 Monkey Jungle Grammar Explorer</h1>
    <button onclick="startGame()" style="padding:12px 20px;margin-top:20px;">START</button>
</div>

<!-- HUD -->
<div id="hud">
    <div class="hudBox">Score: <span id="score">0</span>/15</div>
    <div class="hudBox">⏱ <span id="timer">45</span></div>
</div>

<!-- QUESTION -->
<div id="question">Loading...</div>

<!-- GAME -->
<div id="game">
    <div id="monkey">🐵</div>

    <div id="controls">
        <button class="btn" onclick="move(-1)">⬅ Left</button>
        <button class="btn" onclick="move(1)">Right ➡</button>
    </div>
</div>

<!-- END -->
<div id="end">
    <h1>🎉 Jungle Master!</h1>
</div>

</div>

<script>

/* 🎯 BANK (20 → 15 random) */
const bank=[
{q:"A banana is near you. Which word?",a:"THIS"},
{q:"Bananas near you. Which word?",a:"THESE"},
{q:"Something far away. Which word?",a:"THAT"},
{q:"Many things far away. Which word?",a:"THOSE"},
{q:"One object close. Which word?",a:"THIS"},
{q:"Many objects close. Which word?",a:"THESE"},
{q:"Object far away. Which word?",a:"THAT"},
{q:"Objects far away. Which word?",a:"THOSE"},
{q:"Near jungle fruit. Which word?",a:"THIS"},
{q:"Near jungle fruits. Which word?",a:"THESE"},
{q:"Far jungle tree. Which word?",a:"THAT"},
{q:"Far jungle trees. Which word?",a:"THOSE"},
{q:"Close animal. Which word?",a:"THIS"},
{q:"Close animals. Which word?",a:"THESE"},
{q:"Distant animal. Which word?",a:"THAT"},
{q:"Distant animals. Which word?",a:"THOSE"},
{q:"One banana here. Which word?",a:"THIS"},
{q:"Many bananas here. Which word?",a:"THESE"},
{q:"One tiger far. Which word?",a:"THAT"},
{q:"Many tigers far. Which word?",a:"THOSE"}
];

let qlist=[];
let i=0;
let score=0;
let x=50;

/* 🚀 INIT */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("logoScreen").style.display="none";
document.getElementById("titleScreen").style.display="flex";
},5000);
};

function startGame(){
document.getElementById("titleScreen").style.display="none";

qlist = bank.sort(()=>Math.random()-0.5).slice(0,15);

document.getElementById("question").innerText=qlist[0].q;

spawnLoop();
timer();
}

/* 🐵 MOVE */
function move(dir){
x+=dir*5;
if(x<0)x=0;
if(x>90)x=90;
document.getElementById("monkey").style.left=x+"%";
}

/* 🌿 SPAWN OBJECTS */
function spawnLoop(){

if(i>=qlist.length){
end();
return;
}

document.getElementById("question").innerText=qlist[i].q;

for(let j=0;j<5;j++){

let o=document.createElement("div");
o.className="obj";

let items=["🍌","🍃","🪨","🐒","🌿"];
o.innerText=items[Math.floor(Math.random()*items.length)];

o.style.left=Math.random()*90+"%";
o.style.top="-50px";

document.getElementById("game").appendChild(o);

/* lifetime 5 sec */
setTimeout(()=>o.remove(),5000);

o.onclick=()=>{
if(o.innerText==="🍌"){
score++;
document.getElementById("score").innerText=score;
}
o.remove();
};

}

i++;
setTimeout(spawnLoop,5000);
}

/* ⏱ TIMER */
let t=45;
function timer(){
setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0)end();
},1000);
}

/* 🏁 END */
function end(){
document.getElementById("game").style.display="none";
document.getElementById("end").style.display="flex";
}

</script>

</body>
</html>
