<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkey Jungle Grammar Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= GLOBAL ================= */
body{
    margin:0;
    overflow:hidden;
    font-family:"Comic Sans MS", Arial;
    background:linear-gradient(#b9f6ca,#e8f5e9);
}

/* ================= SCREENS ================= */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#splash{ background:white; }
#title{ background:linear-gradient(#c8e6c9,#e8f5e9); }
#game{ background:linear-gradient(#b3e5fc,#e8f5e9); }

/* ================= HUD ================= */
#hud{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px 15px;
    box-sizing:border-box;
    background:rgba(255,255,255,0.95);
    font-weight:bold;
    z-index:10;
}

.box{
    background:white;
    padding:8px 12px;
    border-radius:10px;
}

/* ================= QUESTION ================= */
#question{
    position:absolute;
    top:60px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#1b5e20;
}

/* ================= ARENA ================= */
#arena{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* ================= MONKEY (GIF FIXED) ================= */
#monkey{
    position:absolute;
    bottom:120px;
    left:50%;
    width:90px;
    transform:translateX(-50%);
    transition:transform 0.2s ease;
}

/* ================= OBJECTS ================= */
.obj{
    position:absolute;
    font-size:38px;
}

/* ================= CONTROLS ================= */
#controls{
    position:absolute;
    bottom:10px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:white;
    font-weight:bold;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- ================= SPLASH ================= -->
<div id="splash" class="screen">
    <img src="assets/innovine-logo_Final.png" style="width:240px;">
</div>

<!-- ================= TITLE ================= -->
<div id="title" class="screen">
    <h1>🐵 Jungle Grammar Explorer</h1>
    <button onclick="startGame()" style="padding:12px 20px;">START</button>
</div>

<!-- ================= GAME ================= -->
<div id="game" class="screen">

<div id="hud">
<div class="box">Score: <span id="score">0</span>/15</div>
<div class="box">⏱ 45</div>
</div>

<div id="question"></div>

<div id="arena">

<img id="monkey" src="assets/monkey.gif">

<div id="controls">
<button class="btn" onclick="move(-1)">⬅ Left</button>
<button class="btn" onclick="move(1)">Right ➡</button>
</div>

</div>

</div>

<!-- ================= END ================= -->
<div id="end" class="screen">
<h1>🎉 Jungle Master!</h1>
</div>

<!-- ================= AUDIO ================= -->
<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

/* ================= GAME STATE ================= */
let score = 0;
let x = 50;
let index = 0;
let questions = [];
let facing = "right";

/* ================= QUESTION BANK ================= */
const bank = [
{q:"A banana is near you. Which word?", a:"THIS"},
{q:"Bananas near you. Which word?", a:"THESE"},
{q:"Object far away. Which word?", a:"THAT"},
{q:"Objects far away. Which word?", a:"THOSE"},
{q:"One near thing?", a:"THIS"},
{q:"Many near things?", a:"THESE"},
{q:"One far thing?", a:"THAT"},
{q:"Many far things?", a:"THOSE"},
{q:"Jungle fruit near you?", a:"THIS"},
{q:"Jungle fruits near you?", a:"THESE"},
{q:"Far animal?", a:"THAT"},
{q:"Far animals?", a:"THOSE"},
{q:"Close object?", a:"THIS"},
{q:"Close objects?", a:"THESE"},
{q:"Distant object?", a:"THAT"},
{q:"Distant objects?", a:"THOSE"}
];

/* ================= FLOW CONTROL ================= */
window.onload = () => {

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("title").style.display="flex";
},5000);

};

/* ================= START GAME ================= */
function startGame(){

document.getElementById("title").style.display="none";
document.getElementById("game").style.display="flex";

questions = bank.sort(()=>Math.random()-0.5).slice(0,15);

loadQ();
spawnLoop();
timer();
}

/* ================= MONKEY MOVE + DIRECTION FIX ================= */
function move(dir){

x += dir * 6;

if(x < 0) x = 0;
if(x > 95) x = 95;

document.getElementById("monkey").style.left = x + "%";

/* FACE DIRECTION */
if(dir < 0){
    facing = "left";
    document.getElementById("monkey").style.transform =
    "translateX(-50%) scaleX(-1)";
}
else{
    facing = "right";
    document.getElementById("monkey").style.transform =
    "translateX(-50%) scaleX(1)";
}
}

/* ================= QUESTION ================= */
function loadQ(){
document.getElementById("question").innerText = questions[index].q;
}

/* ================= SPAWN OBJECTS ================= */
function spawnLoop(){

if(index >= questions.length){
endGame();
return;
}

loadQ();

["THIS","THAT","THESE","THOSE"].forEach(opt=>{

let o = document.createElement("div");
o.className = "obj";
o.innerText = opt;

o.style.left = Math.random()*90 + "%";
o.style.top = "-50px";

document.getElementById("arena").appendChild(o);

let fall = setInterval(()=>{

let top = parseFloat(o.style.top);
top += 3;
o.style.top = top + "px";

let m = document.getElementById("monkey").getBoundingClientRect();
let r = o.getBoundingClientRect();

if(r.bottom > m.top && r.left < m.right && r.right > m.left){

if(opt === questions[index].a){
score++;
document.getElementById("score").innerText = score;
document.getElementById("correct").play();
}
else{
document.getElementById("wrong").play();
}

o.remove();
clearInterval(fall);
}

if(top > 700){
o.remove();
clearInterval(fall);
}

},30);

});

setTimeout(()=>{
index++;
spawnLoop();
},5000);
}

/* ================= TIMER ================= */
function timer(){
let t = 45;

let x = setInterval(()=>{

t--;
if(t <= 0){
clearInterval(x);
endGame();
}

},1000);
}

/* ================= END ================= */
function endGame(){
document.getElementById("game").innerHTML =
"<div style='text-align:center;margin-top:200px;font-size:30px;'>🎉 Game Over</div>";

document.getElementById("clap").play();
}

</script>

</body>
</html>
