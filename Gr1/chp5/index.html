<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkey Mission + Treasure Hunt FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    background:#d0f0ff;
}

/* ================= SPLASH ================= */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
}

/* ================= GAME 1 ================= */
#game1{
    display:none;
    width:100%;
    height:100%;
    position:relative;
    overflow:hidden;
}

/* MONKEY AREA */
#monkeyArea{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(#b3e5fc,#e1f5fe);
    overflow:hidden;
}

/* PROMPT */
#prompt{
    position:absolute;
    top:15px;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    background:rgba(255,255,255,0.7);
    padding:6px;
    z-index:5;
}

/* MONKEY */
#monkey{
    position:absolute;
    left:45%;
    top:15%;
    font-size:70px;
    z-index:3;
}

/* TREE */
#tree{
    position:absolute;
    left:42%;
    bottom:5%;
    font-size:120px;
    z-index:1;
}

/* FRUITS */
.fruit{
    position:absolute;
    font-size:45px;
    cursor:pointer;
    z-index:2;
}

/* ================= GAME 2 ================= */
#game2{
    display:none;
    width:100%;
    height:100%;
    background:url('') center/cover;
}

/* TOP BAR */
#topBar{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:10px;
    font-weight:bold;
    background:white;
    box-sizing:border-box;
}

/* STORY */
#storyBox{
    position:absolute;
    bottom:0;
    width:100%;
    background:white;
    padding:15px;
    font-size:18px;
}

/* COUNTER + TIMER */
#counter,#timer{
    font-size:18px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="ELA_Games/Gr1/chp5/assets/innovine-logo_Final.png" width="250">
</div>

<!-- GAME 1 -->
<div id="game1">
    <div id="monkeyArea">

        <div id="prompt">Loading...</div>
        <div id="monkey">🐒</div>
        <div id="tree">🌳</div>

    </div>
</div>

<!-- GAME 2 -->
<div id="game2">

    <div id="topBar">
        <div id="counter">1/10</div>
        <div id="timer">80</div>
    </div>

    <div id="storyBox"></div>

</div>

<!-- AUDIO -->
<audio id="correct" src="ELA_Games/Gr1/chp5/assets/correct.mp3"></audio>
<audio id="wrong" src="ELA_Games/Gr1/chp5/assets/wrong.mp3"></audio>
<audio id="clap" src="ELA_Games/Gr1/chp5/assets/clapping.mp3"></audio>

<script>

/* ================= GAME DATA ================= */
const prompts = ["near-few","near-many","far-few","far-many"];
const fruits = ["🍎","🍌","🍊"];

let correctCount = 0;
let storyIndex = 0;

/* ================= SPLASH ================= */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
startGame1();
},5000);

/* ================= GAME 1 ================= */
function startGame1(){
document.getElementById("game1").style.display="block";
nextRound();
}

/* ROUND */
function nextRound(){

document.querySelectorAll(".fruit").forEach(f=>f.remove());

let fruit = fruits[Math.floor(Math.random()*fruits.length)];
let prompt = prompts[Math.floor(Math.random()*prompts.length)];

document.getElementById("prompt").innerText =
"Find: " + prompt;

for(let i=0;i<5;i++){
let f = document.createElement("div");
f.className="fruit";
f.innerText=fruit;

/* FIXED SPREAD POSITIONING */
f.style.left = (20 + Math.random()*60) + "%";
f.style.top = (25 + Math.random()*50) + "%";

f.onclick=()=>eatFruit();

document.getElementById("monkeyArea").appendChild(f);
}
}

/* EAT FRUIT */
function eatFruit(){

document.getElementById("correct").play();
correctCount++;

if(correctCount>=3){
startGame2();
return;
}

setTimeout(()=>{
nextRound();
},1000);
}

/* ================= GAME 2 ================= */
const story = [
"Two friends, Riya and Kabir, were playing in the playground after school.",
"Look! What is this paper under the bench?",
"They slowly opened the folded paper.",
"Is this really a treasure map?",
"They reached the swing area and looked around carefully.",
"Those trees look familiar.",
"Behind the tree they found a shiny key!",
"We must go back to play area again.",
"Is that seesaw the final spot?",
"We did it! Treasure found!"
];

function startGame2(){

document.getElementById("game1").style.display="none";
document.getElementById("game2").style.display="block";

showStory();
startTimer();
}

/* STORY */
function showStory(){
document.getElementById("storyBox").innerText = story[storyIndex];
document.getElementById("counter").innerText = (storyIndex+1)+"/10";
}

/* NEXT STORY */
function nextStory(){
storyIndex++;

if(storyIndex>=10){
endGame();
return;
}

showStory();
}

/* TIMER */
let time=80;

function startTimer(){
setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;

if(time<=0){
time=80;
nextStory();
}
},1000);
}

/* END */
function endGame(){
document.getElementById("game2").innerHTML=
"<h1 style='text-align:center;margin-top:40%'>🎉 Treasure Found!</h1>";

document.getElementById("clap").play();
}

</script>

</body>
</html>
