<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sight Word Sky Catch!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    background: linear-gradient(to top, #87CEEB, #e0f6ff);
    user-select: none;
}

/* Splash Screen */
#splashScreen {
    position: absolute;
    width: 100vw;
    height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    transition: opacity 0.5s ease;
}

#splashScreen img {
    max-width: 200px;
    margin-bottom: 20px;
}

#splashScreen h1 {
    font-size: 36px;
    color: #ff5722;
    text-shadow: 2px 2px #ffe0b2;
    margin: 0;
}

/* Top Score Board */
#scoreBoard {
    position: absolute;
    top: 15px;
    left: 15px;
    font-size: 24px;
    font-weight: bold;
    color: #2c3e50;
    background: rgba(255, 255, 255, 0.8);
    padding: 8px 15px;
    border-radius: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    z-index: 5;
}

/* Game Area */
#gameArea {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* Basket using image from asset folder */
#basket {
    position: absolute;
    bottom: 20px;
    width: 110px;
    height: 75px;
    background: url('basket.jpg') no-repeat center center;
    background-size: contain;
    left: 50%;
    transform: translateX(-50%);
    transition: transform 0.1s ease-out;
}

/* Falling word box with attractive colors */
.word {
    position: absolute;
    top: 0;
    font-size: 24px;
    font-weight: bold;
    padding: 8px 16px;
    border-radius: 15px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.15);
    text-align: center;
    color: white;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}

/* End screen */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    font-size: 32px;
    z-index: 8;
}

button {
    padding: 12px 30px;
    font-size: 20px;
    font-weight: bold;
    margin-top: 25px;
    border: none;
    border-radius: 25px;
    background-color: #ff5722;
    color: white;
    cursor: pointer;
    box-shadow: 0 5px #e64a19;
}

button:active {
    box-shadow: 0 2px #e64a19;
    transform: translateY(3px);
}
</style>
</head>

<body>

<!-- 5-Second Splash Screen -->
<div id="splashScreen">
    <img src="innovine-logo.png" alt="Innovine Logo">
    <h1>Sight Word Sky Catch!</h1>
</div>

<div id="scoreBoard">Score: 0</div>

<div id="gameArea">
    <div id="basket"></div>
</div>

<div id="endScreen">
    <div id="endText">Great Job!</div>
    <div id="finalScore" style="font-size: 24px; margin-top: 10px;"></div>
    <button onclick="restartGame()">Play Again</button>
</div>

<!-- Audio Assets -->
<audio id="soundClapping" src="clapping.mp3"></audio>
<audio id="soundCorrect" src="correct.mp3"></audio>
<audio id="soundWrong" src="wrong.mp3"></audio>

<script>
// ===== WORD GAME DATABASE =====
// Sight words = Catch them! Decodable words = Avoid them!
const gameItems = [
    { text: "the", type: "sight" },
    { text: "cat", type: "decodable" },
    { text: "and", type: "sight" },
    { text: "sit", type: "decodable" },
    { text: "is", type: "sight" },
    { text: "map", type: "decodable" },
    { text: "in", type: "sight" },
    { text: "run", type: "decodable" },
    { text: "it", type: "sight" },
    { text: "hop", type: "decodable" },
    { text: "you", type: "sight" },
    { text: "pen", type: "decodable" },
    { text: "he", type: "sight" },
    { text: "she", type: "sight" },
    { text: "we", type: "sight" },
    { text: "me", type: "sight" }
];

// Vibrant background colors for the word boxes
const boxColors = ["#FF5722", "#4CAF50", "#9C27B0", "#FF9800", "#E91E63", "#00BCD4"];

let currentIndex = 0;
let score = 0;
let basketX = window.innerWidth / 2 - 55;

const basket = document.getElementById("basket");
const gameArea = document.getElementById("gameArea");
const scoreBoard = document.getElementById("scoreBoard");
const endScreen = document.getElementById("endScreen");
const splashScreen = document.getElementById("splashScreen");

// Audio Elements
const sndClapping = document.getElementById("soundClapping");
const sndCorrect = document.getElementById("soundCorrect");
const sndWrong = document.getElementById("soundWrong");

function updateBasket() {
    basket.style.left = basketX + "px";
}
updateBasket();

// ===== CONTROLS =====
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") basketX -= 40;
    if (e.key === "ArrowRight") basketX += 40;
    basketX = Math.max(0, Math.min(window.innerWidth - 110, basketX));
    updateBasket();
});

let startX = 0;
document.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; });
document.addEventListener("touchmove", (e) => {
    let moveX = e.touches[0].clientX;
    let diff = moveX - startX;
    basketX += diff * 0.4;
    basketX = Math.max(0, Math.min(window.innerWidth - 110, basketX));
    updateBasket();
    startX = moveX;
});

// ===== GAME LOGIC =====
function createWord(item) {
    const el = document.createElement("div");
    el.classList.add("word");
    el.innerText = item.text;
    
    // Assign random background color
    el.style.backgroundColor = boxColors[Math.floor(Math.random() * boxColors.length)];

    let x = Math.random() * (window.innerWidth - 120);
    let y = -50;

    el.style.left = x + "px";
    gameArea.appendChild(el);

    let fallSpeed = 1.5; 

    function fall() {
        y += fallSpeed;
        el.style.top = y + "px";

        let basketTop = window.innerHeight - 95;

        // Collision detection
        if (y >= basketTop && y <= basketTop + 20 && x > basketX - 40 && x < basketX + 110) {
            el.remove();
            if (item.type === "sight") {
                score += 10;
                sndClapping.currentTime = 0;
                sndClapping.play().catch(() => {});
            } else {
                score = Math.max(0, score - 5); // penalty for decodable word
                sndWrong.currentTime = 0;
                sndWrong.play().catch(() => {});
            }
            scoreBoard.innerText = `Score: ${score}`;
            nextWord();
            return;
        }

        // Missed word (reaches the bottom)
        if (y > window.innerHeight) {
            el.remove();
            if (item.type === "decodable") {
                // Good job letting a decodable word pass!
                sndCorrect.currentTime = 0;
                sndCorrect.play().catch(() => {});
            }
            nextWord();
            return;
        }

        requestAnimationFrame(fall);
    }
    fall();
}

function nextWord() {
    if (currentIndex >= gameItems.length) {
        endGame();
        return;
    }

    let item = gameItems[currentIndex];
    currentIndex++;

    setTimeout(() => {
        createWord(item);
    }, 1000);
}

function startGame() {
    currentIndex = 0;
    score = 0;
    scoreBoard.innerText = "Score: 0";
    nextWord();
}

function endGame() {
    document.getElementById("finalScore").innerText = `Your Final Score: ${score}`;
    endScreen.style.display = "flex";
}

function restartGame() {
    endScreen.style.display = "none";
    startGame();
}

// ===== INITIAL TIMEOUT FOR SPLASH SCREEN =====
window.onload = () => {
    setTimeout(() => {
        splashScreen.style.opacity = 0;
        setTimeout(() => {
            splashScreen.style.display = "none";
            startGame();
        }, 500);
    }, 5000); // 5 seconds display duration
};
</script>

</body>
</html>
