<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alien Catcher Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #0b1d3a, #1c3f7a);
}

/* SPLASH SCREEN */
#splash, #startScreen, #gameOver {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

#splash {
  background: white;
  z-index: 5;
}

#splash img {
  width: 300px;
}

#startScreen {
  background: rgba(0,0,0,0.6);
  display: none;
  z-index: 4;
}

#gameOver {
  display: none;
  background: rgba(0,0,0,0.8);
  z-index: 6;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  color: white;
  font-size: 20px;
  padding: 0 20px;
  z-index: 2;
}

/* CONTROL BUTTONS */
#controls {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  z-index: 2;
}

.ctrlBtn {
  font-size: 30px;
  margin: 10px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="ELA_Games/Gr1/chp21/assets/innovine-logo.png">
</div>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>👾 Alien Catcher</h1>
  <button onclick="startGame()">START</button>
</div>

<!-- HUD -->
<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="time">60</span></div>
</div>

<!-- GAME OVER -->
<div id="gameOver">
  <h1>Game Over</h1>
  <h2 id="finalScore"></h2>
  <button onclick="restartGame()">Play Again</button>
</div>

<!-- CONTROLS -->
<div id="controls">
  <button class="ctrlBtn" onclick="moveLeft()">⬅</button>
  <button class="ctrlBtn" onclick="moveRight()">➡</button>
</div>

<canvas id="gameCanvas"></canvas>

<!-- AUDIO -->
<audio id="correctSound" src="ELA_Games/Gr1/chp21/assets/correct.mp3"></audio>
<audio id="wrongSound" src="ELA_Games/Gr1/chp21/assets/wrong.mp3"></audio>
<audio id="clapSound" src="ELA_Games/Gr1/chp21/assets/clapping.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let basketImg = new Image();
basketImg.src = "ELA_Games/Gr1/chp21/assets/basket.jpg";

let basket = { x: canvas.width/2, y: canvas.height-120, w: 120, h: 80 };

let aliens = [];
let score = 0;
let timeLeft = 60;
let gameRunning = false;

const words = [
  "cat","dog","sun","run","book","pen","apple","ball",
  "fish","tree","car","milk","hat","cup"
];

function spawnAlien() {
  const word = words[Math.floor(Math.random()*words.length)];
  aliens.push({
    x: Math.random() * (canvas.width - 100),
    y: -50,
    speed: 2 + Math.random()*2,
    word: word
  });
}

function drawBasket() {
  ctx.drawImage(basketImg, basket.x, basket.y, basket.w, basket.h);
}

function drawAliens() {
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  aliens.forEach(a => {
    ctx.fillText("👽 " + a.word, a.x, a.y);
  });
}

function updateAliens() {
  aliens.forEach(a => {
    a.y += a.speed;

    if (
      a.y > basket.y &&
      a.x > basket.x &&
      a.x < basket.x + basket.w
    ) {
      document.getElementById("correctSound").play();
      score++;
      document.getElementById("score").innerText = score;
      a.y = canvas.height + 100;
    }

    if (a.y > canvas.height) {
      document.getElementById("wrongSound").play();
      a.y = canvas.height + 100;
    }
  });
}

function gameLoop() {
  if (!gameRunning) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBasket();
  drawAliens();
  updateAliens();

  requestAnimationFrame(gameLoop);
}

setInterval(() => {
  if (gameRunning) spawnAlien();
}, 1200);

/* TIMER */
function startTimer() {
  let t = setInterval(() => {
    if (!gameRunning) return;
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(t);
      endGame();
    }
  },1000);
}

/* CONTROLS */
function moveLeft(){ basket.x -= 30; }
function moveRight(){ basket.x += 30; }

/* GAME FLOW */
function startGame(){
  document.getElementById("startScreen").style.display = "none";
  gameRunning = true;
  score = 0;
  timeLeft = 60;
  aliens = [];
  startTimer();
  gameLoop();
}

function endGame(){
  gameRunning = false;
  document.getElementById("gameOver").style.display = "flex";
  document.getElementById("finalScore").innerText = "Score: " + score;
  document.getElementById("clapSound").play();
}

function restartGame(){
  document.getElementById("gameOver").style.display = "none";
  startGame();
}

/* SPLASH SCREEN */
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
}, 5000);

</script>

</body>
</html>
