<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sight Word Catcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(to top, #cfefff, #ffffff);
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

/* TITLE SCREEN */
#titleScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #fff3c4, #cfefff);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9;
}

#titleScreen h1 {
    font-size: 42px;
    color: #333;
}

/* GAME AREA */
#gameArea {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    overflow: hidden;
}

/* SCORE */
#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
    font-weight: bold;
}

/* BASKET */
#basket {
    position: absolute;
    bottom: 20px;
    width: 120px;
    height: 80px;
    background: url('basket.jpg') no-repeat center;
    background-size: contain;
    left: 50%;
    transform: translateX(-50%);
}

/* WORD */
.word {
    position: absolute;
    top: 0;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: bold;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

/* END SCREEN */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    color: white;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 28px;
}
button {
    padding: 10px 20px;
    font-size: 18px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="innovine-logo.png" style="width:220px;">
</div>

<!-- TITLE -->
<div id="titleScreen">
    <h1>🎯 Sight Word Catcher</h1>
    <button onclick="startGame()">Start</button>
</div>

<!-- GAME -->
<div id="gameArea">
    <div id="score">Caught: 0 / 10</div>
    <div id="basket"></div>
</div>

<!-- END -->
<div id="endScreen">
    <div>🎉 Great Job!</div>
    <button onclick="restartGame()">Play Again</button>
</div>

<audio id="clapSound" src="clapping.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

/* ---------------- WORD LISTS ---------------- */
const sightWords = ["the","and","is","in","it","you","we","he","she","me"];

const decodableWords = [
    "cat","dog","sun","bat","pen","cup","map","tap","sit","run"
];

let caught = 0;
let basketX = window.innerWidth/2 - 60;
let gameRunning = false;

/* ---------------- ELEMENTS ---------------- */
const basket = document.getElementById("basket");
const gameArea = document.getElementById("gameArea");
const score = document.getElementById("score");

/* ---------------- SPLASH FLOW ---------------- */
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("titleScreen").style.display = "flex";
}, 5000);

/* ---------------- GAME START ---------------- */
function startGame() {
    document.getElementById("titleScreen").style.display = "none";
    gameArea.style.display = "block";
    gameRunning = true;
    spawnWord();
}

/* ---------------- BASKET CONTROL ---------------- */
document.addEventListener("keydown", (e) => {
    if (!gameRunning) return;
    if (e.key === "ArrowLeft") basketX -= 30;
    if (e.key === "ArrowRight") basketX += 30;
    basketX = Math.max(0, Math.min(window.innerWidth-120, basketX));
    basket.style.left = basketX + "px";
});

/* TOUCH */
let startX = 0;
document.addEventListener("touchstart", e => startX = e.touches[0].clientX);
document.addEventListener("touchmove", e => {
    if (!gameRunning) return;
    let diff = e.touches[0].clientX - startX;
    basketX += diff * 0.3;
    basketX = Math.max(0, Math.min(window.innerWidth-120, basketX));
    basket.style.left = basketX + "px";
    startX = e.touches[0].clientX;
});

/* ---------------- WORD SPAWN ---------------- */
function spawnWord() {

    if (!gameRunning) return;

    let isSight = Math.random() > 0.35; // more sight words

    let word = isSight ?
        sightWords[Math.floor(Math.random()*sightWords.length)] :
        decodableWords[Math.floor(Math.random()*decodableWords.length)];

    const el = document.createElement("div");
    el.classList.add("word");
    el.innerText = word;

    // color styling
    el.style.background = isSight ?
        "#b3f5ff" : "#ffd1dc";

    let x = Math.random() * (window.innerWidth - 100);
    let y = 0;

    el.style.left = x + "px";
    gameArea.appendChild(el);

    function fall() {
        if (!gameRunning) return;

        y += 1.2; // slow fall
        el.style.top = y + "px";

        let basketTop = window.innerHeight - 100;

        // COLLISION
        if (
            y > basketTop &&
            x > basketX - 50 &&
            x < basketX + 120
        ) {
            el.remove();

            if (isSight) {
                caught++;
                document.getElementById("clapSound").play();
                score.innerText = `Caught: ${caught} / 10`;

                if (caught >= 10) {
                    endGame();
                    return;
                }

            } else {
                document.getElementById("wrongSound").play();
            }

            setTimeout(spawnWord, 600);
            return;
        }

        // MISS
        if (y > window.innerHeight) {
            el.remove();
            setTimeout(spawnWord, 400);
            return;
        }

        requestAnimationFrame(fall);
    }

    fall();
}

/* ---------------- END GAME ---------------- */
function endGame() {
    gameRunning = false;
    document.getElementById("endScreen").style.display = "flex";
    gameArea.style.display = "none";
}

/* ---------------- RESTART ---------------- */
function restartGame() {
    location.reload();
}

</script>

</body>
</html>
