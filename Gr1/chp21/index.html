<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sight Word Catcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(to top, #bfe9ff, #ffffff);
}

/* FLOATING BACKGROUND EFFECT */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.6) 10%, transparent 11%);
    background-size: 80px 80px;
    animation: floatBG 20s linear infinite;
    opacity: 0.4;
}

@keyframes floatBG {
    from { transform: translateY(0px); }
    to { transform: translateY(-200px); }
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
}

/* TITLE SCREEN */
#titleScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fff7cc, #cfefff);
    z-index: 10;
}

.titleCard {
    background: white;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.titleCard h1 {
    font-size: 38px;
    margin-bottom: 20px;
}

/* GAME AREA */
#gameArea {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    overflow: hidden;
}

/* SCORE */
#score {
    position: absolute;
    top: 15px;
    left: 15px;
    font-size: 22px;
    font-weight: bold;
    background: white;
    padding: 8px 12px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* BASKET */
#basket {
    position: absolute;
    bottom: 15px;
    width: 130px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
}

/* WORDS */
.word {
    position: absolute;
    top: 0;
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 24px;
    font-weight: bold;
    box-shadow: 0 5px 10px rgba(0,0,0,0.15);
}

/* END SCREEN */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-size: 30px;
    z-index: 50;
}

button {
    padding: 12px 22px;
    font-size: 18px;
    margin-top: 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- SPLASH (LOGO FIXED) -->
<div id="splash">
    <img src="innovine-logo.png" style="width:260px; max-width:80%;">
</div>

<!-- TITLE -->
<div id="titleScreen">
    <div class="titleCard">
        <h1>🎯 Sight Word Catcher</h1>
        <button onclick="startGame()">Start Game</button>
    </div>
</div>

<!-- GAME -->
<div id="gameArea">
    <div id="score">Caught: 0 / 10</div>
    
    <!-- BASKET FIXED -->
    <img id="basket" src="basket.jpg">
</div>

<!-- END -->
<div id="endScreen">
    🎉 Great Job!
    <button onclick="restartGame()">Play Again</button>
</div>

<audio id="clapSound" src="clapping.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

const sightWords = ["the","and","is","in","it","you","we","he","she","me"];
const decodableWords = ["cat","dog","sun","bat","pen","cup","map","tap","sit","run"];

let caught = 0;
let basketX = window.innerWidth/2 - 65;
let running = false;

const basket = document.getElementById("basket");
const gameArea = document.getElementById("gameArea");
const score = document.getElementById("score");

/* SPLASH → TITLE */
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("titleScreen").style.display = "flex";
}, 5000);

/* START */
function startGame() {
    document.getElementById("titleScreen").style.display = "none";
    gameArea.style.display = "block";
    running = true;
    spawnWord();
}

/* BASKET CONTROL */
document.addEventListener("keydown", (e) => {
    if (!running) return;
    if (e.key === "ArrowLeft") basketX -= 35;
    if (e.key === "ArrowRight") basketX += 35;

    basketX = Math.max(0, Math.min(window.innerWidth-130, basketX));
    basket.style.left = basketX + "px";
});

/* TOUCH */
let startX = 0;
document.addEventListener("touchstart", e => startX = e.touches[0].clientX);

document.addEventListener("touchmove", e => {
    if (!running) return;
    let diff = e.touches[0].clientX - startX;
    basketX += diff * 0.25;
    basketX = Math.max(0, Math.min(window.innerWidth-130, basketX));
    basket.style.left = basketX + "px";
    startX = e.touches[0].clientX;
});

/* WORD SPAWN */
function spawnWord() {

    if (!running) return;

    let isSight = Math.random() > 0.35;

    let word = isSight ?
        sightWords[Math.floor(Math.random()*sightWords.length)] :
        decodableWords[Math.floor(Math.random()*decodableWords.length)];

    const el = document.createElement("div");
    el.classList.add("word");
    el.innerText = word;

    el.style.background = isSight ? "#a8f0ff" : "#ffb3c6";

    let x = Math.random() * (window.innerWidth - 100);
    let y = 0;

    el.style.left = x + "px";
    gameArea.appendChild(el);

    function fall() {
        if (!running) return;

        y += 1.1; // slow & gentle
        el.style.top = y + "px";

        let basketTop = window.innerHeight - 120;

        if (
            y > basketTop &&
            x > basketX - 50 &&
            x < basketX + 130
        ) {
            el.remove();

            if (isSight) {
                caught++;
                document.getElementById("clapSound").play();
                score.innerText = `Caught: ${caught} / 10`;
            } else {
                document.getElementById("wrongSound").play();
            }

            if (caught >= 10) return endGame();

            setTimeout(spawnWord, 500);
            return;
        }

        if (y > window.innerHeight) {
            el.remove();
            setTimeout(spawnWord, 400);
            return;
        }

        requestAnimationFrame(fall);
    }

    fall();
}

/* END */
function endGame() {
    running = false;
    document.getElementById("endScreen").style.display = "flex";
    gameArea.style.display = "none";
}

/* RESTART */
function restartGame() {
    location.reload();
}

</script>

</body>
</html>
