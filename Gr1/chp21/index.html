<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sight Words Catch Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(to top, #87CEEB, #ffffff);
}

/* Top Score Board */
#scoreBoard {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
    font-weight: bold;
    color: #333;
}

/* Game Area */
#gameArea {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* Basket */
#basket {
    position: absolute;
    bottom: 20px;
    width: 100px;
    height: 60px;
    background: url('https://i.imgur.com/3XjQZQp.png'); /* simple basket image */
    background-size: cover;
    left: 50%;
    transform: translateX(-50%);
}

/* Falling word */
.word {
    position: absolute;
    top: 0;
    font-size: 22px;
    font-weight: bold;
    background: #fff;
    padding: 5px 10px;
    border-radius: 10px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.2);
}

/* End screen */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    font-size: 28px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin-top: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="scoreBoard">Caught: 0 / 10</div>

<div id="gameArea">
    <div id="basket"></div>
</div>

<div id="endScreen">
    <div id="endText">Great Job!</div>
    <button onclick="restartGame()">Play Again</button>
</div>

<script>
// ===== SIGHT WORDS =====
const words = ["the", "and", "is", "in", "it", "you", "he", "she", "we", "me"];

let currentIndex = 0;
let caught = 0;
let basketX = window.innerWidth / 2 - 50;

const basket = document.getElementById("basket");
const gameArea = document.getElementById("gameArea");
const scoreBoard = document.getElementById("scoreBoard");
const endScreen = document.getElementById("endScreen");

// position basket
function updateBasket() {
    basket.style.left = basketX + "px";
}
updateBasket();

// ===== KEYBOARD CONTROL =====
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") basketX -= 30;
    if (e.key === "ArrowRight") basketX += 30;

    // boundaries
    basketX = Math.max(0, Math.min(window.innerWidth - 100, basketX));
    updateBasket();
});

// ===== TOUCH SWIPE CONTROL =====
let startX = 0;

document.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchmove", (e) => {
    let moveX = e.touches[0].clientX;
    let diff = moveX - startX;

    basketX += diff * 0.3;

    basketX = Math.max(0, Math.min(window.innerWidth - 100, basketX));
    updateBasket();

    startX = moveX;
});

// ===== CREATE FALLING WORD =====
function createWord(text) {
    const el = document.createElement("div");
    el.classList.add("word");
    el.innerText = text;

    let x = Math.random() * (window.innerWidth - 100);
    let y = 0;

    el.style.left = x + "px";
    gameArea.appendChild(el);

    let fallSpeed = 1.2; // slow for grade 1

    function fall() {
        y += fallSpeed;
        el.style.top = y + "px";

        // collision with basket
        let basketTop = window.innerHeight - 80;

        if (
            y >= basketTop &&
            x > basketX - 50 &&
            x < basketX + 100
        ) {
            caught++;
            scoreBoard.innerText = `Caught: ${caught} / 10`;
            el.remove();
            nextWord();
            return;
        }

        // miss
        if (y > window.innerHeight) {
            el.remove();
            nextWord();
            return;
        }

        requestAnimationFrame(fall);
    }

    fall();
}

// ===== GAME FLOW =====
function nextWord() {
    if (currentIndex >= words.length) {
        endGame();
        return;
    }

    let word = words[currentIndex];
    currentIndex++;

    setTimeout(() => {
        createWord(word);
    }, 800);
}

function startGame() {
    currentIndex = 0;
    caught = 0;
    scoreBoard.innerText = "Caught: 0 / 10";
    nextWord();
}

function endGame() {
    endScreen.style.display = "flex";
}

function restartGame() {
    endScreen.style.display = "none";
    startGame();
}

// start automatically
startGame();
</script>

</body>
</html>
