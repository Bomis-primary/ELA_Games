<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alien Catcher Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #001d3d, #003566);
}

/* SPLASH */
#splash {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#splash img {
  width: 280px;
}

/* START SCREEN */
#startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.6);
  color: white;
  z-index: 9;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

/* HUD */
#hud {
  position: absolute;
  width: 100%;
  top: 10px;
  display: flex;
  justify-content: space-between;
  color: white;
  font-size: 20px;
  padding: 0 20px;
  z-index: 5;
}

/* GAME OVER */
#gameOver {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.8);
  color: white;
  z-index: 20;
}

/* CONTROLS */
#controls {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  z-index: 5;
}

.ctrlBtn {
  font-size: 28px;
  padding: 10px 20px;
  margin: 10px;
}
</style>
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>👾 Alien Catcher</h1>
  <button onclick="startGame()">START</button>
</div>

<!-- HUD -->
<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="time">60</span></div>
</div>

<!-- GAME OVER -->
<div id="gameOver">
  <h1>Game Over</h1>
  <h2 id="finalScore"></h2>
  <button onclick="restartGame()">Play Again</button>
</div>

<!-- CONTROLS -->
<div id="controls">
  <button class="ctrlBtn" onclick="moveLeft()">⬅</button>
  <button class="ctrlBtn" onclick="moveRight()">➡</button>
</div>

<canvas id="gameCanvas"></canvas>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

/* FIX: proper resize handling */
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* BASKET */
let basketImg = new Image();
basketImg.src = "assets/basket.jpg";

let basket = {
  x: canvas.width / 2 - 60,
  y: canvas.height - 120,
  w: 120,
  h: 80
};

/* GAME STATE */
let aliens = [];
let score = 0;
let timeLeft = 60;
let gameRunning = false;

/* WORDS */
const words = ["cat","dog","sun","run","book","pen","apple","ball","fish","tree"];

/* SPAWN */
function spawnAlien() {
  aliens.push({
    x: Math.random() * (canvas.width - 80),
    y: -50,
    speed: 2 + Math.random() * 2,
    word: words[Math.floor(Math.random() * words.length)]
  });
}

/* DRAW */
function drawBasket() {
  ctx.drawImage(basketImg, basket.x, basket.y, basket.w, basket.h);
}

function drawAliens() {
  ctx.fillStyle = "white";
  ctx.font = "22px Arial";

  aliens.forEach(a => {
    ctx.fillText("👽 " + a.word, a.x, a.y);
  });
}

/* UPDATE */
function updateAliens() {
  aliens.forEach(a => {
    a.y += a.speed;

    if (
      a.y > basket.y &&
      a.x > basket.x &&
      a.x < basket.x + basket.w
    ) {
      document.getElementById("correctSound").play();
      score++;
      document.getElementById("score").innerText = score;
      a.y = canvas.height + 100;
    }

    if (a.y > canvas.height) {
      a.y = canvas.height + 100;
    }
  });
}

/* LOOP */
function gameLoop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBasket();
  drawAliens();
  updateAliens();

  requestAnimationFrame(gameLoop);
}

/* SPAWN ENGINE */
let spawnInterval;

function startSpawning() {
  spawnInterval = setInterval(() => {
    if (gameRunning) spawnAlien();
  }, 1200);
}

/* TIMER */
function startTimer() {
  let t = setInterval(() => {
    if (!gameRunning) return;

    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(t);
      endGame();
    }
  }, 1000);
}

/* CONTROLS */
function moveLeft() {
  basket.x -= 40;
  if (basket.x < 0) basket.x = 0;
}

function moveRight() {
  basket.x += 40;
  if (basket.x > canvas.width - basket.w)
    basket.x = canvas.width - basket.w;
}

/* START GAME */
function startGame() {
  document.getElementById("startScreen").style.display = "none";

  score = 0;
  timeLeft = 60;
  aliens = [];

  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = timeLeft;

  gameRunning = true;

  gameLoop();
  startTimer();
  startSpawning();
}

/* END GAME */
function endGame() {
  gameRunning = false;

  document.getElementById("gameOver").style.display = "flex";
  document.getElementById("finalScore").innerText = "Score: " + score;

  document.getElementById("clapSound").play();
}

/* RESTART */
function restartGame() {
  document.getElementById("gameOver").style.display = "none";
  startGame();
}

/* SPLASH → START SCREEN FLOW (FIXED) */
window.onload = () => {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("startScreen").style.display = "flex";
  }, 5000);
};
</script>

</body>
</html>
