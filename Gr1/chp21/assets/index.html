<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alien Translator - Sight Words</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(to bottom,#001d3d,#003566);
    color:white;
    overflow-x:hidden;
}

/* ---------------- LOGO SCREEN ---------------- */

#logoScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to bottom,#001d3d,#003566);
    z-index:9999;
}

#logoImage{
    width:80%;
    max-width:350px;
    background:white;
    padding:20px;
    border-radius:20px;
    border:6px solid #ffd60a;
    box-shadow:0 0 30px rgba(255,214,10,0.7);
}

/* ---------------- GAME ---------------- */

#gameContainer{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1{
    color:#ffd60a;
    margin-top:20px;
    font-size:48px;
}

#timer{
    position:fixed;
    top:15px;
    right:15px;
    background:#ffd60a;
    color:#001d3d;
    padding:12px 20px;
    border-radius:12px;
    font-size:30px;
    font-weight:bold;
    z-index:100;
}

#score{
    font-size:28px;
    margin-top:15px;
    font-weight:bold;
}

#questionCounter{
    font-size:28px;
    margin-top:10px;
    font-weight:bold;
}

#instruction{
    font-size:38px;
    font-weight:bold;
    margin:25px;
    line-height:1.3;
}

#alien{
    font-size:120px;
    margin:20px;
}

#alienWord{
    font-size:70px;
    background:white;
    color:#001d3d;
    display:inline-block;
    padding:25px 50px;
    border-radius:20px;
    margin:20px;
    font-weight:bold;
    min-width:250px;
}

.option{
    display:block;
    width:320px;
    max-width:90%;
    margin:20px auto;
    padding:18px;
    font-size:34px;
    font-weight:bold;
    border:none;
    border-radius:15px;
    cursor:pointer;
    background:#ffd60a;
    color:#001d3d;
    transition:0.3s;
}

.option:hover{
    transform:scale(1.05);
}

#message{
    min-height:50px;
    font-size:32px;
    margin-top:20px;
    font-weight:bold;
}

#gameOver{
    display:none;
    font-size:40px;
    margin-top:40px;
}

/* ---------------- MOBILE ---------------- */

@media (max-width:768px){

    h1{
        font-size:34px;
    }

    #instruction{
        font-size:26px;
        margin:20px 10px;
    }

    #alien{
        font-size:80px;
    }

    #alienWord{
        font-size:46px;
        padding:18px 28px;
    }

    .option{
        width:85%;
        font-size:28px;
    }

    #timer{
        font-size:22px;
        padding:10px 15px;
    }

    #score,
    #questionCounter{
        font-size:22px;
    }

    #message{
        font-size:24px;
    }

    #gameOver{
        font-size:28px;
        padding:20px;
    }
}

</style>
</head>

<body>

<!-- AUDIO -->

<audio id="correctSound" preload="auto">
    <source src="assets/clapping.mp3" type="audio/mpeg">
</audio>

<audio id="wrongSound" preload="auto">
    <source src="assets/wrong.mp3" type="audio/mpeg">
</audio>

<!-- LOGO SCREEN -->

<div id="logoScreen">
    <img
        src="assets/innovine-logo.png"
        alt="Innovine Logo"
        id="logoImage">
</div>

<!-- GAME -->

<div id="gameContainer" style="display:none;">

    <div id="timer">60</div>

    <h1>👽 Alien Translator 👽</h1>

    <div id="score">Score: 0</div>

    <div id="questionCounter">
        Question 1 of 10
    </div>

    <div id="alien">👾</div>

    <p id="instruction">
        Translate the Alien Word! Click on the Sight Word.
    </p>

    <div id="alienWord"></div>

    <div id="options"></div>

    <div id="message"></div>

    <div id="gameOver"></div>

</div>

<script>

/* ---------------- SIGHT WORDS ---------------- */

const sightWords = [
    "the",
    "and",
    "is",
    "it",
    "to",
    "in",
    "you",
    "we",
    "can",
    "see",
    "go",
    "like",
    "come",
    "here",
    "look"
];

/* ---------------- ALIEN DICTIONARY ---------------- */

const alienDictionary = {
    "the":"☉✦☾",
    "and":"✧☍✦",
    "is":"☾☾",
    "it":"✦☉",
    "to":"☉☉",
    "in":"✧☾",
    "you":"☍✦☉",
    "we":"☉✧",
    "can":"☾✦☍",
    "see":"✦✦☉",
    "go":"☍☍",
    "like":"☉☾✦",
    "come":"✧☉☍",
    "here":"☾☉✧",
    "look":"✦☍☾"
};

/* ---------------- DISTRACTORS ---------------- */

const distractorPool = [

    "cat","dog","hat","sun","map",
    "bat","cup","bed","box","van",

    "run","hop","sit","jump","tap",
    "dig","hug","mix","pack","kick",

    "big","red","hot","sad","fat",
    "mad","wet","dim","soft","fast"

];

/* ---------------- VARIABLES ---------------- */

let score = 0;
let currentQuestion = 0;
let currentWord = "";
let gameQuestions = [];
let timer;
let timeLeft = 60;

/* ---------------- FUNCTIONS ---------------- */

function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

function startGame(){

    score = 0;
    currentQuestion = 0;

    document.getElementById("score").textContent =
    "Score: 0";

    gameQuestions =
    shuffle([...sightWords]).slice(0,10);

    loadQuestion();
}

function startTimer(){

    clearInterval(timer);

    timeLeft = 60;

    document.getElementById("timer").textContent =
    timeLeft;

    timer = setInterval(() => {

        timeLeft--;

        document.getElementById("timer").textContent =
        timeLeft;

        if(timeLeft <= 0){

            clearInterval(timer);

            document.getElementById("message").innerHTML =
            "⏰ Time's Up!";

            disableButtons();

            setTimeout(() => {

                currentQuestion++;
                loadQuestion();

            },1000);
        }

    },1000);
}

function loadQuestion(){

    if(currentQuestion >= 10){
        endGame();
        return;
    }

    document.getElementById("questionCounter").textContent =
    `Question ${currentQuestion + 1} of 10`;

    document.getElementById("message").textContent = "";

    currentWord = gameQuestions[currentQuestion];

    document.getElementById("alienWord").textContent =
    alienDictionary[currentWord];

    const wrongWord =
    distractorPool[
        Math.floor(
            Math.random() * distractorPool.length
        )
    ];

    const options =
    shuffle([currentWord, wrongWord]);

    let html = "";

    options.forEach(word => {

        html += `
        <button class="option"
        onclick="checkAnswer('${word}')">
        ${word}
        </button>
        `;

    });

    document.getElementById("options").innerHTML =
    html;

    startTimer();
}

function checkAnswer(selected){

    clearInterval(timer);

    if(selected === currentWord){

        const sound =
        document.getElementById("correctSound");

        sound.currentTime = 0;
        sound.play();

        score++;

        document.getElementById("score").textContent =
        "Score: " + score;

        document.getElementById("message").innerHTML =
        "🎉 Correct!";

        document.getElementById("alien").textContent =
        "😊👽";

    }

    else{

        const sound =
        document.getElementById("wrongSound");

        sound.currentTime = 0;
        sound.play();

        document.getElementById("message").innerHTML =
        "❌ Wrong Answer";

        document.getElementById("alien").textContent =
        "😕👽";

    }

    disableButtons();

    setTimeout(() => {

        document.getElementById("alien").textContent =
        "👾";

        currentQuestion++;

        loadQuestion();

    },1000);
}

function disableButtons(){

    const buttons =
    document.querySelectorAll(".option");

    buttons.forEach(button => {

        button.disabled = true;
        button.style.opacity = "0.6";

    });

}

function endGame(){

    clearInterval(timer);

    document.getElementById("alienWord").style.display =
    "none";

    document.getElementById("options").style.display =
    "none";

    document.getElementById("message").style.display =
    "none";

    document.getElementById("instruction").style.display =
    "none";

    document.getElementById("alien").style.display =
    "none";

    document.getElementById("gameOver").style.display =
    "block";

    document.getElementById("gameOver").innerHTML = `

        🚀 Mission Complete!<br><br>

        Final Score<br><br>

        ${score} / 10

        <br><br>

        <button class="option"
        onclick="location.reload()">

        Play Again

        </button>

    `;
}

/* ---------------- LOGO SPLASH ---------------- */

window.onload = function(){

    setTimeout(() => {

        document.getElementById("logoScreen").style.display =
        "none";

        document.getElementById("gameContainer").style.display =
        "block";

        startGame();

    },5000);

};

</script>

</body>
</html>
