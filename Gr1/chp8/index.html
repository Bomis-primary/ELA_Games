<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helping Verbs Monkey Feed Game</title>

<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
        width: 100%; height: 100%;
        font-family: Arial;
        overflow: hidden;
        background: #38bdf8;
    }

    .game-container {
        width: 100%; height: 100%;
        position: relative;
    }

    #screen-splash {
        position: fixed;
        width: 100%; height: 100%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .hud {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        background: white;
    }

    .math-banner {
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        margin: 10px;
    }

    .interaction-canvas {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 60px;
    }

    .balloon-node {
        cursor: pointer;
    }

    .balloon-body {
        width: 100px;
        height: 120px;
        background: #0ea5e9;
        color: white;
        font-size: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-weight: bold;
    }

    /* 🐵 MONKEY */
    .monkey-area {
        position: absolute;
        bottom: 20px;
        right: 20px;
        text-align: center;
    }

    .monkey-area img {
        width: 140px;
    }

    /* 🍌 BANANA ANIMATION */
    .banana {
        position: absolute;
        font-size: 30px;
        z-index: 999;
        animation: flyBanana 1s ease-in-out forwards;
    }

    @keyframes flyBanana {
        0% { transform: scale(1) translate(0,0); opacity: 1; }
        70% { transform: scale(1.3) translate(200px, -150px); }
        100% { transform: translate(260px, -220px); opacity: 0; }
    }

</style>
</head>

<body>

<!-- SPLASH -->
<div id="screen-splash">
    <img src="assets/innovine-logo.png" style="max-width:300px;">
</div>

<div class="game-container">

    <div id="screen-game" class="screen active">

        <div class="hud">
            <div id="round-counter">Round: 1/10</div>
            <div id="score">Score: 0</div>
        </div>

        <div class="math-banner" id="question">
            Loading...
        </div>

        <!-- 🐵 MONKEY -->
        <div class="monkey-area" id="monkeyArea">
            <img src="assets/monkey.gif" id="monkeyGif">
        </div>

        <div class="interaction-canvas" id="options"></div>

    </div>

</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

let score = 0;
let round = 1;
let answer = "";

const data = [
    {q:"I ___ a boy", a:"am"},
    {q:"She ___ happy", a:"is"},
    {q:"They ___ playing", a:"are"},
    {q:"We ___ friends", a:"are"},
    {q:"He ___ tall", a:"is"}
];

function load(){

    let d = data[Math.floor(Math.random()*data.length)];
    answer = d.a;

    document.getElementById("question").innerText = d.q;
    document.getElementById("score").innerText = "Score: " + score;

    let opts = ["is","am","are"];
    opts.sort(()=>Math.random()-0.5);

    let box = document.getElementById("options");
    box.innerHTML = "";

    opts.forEach(o=>{
        let div = document.createElement("div");
        div.className = "balloon-node";
        div.innerHTML = `<div class="balloon-body">${o}</div>`;

        div.onclick = ()=>check(o, div);

        box.appendChild(div);
    });
}

function check(val, el){

    if(val === answer){
        score++;

        document.getElementById("correct").play();
        document.getElementById("clap").play();

        // 🍌 CREATE BANANA ANIMATION
        let banana = document.createElement("div");
        banana.className = "banana";
        banana.innerText = "🍌";

        document.body.appendChild(banana);

        // start from clicked option position
        let rect = el.getBoundingClientRect();
        banana.style.left = rect.left + "px";
        banana.style.top = rect.top + "px";

        setTimeout(()=>banana.remove(), 1000);

        setTimeout(load, 1200);
    }
    else{
        document.getElementById("wrong").play();
        el.style.opacity = 0.3;
    }
}

window.onload = ()=>{
    setTimeout(()=>{
        document.getElementById("screen-splash").style.display="none";
        load();
    }, 2000);
};

</script>

</body>
</html>
