<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grammar Olympics: Helping Verbs</title>
    <style>
        /* Global Styles & Olympic Theme */
        :root {
            --olympic-blue: #0081C8;
            --olympic-yellow: #FCB131;
            --olympic-black: #000000;
            --olympic-green: #00A651;
            --olympic-red: #EE334E;
            --bg-color: #e0f7fa;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation; /* Prevents double-tap zoom on mobile */
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .active {
            display: flex;
        }

        /* Splash Screen */
        #splash-screen {
            background-color: white;
        }
        #splash-screen img {
            max-width: 80%;
            max-height: 50%;
        }

        /* Intro Screen */
        #intro-screen {
            background-color: var(--olympic-yellow);
            color: #333;
            padding: 20px;
        }
        #intro-screen h1 {
            color: var(--olympic-red);
            font-size: 2.5rem;
            text-shadow: 2px 2px white;
            margin-bottom: 10px;
        }
        .instructions {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 4px solid var(--olympic-blue);
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 20px;
        }
        .btn-start {
            background-color: var(--olympic-green);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            font-weight: bold;
            font-family: inherit;
        }
        .btn-start:active { transform: scale(0.95); }

        /* Game Screen */
        #game-screen {
            justify-content: flex-start;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background-color: var(--olympic-blue);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            box-sizing: border-box;
        }

        .question-box {
            width: 90%;
            background: white;
            margin: 15px auto;
            padding: 15px;
            border-radius: 10px;
            border: 3px solid var(--olympic-red);
            font-size: 1.5rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .play-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border-top: 4px solid var(--olympic-green);
            border-bottom: 4px solid var(--olympic-green);
        }

        /* Archer & Arrows */
        .archer-lane {
            position: absolute;
            left: 5%;
            font-size: 3rem;
            transition: top 0.3s ease;
            z-index: 10;
        }

        .arrow {
            position: absolute;
            font-size: 2rem;
            display: none;
            z-index: 5;
            transition: left 0.5s linear;
        }

        /* Targets */
        .target-container {
            position: absolute;
            right: 5%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
            width: 80px;
        }

        .target {
            background-color: white;
            border: 4px solid var(--olympic-black);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.3s;
        }

        /* Mobile Controls */
        .controls {
            width: 100%;
            height: 80px;
            background-color: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .control-btn {
            background-color: var(--olympic-blue);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .control-btn:active { transform: scale(0.9); }
        .btn-shoot {
            width: 120px;
            border-radius: 30px;
            background-color: var(--olympic-red);
            font-family: inherit;
            font-weight: bold;
        }

        /* End Screen */
        #end-screen {
            background-color: var(--olympic-blue);
            color: white;
        }
        .medal { font-size: 5rem; margin-bottom: 20px; }

        @media (min-width: 768px) {
            .controls { display: none; } /* Hide on-screen controls for laptops */
            .question-box { font-size: 2rem; }
            .target { width: 100px; height: 100px; font-size: 2rem; }
