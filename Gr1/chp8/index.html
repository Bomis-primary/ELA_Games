<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helping Verbs Adventure - Grade 1</title>

<style>
    :root {
        --sky-blue: #bae6fd;
        --grass-green: #22c55e;
        --pop-pink: #f43f5e;
        --gold: #eab308;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
        width: 100%; height: 100%;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #1e293b; overflow: hidden;
        background-color: #38bdf8;
    }

    .game-container {
        position: relative; width: 100%; height: 100%;
        background: #38bdf8 url('assets/sky-bg.png') no-repeat center center;
        background-size: cover;
        display: flex; justify-content: center; align-items: center;
        flex-direction: column; padding: 20px;
    }

    #screen-splash {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #ffffff; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .logo-img {
        max-width: 420px;
    }

    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    .card {
        background: white;
        padding: 30px;
        border-radius: 25px;
        border: 4px solid #38bdf8;
        text-align: center;
    }

    h1 { color: #0284c7; }

    .btn {
        padding: 14px 30px;
        font-size: 20px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        background: #22c55e;
        color: white;
        font-weight: bold;
        margin-top: 15px;
    }

    .hud {
        width: 100%;
        display: flex;
        justify-content: space-between;
        background: white;
        padding: 10px 20px;
        border-radius: 20px;
        margin-bottom: 10px;
    }

    .math-banner {
        background: #fef08a;
        padding: 12px;
        font-size: 26px;
        font-weight: bold;
        border-radius: 20px;
        margin-bottom: 10px;
    }

    .interaction-canvas {
        display: flex;
        gap: 30px;
        justify-content: center;
        align-items: center;
        height: 300px;
    }

    .balloon-node {
        cursor: pointer;
    }

    .balloon-body {
        width: 110px;
        height: 130px;
        border-radius: 50%;
        background: #0ea5e9;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        color: white;
        font-weight: bold;
    }

    .basket-node {
        cursor: pointer;
        font-size: 60px;
    }

</style>
</head>

<body>

<!-- SPLASH -->
<div id="screen-splash">
    <img class="logo-img" src="assets/innovine-logo.png">
</div>

<div class="game-container">

    <div id="screen-game" class="screen active">

        <div class="hud">
            <div id="round-counter">Round: 1/10</div>
            <div id="pops-counter">Score: 0</div>
        </div>

        <div class="math-banner" id="challenge-formula">Loading...</div>

        <div class="interaction-canvas" id="interaction-field"></div>

    </div>

</div>

<!-- SOUNDS -->
<audio id="snd-correct" src="assets/correct.mp3"></audio>
<audio id="snd-wrong" src="assets/wrong.mp3"></audio>
<audio id="snd-clap" src="assets/clapping.mp3"></audio>

<script>

let currentRound = 1;
let score = 0;
let correctAnswer = "";
let attempts = 0;

const sentences = [
    {q: "I ___ a boy.", a: "am"},
    {q: "She ___ happy.", a: "is"},
    {q: "They ___ playing.", a: "are"},
    {q: "We ___ friends.", a: "are"},
    {q: "He ___ tall.", a: "is"},
    {q: "I ___ six years old.", a: "am"},
    {q: "It ___ a dog.", a: "is"},
    {q: "You ___ my friend.", a: "are"},
    {q: "She ___ a teacher.", a: "is"},
    {q: "We ___ in school.", a: "are"},
    {q: "I ___ happy today.", a: "am"},
    {q: "They ___ at home.", a: "are"}
];

function startGame(){
    loadRound();
}

function loadRound(){

    attempts = 0;

    document.getElementById("round-counter").innerText = `Round: ${currentRound}/10`;
    document.getElementById("pops-counter").innerText = `Score: ${score}`;

    let data = sentences[Math.floor(Math.random() * sentences.length)];
    correctAnswer = data.a;

    document.getElementById("challenge-formula").innerText = data.q;

    let options = ["is","am","are"];
    options.sort(() => Math.random() - 0.5);

    let field = document.getElementById("interaction-field");
    field.innerHTML = "";

    options.forEach(opt => {
        let div = document.createElement("div");
        div.className = "balloon-node";
        div.innerHTML = `<div class="balloon-body">${opt}</div>`;

        div.onclick = () => checkAnswer(opt, div);

        field.appendChild(div);
    });
}

function checkAnswer(opt, el){

    attempts++;

    if(opt === correctAnswer){
        score++;

        document.getElementById("snd-correct").play();
        document.getElementById("snd-clap").play();

        el.style.background = "green";

        setTimeout(nextRound, 1200);
    }
    else{
        document.getElementById("snd-wrong").play();

        el.style.opacity = 0.3;

        if(attempts >= 2){
            setTimeout(nextRound, 1000);
        }
    }
}

function nextRound(){

    currentRound++;

    if(currentRound > 10){
        document.getElementById("challenge-formula").innerText =
        `Game Over! Score: ${score}/10`;
        document.getElementById("interaction-field").innerHTML = "";
        return;
    }

    loadRound();
}

window.onload = () => {
    setTimeout(() => {
        document.getElementById("screen-splash").style.display = "none";
        startGame();
    }, 2000);
};

</script>

</body>
</html>
