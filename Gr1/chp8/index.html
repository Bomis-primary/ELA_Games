<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Olympic Grammar Archery - Is Am Are</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(to bottom,#e8f6ff,#ffffff);
overflow:hidden;
}

.screen{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

/* SPLASH */
#splash{
background:white;
z-index:10;
}
#splash img{
width:180px;
}

/* INSTRUCTIONS */
#intro{
display:none;
background:#fff;
z-index:9;
}
#intro h1{
font-size:28px;
color:#1b4d89;
}
#intro p{
font-size:18px;
margin:10px;
}

/* GAME */
#game{
display:none;
flex-direction:row;
justify-content:space-between;
padding:10px;
box-sizing:border-box;
}

#hud{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 15px;
font-weight:bold;
font-size:18px;
}

#playerArea{
width:40%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

#archer{
width:120px;
transition:transform 0.2s;
}

#bowHint{
font-size:14px;
color:#555;
margin-top:10px;
}

#targetArea{
width:55%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
}

.option{
padding:15px 25px;
border:3px solid #1b4d89;
border-radius:12px;
font-size:22px;
width:120px;
text-align:center;
background:white;
cursor:pointer;
transition:0.2s;
}

.option.selected{
background:#1b4d89;
color:white;
transform:scale(1.1);
}

/* RESULT */
#result{
display:none;
background:white;
z-index:20;
}

#result h1{
font-size:32px;
color:#1b4d89;
}
button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:#1b4d89;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen">
    <img src="assets/innovine-logo.png" />
</div>

<!-- INTRO -->
<div id="intro" class="screen">
    <h1>🏹 Olympic Grammar Archery</h1>
    <p><b>Helping Verbs: is / am / are</b></p>
    <p>Use UP / DOWN arrows to aim and SPACE to shoot the correct answer.</p>
    <button onclick="startGame()">Start Game</button>
</div>

<!-- HUD -->
<div id="hud">
    <div>Question: <span id="qNo">1</span>/15</div>
    <div>⏳ Time: <span id="timer">30</span>s</div>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <div id="playerArea">
        <img id="archer" src="https://cdn-icons-png.flaticon.com/512/4774/4774069.png"/>
        <div id="bowHint">Aim & Shoot 🎯</div>
    </div>

    <div id="targetArea">
        <div class="option selected">is</div>
        <div class="option">am</div>
        <div class="option">are</div>
    </div>

</div>

<!-- RESULT -->
<div id="result" class="screen">
    <h1 id="finalText">Great Job!</h1>
    <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>

// QUESTIONS BANK (20)
const questions = [
["I ___ a boy","am"],
["She ___ happy","is"],
["They ___ playing","are"],
["I ___ 6 years old","am"],
["He ___ tall","is"],
["We ___ friends","are"],
["I ___ hungry","am"],
["It ___ a cat","is"],
["You ___ late","are"],
["She ___ a doctor","is"],
["They ___ at school","are"],
["I ___ ready","am"],
["He ___ my brother","is"],
["We ___ in the park","are"],
["She ___ dancing","is"],
["I ___ excited","am"],
["They ___ students","are"],
["It ___ raining","is"],
["You ___ kind","are"],
["I ___ sleepy","am"]
];

let selectedIndex = 0;
let qIndex = 0;
let score = 0;
let timer;
let timeLeft = 30;
let currentSet = [];

const options = document.querySelectorAll(".option");

// SPLASH FLOW
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("intro").style.display="flex";
},5000);

// START GAME
function startGame(){
document.getElementById("intro").style.display="none";
document.getElementById("game").style.display="flex";
initGame();
}

// INIT
function initGame(){
currentSet = shuffle(questions).slice(0,15);
loadQuestion();
startTimer();
}

// LOAD QUESTION
function loadQuestion(){
if(qIndex >= currentSet.length){
endGame();
return;
}

document.getElementById("qNo").innerText = qIndex+1;

options.forEach((o,i)=>{
o.classList.remove("selected");
if(i===0) o.classList.add("selected");
});

selectedIndex = 0;
document.getElementById("archer").style.transform="translateX(0)";
}

// TIMER
function startTimer(){
timeLeft = 30;
document.getElementById("timer").innerText = timeLeft;

timer = setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText = timeLeft;

if(timeLeft<=0){
nextQuestion(false);
}
},1000);
}

// SHOOT
document.addEventListener("keydown",(e)=>{
if(document.getElementById("game").style.display!=="flex") return;

if(e.key==="ArrowDown"){
selectedIndex = (selectedIndex+1)%3;
updateSelection();
}
if(e.key==="ArrowUp"){
selectedIndex = (selectedIndex+2)%3;
updateSelection();
}
if(e.key===" "){
checkAnswer();
}
});

function updateSelection(){
options.forEach(o=>o.classList.remove("selected"));
options[selectedIndex].classList.add("selected");

let move = selectedIndex * 40;
document.getElementById("archer").style.transform = `translateY(${move}px)`;
}

// CHECK ANSWER
function checkAnswer(){
let correct = currentSet[qIndex][1];
let chosen = options[selectedIndex].innerText;

if(chosen === correct){
document.getElementById("correctSound").play();
score++;
nextQuestion(true);
}else{
document.getElementById("wrongSound").play();
nextQuestion(false);
}
}

// NEXT
function nextQuestion(){
clearInterval(timer);
qIndex++;
startTimer();
loadQuestion();
}

// END
function endGame(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="flex";
document.getElementById("finalText").innerText =
`You scored ${score} / 15 🏹`;

document.getElementById("clapSound").play();
}

// SHUFFLE
function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

</script>

</body>
</html>
