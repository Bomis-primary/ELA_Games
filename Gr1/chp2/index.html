<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Common & Proper Nouns Adventure</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fff3c4,#ffd6d6);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* SPLASH + TITLE SCREENS */
.screen {
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:white;
    z-index:1000;
}

#titleScreen {
    display:none;
    background:linear-gradient(135deg,#ffe082,#fff);
}

#titleScreen h1{
    font-size:2rem;
    text-align:center;
    color:#4a148c;
}

button {
    padding:12px 25px;
    border:none;
    background:#4a148c;
    color:white;
    border-radius:10px;
    font-size:1rem;
    cursor:pointer;
}

/* GAME AREA */
#gameContainer {
    display:none;
    flex-direction:column;
    width:95%;
    max-width:650px;
    text-align:center;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    font-size:1rem;
    margin-bottom:10px;
    color:#4a148c;
}

h2{
    font-size:1.2rem;
    margin:10px 0;
}

#zones{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

.zone{
    width:45%;
    min-height:90px;
    border:2px dashed #6a1b9a;
    border-radius:10px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:1.1rem;
}

#word{
    margin-top:25px;
    padding:15px;
    border-radius:10px;
    color:white;
    font-size:1.3rem;
    display:inline-block;
    cursor:grab;
    user-select:none;
}

/* END SCREEN */
#endScreen{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:2000;
}

.trophy{
    font-size:3rem;
}
</style>
</head>

<body>

<!-- LOGO SCREEN -->
<div id="logoScreen" class="screen">
    <img src="assets/568a9f41-3f89-4549-b139-f25154804e44.png" style="width:180px;">
</div>

<!-- TITLE SCREEN -->
<div id="titleScreen" class="screen">
    <h1>🎯 Common & Proper Noun Adventure</h1>
    <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="gameContainer">
    <div class="top-bar">
        <div>Question: <span id="qNo">1</span>/15</div>
        <div>⏱ <span id="timer">30</span>s</div>
    </div>

    <h2>Drag the word into the correct category</h2>

    <div id="zones">
        <div class="zone" id="common">Common Noun</div>
        <div class="zone" id="proper">Proper Noun</div>
    </div>

    <div id="word" draggable="true"></div>
</div>

<!-- END SCREEN -->
<div id="endScreen">
    <div class="trophy" id="trophy">🏆</div>
    <h2 id="resultText"></h2>
    <button onclick="location.reload()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>

let words = [
["dog","common"],["school","common"],["book","common"],["city","common"],["river","common"],
["Riya","proper"],["Mumbai","proper"],["Rahul","proper"],["Ganga","proper"],["India","proper"],
["teacher","common"],["apple","common"],["Ananya","proper"],["Delhi","proper"],["friend","common"]
];

let index=0;
let score=0;
let timer;
let timeLeft=30;

words = words.sort(()=>Math.random()-0.5);

const wordBox = document.getElementById("word");

function startGame(){
    document.getElementById("titleScreen").style.display="none";
    document.getElementById("gameContainer").style.display="flex";
    loadWord();
    startTimer();
}

/* SPLASH SEQUENCE */
setTimeout(()=>{
    document.getElementById("logoScreen").style.display="none";
    document.getElementById("titleScreen").style.display="flex";
},5000);

/* LOAD WORD */
function loadWord(){
    if(index>=words.length){
        endGame();
        return;
    }

    let [w,c] = words[index];
    wordBox.textContent=w;
    wordBox.dataset.correct=c;
    wordBox.style.background=randomColor();

    document.getElementById("qNo").textContent=index+1;

    resetTimer();
}

/* TIMER */
function startTimer(){
    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").textContent=timeLeft;

        if(timeLeft<=0){
            nextQuestion();
        }
    },1000);
}

function resetTimer(){
    timeLeft=30;
    document.getElementById("timer").textContent=timeLeft;
}

function nextQuestion(){
    index++;
    loadWord();
}

/* DRAG */
wordBox.addEventListener("dragstart",(e)=>{
    e.dataTransfer.setData("text",wordBox.textContent);
});

/* DROP */
document.querySelectorAll(".zone").forEach(z=>{
    z.addEventListener("dragover",e=>e.preventDefault());

    z.addEventListener("drop",(e)=>{
        e.preventDefault();

        let correct = wordBox.dataset.correct;
        let chosen = e.target.id;

        if(chosen===correct){
            score++;
            document.getElementById("correctSound").play();
            document.getElementById("clapSound").play();
            confetti();
        } else {
            document.getElementById("wrongSound").play();
            showCorrect(correct);
        }

        index++;
        setTimeout(loadWord,800);
    });
});

/* SHOW CORRECT ANSWER ON WRONG */
function showCorrect(correct){
    let zone=document.getElementById(correct);
    zone.style.background="#c8e6c9";
    setTimeout(()=>zone.style.background="white",2000);
}

/* CONFETTI */
function confetti(){
    for(let i=0;i<15;i++){
        let c=document.createElement("div");
        c.style.position="absolute";
        c.style.width="8px";
        c.style.height="8px";
        c.style.background=randomColor();
        c.style.left=Math.random()*100+"%";
        c.style.top=Math.random()*100+"%";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),800);
    }
}

/* END GAME */
function endGame(){
    clearInterval(timer);
    document.getElementById("gameContainer").style.display="none";
    document.getElementById("endScreen").style.display="flex";

    let trophy="🥉 Bronze";
    let text="Let's revise and come back!";

    if(score===15){
        trophy="🏆 Gold";
        text="Excellent!";
    } else if(score>=10){
        trophy="🥈 Silver";
        text="Well Done!";
    } else if(score>=5){
        trophy="🥉 Bronze";
        text="Good Try!";
    }

    document.getElementById("trophy").textContent=trophy;
    document.getElementById("resultText").textContent=`Score: ${score}/15 - ${text}`;
}

/* COLOR */
function randomColor(){
    const colors=["#e91e63","#9c27b0","#3f51b5","#009688","#ff9800"];
    return colors[Math.floor(Math.random()*colors.length)];
}

</script>

</body>
</html>
