 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Common and Proper Nouns Adventure</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fff3c4,#ffd6d6);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* SCREENS */
.screen {
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:white;
    z-index:1000;
}

#titleScreen {
    display:none;
    background:linear-gradient(135deg,#ffe082,#fff);
}

#titleScreen h1{
    font-size:clamp(1.6rem, 3vw, 2.4rem);
    text-align:center;
    color:#4a148c;
    padding:0 10px;
}

button {
    padding:12px 25px;
    border:none;
    background:#4a148c;
    color:white;
    border-radius:10px;
    font-size:1rem;
    cursor:pointer;
}

/* GAME CONTAINER (LAPTOP OPTIMIZED) */
#gameContainer {
    display:none;
    flex-direction:column;
    width:95%;
    max-width:900px;
    text-align:center;
}

/* TOP BAR */
.top-bar{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    font-size:clamp(0.9rem, 1.2vw, 1.1rem);
    margin-bottom:10px;
    color:#4a148c;
}

/* QUESTION */
h2{
    font-size:clamp(1rem, 1.6vw, 1.3rem);
    margin:10px 0;
}

/* ZONES */
#zones{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
    gap:10px;
}

.zone{
    width:45%;
    min-height:clamp(80px, 12vh, 120px);
    border:2px dashed #6a1b9a;
    border-radius:10px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:clamp(0.9rem, 1.4vw, 1.2rem);
}

/* WORD */
#word{
    margin-top:25px;
    padding:15px;
    border-radius:10px;
    color:white;
    font-size:1.3rem;
    display:inline-block;
    cursor:grab;
    user-select:none;
}

/* END */
#endScreen{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:2000;
}

.trophy{font-size:3rem;}

/* MOBILE RESPONSIVE */
@media (max-width:600px){
    #gameContainer{width:98%;}
    #zones{flex-direction:column;}
    .zone{width:90%;}
    #word{width:80%;}
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="logoScreen" class="screen">
    <img src="assets/innovine-logo.png" style="width:180px;">
</div>

<!-- TITLE -->
<div id="titleScreen" class="screen">
    <h1>🎯 Common and Proper Noun Adventure</h1>
    <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="gameContainer">

    <div class="top-bar">
        <div>Question: <span id="qNo">1</span>/15</div>
        <div>⏱ <span id="timer">30</span>s</div>
    </div>

    <h2>Drag the word into the correct category.</h2>

    <div id="zones">
        <div class="zone" id="common">Common Noun</div>
        <div class="zone" id="proper">Proper Noun</div>
    </div>

    <div id="word" draggable="true"></div>

</div>

<!-- END -->
<div id="endScreen">
    <div class="trophy" id="trophy">🏆</div>
    <h2 id="resultText"></h2>
    <button onclick="location.reload()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>

/* WORD POOL */
let wordPool = [
["dog","common"],["school","common"],["book","common"],["city","common"],["river","common"],
["teacher","common"],["apple","common"],["friend","common"],["tree","common"],["car","common"],
["table","common"],["pen","common"],["bird","common"],["chair","common"],["ball","common"],

["Riya","proper"],["Mumbai","proper"],["Rahul","proper"],["Ganga","proper"],["India","proper"],
["Ananya","proper"],["Delhi","proper"],["Chennai","proper"],["Kiran","proper"],["London","proper"]
];

let words = wordPool.sort(()=>Math.random()-0.5).slice(0,15);

let index=0;
let score=0;
let timeLeft=30;
let timer;

const wordBox=document.getElementById("word");

/* SPLASH */
setTimeout(()=>{
    document.getElementById("logoScreen").style.display="none";
    document.getElementById("titleScreen").style.display="flex";
},5000);

function startGame(){
    document.getElementById("titleScreen").style.display="none";
    document.getElementById("gameContainer").style.display="flex";
    loadWord();
    startTimer();
}

function loadWord(){
    if(index>=15){
        endGame();
        return;
    }

    let [w,c]=words[index];

    wordBox.textContent=w;
    wordBox.dataset.correct=c;
    wordBox.style.background=randomColor();

    document.getElementById("qNo").textContent=index+1;

    resetTimer();
}

function startTimer(){
    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").textContent=timeLeft;
        if(timeLeft<=0){
            nextQuestion();
        }
    },1000);
}

function resetTimer(){
    timeLeft=30;
    document.getElementById("timer").textContent=timeLeft;
}

function nextQuestion(){
    index++;
    loadWord();
}

/* DRAG */
wordBox.addEventListener("dragstart",e=>{
    e.dataTransfer.setData("text",wordBox.textContent);
});

/* DROP */
document.querySelectorAll(".zone").forEach(z=>{
    z.addEventListener("dragover",e=>e.preventDefault());

    z.addEventListener("drop",e=>{
        e.preventDefault();

        let correct=wordBox.dataset.correct;
        let chosen=e.target.id;

        if(chosen===correct){
            score++;
            document.getElementById("correctSound").play();
            document.getElementById("clapSound").play();
            confetti(chosen);
        } else {
            document.getElementById("wrongSound").play();
            showCorrect(correct);
        }

        index++;
        setTimeout(loadWord,700);
    });
});

/* CONFETTI */
function confetti(zoneId){
    const zone=document.getElementById(zoneId);
    const rect=zone.getBoundingClientRect();

    for(let i=0;i<25;i++){
        let c=document.createElement("div");
        c.style.position="fixed";
        c.style.width="8px";
        c.style.height="8px";
        c.style.borderRadius="50%";
        c.style.background=randomColor();
        c.style.zIndex="9999";

        let x=rect.left+rect.width/2;
        let y=rect.top+rect.height/2;

        c.style.left=x+"px";
        c.style.top=y+"px";

        document.body.appendChild(c);

        let angle=Math.random()*2*Math.PI;
        let speed=Math.random()*6+2;
        let vx=Math.cos(angle)*speed;
        let vy=Math.sin(angle)*speed;
        let gravity=0.15;

        function animate(){
            x+=vx;
            y+=vy;
            vy+=gravity;

            c.style.left=x+"px";
            c.style.top=y+"px";

            if(y<window.innerHeight+50){
                requestAnimationFrame(animate);
            } else {
                c.remove();
            }
        }

        requestAnimationFrame(animate);
    }
}

/* SHOW CORRECT */
function showCorrect(correct){
    let zone=document.getElementById(correct);
    zone.style.background="#c8e6c9";
    setTimeout(()=>zone.style.background="white",2000);
}

/* ⭐ FIXED SCOREBOARD LOGIC (ONLY CHANGE) */
function endGame(){

    clearInterval(timer);
    document.getElementById("gameContainer").style.display="none";
    document.getElementById("endScreen").style.display="flex";

    let trophy="🥉 Bronze";
    let msg="Let's revise and come back!";

    /* ✅ CORRECTED LOGIC */
    if(score >= 11){
        trophy="🏆 Gold";
        msg="Excellent!";
    }
    else if(score >= 6){
        trophy="🥈 Silver";
        msg="Well Done!";
    }
    else {
        trophy="🥉 Bronze";
        msg="Good Try!";
    }

    document.getElementById("trophy").textContent=trophy;
    document.getElementById("resultText").textContent=`Score: ${score}/15 - ${msg}`;
}

/* COLORS */
function randomColor(){
    const colors=["#e91e63","#9c27b0","#3f51b5","#009688","#ff9800"];
    return colors[Math.floor(Math.random()*colors.length)];
}

</script>

</body>
</html>
