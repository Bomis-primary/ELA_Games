\<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Action Word Adventure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Comic Sans MS;
background:#dff3ff;
overflow:hidden;
}

/* CENTER GAME FRAME (FIX FOR LAPTOP + MOBILE) */
#frame{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:95%;
max-width:900px;
height:90vh;
}

/* TOP BAR FIXED INSIDE FRAME */
#topBar{
display:flex;
justify-content:space-between;
font-size:16px;
font-weight:bold;
padding:5px 10px;
}

/* QUESTION (LESS GAP FIX) */
#question{
text-align:center;
font-size:20px;
font-weight:bold;
color:#0d47a1;
margin-top:10px;
}

/* TICKER AREA */
#ticker{
position:absolute;
bottom:60px;
width:100%;
overflow:hidden;
background:#2c3e50;
padding:15px 0;
border-radius:10px;
}

#track{
display:inline-block;
white-space:nowrap;
animation:scroll 12s linear infinite;
}

@keyframes scroll{
from{transform:translateX(0)}
to{transform:translateX(-50%)}
}

.option{
display:inline-block;
margin:0 70px;
cursor:pointer;
}

.option img{
height:80px;
width:80px;
object-fit:contain;
}

/* BOX (NOT USED MUCH NOW BUT KEPT SAFE) */
#box{
position:absolute;
top:120px;
left:50%;
transform:translateX(-50%);
font-size:70px;
}

/* FREEZE OVERLAY (FIXED) */
#freeze{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
background:rgba(0,0,0,0.05);
z-index:999;
}

/* RESULT */
#result{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:12px;
display:none;
font-size:20px;
text-align:center;
}

/* SPLASH LOGO */
#splash{
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:2000;
}
</style>
</head>

<body>

<!-- LOGO RESTORED -->
<div id="splash">
<img src="assets/innovine-logo.png" style="width:220px;">
</div>

<!-- GAME FRAME -->
<div id="frame">

<div id="topBar">
<div>Q: <span id="qCount">1</span>/10</div>
<div>⏱ <span id="timer">30</span>s</div>
</div>

<div id="question"></div>

<div id="ticker">
<div id="track"></div>
</div>

<div id="freeze"></div>

<div id="result"></div>

</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clappingSound" src="assets/clapping.mp3"></audio>

<script>

/* ================= DATA ================= */
const bank=[
{q:"The child is jumping with joy. What action is this?",ans:"jump_image.png"},
{q:"The boy is running fast. What is he doing?",ans:"run_image.png"},
{q:"The girl is sleeping peacefully. What action is this?",ans:"sleep_image.jpg"},
{q:"The child is eating food. What is happening?",ans:"eat_image.jpg"},
{q:"The student is reading a book. What action is this?",ans:"read_image.png"},
{q:"The children are singing. What are they doing?",ans:"sing_image.png"},
{q:"The boy is swimming. What action is this?",ans:"swim_image.png"},
{q:"The girl is walking. What is she doing?",ans:"walk_image.png"}
];

let questions=[...bank].sort(()=>Math.random()-0.5).slice(0,10);

let index=0;
let timer=30;
let locked=false;

/* REMOVE SPLASH */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
load();
},5000);

/* LOAD */
function load(){

if(index>=10){
document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML="🎉 Game Over!";
return;
}

document.getElementById("qCount").innerText=index+1;
timer=30;
locked=false;

let q=questions[index];
document.getElementById("question").innerText=q.q;

buildTicker(q.ans);
}

/* TICKER */
function buildTicker(correct){

let track=document.getElementById("track");
track.innerHTML="";

let pool=bank.map(x=>x.ans).filter(x=>x!==correct);

let options=[
correct,
pool[Math.floor(Math.random()*pool.length)],
pool[Math.floor(Math.random()*pool.length)]
].sort(()=>Math.random()-0.5);

/* duplicate for smooth loop */
let loop=[...options,...options];

loop.forEach(img=>{
let div=document.createElement("div");
div.className="option";

div.innerHTML=`<img src="assets/${img}">`;

div.onclick=()=>check(img,correct);

track.appendChild(div);
});
}

/* CONFETTI FIX */
function confetti(){
for(let i=0;i<25;i++){
let c=document.createElement("div");
c.style.position="absolute";
c.style.width="6px";
c.style.height="6px";
c.style.background=["#ff0","#f0f","#0ff","#0f0"][Math.floor(Math.random()*4)];
c.style.left=Math.random()*100+"%";
c.style.top=Math.random()*50+"%";
document.body.appendChild(c);
setTimeout(()=>c.remove(),800);
}
}

/* CHECK */
function check(val,correct){

if(locked) return;
locked=true;

/* FREEZE SCREEN */
document.getElementById("freeze").style.display="block";

if(val===correct){
document.getElementById("correctSound").play();
document.getElementById("clappingSound").play();
confetti();
}else{
document.getElementById("wrongSound").play();
}

setTimeout(()=>{
document.getElementById("freeze").style.display="none";
index++;
load();
},1000);
}

/* TIMER */
setInterval(()=>{

if(locked) return;

timer--;
document.getElementById("timer").innerText=timer;

if(timer<=0){
index++;
load();
}

},1000);

</script>

</body>
</html>
