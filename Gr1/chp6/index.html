<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Action Word Ticker Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#b3e5fc, #e1f5fe);
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#splash img {
    width: 250px;
}

/* GAME AREA */
#game {
    display: none;
}

#topWord {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 42px;
    font-weight: bold;
    color: #0d47a1;
    z-index: 5;
}

#scoreBoard {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    padding: 10px 15px;
    border-radius: 10px;
    z-index: 5;
    font-size: 20px;
}

/* TICKER STRIP */
#ticker {
    position: absolute;
    top: 45%;
    width: 100%;
    height: 220px;
    overflow: hidden;
    white-space: nowrap;
}

/* IMAGE STYLE (2 inches approx) */
.item {
    height: 200px;   /* ~2 inches visual */
    margin: 0 40px;
    cursor: pointer;
    display: inline-block;
    vertical-align: middle;
    transition: transform 0.2s;
}

.item:hover {
    transform: scale(1.1);
}

/* moving track */
#track {
    display: inline-block;
    white-space: nowrap;
    animation: scroll 18s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* END SCREEN */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 20;
}

#endScreen h1 {
    font-size: 50px;
    color: green;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

    <div id="scoreBoard">
        Score: <span id="score">0</span>
    </div>

    <div id="topWord">Loading...</div>

    <div id="ticker">
        <div id="track"></div>
    </div>
</div>

<!-- END -->
<div id="endScreen">
    <h1>Good Job!</h1>
    <p id="finalScore"></p>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/clapping.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

const images = [
    {word:"sleep", img:"sleep_image.jpg"},
    {word:"read", img:"read_image.png"},
    {word:"run", img:"run_image.png"},
    {word:"walk", img:"walk_image.png"},
    {word:"eat", img:"eat_image.jpg"},
    {word:"sit", img:"sit_image.png"},
    {word:"swim", img:"swim_image.png"},
    {word:"jump", img:"jump_image.png"},
    {word:"sing", img:"sing_image.png"}
];

let score = 0;
let targetWord = "";
let gameRunning = false;

const track = document.getElementById("track");
const scoreEl = document.getElementById("score");
const topWord = document.getElementById("topWord");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

/* SPLASH */
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("game").style.display = "block";
    startGame();
}, 5000);

/* BUILD TICKER (duplicated for seamless loop) */
function createTicker() {

    let list = [...images, ...images]; // duplicate for smooth loop

    list.forEach(data => {
        let img = document.createElement("img");
        img.src = "assets/" + data.img;
        img.className = "item";
        img.dataset.word = data.word;

        img.addEventListener("click", () => checkClick(data.word));

        track.appendChild(img);
    });
}

/* NEW WORD */
function setNewWord() {
    let random = images[Math.floor(Math.random() * images.length)];
    targetWord = random.word;
    topWord.innerText = "Find: " + targetWord.toUpperCase();
}

/* CLICK CHECK */
function checkClick(word) {
    if (!gameRunning) return;

    if (word === targetWord) {
        score++;
        scoreEl.innerText = score;
        correctSound.play();
        setNewWord();
    } else {
        wrongSound.play();
    }

    if (score >= 10) endGame();
}

/* START */
function startGame() {
    gameRunning = true;
    createTicker();
    setNewWord();
}

/* END */
function endGame() {
    gameRunning = false;
    document.getElementById("game").style.display = "none";
    document.getElementById("endScreen").style.display = "flex";
    document.getElementById("finalScore").innerText = "Score: " + score;
}

</script>

</body>
</html>
