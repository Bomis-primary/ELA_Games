<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Action Word Catch Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background: linear-gradient(#b3e5fc, #e1f5fe);
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#splash img {
    width: 250px;
}

/* GAME */
#game {
    display: none;
}

#topWord {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    color: #0d47a1;
    z-index: 5;
}

#scoreBoard {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 20px;
    background: #fff;
    padding: 10px 15px;
    border-radius: 10px;
    z-index: 5;
}

/* GAME AREA */
#gameArea {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

/* FIXED ROW LAYOUT */
.row {
    position: absolute;
    width: 100%;
    display: flex;
    justify-content: space-around;
    top: 45%;
}

/* BIGGER IMAGES (~2 inches ≈ 180px) */
.item {
    width: 180px;
    height: auto;
    cursor: pointer;
    transition: transform 0.2s;
    z-index: 2;
}

.item:hover {
    transform: scale(1.1);
}

/* END SCREEN */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
}

#endScreen h1 {
    font-size: 50px;
    color: green;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png" alt="logo">
</div>

<!-- GAME -->
<div id="game">

    <div id="scoreBoard">
        Score: <span id="score">0</span>
    </div>

    <div id="topWord">Loading...</div>

    <div id="gameArea"></div>
</div>

<!-- END SCREEN -->
<div id="endScreen">
    <h1>Good Job!</h1>
    <p id="finalScore"></p>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/clapping.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

const images = [
    {word:"sleep", img:"sleep_image.jpg"},
    {word:"read", img:"read_image.png"},
    {word:"run", img:"run_image.png"},
    {word:"walk", img:"walk_image.png"},
    {word:"eat", img:"eat_image.jpg"},
    {word:"sit", img:"sit_image.png"},
    {word:"swim", img:"swim_image.png"},
    {word:"jump", img:"jump_image.png"},
    {word:"sing", img:"sing_image.png"}
];

let score = 0;
let targetWord = "";
let gameRunning = false;

const gameArea = document.getElementById("gameArea");
const scoreEl = document.getElementById("score");
const topWord = document.getElementById("topWord");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

let row;

/* SPLASH */
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("game").style.display = "block";
    startGame();
}, 5000);

/* CREATE ONE CLEAN ROW */
function createRow() {
    row = document.createElement("div");
    row.className = "row";
    gameArea.appendChild(row);

    images.forEach((data) => {
        let img = document.createElement("img");
        img.src = "assets/" + data.img;
        img.className = "item";

        img.dataset.word = data.word;

        img.addEventListener("click", () => checkClick(data.word));

        row.appendChild(img);
    });
}

/* CHANGE TARGET WORD */
function setNewWord() {
    let random = images[Math.floor(Math.random() * images.length)];
    targetWord = random.word;
    topWord.innerText = "Find: " + targetWord.toUpperCase();
}

/* CLICK CHECK */
function checkClick(word) {
    if (!gameRunning) return;

    if (word === targetWord) {
        score++;
        correctSound.play();
        scoreEl.innerText = score;
        setNewWord();
    } else {
        wrongSound.play();
    }

    if (score >= 10) endGame();
}

/* START */
function startGame() {
    gameRunning = true;
    createRow();
    setNewWord();
}

/* END */
function endGame() {
    gameRunning = false;
    document.getElementById("game").style.display = "none";
    document.getElementById("endScreen").style.display = "flex";
    document.getElementById("finalScore").innerText = "Score: " + score;
}

</script>

</body>
</html>
