<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Action Words Adventure</title>

<style>
/* ===== ORIGINAL STYLE KEPT (UNCHANGED STRUCTURE) ===== */

:root {
    --bg-sky: #e0f2fe;
    --slate-dark: #1e293b;
    --clay-orange: #f97316;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background-color: var(--bg-sky);
    color: var(--slate-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* SCREENS */
.screen-layout {
    display: none;
    width: 100%;
    max-width: 650px;
    min-height: 100vh;
    padding: 15px;
    flex-direction: column;
    align-items: center;
}

.active-view { display: flex !important; }

/* SPLASH */
#screen-splash {
    position: fixed;
    width: 100vw;
    height: 100vh;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* IMAGE AREA */
.display-frame img {
    width: 100%;
    max-width: 380px;
    max-height: 240px;
    object-fit: contain;
}

/* QUESTION */
.question-bubble {
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    margin: 10px 0;
}

/* CONVEYOR */
.conveyor {
    width: 100%;
    overflow: hidden;
    background: #475569;
    border-radius: 20px;
}

.track {
    display: flex;
    width: max-content;
    animation: scroll 18s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

.choice {
    flex-shrink: 0;
    margin: 0 25px;
    background: white;
    padding: 10px;
    border-radius: 15px;
    cursor: pointer;
}

.choice img {
    height: 90px;
}

</style>
</head>

<body>

<!-- ===== SOUND ===== -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<!-- ===== SPLASH ===== -->
<div id="screen-splash">
    <img src="assets/innovine-logo.png" style="width:220px;">
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="screen-game" class="screen-layout active-view">

    <div class="display-frame">
        <img id="mainImage" src="">
    </div>

    <div class="question-bubble" id="questionText"></div>

    <div class="conveyor">
        <div class="track" id="track"></div>
    </div>

</div>

<script>

/* ===== ACTION WORD DATA ===== */

const bank = [
{q:"Which action shows RUNNING?", ans:"run_image.png"},
{q:"Which action shows EATING?", ans:"eat_image.jpg"},
{q:"Which action shows SLEEPING?", ans:"sleep_image.jpg"},
{q:"Which action shows READING?", ans:"read_image.png"},
{q:"Which action shows JUMPING?", ans:"jump_image.png"},
{q:"Which action shows SINGING?", ans:"sing_image.png"},
{q:"Which action shows SWIMMING?", ans:"swim_image.png"},
{q:"Which action shows WALKING?", ans:"walk_image.png"}
];

let questions = [...bank].sort(()=>Math.random()-0.5).slice(0,8);
let index = 0;

/* ===== START AFTER SPLASH ===== */
setTimeout(()=>{
    document.getElementById("screen-splash").style.display="none";
    loadQ();
},5000);

/* ===== LOAD QUESTION ===== */
function loadQ(){

if(index >= questions.length){
    document.getElementById("questionText").innerText = "🎉 Well Done!";
    document.getElementById("track").innerHTML="";
    return;
}

let q = questions[index];

document.getElementById("questionText").innerText = q.q;
document.getElementById("mainImage").src = "assets/" + q.ans;

loadOptions(q.ans);
}

/* ===== OPTIONS ===== */
function loadOptions(correct){

let pool = bank.map(x=>x.ans).filter(x=>x!==correct);

let options = [
correct,
random(pool),
random(pool)
].sort(()=>Math.random()-0.5);

let track = document.getElementById("track");
track.innerHTML="";

options.forEach(opt=>{
let div = document.createElement("div");
div.className="choice";

div.innerHTML = `<img src="assets/${opt}">`;

div.onclick = ()=>check(opt, correct);

track.appendChild(div);
});
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* ===== CHECK ===== */
function check(selected, correct){

if(selected === correct){
document.getElementById("correctSound").play();
document.getElementById("clapSound").play();
} else {
document.getElementById("wrongSound").play();
}

index++;
setTimeout(loadQ,800);
}

</script>

</body>
</html>
