<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Superhero Action Word Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#b3e5fc, #e1f5fe);
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50;
}

#splash img {
    width: 260px;
}

/* TITLE SCREEN */
#titleScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#e3f2fd;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:40;
}

#titleScreen h1{
    font-size:42px;
    color:#0d47a1;
}

#titleScreen p{
    font-size:20px;
    max-width:600px;
    padding:10px;
}

#startBtn{
    padding:12px 25px;
    font-size:18px;
    margin-top:20px;
    display:none;
}

/* GAME AREA */
#game {
    display: none;
}

/* TOP QUESTION */
#topWord {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    color: #0d47a1;
    z-index: 5;
}

/* TOP BAR */
#topBar {
    position: absolute;
    top: 60px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 20px;
    font-weight: bold;
    z-index: 5;
}

/* TICKER */
#ticker {
    position: absolute;
    top: 45%;
    width: 100%;
    height: 220px;
    overflow: hidden;
    white-space: nowrap;
}

/* IMAGE */
.item {
    height: 200px;
    margin: 0 40px;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.2s;
}

.item:hover {
    transform: scale(1.1);
}

#track {
    display: inline-block;
    white-space: nowrap;
    animation: scroll 18s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* END */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 100;
}

/* CONFETTI */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    background: red;
    animation: fall 2s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(600px) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- TITLE SCREEN -->
<div id="titleScreen">
    <h1>🦸 Superhero Training Camp</h1>
    <p>Mission: Action Word Rescue! Tap the correct action word image to complete your hero training.</p>
    <button id="startBtn">START MISSION</button>
</div>

<!-- GAME -->
<div id="game">

    <div id="topWord">Loading...</div>

    <div id="topBar">
        <div id="counter">Mission: 0/10</div>
        <div id="timer">⏱ 45</div>
    </div>

    <div id="ticker">
        <div id="track"></div>
    </div>
</div>

<!-- END -->
<div id="endScreen">
    <h1>Mission Complete! 🦸</h1>
    <p id="finalScore"></p>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/clapping.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

const images = [
    {word:"run", img:"run_image.png"},
    {word:"jump", img:"jump_image.png"},
    {word:"eat", img:"eat_image.jpg"},
    {word:"sleep", img:"sleep_image.jpg"},
    {word:"read", img:"read_image.png"},
    {word:"swim", img:"swim_image.png"},
    {word:"sing", img:"sing_image.png"}
];

let score = 0;
let targetWord = "";
let gameRunning = false;
let questionIndex = 0;
let time = 45;

const track = document.getElementById("track");
const topWord = document.getElementById("topWord");
const counter = document.getElementById("counter");
const timerEl = document.getElementById("timer");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

/* ================= SPLASH FLOW ================= */
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("titleScreen").style.display = "flex";

    setTimeout(()=>{
        document.getElementById("startBtn").style.display="inline-block";
    },3000);

}, 5000);

/* START */
document.getElementById("startBtn").onclick = () => {
    document.getElementById("titleScreen").style.display = "none";
    document.getElementById("game").style.display = "block";

    createTicker();
    setNewWord();
    startTimer();
};

/* TICKER */
function createTicker() {
    let list = [...images, ...images];

    list.forEach(data => {
        let img = document.createElement("img");
        img.src = "assets/" + data.img;
        img.className = "item";

        img.addEventListener("click", () => checkClick(data.word));

        track.appendChild(img);
    });
}

/* NEW WORD */
function setNewWord() {
    let random = images[Math.floor(Math.random() * images.length)];
    targetWord = random.word;
    topWord.innerText = "🦸 Find Action Word: " + targetWord.toUpperCase();
}

/* CLICK */
function checkClick(word) {
    if (!gameRunning) gameRunning = true;

    if (word === targetWord) {

        setTimeout(()=>{
            correctSound.play();
            score++;
            questionIndex++;
            counter.innerText = "Mission: " + questionIndex + "/10";
            createConfetti();
            setNewWord();
        },1000);

    } else {

        setTimeout(()=>{
            wrongSound.play();
        },1000);
    }

    if (questionIndex >= 10) endGame();
}

/* TIMER */
function startTimer() {
    setInterval(() => {
        time--;
        timerEl.innerText = "⏱ " + time;

        if (time <= 0) endGame();
    }, 1000);
}

/* CONFETTI */
function createConfetti(){
    for(let i=0;i<20;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"%";
        c.style.background=["red","blue","yellow","green"][i%4];
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),2000);
    }
}

/* END */
function endGame(){
    gameRunning=false;
    document.getElementById("game").style.display="none";
    document.getElementById("endScreen").style.display="flex";
    document.getElementById("finalScore").innerText =
        "Score: " + score + "/10 Missions Completed";
}

</script>

</body>
</html>
