<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Action Catch Box Adventure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
font-family:Comic Sans MS;
background:linear-gradient(#b3e5fc,#e1f5fe);
}

#topBar{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
font-size:20px;
font-weight:bold;
}

#game{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

#clue{
position:absolute;
top:80px;
width:100%;
text-align:center;
font-size:26px;
font-weight:bold;
color:#0d47a1;
}

/* BOX */
#box{
position:absolute;
top:140px;
left:50%;
font-size:90px;
transition:transform 0.3s ease;
}

#ticker{
position:absolute;
top:55%;
width:100%;
overflow:hidden;
white-space:nowrap;
}

#track{
display:inline-block;
white-space:nowrap;
animation:scroll 14s linear infinite;
}

.emoji{
display:inline-block;
margin:0 90px;
cursor:pointer;
}

.emoji img{
height:90px;
width:90px;
object-fit:contain;
}

@keyframes scroll{
from{transform:translateX(0)}
to{transform:translateX(-50%)}
}

#result{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:38px;
font-weight:bold;
display:none;
background:white;
padding:20px;
border-radius:18px;
}
</style>
</head>

<body>

<div id="game">

<div id="topBar">
<div>⏱ Time Left: <span id="timer">30</span>s</div>
<div>📊 Score: <span id="score">0</span></div>
</div>

<div id="clue"></div>

<div id="box">📦</div>

<div id="ticker">
<div id="track"></div>
</div>

<div id="result"></div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>

/* ================= IMAGE BANK ================= */
const bank=[
{clue:"Which action shows RUNNING?",answer:"run.png"},
{clue:"Which action shows EATING?",answer:"eat.png"},
{clue:"Which action shows SLEEPING?",answer:"sleep.png"},
{clue:"Which action shows READING?",answer:"read.png"},
{clue:"Which action shows JUMPING?",answer:"jump.png"},
{clue:"Which action shows WALKING?",answer:"walk.png"},
{clue:"Which action shows CLAPPING?",answer:"clap.png"},
{clue:"Which action shows SWIMMING?",answer:"swim.png"},
{clue:"Which action shows SINGING?",answer:"sing.png"},
{clue:"Which action shows DANCING?",answer:"dance.png"}
];

let questions=[...bank].sort(()=>Math.random()-0.5).slice(0,10);

let index=0;
let score=0;
let timer=30;

/* ================= LOAD ================= */
load();

function load(){

if(index>=10){
document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML=
`🎉 Game Over!<br>Score: ${score}/10`;
return;
}

let q=questions[index];

document.getElementById("clue").innerText=q.clue;

buildTicker(q.answer);

timer=30;
}

/* ================= TICKER ================= */
function buildTicker(correct){

let track=document.getElementById("track");
track.innerHTML="";

let pool=[...bank.map(x=>x.answer)].filter(x=>x!==correct);

let options=[
correct,
random(pool),
random(pool)
].sort(()=>Math.random()-0.5);

options.forEach(img=>{
let div=document.createElement("div");
div.className="emoji";

div.innerHTML=`<img src="assets/${img}">`;

div.onclick=()=>check(img,correct);

track.appendChild(div);
});
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* ================= CHECK ================= */
function check(val,correct){

if(val===correct){
score++;
document.getElementById("correctSound").play();
document.getElementById("clapSound").play();
}else{
document.getElementById("wrongSound").play();
}

document.getElementById("score").innerText=score;

index++;
setTimeout(load,800);
}

/* ================= TIMER ================= */
setInterval(()=>{

timer--;
document.getElementById("timer").innerText=timer;

if(timer<=0){
index++;
load();
timer=30;
}

},1000);

</script>

</body>
</html>
