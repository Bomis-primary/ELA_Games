<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Superhero Action Word Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#0d47a1, #e3f2fd);
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50;
}

/* TITLE SCREEN */
#titleScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#0d47a1;
    color:white;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:40;
}

#titleScreen h1{
    font-size:44px;
    font-weight:bold;
}

/* GAME AREA */
#game{
    display:none;
}

/* QUESTION */
#topWord {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 38px;
    font-weight: 900;
    color: #ffffff;
}

/* CLUE */
#clueWord{
    position:absolute;
    top:70px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#ffeb3b;
}

/* TOP BAR */
#topBar {
    position: absolute;
    top: 120px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 15px;
    font-size: 18px;
    font-weight: bold;
    color:white;
    box-sizing:border-box;
}

#timer, #counter {
    background: rgba(0,0,0,0.4);
    padding: 6px 10px;
    border-radius: 8px;
}

/* TICKER */
#ticker {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 220px;
    overflow: hidden;
    white-space: nowrap;
}

.item {
    height: 180px;
    margin: 0 30px;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.2s;
}

.item:hover {
    transform: scale(1.08);
}

#track {
    display: inline-block;
    white-space: nowrap;
    animation: scroll 45s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* END SCREEN */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png" style="width:260px;">
</div>

<!-- TITLE -->
<div id="titleScreen">
    <h1>🦸 SUPERHERO TRAINING CAMP</h1>
    <p>Unlock your hero powers by mastering ACTION WORD MISSIONS!</p>
</div>

<!-- GAME -->
<div id="game">

    <div id="topWord"><b>Loading Mission...</b></div>
    <div id="clueWord"></div>

    <div id="topBar">
        <div id="counter">Mission: 0/10</div>
        <div id="timer">⏱ 45</div>
    </div>

    <div id="ticker">
        <div id="track"></div>
    </div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/clapping.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* ================= MISSIONS ================= */
const missions = [
{
q:"After intense superhero training, what action helps restore energy and strength?",
ans:"sleep"
},
{
q:"A hero must move fast to rescue people. Which action shows speed?",
ans:"run"
},
{
q:"To decode secret missions, a hero must carefully...",
ans:"read"
},
{
q:"After saving the city, heroes must regain energy by...",
ans:"eat"
},
{
q:"To reach high buildings quickly, heroes must...",
ans:"jump"
},
{
q:"During underwater rescue missions heroes must...",
ans:"swim"
},
{
q:"To alert teammates in danger, heroes may...",
ans:"sing"
}
];

/* ================= IMAGES ================= */
const images = [
{word:"sleep", img:"sleep_image.jpg"},
{word:"read", img:"read_image.png"},
{word:"run", img:"run_image.png"},
{word:"walk", img:"walk_image.png"},
{word:"eat", img:"eat_image.jpg"},
{word:"sit", img:"sit_image.png"},
{word:"swim", img:"swim_image.png"},
{word:"jump", img:"jump_image.png"},
{word:"sing", img:"sing_image.png"}
];

let index = 0;
let targetWord = "";
let score = 0;

/* ================= FLOW ================= */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("titleScreen").style.display="flex";

setTimeout(()=>{
document.getElementById("titleScreen").style.display="none";
document.getElementById("game").style.display="block";
startMission();
startTimer();
},3000);
},5000);

/* ================= MISSION ================= */
function startMission(){

let m = missions[index];
targetWord = m.ans;

document.getElementById("topWord").innerHTML =
"<b>🦸 MISSION: " + m.q + "</b>";

document.getElementById("clueWord").innerHTML =
"TARGET ACTION: <b>" + targetWord.toUpperCase() + "</b>";

buildTicker();
}

/* ================= TICKER ================= */
function buildTicker(){

let track = document.getElementById("track");
track.innerHTML="";

let pool = [...images].sort(()=>Math.random()-0.5).slice(0,5);

pool.forEach(data=>{
let img = document.createElement("img");
img.src = "assets/"+data.img;
img.className="item";

img.onclick=()=>check(data.word);

track.appendChild(img);
});
}

/* ================= CHECK ================= */
function check(word){

if(word === targetWord){

document.getElementById("correctSound").play();
score++;
index++;

document.getElementById("counter").innerText =
"Mission: " + index + "/10";

setTimeout(()=>{
startMission();
},1000);

}else{
document.getElementById("wrongSound").play();
}
}

/* ================= TIMER ================= */
let time = 45;

function startTimer(){
setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱ "+time;

if(time<=0){
index++;
startMission();
time=45;
}
},1000);
}

</script>

</body>
</html>
