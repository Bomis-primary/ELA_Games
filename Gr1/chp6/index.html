<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Action Word Adventure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Comic Sans MS;
background:#dff3ff;
overflow:hidden;
}

/* TOP BAR */
#topBar{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
font-size:20px;
font-weight:bold;
}

/* QUESTION */
#question{
position:absolute;
top:60px;
width:100%;
text-align:center;
font-size:22px;
font-weight:bold;
color:#0d47a1;
}

/* TICKER */
#ticker{
position:absolute;
bottom:60px;
width:100%;
overflow:hidden;
white-space:nowrap;
background:#2c3e50;
padding:20px 0;
}

#track{
display:inline-block;
white-space:nowrap;
animation:scroll 14s linear infinite;
}

@keyframes scroll{
from{transform:translateX(0)}
to{transform:translateX(-50%)}
}

.option{
display:inline-block;
margin:0 80px;
cursor:pointer;
}

.option img{
height:100px;
width:100px;
object-fit:contain;
}

/* RESULT */
#result{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
font-size:24px;
display:none;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div id="topBar">
<div>Q: <span id="qCount">1</span>/10</div>
<div>⏱ <span id="timer">30</span>s</div>
</div>

<!-- QUESTION -->
<div id="question"></div>

<!-- TICKER -->
<div id="ticker">
<div id="track"></div>
</div>

<!-- RESULT -->
<div id="result"></div>

<script>

/* ================= DATA ================= */
const bank = [
{q:"The child is full of energy and jumping high. What action is this?", ans:"jump_image.png"},
{q:"The boy moves very fast across the ground. What is he doing?", ans:"run_image.png"},
{q:"The girl is resting with eyes closed. What action is this?", ans:"sleep_image.jpg"},
{q:"The child is enjoying food at the table. What is happening?", ans:"eat_image.jpg"},
{q:"The student is looking at a story book carefully. What action is this?", ans:"read_image.png"},
{q:"The children are singing together happily. What are they doing?", ans:"sing_image.png"},
{q:"The boy is moving in water like a fish. What action is this?", ans:"swim_image.png"},
{q:"The girl is moving step by step on the road. What is she doing?", ans:"walk_image.png"}
];

let questions = [...bank].sort(()=>Math.random()-0.5).slice(0,10);

let index = 0;
let score = 0;
let timer = 30;

/* REMOVE IMAGE REPEAT MEMORY */
let lastOptions = [];

/* START */
loadQuestion();

/* ================= LOAD ================= */
function loadQuestion(){

if(index >= 10){
endGame();
return;
}

document.getElementById("qCount").innerText = index+1;

timer = 30;

let q = questions[index];
document.getElementById("question").innerText = q.q;

buildOptions(q.ans);
}

/* ================= OPTIONS ================= */
function buildOptions(correct){

let track = document.getElementById("track");
track.innerHTML = "";

/* prevent repetition */
let pool = bank.map(x=>x.ans).filter(x=>x!==correct && !lastOptions.includes(x));

if(pool.length < 2){
pool = bank.map(x=>x.ans).filter(x=>x!==correct);
}

let options = [
correct,
random(pool),
random(pool)
].sort(()=>Math.random()-0.5);

/* store last set */
lastOptions = options;

options.forEach(img=>{
let div = document.createElement("div");
div.className="option";

let image = document.createElement("img");
image.src = "assets/" + img;

div.appendChild(image);

div.onclick = ()=>check(img, correct);

track.appendChild(div);
});
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* ================= CHECK ================= */
function check(val, correct){

if(val === correct){
score++;
}

index++;
setTimeout(loadQuestion,600);
}

/* ================= TIMER ================= */
setInterval(()=>{

timer--;
document.getElementById("timer").innerText = timer;

if(timer <= 0){
index++;
loadQuestion();
timer = 30;
}

},1000);

/* ================= END ================= */
function endGame(){

let remark = "";

if(score >= 8){
remark = "🌟 Excellent!";
} else if(score >= 5){
remark = "👍 Good Job!";
} else {
remark = "📘 Keep Practicing!";
}

document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML =
`Score: ${score}/10 <br>${remark}`;
}

</script>

</body>
</html>
