<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Action Word Adventure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Comic Sans MS;
background:#dff3ff;
overflow:hidden;
}

/* SPLASH */
#splash{
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:2000;
}

/* FRAME */
#frame{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:95%;
max-width:900px;
height:90vh;
}

/* TOP BAR */
#topBar{
display:flex;
justify-content:space-between;
font-size:16px;
font-weight:bold;
padding:5px 10px;
}

/* QUESTION */
#question{
text-align:center;
font-size:20px;
font-weight:bold;
color:#0d47a1;
margin-top:10px;
}

/* TICKER */
#ticker{
position:absolute;
bottom:60px;
width:100%;
overflow:hidden;
background:#2c3e50;
padding:25px 0;
border-radius:10px;
}

#track{
display:inline-block;
white-space:nowrap;
animation:scroll 12s linear infinite;
}

@keyframes scroll{
from{transform:translateX(0)}
to{transform:translateX(-50%)}
}

.option{
display:inline-block;
margin:0 70px;
cursor:pointer;
}

.option img{
height:110px;
width:110px;
object-fit:contain;
}

/* FREEZE */
#freeze{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
background:rgba(0,0,0,0.05);
z-index:999;
}

/* RESULT SCREEN */
#result{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:12px;
display:none;
font-size:20px;
text-align:center;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="assets/innovine-logo.png" style="width:220px;">
</div>

<!-- FRAME -->
<div id="frame">

<div id="topBar">
<div>Q: <span id="qCount">1</span>/10</div>
<div>⏱ <span id="timer">30</span>s</div>
</div>

<div id="question"></div>

<div id="ticker">
<div id="track"></div>
</div>

<div id="freeze"></div>

<div id="result"></div>

</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clappingSound" src="assets/clapping.mp3"></audio>

<script>

/* ================= DATA ================= */
const bank=[
{q:"The child is jumping happily.",ans:"jump_image.png"},
{q:"The boy is running fast.",ans:"run_image.png"},
{q:"The girl is sleeping peacefully.",ans:"sleep_image.jpg"},
{q:"The child is eating food.",ans:"eat_image.jpg"},
{q:"The student is reading a book.",ans:"read_image.png"},
{q:"The children are singing.",ans:"sing_image.png"},
{q:"The boy is swimming.",ans:"swim_image.png"},
{q:"The girl is walking.",ans:"walk_image.png"}
];

let questions=[...bank].sort(()=>Math.random()-0.5).slice(0,10);

let index=0;
let timer=30;
let locked=false;
let gameEnded=false;

/* ================= SPLASH ================= */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
load();
},5000);

/* ================= LOAD ================= */
function load(){

if(gameEnded) return;

if(index>=10){
gameEnded=true;

/* STOP TICKER */
document.getElementById("track").innerHTML="";
document.getElementById("question").innerText="";

setTimeout(()=>{
document.getElementById("question").innerText="🎮 GAME OVER!";

setTimeout(showScoreBoard,1000);

},500);

return;
}

document.getElementById("qCount").innerText=index+1;
timer=30;
locked=false;

let q=questions[index];
document.getElementById("question").innerText=q.q;

buildTicker(q.ans);
}

/* ================= TICKER ================= */
function buildTicker(correct){

let track=document.getElementById("track");
track.innerHTML="";

let pool=bank.map(x=>x.ans).filter(x=>x!==correct);

let options=[
correct,
pool[Math.floor(Math.random()*pool.length)],
pool[Math.floor(Math.random()*pool.length)]
].sort(()=>Math.random()-0.5);

/* loop effect */
let loop=[...options,...options];

loop.forEach(img=>{
let div=document.createElement("div");
div.className="option";

div.innerHTML=`<img src="assets/${img}">`;

div.onclick=()=>check(img,correct);

track.appendChild(div);
});
}

/* ================= CHECK ================= */
function check(val,correct){

if(locked) return;
locked=true;

/* FREEZE */
document.getElementById("freeze").style.display="block";

if(val===correct){
document.getElementById("correctSound").play();
document.getElementById("clappingSound").play();
}else{
document.getElementById("wrongSound").play();
}

setTimeout(()=>{
document.getElementById("freeze").style.display="none";
index++;
load();
},1000);
}

/* ================= TIMER ================= */
setInterval(()=>{

if(locked || gameEnded) return;

timer--;
document.getElementById("timer").innerText=timer;

if(timer<=0){
index++;
load();
}

},1000);

/* ================= SCOREBOARD ================= */
function showScoreBoard(){

let score=index; // completed rounds

let msg="";

if(score>=8){
msg="🌟 Excellent Work!";
}
else if(score>=5){
msg="👍 Good Job!";
}
else{
msg="📘 Keep Practicing!";
}

document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML=
`🎯 Score: ${score}/10<br>${msg}`;
}

</script>

</body>
</html>
