<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Superhero Action Word Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#0d47a1, #e3f2fd);
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* TITLE */
#titleScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#0d47a1;
    color:white;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* GAME */
#game{ display:none; }

/* QUESTION */
#topWord {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 38px;
    font-weight: 900;
    color: #ffffff;
}

/* CLUE */
#clueWord{
    position:absolute;
    top:70px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#ffeb3b;
}

/* TOP BAR */
#topBar {
    position: absolute;
    top: 120px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 15px;
    font-size: 18px;
    font-weight: bold;
    color:white;
    box-sizing:border-box;
}

/* ================= TICKER FIX (IMPORTANT PART) ================= */
#ticker {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 220px;
    overflow: hidden;
    white-space: nowrap;
}

/* TRACK MOVEMENT */
#track {
    display: inline-block;
    white-space: nowrap;
    animation: scroll 20s linear infinite;
}

/* KEY CHANGE: smooth continuous loop */
@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* IMAGE */
.item {
    height: 180px;
    margin: 0 30px;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.2s;
}

.item:hover {
    transform: scale(1.08);
}

/* END */
#endScreen {
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    display:none;
    justify-content:center;
    align-items:center;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png" style="width:260px;">
</div>

<!-- TITLE -->
<div id="titleScreen">
    <h1>🦸 SUPERHERO TRAINING CAMP</h1>
</div>

<!-- GAME -->
<div id="game">

    <div id="topWord"></div>
    <div id="clueWord"></div>

    <div id="topBar">
        <div id="counter">Mission: 0/10</div>
        <div id="timer">⏱ 45</div>
    </div>

    <div id="ticker">
        <div id="track"></div>
    </div>
</div>

<script>

/* HERO MISSIONS */
const missions = [
{q:"After training, what helps a hero recover?", ans:"sleep"},
{q:"Hero must move fast to save people. Which action?", ans:"run"},
{q:"To read secret maps, hero must...", ans:"read"},
{q:"After battle, heroes must...", ans:"eat"},
{q:"To reach high place quickly...", ans:"jump"},
{q:"Underwater rescue requires...", ans:"swim"},
{q:"To alert team, hero may...", ans:"sing"}
];

/* IMAGES */
const images = [
{word:"sleep", img:"sleep_image.jpg"},
{word:"read", img:"read_image.png"},
{word:"run", img:"run_image.png"},
{word:"walk", img:"walk_image.png"},
{word:"eat", img:"eat_image.jpg"},
{word:"sit", img:"sit_image.png"},
{word:"swim", img:"swim_image.png"},
{word:"jump", img:"jump_image.png"},
{word:"sing", img:"sing_image.png"}
];

let index=0;
let targetWord="";

/* START */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("titleScreen").style.display="flex";

setTimeout(()=>{
document.getElementById("titleScreen").style.display="none";
document.getElementById("game").style.display="block";
startMission();
},3000);

},5000);

/* MISSION */
function startMission(){

let m = missions[index];
targetWord = m.ans;

document.getElementById("topWord").innerHTML =
"🦸 <b>MISSION:</b> " + m.q;

document.getElementById("clueWord").innerHTML =
"TARGET: <b>" + targetWord.toUpperCase() + "</b>";

buildTicker();
}

/* ================= TICKER FIX ================= */
function buildTicker(){

let track = document.getElementById("track");
track.innerHTML="";

/* STEP 1: pick 5 images */
let pool = [...images].sort(()=>Math.random()-0.5).slice(0,5);

/* STEP 2: duplicate for infinite loop */
let loop = [...pool, ...pool];

loop.forEach(data=>{
let img = document.createElement("img");
img.src = "assets/" + data.img;
img.className = "item";

img.onclick = () => check(data.word);

track.appendChild(img);
});
}

/* CHECK */
function check(word){

if(word === targetWord){
index++;
setTimeout(()=> startMission(), 500);
}
}

</script>

</body>
</html>
