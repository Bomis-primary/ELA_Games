<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Action Word Adventure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Comic Sans MS;
background:#dff3ff;
overflow:hidden;
}

/* SPLASH */
#splash{
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:2000;
}

/* TITLE SCREEN */
#titleScreen{
position:fixed;
width:100%;
height:100%;
background:#e3f2fd;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:1999;
padding:20px;
}

#titleScreen h1{
font-size:28px;
color:#0d47a1;
margin-bottom:10px;
}

#titleScreen p{
font-size:18px;
margin-bottom:20px;
}

#startBtn{
padding:12px 20px;
font-size:18px;
border:none;
background:#0d47a1;
color:white;
border-radius:10px;
cursor:pointer;
}

/* GAME FRAME */
#frame{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:95%;
max-width:900px;
height:90vh;
}

/* TOP BAR */
#topBar{
display:flex;
justify-content:space-between;
font-size:16px;
font-weight:bold;
padding:5px 10px;
}

/* QUESTION */
#question{
text-align:center;
font-size:20px;
font-weight:bold;
color:#0d47a1;
margin-top:10px;
}

/* POP IMAGE (NEW FEATURE) */
#popImg{
position:absolute;
top:30%;
left:50%;
transform:translate(-50%,-50%);
width:200px;
height:200px;
display:none;
z-index:3000;
}

/* TICKER (BIGGER NOW) */
#ticker{
position:absolute;
bottom:60px;
width:100%;
overflow:hidden;
background:#2c3e50;
padding:25px 0;   /* increased height */
border-radius:10px;
}

#track{
display:inline-block;
white-space:nowrap;
animation:scroll 12s linear infinite;
}

@keyframes scroll{
from{transform:translateX(0)}
to{transform:translateX(-50%)}
}

/* BIGGER IMAGES */
.option{
display:inline-block;
margin:0 70px;
cursor:pointer;
}

.option img{
height:110px;   /* increased size */
width:110px;
object-fit:contain;
}

/* FREEZE */
#freeze{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
background:rgba(0,0,0,0.05);
z-index:999;
}

/* RESULT */
#result{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:12px;
display:none;
font-size:20px;
text-align:center;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="splash">
<img src="assets/innovine-logo.png" style="width:220px;">
</div>

<!-- TITLE SCREEN -->
<div id="titleScreen">
<h1>🎯 Action Word Adventure</h1>
<p>Watch the pictures and choose the correct action word!</p>
<button id="startBtn">START GAME</button>
</div>

<!-- POP IMAGE -->
<img id="popImg">

<!-- GAME -->
<div id="frame">

<div id="topBar">
<div>Q: <span id="qCount">1</span>/10</div>
<div>⏱ <span id="timer">30</span>s</div>
</div>

<div id="question"></div>

<div id="ticker">
<div id="track"></div>
</div>

<div id="freeze"></div>

<div id="result"></div>

</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clappingSound" src="assets/clapping.mp3"></audio>

<script>

/* ================= DATA ================= */
const bank=[
{q:"The child is jumping happily.",ans:"jump_image.png"},
{q:"The boy is running fast.",ans:"run_image.png"},
{q:"The girl is sleeping peacefully.",ans:"sleep_image.jpg"},
{q:"The child is eating food.",ans:"eat_image.jpg"},
{q:"The student is reading a book.",ans:"read_image.png"},
{q:"The children are singing.",ans:"sing_image.png"},
{q:"The boy is swimming.",ans:"swim_image.png"},
{q:"The girl is walking.",ans:"walk_image.png"}
];

let questions=[...bank].sort(()=>Math.random()-0.5).slice(0,10);

let index=0;
let timer=30;
let locked=false;

/* ================= FLOW ================= */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
setTimeout(()=>{
document.getElementById("titleScreen").style.display="flex";
},2000);
},5000);

/* START GAME */
document.getElementById("startBtn").onclick=()=>{
document.getElementById("titleScreen").style.display="none";
load();
};

/* LOAD */
function load(){

if(index>=10){
document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML="🎉 Great Job!";
return;
}

document.getElementById("qCount").innerText=index+1;
timer=30;
locked=false;

let q=questions[index];
document.getElementById("question").innerText=q.q;

buildTicker(q.ans);
}

/* TICKER */
function buildTicker(correct){

let track=document.getElementById("track");
track.innerHTML="";

let pool=bank.map(x=>x.ans).filter(x=>x!==correct);

let options=[
correct,
pool[Math.floor(Math.random()*pool.length)],
pool[Math.floor(Math.random()*pool.length)]
].sort(()=>Math.random()-0.5);

/* duplicate loop */
let loop=[...options,...options];

loop.forEach(img=>{
let div=document.createElement("div");
div.className="option";

div.innerHTML=`<img src="assets/${img}">`;

div.onclick=()=>check(img,correct);

track.appendChild(div);
});
}

/* CONFETTI */
function confetti(){
for(let i=0;i<30;i++){
let c=document.createElement("div");
c.style.position="absolute";
c.style.width="6px";
c.style.height="6px";
c.style.background=["#ff0","#f0f","#0ff","#0f0"][Math.floor(Math.random()*4)];
c.style.left=Math.random()*100+"%";
c.style.top=Math.random()*40+"%";
document.body.appendChild(c);
setTimeout(()=>c.remove(),800);
}
}

/* CHECK + POP */
function check(val,correct){

if(locked) return;
locked=true;

/* FREEZE */
document.getElementById("freeze").style.display="block";

/* POP IMAGE */
let pop=document.getElementById("popImg");

if(val===correct){

scoreEffect = true;

document.getElementById("correctSound").play();
document.getElementById("clappingSound").play();

/* show big pop image */
pop.src="assets/"+correct;
pop.style.display="block";

confetti();

}else{
document.getElementById("wrongSound").play();
}

setTimeout(()=>{
pop.style.display="none";
document.getElementById("freeze").style.display="none";
index++;
load();
},1000);
}

/* TIMER */
setInterval(()=>{

if(locked) return;

timer--;
document.getElementById("timer").innerText=timer;

if(timer<=0){
index++;
load();
}

},1000);

</script>

</body>
</html>
