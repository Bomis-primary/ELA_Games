<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Superhero Action Word Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#b3e5fc, #e1f5fe);
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50;
}

/* TITLE */
#titleScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#e3f2fd;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:40;
}

#titleScreen h1{
    font-size:42px;
    color:#0d47a1;
}

#titleScreen p{
    font-size:20px;
    max-width:600px;
}

#startBtn{
    padding:12px 25px;
    font-size:18px;
    margin-top:20px;
    display:none;
}

/* GAME */
#game{
    display:none;
}

/* ✅ QUESTION FIX (BOLD + BIG + CENTER) */
#topWord {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 44px;
    font-weight: 900;
    color: #0d47a1;
    z-index: 5;
}

/* TOP BAR FIX (RESPONSIVE) */
#topBar {
    position: absolute;
    top: 70px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 20px;
    font-weight: bold;
    z-index: 5;
    box-sizing: border-box;
}

/* TIMER SAFE */
#timer {
    white-space: nowrap;
}

/* TICKER */
#ticker {
    position: absolute;
    top: 45%;
    width: 100%;
    height: 220px;
    overflow: hidden;
    white-space: nowrap;
}

.item {
    height: 200px;
    margin: 0 40px;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.2s;
}

.item:hover {
    transform: scale(1.1);
}

#track {
    display: inline-block;
    white-space: nowrap;
    animation: scroll 18s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* END */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 100;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- TITLE SCREEN -->
<div id="titleScreen">
    <h1>🦸 Superhero Training Camp</h1>
    <p><b>Read the action word carefully and tap the correct image to complete your mission!</b></p>
    <button id="startBtn">START MISSION</button>
</div>

<!-- GAME -->
<div id="game">

    <div id="topWord"></div>

    <div id="topBar">
        <div id="counter">Mission: 0/10</div>
        <div id="timer">⏱ 45</div>
    </div>

    <div id="ticker">
        <div id="track"></div>
    </div>
</div>

<!-- END -->
<div id="endScreen">
    <h1>Mission Complete! 🦸</h1>
    <p id="finalScore"></p>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/clapping.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

const images = [
    {word:"sleep", img:"sleep_image.jpg"},
    {word:"read", img:"read_image.png"},
    {word:"run", img:"run_image.png"},
    {word:"walk", img:"walk_image.png"},
    {word:"eat", img:"eat_image.jpg"},
    {word:"sit", img:"sit_image.png"},
    {word:"swim", img:"swim_image.png"},
    {word:"jump", img:"jump_image.png"},
    {word:"sing", img:"sing_image.png"}
];

let score = 0;
let targetWord = "";
let questionIndex = 0;
let time = 45;

/* SPLASH FLOW */
setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("titleScreen").style.display = "flex";

    setTimeout(()=>{
        document.getElementById("startBtn").style.display="inline-block";
    },3000);

}, 5000);

/* START */
document.getElementById("startBtn").onclick = () => {

    document.getElementById("titleScreen").style.display = "none";
    document.getElementById("game").style.display = "block";

    createTicker();
    setNewWord();
    startTimer();
};

/* TICKER */
function createTicker() {
    let list = [...images, ...images];

    list.forEach(data => {
        let img = document.createElement("img");
        img.src = "assets/" + data.img;
        img.className = "item";

        img.onclick = () => checkClick(data.word);

        document.getElementById("track").appendChild(img);
    });
}

/* QUESTION */
function setNewWord() {
    let random = images[Math.floor(Math.random() * images.length)];
    targetWord = random.word;

    document.getElementById("topWord").innerHTML =
        "🦸 <b>Find Action Word: " + targetWord.toUpperCase() + "</b>";
}

/* CLICK FIX (MAIN BUG FIX) */
function checkClick(word) {

    if (word === targetWord) {

        setTimeout(() => {
            document.getElementById("correctSound").play();
            score++;
            questionIndex++;

            document.getElementById("counter").innerText =
                "Mission: " + questionIndex + "/10";

            setNewWord();
        }, 500);

    } else {
        setTimeout(() => {
            document.getElementById("wrongSound").play();
        }, 500);
    }

    if (questionIndex >= 10) endGame();
}

/* TIMER FIX (SAFE MOBILE) */
function startTimer() {
    setInterval(() => {
        time--;
        document.getElementById("timer").innerText = "⏱ " + time;

        if (time <= 0) endGame();
    }, 1000);
}

/* END */
function endGame() {
    document.getElementById("game").style.display = "none";
    document.getElementById("endScreen").style.display = "flex";
    document.getElementById("finalScore").innerText =
        "Score: " + score + "/10";
}

</script>

</body>
</html>
