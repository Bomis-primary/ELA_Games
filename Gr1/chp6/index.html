<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Superhero Action Word Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#0d47a1, #e3f2fd);
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50;
}

#splash img{
    width:240px;
}

/* TITLE SCREEN */
#titleScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#0d47a1;
    color:white;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:40;
}

#titleScreen h1{
    font-size:34px;
}

/* GAME */
#game{
    display:none;
}

/* QUESTION (REDUCED FONT SIZE - FIX 1) */
#topWord {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 32px; /* reduced */
    font-weight: 800;
    color: #ffffff;
    padding: 0 10px;
    box-sizing:border-box;
}

/* TOP BAR (MOBILE SAFE SMALLER) */
#topBar {
    position: absolute;
    top: 85px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 16px;
    font-weight: bold;
    color:white;
    box-sizing:border-box;
}

#counter, #timer{
    background: rgba(0,0,0,0.35);
    padding: 5px 8px;
    border-radius: 6px;
}

/* ================= TICKER ================= */
#ticker {
    position: absolute;
    top: 48%;
    width: 100%;
    height: 180px;
    overflow: hidden;
    white-space: nowrap;
}

/* IMAGE SIZE (RESPONSIVE) */
.item {
    height: 140px; /* smaller for mobile */
    margin: 0 25px;
    cursor: pointer;
    display: inline-block;
}

/* CONTINUOUS LOOP TICKER (FIX 2) */
#track {
    display: inline-block;
    white-space: nowrap;
    animation: scroll 12s linear infinite; /* faster loop so repetition visible */
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* END SCREEN */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- TITLE -->
<div id="titleScreen">
    <h1>🦸 Superhero Training Camp</h1>
</div>

<!-- GAME -->
<div id="game">

    <!-- QUESTION ONLY (NO HINT - FIX 3) -->
    <div id="topWord"></div>

    <div id="topBar">
        <div id="counter">Mission: 0/10</div>
        <div id="timer">⏱ 45</div>
    </div>

    <!-- TICKER -->
    <div id="ticker">
        <div id="track"></div>
    </div>
</div>

<!-- END -->
<div id="endScreen"></div>

<audio id="correctSound" src="assets/clapping.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* ================= DATA ================= */
const missions = [
{q:"After superhero training, what helps a hero recover energy?", ans:"sleep"},
{q:"A hero must move fast to save people. Which action shows speed?", ans:"run"},
{q:"To understand secret missions, heroes must carefully...", ans:"read"},
{q:"After saving the city, heroes must regain energy by...", ans:"eat"},
{q:"To reach high places quickly, heroes must...", ans:"jump"},
{q:"Underwater rescue heroes must...", ans:"swim"},
{q:"To alert teammates, heroes may...", ans:"sing"}
];

/* IMAGES */
const images = [
{word:"sleep", img:"sleep_image.jpg"},
{word:"read", img:"read_image.png"},
{word:"run", img:"run_image.png"},
{word:"walk", img:"walk_image.png"},
{word:"eat", img:"eat_image.jpg"},
{word:"sit", img:"sit_image.png"},
{word:"swim", img:"swim_image.png"},
{word:"jump", img:"jump_image.png"},
{word:"sing", img:"sing_image.png"}
];

let index = 0;
let target = "";

/* ================= SPLASH FLOW ================= */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("titleScreen").style.display="flex";

setTimeout(()=>{
document.getElementById("titleScreen").style.display="none";
document.getElementById("game").style.display="block";
startMission();
startTimer();
},3000);

},5000);

/* ================= MISSION ================= */
function startMission(){

let m = missions[index];
target = m.ans;

/* QUESTION ONLY */
document.getElementById("topWord").innerHTML =
"🦸 " + m.q;

/* BUILD CONTINUOUS TICKER */
buildTicker();
}

/* ================= CONTINUOUS LOOP TICKER FIX ================= */
function buildTicker(){

let track = document.getElementById("track");
track.innerHTML="";

/* EXACT 5 ITEMS ONLY */
let pool = [...images]
.sort(()=>Math.random()-0.5)
.slice(0,5);

/* DUPLICATE FOR CONTINUOUS LOOP */
let loop = pool.concat(pool);

loop.forEach(data=>{
let img = document.createElement("img");
img.src = "assets/" + data.img;
img.className = "item";

img.onclick = ()=>check(data.word);

track.appendChild(img);
});
}

/* ================= CHECK ================= */
function check(word){

if(word === target){
document.getElementById("correctSound").play();

index++;
document.getElementById("counter").innerText =
"Mission: " + index + "/10";

setTimeout(()=>startMission(),1000);

}else{
document.getElementById("wrongSound").play();
}
}

/* ================= TIMER ================= */
let time = 45;
function startTimer(){
setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱ " + time;

if(time<=0){
index++;
startMission();
time=45;
}
},1000);
}

</script>

</body>
</html>
