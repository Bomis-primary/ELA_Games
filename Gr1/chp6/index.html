<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Superhero Action Word Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#0d47a1, #e3f2fd);
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50;
}

/* TITLE */
#titleScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#0d47a1;
    color:white;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:40;
}

/* GAME */
#game{
    display:none;
}

/* ================= QUESTION (SMALLER BY 2pt) ================= */
#topWord {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 36px; /* reduced */
    font-weight: 900;
    color: #ffffff;
    padding: 0 10px;
}

/* ================= HINT (MOVED DOWN TO AVOID OVERLAP) ================= */
#clueWord{
    position:absolute;
    top:85px; /* FIXED LOWER */
    width:100%;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#ffeb3b;
    padding: 0 10px;
}

/* ================= TOP BAR (MOBILE SAFE) ================= */
#topBar {
    position: absolute;
    top: 140px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 16px;
    font-weight: bold;
    box-sizing:border-box;
    color:white;
}

#timer, #counter {
    background: rgba(0,0,0,0.4);
    padding: 5px 8px;
    border-radius: 6px;
}

/* ================= TICKER AREA ================= */
#ticker {
    position: absolute;
    top: 52%;
    width: 100%;
    height: 200px;
    overflow: hidden;
}

/* ================= TICKER TRACK (CONTINUOUS LOOP FIX) ================= */
#track {
    display: inline-flex;
    white-space: nowrap;
    animation: scroll 14s linear infinite; /* smooth loop */
}

/* images */
.item {
    height: 160px;
    margin: 0 25px;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.2s;
}

.item:hover {
    transform: scale(1.05);
}

/* loop animation */
@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

/* END */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png" style="width:240px;">
</div>

<!-- TITLE -->
<div id="titleScreen">
    <h1>🦸 Superhero Training Camp</h1>
</div>

<!-- GAME -->
<div id="game">

    <div id="topWord"></div>
    <div id="clueWord"></div>

    <div id="topBar">
        <div id="counter">Mission: 0/10</div>
        <div id="timer">⏱ 45</div>
    </div>

    <div id="ticker">
        <div id="track"></div>
    </div>
</div>

<!-- END -->
<div id="endScreen"></div>

<audio id="correctSound" src="assets/clapping.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* ================= MISSIONS ================= */
const missions = [
{q:"After superhero training, what helps you rest?", ans:"sleep"},
{q:"A hero must move fast to rescue people. Which action?", ans:"run"},
{q:"To understand secret plans, heroes must...", ans:"read"},
{q:"To regain strength after saving city, heroes must...", ans:"eat"},
{q:"To reach high places quickly, heroes must...", ans:"jump"},
{q:"To rescue underwater victims, heroes must...", ans:"swim"},
{q:"To alert teammates, heroes may...", ans:"sing"}
];

/* ================= IMAGES ================= */
const images = [
{word:"sleep", img:"sleep_image.jpg"},
{word:"read", img:"read_image.png"},
{word:"run", img:"run_image.png"},
{word:"walk", img:"walk_image.png"},
{word:"eat", img:"eat_image.jpg"},
{word:"sit", img:"sit_image.png"},
{word:"swim", img:"swim_image.png"},
{word:"jump", img:"jump_image.png"},
{word:"sing", img:"sing_image.png"}
];

let index=0;
let targetWord="";

/* ================= FLOW ================= */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("titleScreen").style.display="flex";

setTimeout(()=>{
document.getElementById("titleScreen").style.display="none";
document.getElementById("game").style.display="block";

startMission();
startTimer();

},3000);

},5000);

/* ================= MISSION ================= */
function startMission(){

let m = missions[index];
targetWord = m.ans;

document.getElementById("topWord").innerHTML =
"🦸 MISSION: <b>" + m.q + "</b>";

document.getElementById("clueWord").innerHTML =
"TARGET ACTION: <b>" + targetWord.toUpperCase() + "</b>";

buildTicker();
}

/* ================= CONTINUOUS TICKER (FIXED) ================= */
function buildTicker(){

let track = document.getElementById("track");
track.innerHTML="";

/* ONLY 5 IMAGES PER ROUND */
let pool = [...images].sort(()=>Math.random()-0.5).slice(0,5);

/* DUPLICATE FOR CONTINUOUS LOOP */
let loopSet = [...pool, ...pool];

loopSet.forEach(data=>{
let img = document.createElement("img");
img.src = "assets/"+data.img;
img.className="item";

img.onclick=()=>check(data.word);

track.appendChild(img);
});
}

/* ================= CHECK ================= */
function check(word){

if(word === targetWord){
document.getElementById("correctSound").play();
index++;
setTimeout(()=>startMission(),1000);
}else{
document.getElementById("wrongSound").play();
}
}

/* ================= TIMER ================= */
let time=45;
function startTimer(){
setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱ "+time;

if(time<=0){
index++;
startMission();
time=45;
}
},1000);
}

</script>

</body>
</html>
