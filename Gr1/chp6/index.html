<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Superhero Action Word Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#b3e5fc, #e1f5fe);
}

/* SPLASH */
#splash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50;
}

/* TITLE */
#titleScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#e3f2fd;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:40;
}

#titleScreen h1{
    font-size:42px;
    color:#0d47a1;
}

#startBtn{
    padding:12px 25px;
    font-size:18px;
    margin-top:20px;
    display:none;
}

/* GAME */
#game{
    display:none;
}

/* QUESTION */
#topWord {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    font-size: 40px;
    font-weight: 900;
    color: #0d47a1;
}

/* CLUE WORD (BELOW QUESTION) */
#clueWord{
    position:absolute;
    top:70px;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#1565c0;
}

/* TOP BAR */
#topBar {
    position: absolute;
    top: 120px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 20px;
    font-weight: bold;
    box-sizing:border-box;
}

/* TICKER */
#ticker {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 220px;
    overflow: hidden;
    white-space: nowrap;
}

/* IMAGE */
.item {
    height: 200px;
    margin: 0 40px;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.2s;
}

.item:hover {
    transform: scale(1.1);
}

#track {
    display: inline-block;
    white-space: nowrap;
    animation: scroll 18s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* END */
#endScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png" style="width:250px;">
</div>

<!-- TITLE SCREEN -->
<div id="titleScreen">
    <h1>🦸 Superhero Training Camp</h1>
    <button id="startBtn">START MISSION</button>
</div>

<!-- GAME -->
<div id="game">

    <div id="topWord"></div>
    <div id="clueWord"></div>

    <div id="topBar">
        <div id="counter">Mission: 0/10</div>
        <div id="timer">⏱ 45</div>
    </div>

    <div id="ticker">
        <div id="track"></div>
    </div>
</div>

<!-- END -->
<div id="endScreen">
    <h1>Mission Complete! 🦸</h1>
</div>

<audio id="correctSound" src="assets/clapping.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* ================= HERO QUESTIONS ================= */
const missions = [
{
q:"After a long day of superhero training, which action is needed to rest and recover?",
ans:"sleep"
},
{
q:"A hero must move fast to save people. Which action shows speed?",
ans:"run"
},
{
q:"To understand secret missions, what should a hero do carefully?",
ans:"read"
},
{
q:"After saving the city, what should a hero do to regain energy?",
ans:"eat"
},
{
q:"To reach a tall building quickly, which action is needed?",
ans:"jump"
},
{
q:"A hero under water rescue mission must be able to...",
ans:"swim"
},
{
q:"To call teammates during danger, a hero should...",
ans:"sing"
}
];

/* ================= ACTION IMAGES ================= */
const images = [
{word:"sleep", img:"sleep_image.jpg"},
{word:"read", img:"read_image.png"},
{word:"run", img:"run_image.png"},
{word:"walk", img:"walk_image.png"},
{word:"eat", img:"eat_image.jpg"},
{word:"sit", img:"sit_image.png"},
{word:"swim", img:"swim_image.png"},
{word:"jump", img:"jump_image.png"},
{word:"sing", img:"sing_image.png"}
];

let index=0;
let targetWord="";
let score=0;

/* SPLASH */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("titleScreen").style.display="flex";

setTimeout(()=>{
document.getElementById("startBtn").style.display="inline-block";
},3000);

},5000);

/* START */
document.getElementById("startBtn").onclick=()=>{
document.getElementById("titleScreen").style.display="none";
document.getElementById("game").style.display="block";

nextMission();
startTimer();
};

/* ================= MISSION ================= */
function nextMission(){

let m = missions[index];
targetWord = m.ans;

document.getElementById("topWord").innerHTML =
"🦸 Mission: " + m.q;

document.getElementById("clueWord").innerHTML =
"Target Action: <b>" + targetWord.toUpperCase() + "</b>";

buildTicker();

}

/* ================= TICKER (ONLY 5 IMAGES) ================= */
function buildTicker(){

let track = document.getElementById("track");
track.innerHTML="";

let shuffled = [...images].sort(()=>Math.random()-0.5).slice(0,5);

shuffled.forEach(data=>{
let img = document.createElement("img");
img.src="assets/"+data.img;
img.className="item";

img.onclick=()=>check(data.word);

track.appendChild(img);
});
}

/* ================= CHECK ================= */
function check(word){

if(word===targetWord){
document.getElementById("correctSound").play();
score++;
index++;

setTimeout(()=>{
nextMission();
},1000);

}else{
document.getElementById("wrongSound").play();
}
}

/* ================= TIMER ================= */
let time=45;
function startTimer(){
setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱ "+time;

if(time<=0){
index++;
nextMission();
time=45;
}
},1000);
}

</script>

</body>
</html>
