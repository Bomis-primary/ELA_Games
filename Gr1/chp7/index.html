<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronoun Detective - LMS Safe</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial;
    overflow:hidden;
    background: linear-gradient(to bottom,#d7f0ff,#ffffff);
}

/* SPLASH */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#splash img{
    width:220px;
}

/* GAME */
#game{
    display:none;
    height:100vh;
    flex-direction:column;
}

/* TOP BAR */
#top{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#ffffffcc;
    font-weight:bold;
}

/* CARD */
.card{
    width:92%;
    max-width:520px;
    margin:auto;
    background:white;
    padding:18px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 6px 20px rgba(0,0,0,0.12);
}

/* IMAGE TILE */
.tile{
    height:170px;
    border-radius:16px;
    background-image:url("assets/a_collection_of_eight_educational_digital_illustra.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    margin-bottom:10px;
    border:3px solid transparent;
    transition:0.25s;
}

.tile:hover{
    transform:scale(1.03);
    border:3px solid #4fc3f7;
}

/* OPTIONS */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}

.opt{
    padding:14px;
    border:none;
    border-radius:10px;
    background:#e3f2fd;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.opt:active{
    transform:scale(0.97);
}

/* RESULT */
#result{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:0;
    animation:fall 2s linear;
}

@keyframes fall{
    0%{transform:translateY(-10px)}
    100%{transform:translateY(100vh)}
}

/* MOBILE FIX */
@media(max-width:600px){
.tile{
    height:140px;
}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

<div id="top">
    <div>Score: <span id="score">0</span></div>
    <div>Q: <span id="qno">1</span></div>
</div>

<div class="card">

    <h2 id="q"></h2>

    <div id="visual" class="tile"></div>

    <div class="grid" id="grid"></div>

    <div id="msg"></div>

</div>

</div>

<!-- RESULT -->
<div id="result">
    <h1>🎉 Great Job!</h1>
    <h2>Score: <span id="final"></span></h2>
    <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

/* =========================
QUESTIONS (IMAGE BASED)
========================= */
const data=[
{q:"___ is a doctor", img:"doc", a:"He"},
{q:"___ is a teacher", img:"teacher", a:"She"},
{q:"___ is a cat", img:"cat", a:"It"},
{q:"___ are friends", img:"group", a:"They"},
{q:"___ is a girl", img:"girl", a:"She"},
{q:"___ is a boy", img:"boy", a:"He"}
];

/* =========================
STATE ENGINE (LMS SAFE)
========================= */
let i=0;
let score=0;
let attempt=0;
let locked=false;

/* =========================
START SEQUENCE
========================= */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("game").style.display="flex";
load();
},5000);
};

/* =========================
LOAD QUESTION
========================= */
function load(){

locked=false;
attempt=0;

if(i>=data.length){
end();
return;
}

let q=data[i];

document.getElementById("q").innerText=q.q;
document.getElementById("visual").className="tile "+q.img;

document.getElementById("qno").innerText=i+1;
document.getElementById("score").innerText=score;

let box=document.getElementById("grid");
box.innerHTML="";

shuffle(["He","She","It","They","I"]).forEach(op=>{
let b=document.createElement("button");
b.className="opt";
b.innerText=op;
b.onclick=()=>check(op);
box.appendChild(b);
});
}

/* =========================
CHECK ANSWER (SAFE LOCK)
========================= */
function check(ans){

if(locked) return;
locked=true;

let q=data[i];

if(ans===q.a){
score++;
safe("correct");
safe("clap");
confetti();
document.getElementById("msg").innerText="Correct!";
}
else{
attempt++;
safe("wrong");

if(attempt>=2){
document.getElementById("msg").innerText="Answer: "+q.a;
}
}

document.getElementById("score").innerText=score;

/* NEXT QUESTION FLOW */
setTimeout(()=>{
i++;
load();
},900);
}

/* =========================
END SCREEN
========================= */
function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="flex";
document.getElementById("final").innerText=score+"/"+data.length;
confetti();
}

/* =========================
SAFE AUDIO
========================= */
function safe(id){
let a=document.getElementById(id);
if(!a) return;
a.currentTime=0;
a.play().catch(()=>{});
}

/* =========================
CONFETTI
========================= */
function confetti(){
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*100+"vw";
d.style.background=["#ff5252","#ffd740","#40c4ff","#69f0ae"][Math.floor(Math.random()*4)];
document.body.appendChild(d);
setTimeout(()=>d.remove(),2000);
}
}

/* =========================
SHUFFLE ENGINE
========================= */
function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

</script>

</body>
</html>
