<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Identity Heroes LMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:Arial;margin:0;padding:0;}

body{overflow:hidden;background:#000;}

/* BACKGROUND (FULL IMAGE SAFE) */
#bg{
position:fixed;
width:100%;
height:100%;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:#000;
z-index:-2;
}

#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-1;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
#splash img{width:220px;}

/* LEVEL GRID (2x2 BIG CARDS) */
#levels{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:20px;
height:100vh;
padding:30px;
justify-items:center;
align-items:center;
}

.level{
width:95%;
height:200px;
border-radius:16px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-weight:900;
font-size:26px;
color:black;
text-align:center;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
background-color:white;
box-shadow:0 6px 18px rgba(0,0,0,0.4);
position:relative;
cursor:pointer;
}

.lock{
position:absolute;
top:10px;
right:10px;
font-size:28px;
}

/* SCREENS */
.screen{
display:none;
height:100vh;
width:100%;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

/* INPUT */
input{
padding:12px;
border-radius:10px;
border:none;
width:220px;
margin:10px;
text-align:center;
}

/* BUTTON */
button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#4caf50;
color:white;
font-size:16px;
margin:5px;
cursor:pointer;
}

/* GAME */
#game{
display:none;
height:100vh;
flex-direction:column;
}

#top{
display:flex;
justify-content:space-between;
padding:10px;
background:rgba(255,255,255,0.9);
font-weight:bold;
}

/* HERO */
#hero{
position:absolute;
bottom:20px;
left:10%;
width:120px;
transition:all 0.8s ease;
}

/* CARD */
#card{
margin:auto;
margin-top:70px;
background:white;
padding:18px;
border-radius:16px;
width:90%;
max-width:520px;
text-align:center;
}

/* DROP BLANK */
.blank{
border-bottom:3px dashed #333;
display:inline-block;
min-width:60px;
padding:5px;
}

/* OPTIONS */
.option{
padding:10px;
margin:5px;
background:#e3f2fd;
border-radius:10px;
display:inline-block;
cursor:grab;
}

/* RESULT */
#result{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

/* CONFETTI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 2s linear;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}

/* MOBILE */
@media(max-width:600px){
.level{height:160px;font-size:20px;}
#hero{width:95px;}
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>

<!-- SPLASH -->
<div id="splash">
<img src="assets/innovine-logo.png">
</div>

<!-- LEVELS -->
<div id="levels"></div>

<!-- GAME -->
<div id="game">
<div id="top">
<div id="player"></div>
<div>Score: <span id="score">0</span></div>
<div>Lives: <span id="lives">3</span></div>
<div>Q: <span id="qno">1</span></div>
</div>

<img id="hero">

<div id="card">
<h2 id="question"></h2>
<div id="options"></div>
<div id="hint"></div>
</div>
</div>

<!-- RESULT -->
<div id="result">
<h1 id="final"></h1>
<button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clapping" src="assets/clapping.mp3"></audio>

<script>

/* BACKGROUNDS */
const themes={
0:"assets/beach.png",
1:"assets/desert.png",
2:"assets/forest.png",
3:"assets/city.png"
};

/* LEVEL STORIES */
const story=[
"🌊 Beach: Sea monsters are attacking! Save the shore using pronouns!",
"🏜 Desert: Sandstorm confusion! Restore identities!",
"🌲 Forest: Magical creatures lost identity!",
"🏙 City: Emergency chaos! Fix all pronouns!"
];

/* DATA (ALL PRONOUNS ALWAYS PRESENT) */
const levels=[
[
{q:"___ am happy",a:"I"},
{q:"___ are playing",a:"You"},
{q:"___ is a boy",a:"He"},
{q:"___ is a girl",a:"She"},
{q:"___ is a cat",a:"It"}
],
[
{q:"___ is a doctor",a:"He"},
{q:"___ is a nurse",a:"She"},
{q:"___ are friends",a:"They"},
{q:"___ is strong",a:"He"},
{q:"___ is kind",a:"She"}
],
[
{q:"___ is a bird",a:"It"},
{q:"___ are running",a:"They"},
{q:"___ is a tree",a:"It"},
{q:"___ are playing",a:"They"},
{q:"___ is sleeping",a:"It"}
],
[
{q:"___ am ready",a:"I"},
{q:"___ are listening",a:"You"},
{q:"___ is a hero",a:"He"},
{q:"___ is a leader",a:"She"},
{q:"___ are saving city",a:"They"}
]
];

let level=0;
let index=0;
let score=0;
let lives=3;

/* SPLASH */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
showLevels();
},5000);

/* LEVEL GRID */
function showLevels(){
let box=document.getElementById("levels");
box.innerHTML="";
box.style.display="grid";

for(let i=0;i<4;i++){
let d=document.createElement("div");
d.className="level";
d.style.backgroundImage=`url('${themes[i]}')`;
d.innerHTML=`Level ${i+1}<br><small>Tap to start</small>`;

let lock=document.createElement("div");
lock.className="lock";
lock.innerHTML="🔓";

d.appendChild(lock);

d.onclick=()=>startLevel(i);
box.appendChild(d);
}

document.getElementById("bg").style.backgroundImage="url('assets/background.jpg')";
}

/* START LEVEL */
function startLevel(lv){

level=lv;
index=0;
score=0;
lives=3;

document.getElementById("levels").style.display="none";
document.getElementById("game").style.display="flex";

document.getElementById("bg").style.backgroundImage=`url('${themes[lv]}')`;

loadQ();
}

/* LOAD */
function loadQ(){

if(index>=levels[level].length){
endLevel();
return;
}

let q=levels[level][index];

document.getElementById("question").innerHTML=q.q.replace("___","<span class='blank'>___</span>");
document.getElementById("score").innerText=score;
document.getElementById("lives").innerText=lives;
document.getElementById("qno").innerText=index+1;

let box=document.getElementById("options");
box.innerHTML="";

["I","You","He","She","It","They"].forEach(p=>{
let d=document.createElement("div");
d.className="option";
d.innerText=p;

d.onclick=()=>check(p);

box.appendChild(d);
});
}

/* CHECK */
function check(ans){

let q=levels[level][index];

if(ans===q.a){
score++;
play("correct");
play("clapping");
moveHero();
index++;
loadQ();
}
else{
lives--;
play("wrong");

if(lives<=0){
startLevel(level);
}
}
}

/* HERO MOVE */
function moveHero(){
let h=document.getElementById("hero");
if(!h.src){
h.src="assets/boy-hero.png";
}
h.style.left=(10+index*15)+"%";
}

/* END LEVEL */
function endLevel(){
document.getElementById("game").style.display="none";
document.getElementById("levels").style.display="grid";

if(score>=4){
alert("Awesome! Level Complete");
}
else{
alert("Try again!");
}
showLevels();
}

/* AUDIO */
function play(id){
let a=document.getElementById(id);
a.currentTime=0;
a.play().catch(()=>{});
}

</script>

</body>
</html>
