<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Help the Bee Reach Home</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
background:linear-gradient(to bottom,#dff7ff,#ffffff);
}

/* TOP */
#top{
padding:10px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* GAME AREA */
#gameArea{
position:relative;
width:100%;
height:70vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px;
}

/* BEE */
#bee{
width:80px;
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
transition:all 0.8s ease;
}

/* HIVE */
#hive{
width:100px;
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
}

/* PATH SLOTS */
#path{
position:absolute;
width:100%;
top:50%;
display:flex;
justify-content:center;
gap:20px;
}

.slot{
width:70px;
height:70px;
border:2px dashed #999;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

/* ITEMS */
#items{
position:absolute;
bottom:10px;
width:100%;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.item{
width:60px;
height:60px;
background:#fff3cd;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:grab;
}

/* BUTTON */
button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#4caf50;
color:white;
font-size:16px;
}

/* CONFETTI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 2s linear;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}
</style>
</head>

<body>

<div id="top">🐝 Help the Bee Reach Home</div>

<div id="gameArea">

<img id="bee" src="https://cdn-icons-png.flaticon.com/512/616/616408.png">
<img id="hive" src="https://cdn-icons-png.flaticon.com/512/616/616408.png">

<div id="path"></div>

</div>

<div id="items"></div>

<script>

/* ---------------- GAME DATA ---------------- */
const correctPath = ["🌸","🍯","🌼"];

let placed = [];

/* ---------------- INIT ---------------- */
function init(){

let path = document.getElementById("path");
let items = document.getElementById("items");

path.innerHTML="";
items.innerHTML="";

/* CREATE SLOTS */
for(let i=0;i<correctPath.length;i++){
let d=document.createElement("div");
d.className="slot";
d.dataset.index=i;
d.ondragover=e=>e.preventDefault();
d.ondrop=dropItem;
path.appendChild(d);
}

/* MIX ITEMS */
let allItems = ["🌸","🍯","🌼","🍃","🐞","🌻"].sort(()=>Math.random()-0.5);

allItems.forEach(val=>{
let d=document.createElement("div");
d.className="item";
d.draggable=true;
d.innerText=val;
d.dataset.value=val;

d.ondragstart=e=>{
e.dataTransfer.setData("text",val);
};

items.appendChild(d);
});
}

/* ---------------- DROP ---------------- */
function dropItem(e){
let val = e.dataTransfer.getData("text");
let slotIndex = e.target.dataset.index;

if(val === correctPath[slotIndex]){
e.target.innerText = val;
placed[slotIndex]=true;
moveBee();

checkWin();
}else{
alert("Try again! 🐝");
}
}

/* ---------------- BEE MOVE ---------------- */
function moveBee(){
let bee = document.getElementById("bee");
let progress = placed.filter(Boolean).length;

bee.style.left = (20 + progress*25) + "%";
}

/* ---------------- WIN CHECK ---------------- */
function checkWin(){
if(placed.length === correctPath.length && placed.every(Boolean)){
setTimeout(()=>{
confetti();
alert("🎉 Bee reached home!");
},500);
}
}

/* ---------------- CONFETTI ---------------- */
function confetti(){
for(let i=0;i<30;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["#ff0","#0f0","#00f","#f00"][Math.floor(Math.random()*4)];
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}

/* ---------------- START ---------------- */
init();

</script>

</body>
</html>
