<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Identity Heroes</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
}

/* THEME BACKGROUND */
#bg{
position:fixed;
width:100%;
height:100%;
background:url("/mnt/data/d6a82c20-c864-449d-a793-886a79dc8012.png") no-repeat center center;
background-size:cover;
z-index:-2;
}

/* DARK OVERLAY FOR READABILITY */
#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
z-index:-1;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
#splash img{width:220px}

/* START SCREEN */
#start{
display:none;
height:100vh;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
margin:5px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#4caf50;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

/* GAME AREA */
#game{
display:none;
height:100vh;
flex-direction:column;
}

/* TOP BAR */
#top{
display:flex;
justify-content:space-between;
padding:10px;
background:rgba(255,255,255,0.85);
font-weight:bold;
}

/* HERO */
#hero{
position:absolute;
bottom:20px;
left:10%;
width:90px;
transition:all 0.8s ease;
}

/* BUILDING */
#goal{
position:absolute;
right:20px;
bottom:20px;
width:120px;
}

/* QUESTION BOX */
#box{
margin:auto;
margin-top:60px;
background:white;
padding:18px;
border-radius:16px;
width:90%;
max-width:520px;
text-align:center;
}

/* OPTIONS */
#options{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-top:15px;
}

.opt{
padding:12px 16px;
border:none;
border-radius:10px;
background:#e3f2fd;
font-size:16px;
cursor:pointer;
}

/* RESULT */
#result{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
}

/* CONFETTI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 2s linear;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>

<!-- SPLASH -->
<div id="splash">
<img src="assets/innovine-logo.png">
</div>

<!-- START -->
<div id="start">
<h2>🦸 Secret Identity Mission</h2>
<input id="name" placeholder="Enter your hero name">
<br>
<button onclick="chooseGender('boy')">Boy Hero</button>
<button onclick="chooseGender('girl')">Girl Hero</button>
</div>

<!-- GAME -->
<div id="game">

<div id="top">
<div id="pname"></div>
<div>Score: <span id="score">0</span></div>
</div>

<img id="hero">
<img id="goal" src="https://cdn-icons-png.flaticon.com/512/684/684908.png">

<div id="box">
<h2 id="q"></h2>
<div id="options"></div>
<div id="msg"></div>
</div>

</div>

<!-- RESULT -->
<div id="result">
<h1 id="final"></h1>
<button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

/* QUESTIONS */
const data=[
{q:"___ is a doctor", a:"He"},
{q:"___ is a teacher", a:"She"},
{q:"___ are friends", a:"They"},
{q:"___ is a cat", a:"It"},
{q:"___ am happy", a:"I"}
];

let i=0;
let score=0;
let heroX=10;
let name="";
let heroType="";

function chooseGender(type){

name=document.getElementById("name").value || "Hero";
heroType=type;

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="flex";

document.getElementById("hero").src =
type==="boy" ? "assets/boy-hero.png" : "assets/girl-hero.png";

document.getElementById("hero").style.position="absolute";
document.getElementById("hero").style.bottom="20px";
document.getElementById("hero").style.left="10%";

document.getElementById("pname").innerText="🦸 "+name;

load();
}

/* LOAD */
function load(){

if(i>=data.length){
end();
return;
}

let q=data[i];

document.getElementById("q").innerText=q.q;
document.getElementById("score").innerText=score;

let box=document.getElementById("options");
box.innerHTML="";

["He","She","It","They","I"].forEach(op=>{
let b=document.createElement("button");
b.className="opt";
b.innerText=op;
b.onclick=()=>check(op);
box.appendChild(b);
});
}

/* CHECK */
function check(ans){

let q=data[i];

if(ans===q.a){
score++;
play("correct");
play("clap");
moveHero();
document.getElementById("msg").innerText="Correct!";
}
else{
play("wrong");
document.getElementById("msg").innerText="Try again!";
return;
}

i++;
setTimeout(load,800);
}

/* HERO MOVE */
function moveHero(){
heroX += 18;
document.getElementById("hero").style.left = heroX + "%";
}

/* END */
function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="flex";
document.getElementById("final").innerText =
"🎉 Well done " + name + "! Score: " + score;
confetti();
}

/* SOUND */
function play(id){
let a=document.getElementById(id);
a.currentTime=0;
a.play().catch(()=>{});
}

/* CONFETTI */
function confetti(){
for(let i=0;i<30;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*100+"vw";
d.style.background=["#ff0","#0f0","#f00","#0ff"][Math.floor(Math.random()*4)];
document.body.appendChild(d);
setTimeout(()=>d.remove(),2000);
}
}

/* SPLASH FLOW */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("start").style.display="flex";
},5000);

</script>

</body>
</html>
