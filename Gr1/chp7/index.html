<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Identity Heroes – Pronouns Mission</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;overflow:hidden;background:linear-gradient(to bottom,#dff3ff,#ffffff);}
#splash{position:fixed;inset:0;background:white;display:flex;justify-content:center;align-items:center;z-index:9999;}
#splash img{width:220px;}
#instructions{display:none;height:100vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
#instructions button{padding:12px 20px;font-size:18px;border:none;border-radius:10px;background:#4caf50;color:#fff;margin-top:20px;cursor:pointer;}
#game{display:none;height:100vh;flex-direction:column;}
#top{display:flex;justify-content:space-between;padding:10px;background:#ffffffcc;font-weight:bold;}
#stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:15px;}
#clueBox{background:#fff;padding:18px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);max-width:600px;width:90%;font-size:18px;}
#options{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:20px;}
.card{width:120px;height:120px;background:#e3f2fd;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;font-weight:bold;transition:0.2s;user-select:none;}
.card:active{transform:scale(0.95);}
.correct{background:#c8e6c9!important;}
.wrong{background:#ffcdd2!important;}
#hint{margin-top:8px;font-size:14px;color:#444;min-height:20px;text-align:center;}
#result{display:none;height:100vh;align-items:center;justify-content:center;flex-direction:column;text-align:center;}
.confetti{position:fixed;width:8px;height:8px;top:0;animation:fall 2s linear;}
@keyframes fall{0%{transform:translateY(-10px)}100%{transform:translateY(100vh)}}
#controls{position:fixed;top:10px;right:10px;background:#fff;padding:6px 10px;border-radius:8px;font-size:12px;}
</style>
</head>
<body>

<div id="controls">🔊 <input id="vol" type="range" min="0" max="1" step="0.05" value="1"></div>

<!-- SPLASH -->
<div id="splash"><img src="assets/innovine-logo.png"></div>

<!-- INSTRUCTIONS -->
<div id="instructions">
<h2>🦸 Secret Identity Heroes</h2>
<p>Restore the heroes’ secret identities by selecting the correct hero mask (pronoun) for each clue. Use your reasoning to save the city!</p>
<button onclick="startGame()">Start Mission</button>
</div>

<!-- GAME -->
<div id="game">
<div id="top">
<div>Score: <span id="score">0</span></div>
<div>Mission: <span id="qno">1</span>/12</div>
</div>
<div id="stage">
<div id="clueBox"></div>
<div id="options"></div>
<div id="hint"></div>
</div>
</div>

<!-- RESULT -->
<div id="result">
<h1>🎉 Mission Complete!</h1>
<h2 id="final"></h2>
<button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>
const missions=[
{clue:"A protector who helps people in danger", correct:"He", hint:"Think: male hero"},
{clue:"A flyer who saves people from sky", correct:"She", hint:"Think: female hero"},
{clue:"A fast runner who catches villains", correct:"They", hint:"Think multiple heroes"},
{clue:"A strong one who lifts heavy objects", correct:"He", hint:"Think strong male hero"},
{clue:"A hero who uses intelligence", correct:"She", hint:"Think smart female hero"},
{clue:"A silent protector of city night", correct:"He", hint:"Think male hero"},
{clue:"A water rescuer in floods", correct:"They", hint:"Think team heroes"},
{clue:"A tech hero using gadgets", correct:"She", hint:"Think tech-savvy female hero"},
{clue:"A shield defender of citizens", correct:"He", hint:"Think male hero"},
{clue:"A jungle rescuer of animals", correct:"They", hint:"Think team heroes"},
{clue:"A fire rescue specialist", correct:"He", hint:"Think male hero"},
{clue:"A leader who guides others", correct:"She", hint:"Think female hero"}
];

let shuffled=[];
let index=0;
let score=0;
let attempt=0;
let locked=false;
let muted=false;

const splash=document.getElementById("splash");
const instructions=document.getElementById("instructions");
const game=document.getElementById("game");
const clueBox=document.getElementById("clueBox");
const optionsBox=document.getElementById("options");
const hintBox=document.getElementById("hint");
const scoreBox=document.getElementById("score");
const qnoBox=document.getElementById("qno");
const finalScore=document.getElementById("final");

const correctSound=document.getElementById("correct");
const wrongSound=document.getElementById("wrong");
const clapSound=document.getElementById("clap");
const volumeSlider=document.getElementById("vol");

volumeSlider.addEventListener("input",()=>{let v=volumeSlider.value;correctSound.volume=v;wrongSound.volume=v;clapSound.volume=v;});

setTimeout(()=>{splash.style.display="none";instructions.style.display="flex";},5000);

function startGame(){
instructions.style.display="none";
game.style.display="flex";
shuffled=[...missions].sort(()=>Math.random()-0.5);
index=0;score=0;
loadMission();
}

function loadMission(){
locked=false;
attempt=0;
if(index>=shuffled.length){endGame();return;}
let m=shuffled[index];
clueBox.innerText=m.clue;
scoreBox.innerText=score;
qnoBox.innerText=index+1;
hintBox.innerText="";
optionsBox.innerHTML="";
["He","She","It","They","I"].forEach(o=>{
let b=document.createElement("div");b.className="card";b.innerText=o;b.onclick=()=>check(o,b);optionsBox.appendChild(b);
});
}

function check(opt,el){
if(locked) return;locked=true;
let m=shuffled[index];
if(opt===m.correct){score++;scoreBox.innerText=score;el.classList.add("correct");hintBox.innerText="Mission Success!";play("correct");play("clap");confetti();}
else{attempt++;el.classList.add("wrong");play("wrong");hintBox.innerText=(attempt<2?m.hint:"Answer: "+m.correct);if(attempt<2){locked=false;return;}}
setTimeout(()=>{index++;loadMission();},900);
}

function endGame(){game.style.display="none";finalScore.innerText=`Score: ${score}/${shuffled.length}`;document.getElementById("result").style.display="flex";confetti();}

function play(id){let a=document.getElementById(id);if(!a)return;a.currentTime=0;a.play().catch(()=>{});}

function confetti(){for(let i=0;i<30;i++){let d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=["#ff5252","#ffd740","#40c4ff","#69f0ae"][Math.floor(Math.random()*4)];document.body.appendChild(d);setTimeout(()=>d.remove(),2000);}}
</script>

</body>
</html>
