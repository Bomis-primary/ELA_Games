<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronoun Detective - Classroom Edition</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    overflow:hidden;

    /* CLASSROOM BACKGROUND (SAFE, NO IMAGE DEPENDENCY) */
    background: linear-gradient(to bottom, #cfe9ff 0%, #ffffff 100%);
}

/* floating classroom pattern */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
        radial-gradient(#00000005 2px, transparent 3px);
    background-size:40px 40px;
    pointer-events:none;
}

/* SPLASH */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#splash img{
    width:220px;
}

/* HOME */
#home{
    display:none;
    height:100vh;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.btn{
    padding:16px 28px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#4caf50;
    color:white;
}

/* TOP BAR */
#top{
    display:flex;
    justify-content:space-between;
    padding:12px;
    background:#ffffffcc;
    font-weight:bold;
}

/* GAME AREA */
#game{
    display:none;
    height:100vh;
    flex-direction:column;
}

/* QUESTION CARD */
.card{
    background:white;
    width:92%;
    max-width:520px;
    margin:auto;
    padding:22px;
    border-radius:18px;
    box-shadow:0 6px 20px rgba(0,0,0,0.12);
    text-align:center;
}

/* VISUAL TILE (NO EMOJI) */
.visual{
    width:140px;
    height:140px;
    margin:10px auto;
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    color:#333;
    background:linear-gradient(135deg,#fff3e0,#e1f5fe);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
}

/* OPTIONS */
.options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:15px;
}

.opt{
    padding:16px;
    border:none;
    border-radius:12px;
    background:#e3f2fd;
    font-size:20px;
    cursor:pointer;
    transition:0.2s;
}

.opt:active{
    transform:scale(0.96);
}

.opt.correct{
    background:#c8e6c9 !important;
}

.opt.wrong{
    background:#ffcdd2 !important;
}

#msg{
    margin-top:12px;
    font-weight:bold;
}

/* RESULT */
#result{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:0;
    animation:fall 2s linear;
}

@keyframes fall{
    0%{transform:translateY(-10px);}
    100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- HOME -->
<div id="home">
    <h1>🧠 Pronoun Detective</h1>
    <button class="btn" onclick="start()">Start Game</button>
</div>

<!-- GAME -->
<div id="game">

<div id="top">
    <div>Score: <span id="score">0</span></div>
    <div>Q: <span id="qno">1</span></div>
</div>

<div class="card">
    <h2 id="q"></h2>

    <!-- VISUAL CARD (NO EMOJI DEPENDENCY) -->
    <div class="visual" id="visual"></div>

    <div class="options" id="options"></div>
    <div id="msg"></div>
</div>

</div>

<!-- RESULT -->
<div id="result">
    <h1>🎉 Good Job!</h1>
    <h2>Your Score: <span id="final"></span></h2>
    <button class="btn" onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

/* SAFE QUESTION BANK (NO REPEATS) */
let data = [
{q:"___ is a doctor", a:"He", icon:"Doctor"},
{q:"___ is a teacher", a:"She", icon:"Teacher"},
{q:"___ is a cat", a:"It", icon:"Animal"},
{q:"___ are friends", a:"They", icon:"Group"},
{q:"___ am reading", a:"I", icon:"Me"},
{q:"___ is my brother", a:"He", icon:"Boy"},
{q:"___ is my sister", a:"She", icon:"Girl"}
];

let i=0;
let score=0;
let attempt=0;

window.onload = () => {
    setTimeout(()=>{
        document.getElementById("splash").style.display="none";
        document.getElementById("home").style.display="flex";
    },5000);
};

function start(){
    document.getElementById("home").style.display="none";
    document.getElementById("game").style.display="flex";
    load();
}

function load(){
    attempt=0;

    if(i>=data.length){
        end();
        return;
    }

    let q=data[i];

    document.getElementById("q").innerText=q.q;
    document.getElementById("visual").innerText=q.icon;
    document.getElementById("qno").innerText=i+1;
    document.getElementById("score").innerText=score;

    let box=document.getElementById("options");
    box.innerHTML="";

    ["He","She","It","They","I"].forEach(op=>{
        let b=document.createElement("button");
        b.className="opt";
        b.innerText=op;
        b.onclick=()=>check(b,op);
        box.appendChild(b);
    });
}

function check(btn,ans){
    let q=data[i];

    if(ans===q.a){
        btn.classList.add("correct");
        score++;
        safe("correct");
        safe("clap");
        confetti();

        setTimeout(()=>{ i++; load(); },900);
    }
    else{
        attempt++;
        btn.classList.add("wrong");
        safe("wrong");

        if(attempt>=2){
            document.getElementById("msg").innerText="Answer: "+q.a;
            setTimeout(()=>{ i++; load(); },900);
        }
    }

    document.getElementById("score").innerText=score;
}

function end(){
    document.getElementById("game").style.display="none";
    document.getElementById("result").style.display="flex";
    document.getElementById("final").innerText=score;
    confetti();
}

function safe(id){
    let a=document.getElementById(id);
    a.currentTime=0;
    a.play().catch(()=>{});
}

function confetti(){
    for(let i=0;i<20;i++){
        let d=document.createElement("div");
        d.className="confetti";
        d.style.left=Math.random()*100+"vw";
        d.style.background=["#ff5252","#ffd740","#40c4ff","#69f0ae"][Math.floor(Math.random()*4)];
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),2000);
    }
}

</script>

</body>
</html>
