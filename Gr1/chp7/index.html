<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronoun Detective - ABCYA PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial;
    overflow:hidden;
    background: linear-gradient(to bottom,#dff3ff,#ffffff);
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#splash img{width:220px}

/* GAME WRAPPER */
.screen{
    display:none;
    height:100vh;
    flex-direction:column;
}

.active{display:flex}

/* TOP BAR */
#top{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#ffffffcc;
    font-weight:bold;
}

/* CARD */
.card{
    width:92%;
    max-width:540px;
    margin:auto;
    background:white;
    padding:18px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

/* IMAGE */
#visual{
    width:150px;
    height:150px;
    object-fit:contain;
    margin:10px auto;
    display:block;
    animation:pop 0.4s ease;
}

@keyframes pop{
    from{transform:scale(0.7);opacity:0}
    to{transform:scale(1);opacity:1}
}

/* OPTIONS */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}

.opt{
    padding:14px;
    border:none;
    border-radius:10px;
    background:#e3f2fd;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.opt:active{transform:scale(0.96)}

.correct{background:#c8e6c9!important}
.wrong{background:#ffcdd2!important}

/* HINT BOX */
#hint{
    margin-top:8px;
    font-size:14px;
    color:#444;
    min-height:20px;
}

/* RESULT */
#result{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:0;
    animation:fall 2s linear;
}

@keyframes fall{
    0%{transform:translateY(-10px)}
    100%{transform:translateY(100vh)}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game" class="screen">

<div id="top">
    <div>Score: <span id="score">0</span></div>
    <div>Level: <span id="level">1</span></div>
    <div>Q: <span id="qno">1</span></div>
</div>

<div class="card">

    <h2 id="question"></h2>

    <img id="visual" src="" />

    <div id="hint"></div>

    <div class="grid" id="options"></div>

</div>

</div>

<!-- RESULT -->
<div id="result">
    <h1>🎉 Great Job!</h1>
    <h2 id="final"></h2>
    <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

/* =======================
LEVEL SYSTEM (ABCYA STYLE)
======================= */
const levels = {
1:[
{q:"___ is a doctor", img:"assets/doctor.png", a:"He", hint:"Think: male doctor"},
{q:"___ is a teacher", img:"assets/teacher.png", a:"She", hint:"Think: female teacher"}
],
2:[
{q:"___ is a cat", img:"assets/cat.png", a:"It", hint:"Animals use it"},
{q:"___ are friends", img:"assets/group.png", a:"They", hint:"More than one"}
],
3:[
{q:"___ is a girl", img:"assets/girl.png", a:"She", hint:"Female child"},
{q:"___ is a boy", img:"assets/boy.png", a:"He", hint:"Male child"}
]
};

let level=1;
let data=[];
let i=0;
let score=0;
let attempt=0;
let locked=false;

/* SPLASH */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("game").classList.add("active");
start();
},5000);

/* START */
function start(){
level=1;
data=[...levels[1],...levels[2],...levels[3]];
i=0;
score=0;
load();
}

/* LOAD */
function load(){

locked=false;
attempt=0;

if(i>=data.length){
end();
return;
}

let q=data[i];

document.getElementById("question").innerText=q.q;
document.getElementById("visual").src=q.img;

document.getElementById("hint").innerText="";
document.getElementById("qno").innerText=i+1;
document.getElementById("score").innerText=score;
document.getElementById("level").innerText=getLevel(i);

let box=document.getElementById("options");
box.innerHTML="";

["He","She","It","They","I"].forEach(op=>{
let b=document.createElement("button");
b.className="opt";
b.innerText=op;
b.onclick=()=>check(op);
box.appendChild(b);
});

}

/* CHECK */
function check(ans){

if(locked) return;
locked=true;

let q=data[i];

if(ans===q.a){
score++;
document.getElementById("correct").play().catch(()=>{});
document.getElementById("clap").play().catch(()=>{});
document.getElementById("hint").innerText="🎉 Correct!";
confetti();
}
else{
attempt++;
document.getElementById("wrong").play().catch(()=>{});
document.getElementById("hint").innerText=q.hint;

if(attempt>=2){
document.getElementById("hint").innerText="Answer: "+q.a;
}
}

document.getElementById("score").innerText=score;

setTimeout(()=>{
i++;
load();
},900);

}

/* LEVEL CALC */
function getLevel(index){
if(index<2) return 1;
if(index<4) return 2;
return 3;
}

/* END */
function end(){
document.getElementById("game").classList.remove("active");
document.getElementById("result").style.display="flex";
document.getElementById("final").innerText=`Score: ${score}/${data.length}`;
confetti();
}

/* CONFETTI */
function confetti(){
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*100+"vw";
d.style.background=["#ff5252","#ffd740","#40c4ff","#69f0ae"][Math.floor(Math.random()*4)];
document.body.appendChild(d);
setTimeout(()=>d.remove(),2000);
}
}

</script>

</body>
</html>
