<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Identity Heroes LMS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:Arial;margin:0;padding:0;}

body{
overflow:hidden;
}

/* BACKGROUND */
#bg{
position:fixed;
width:100%;
height:100%;
background:url("assets/background.jpg") center/cover no-repeat;
z-index:-2;
}

#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-1;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
#splash img{width:220px}

/* SCREEN COMMON */
.screen{
display:none;
height:100vh;
width:100%;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

/* INPUT */
input{
padding:12px;
border-radius:10px;
border:none;
width:220px;
margin:8px;
text-align:center;
}

/* BUTTON */
button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#4caf50;
color:white;
font-size:16px;
margin:5px;
cursor:pointer;
}

/* LEVELS */
#levels{
display:none;
flex-wrap:wrap;
gap:15px;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.level{
width:140px;
height:120px;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-weight:bold;
background-size:cover;
background-position:center;
position:relative;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.lock{
position:absolute;
top:5px;
right:5px;
font-size:22px;
}

/* GAME */
#game{
display:none;
height:100vh;
flex-direction:column;
}

#top{
display:flex;
justify-content:space-between;
padding:10px;
background:rgba(255,255,255,0.9);
font-weight:bold;
}

/* HERO */
#hero{
position:absolute;
bottom:20px;
left:10%;
width:110px;
transition:all 0.8s ease;
}

/* CARD */
#card{
margin:auto;
margin-top:70px;
background:white;
padding:18px;
border-radius:16px;
width:90%;
max-width:520px;
text-align:center;
}

/* DRAG OPTIONS */
.option{
padding:10px;
margin:5px;
background:#e3f2fd;
border-radius:10px;
display:inline-block;
cursor:grab;
}

/* DROP AREA */
#drop{
margin-top:15px;
padding:20px;
border:2px dashed #999;
border-radius:12px;
min-height:50px;
}

/* RESULT */
#result{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

/* CONFETTI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 2s linear;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>

<!-- SPLASH -->
<div id="splash">
<img src="assets/innovine-logo.png">
</div>

<!-- NAME -->
<div id="nameScreen" class="screen">
<h2>Enter Your Hero Name</h2>
<input id="name" placeholder="Your name">
<button onclick="chooseGender('boy')">Boy Hero</button>
<button onclick="chooseGender('girl')">Girl Hero</button>
</div>

<!-- LEVELS -->
<div id="levels"></div>

<!-- GAME -->
<div id="game">
<div id="top">
<div id="player"></div>
<div>Score: <span id="score">0</span></div>
<div>Lives: <span id="lives">3</span></div>
<div>Q: <span id="qno">1</span>/5</div>
</div>

<img id="hero">

<div id="card">
<h2 id="question"></h2>

<div id="drop">DROP ANSWER HERE</div>

<div id="options"></div>
</div>
</div>

<!-- RESULT -->
<div id="result">
<h1 id="final"></h1>
<button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clapping" src="assets/clapping.mp3"></audio>

<script>

/* =======================
ASSETS & THEMES
======================= */
const backgrounds={
beach:"assets/beach.png",
desert:"assets/desert.png",
forest:"assets/forest.png",
city:"assets/city.png"
};

const levels=[
{theme:"beach",title:"City 1",focus:"I / You"},
{theme:"desert",title:"City 2",focus:"He / She"},
{theme:"forest",title:"City 3",focus:"It / They"},
{theme:"city",title:"City 4",focus:"Mixed"}
];

/* =======================
MISSIONS (5 per level)
======================= */
const data=[
[
{q:"___ am happy",a:"I"},
{q:"___ are playing",a:"You"},
{q:"___ am ready",a:"I"},
{q:"___ are here",a:"You"},
{q:"___ am a hero",a:"I"}
],
[
{q:"___ is a doctor",a:"He"},
{q:"___ is a teacher",a:"She"},
{q:"___ is strong",a:"He"},
{q:"___ is kind",a:"She"},
{q:"___ is working",a:"He"}
],
[
{q:"___ is a cat",a:"It"},
{q:"___ are friends",a:"They"},
{q:"___ is a tree",a:"It"},
{q:"___ are playing",a:"They"},
{q:"___ is sleeping",a:"It"}
],
[
{q:"___ is a hero",a:"He"},
{q:"___ is a leader",a:"She"},
{q:"___ are saving city",a:"They"},
{q:"___ is brave",a:"He"},
{q:"___ is smart",a:"She"}
]
];

let level=0;
let qIndex=0;
let score=0;
let lives=3;
let name="";
let heroType="";
let attempts=0;

/* =======================
SPLASH
======================= */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("nameScreen").style.display="flex";
},5000);

/* =======================
GENDER + NAME
======================= */
function chooseGender(type){
heroType=type;
name=document.getElementById("name").value||"Hero";

document.getElementById("nameScreen").style.display="none";
showLevels();
}

/* =======================
LEVEL SCREEN
======================= */
function showLevels(){
let box=document.getElementById("levels");
box.style.display="flex";

box.innerHTML="";

levels.forEach((l,i)=>{
let div=document.createElement("div");
div.className="level";
div.style.backgroundImage=`url('${backgrounds[l.theme]}')`;
div.innerHTML=`${l.title}<br>${l.focus}`;

if(i>level){
let lock=document.createElement("div");
lock.className="lock";
lock.innerHTML="🔒";
div.appendChild(lock);
}

div.onclick=()=>{
if(i<=level) startLevel(i);
};

box.appendChild(div);
});
}

/* =======================
START LEVEL
======================= */
function startLevel(lv){

level=lv;
qIndex=0;
score=0;
lives=3;

document.getElementById("levels").style.display="none";
document.getElementById("game").style.display="flex";

document.getElementById("hero").src=
heroType==="boy"?"assets/boy-hero.png":"assets/girl-hero.png";

document.getElementById("player").innerText="🦸 "+name;

document.getElementById("bg").style.backgroundImage=
`url('${backgrounds[levels[lv].theme]}')`;

loadQ();
}

/* =======================
LOAD QUESTION
======================= */
function loadQ(){

if(qIndex>=5){
endLevel();
return;
}

attempts=0;

document.getElementById("score").innerText=score;
document.getElementById("lives").innerText=lives;
document.getElementById("qno").innerText=qIndex+1;

let q=data[level][qIndex];

document.getElementById("question").innerText=q.q;

let optBox=document.getElementById("options");
optBox.innerHTML="";

["I","You","He","She","It","They"].forEach(o=>{
let d=document.createElement("div");
d.className="option";
d.draggable=true;
d.innerText=o;

d.ondragstart=(e)=>e.dataTransfer.setData("text",o);

optBox.appendChild(d);
});

/* DROP */
let drop=document.getElementById("drop");
drop.ondragover=(e)=>e.preventDefault();

drop.ondrop=(e)=>{
let val=e.dataTransfer.getData("text");
check(val);
};
}

/* =======================
CHECK ANSWER
======================= */
function check(val){

let q=data[level][qIndex];

if(val===q.a){
score++;
play("correct");
play("clapping");
moveHero();
nextQ();
}
else{
attempts++;
lives--;
play("wrong");

if(lives<=0){
alert("Level Failed! Try Again");
startLevel(level);
return;
}
}
}

/* =======================
NEXT QUESTION
======================= */
function nextQ(){
qIndex++;
setTimeout(loadQ,700);
}

/* =======================
HERO MOVE
======================= */
function moveHero(){
let h=document.getElementById("hero");
h.style.left=(10+qIndex*15)+"%";
}

/* =======================
LEVEL END
======================= */
function endLevel(){

if(score>=4){
level++;
alert("Awesome! Level Completed");

showLevels();
document.getElementById("game").style.display="none";
}
else{
alert("Try again! You need at least 4 correct.");
startLevel(level);
}
}

/* =======================
AUDIO
======================= */
function play(id){
let a=document.getElementById(id);
a.currentTime=0;
a.play().catch(()=>{});
}

</script>

</body>
</html>
