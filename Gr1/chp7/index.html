<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Identity Heroes – World Map LMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
}
#bg{
  position:fixed;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  z-index:-2;
}
#overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
  z-index:-1;
}
/* SPLASH */
#splash{
  position:fixed; inset:0;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#splash img{width:220px;}

/* START SCREEN */
#start, #instructions{
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  color:white;
}
input{
  padding:12px;
  border-radius:8px;
  border:none;
  width:200px;
  text-align:center;
  margin:5px;
}
button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
  font-size:16px;
  margin-top:5px;
  cursor:pointer;
}

/* GAME */
#game{
  display:none;
  height:100vh;
  flex-direction:column;
}
#top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(255,255,255,0.9);
  font-weight:bold;
}

/* HERO */
#hero{
  position:absolute;
  bottom:20px;
  left:10%;
  width:90px;
  transition:all 0.8s ease;
}

/* BUILDING / GOAL */
#goal{
  position:absolute;
  right:20px;
  bottom:20px;
  width:120px;
}

/* CARD */
#card{
  margin:auto;
  margin-top:60px;
  width:90%;
  max-width:520px;
  background:white;
  padding:18px;
  border-radius:16px;
  text-align:center;
}

/* OPTIONS */
#options{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}
.opt{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#e3f2fd;
  font-size:16px;
  min-width:80px;
  cursor:pointer;
}
.opt:active{transform:scale(0.96);}
.correct{background:#c8e6c9!important;}
.wrong{background:#ffcdd2!important;}
#hint{
  margin-top:8px;
  font-size:14px;
  color:#444;
  min-height:20px;
  text-align:center;
}

/* RESULT */
#result{
  display:none;
  height:100vh;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  color:white;
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:8px;
  height:8px;
  top:0;
  animation:fall 2s linear;
}
@keyframes fall{
  0%{transform:translateY(-10px)}
  100%{transform:translateY(100vh)}
}

@media(max-width:600px){
#hero{width:70px;}
#card{margin-top:40px;}
.opt{font-size:14px;}
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="overlay"></div>

<!-- SPLASH -->
<div id="splash"><img src="assets/innovine-logo.png"></div>

<!-- NAME -->
<div id="start">
<h2>Enter Your Hero Name</h2>
<input id="nameInput" placeholder="Your name">
<br>
<button onclick="chooseGender('boy')">Boy Hero</button>
<button onclick="chooseGender('girl')">Girl Hero</button>
</div>

<!-- INSTRUCTIONS -->
<div id="instructions">
<h2>🦸 Secret Identity Mission</h2>
<p>Help restore the city’s secret identities by selecting the correct hero mask (pronoun) for each clue.</p>
<button onclick="startGame()">Start Mission</button>
</div>

<!-- GAME -->
<div id="game">
<div id="top">
<div id="player"></div>
<div>Score: <span id="score">0</span></div>
<div>Mission: <span id="qno">1</span></div>
</div>

<img id="hero">
<img id="goal" src="https://cdn-icons-png.flaticon.com/512/684/684908.png">

<div id="card">
<h2 id="q"></h2>
<div id="options"></div>
<div id="hint"></div>
</div>
</div>

<!-- RESULT -->
<div id="result">
<h1 id="final"></h1>
<button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>
let missions=[
{q:"___ is a doctor", a:"He", hint:"Think male hero", theme:"city"},
{q:"___ is a teacher", a:"She", hint:"Think female hero", theme:"city"},
{q:"___ are friends", a:"They", hint:"Plural group", theme:"forest"},
{q:"___ is a cat", a:"It", hint:"Animal", theme:"forest"},
{q:"___ am happy", a:"I", hint:"First person", theme:"desert"},
{q:"___ is a nurse", a:"She", hint:"Female worker", theme:"desert"},
{q:"___ is a boy", a:"He", hint:"Male child", theme:"beach"},
{q:"___ is a girl", a:"She", hint:"Female child", theme:"beach"}
];

const themeBackgrounds={
city:"assets/background.jpg",
forest:"assets/background.jpg",
desert:"assets/background.jpg",
beach:"assets/beach.png"
};

let data=[],i=0,score=0,attempt=0,heroX=10,name="",heroType="";

const splash=document.getElementById("splash");
const startScreen=document.getElementById("start");
const instructions=document.getElementById("instructions");
const game=document.getElementById("game");
const clueBox=document.getElementById("q");
const optionsBox=document.getElementById("options");
const hintBox=document.getElementById("hint");
const scoreBox=document.getElementById("score");
const qnoBox=document.getElementById("qno");
const finalScore=document.getElementById("final");
const hero=document.getElementById("hero");
const bg=document.getElementById("bg");

setTimeout(()=>{
splash.style.display="none";
instructions.style.display="flex";
},5000);

function chooseGender(type){
heroType=type;
name=document.getElementById("nameInput").value || "Hero";
startScreen.style.display="none";
instructions.style.display="flex";
}

function startGame(){
instructions.style.display="none";
game.style.display="flex";
hero.src=(heroType==="boy"?"assets/boy-hero.png":"assets/girl-hero.png");
data=[...missions].sort(()=>Math.random()-0.5);
i=0;score=0;heroX=10;
document.getElementById("player").innerText="🦸 "+name;
loadMission();
}

function loadMission(){
if(i>=data.length){endGame();return;}
attempt=0;
let m=data[i];
clueBox.innerText=m.q;
scoreBox.innerText=score;
qnoBox.innerText=i+1;
hintBox.innerText="";
bg.style.backgroundImage=`url('${themeBackgrounds[m.theme]}')`;
optionsBox.innerHTML="";
["He","She","It","They","I"].forEach(o=>{
let b=document.createElement("button");
b.className="opt";b.innerText=o;b.onclick=()=>check(o);
optionsBox.appendChild(b);
});
}

function check(ans){
let m=data[i];
if(ans===m.a){score++;scoreBox.innerText=score;moveHero();play("correct");play("clap");hintBox.innerText="Correct!";}
else{attempt++;play("wrong");hintBox.innerText=(attempt<2?m.hint:"Answer: "+m.a);if(attempt<2){return;}}
i++;setTimeout(loadMission,900);
}

function moveHero(){heroX+=18;hero.style.left=heroX+"%";}

function endGame(){
game.style.display="none";finalScore.innerText=`🎉 Well done ${name}! Score: ${score}/${data.length}`;document.getElementById("result").style.display="flex";confetti();
}

function play(id){let a=document.getElementById(id);a.currentTime=0;a.play().catch(()=>{});}
function confetti(){for(let i=0;i<30;i++){let d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=["#ff5252","#ffd740","#40c4ff","#69f0ae"][Math.floor(Math.random()*4)];document.body.appendChild(d);setTimeout(()=>d.remove(),2000);}}
</script>
</body>
</html>
