<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronoun Detective - Image Mode</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial;
    overflow:hidden;
    background: linear-gradient(to bottom,#d7f0ff,#ffffff);
}

/* SPLASH */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#splash img{width:220px}

/* GAME */
#game{
    display:none;
    height:100vh;
    flex-direction:column;
}

#top{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#ffffffcc;
    font-weight:bold;
}

/* QUESTION */
.card{
    width:92%;
    max-width:520px;
    margin:auto;
    background:white;
    padding:18px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 6px 20px rgba(0,0,0,0.12);
}

/* IMAGE GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:15px;
}

/* IMAGE TILE (CROPPED FROM ONE PACK) */
.tile{
    height:140px;
    border-radius:14px;
    background-image:url("assets/a_collection_of_eight_educational_digital_illustra.png");
    background-size:400px 400px;
    cursor:pointer;
    border:3px solid transparent;
    transition:0.2s;
}

.tile:hover{
    transform:scale(1.03);
}

/* CROPPED POSITIONS (FROM IMAGE GRID) */

/* Doctor */
.doc{ background-position:0px 0px; }

/* Teacher */
.teacher{ background-position:-200px 0px; }

/* Cat */
.cat{ background-position:-400px 0px; }

/* Kids group */
.group{ background-position:0px -200px; }

/* Girl */
.girl{ background-position:-200px -200px; }

/* Boy */
.boy{ background-position:-400px -200px; }

/* OPTIONS */
.options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:15px;
}

.opt{
    padding:14px;
    border:none;
    border-radius:10px;
    background:#e3f2fd;
    font-size:18px;
}

#msg{
    margin-top:10px;
    font-weight:bold;
}

/* RESULT */
#result{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:0;
    animation:fall 2s linear;
}

@keyframes fall{
    0%{transform:translateY(-10px)}
    100%{transform:translateY(100vh)}
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

<div id="top">
    <div>Score: <span id="score">0</span></div>
    <div>Q: <span id="qno">1</span></div>
</div>

<div class="card">

    <h2 id="q"></h2>

    <!-- IMAGE VISUAL -->
    <div id="visual" class="tile doc"></div>

    <div class="grid" id="grid"></div>

    <div id="msg"></div>

</div>

</div>

<!-- RESULT -->
<div id="result">
    <h1>🎉 Great Job!</h1>
    <h2>Score: <span id="final"></span></h2>
    <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/clapping.mp3"></audio>

<script>

/* QUESTIONS */
const data=[
{q:"___ is a doctor", img:"doc", a:"He"},
{q:"___ is a teacher", img:"teacher", a:"She"},
{q:"___ is a cat", img:"cat", a:"It"},
{q:"___ are friends", img:"group", a:"They"},
{q:"___ is a girl", img:"girl", a:"She"},
{q:"___ is a boy", img:"boy", a:"He"}
];

let i=0;
let score=0;
let attempt=0;

window.onload=()=>{
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("game").style.display="flex";
load();
},5000);
};

function load(){

attempt=0;

if(i>=data.length){
end();
return;
}

let q=data[i];

document.getElementById("q").innerText=q.q;
document.getElementById("visual").className="tile "+q.img;

document.getElementById("qno").innerText=i+1;
document.getElementById("score").innerText=score;

let box=document.getElementById("grid");
box.innerHTML="";

["He","She","It","They","I"].forEach(op=>{

let b=document.createElement("button");
b.className="opt";
b.innerText=op;
b.onclick=()=>check(op);
box.appendChild(b);

});

}

function check(ans){

let q=data[i];

if(ans===q.a){
score++;
safe("correct");
safe("clap");
confetti();
document.getElementById("msg").innerText="Correct!";

setTimeout(()=>{
i++;
load();
},900);

}else{

attempt++;
safe("wrong");

if(attempt>=2){
document.getElementById("msg").innerText="Answer: "+q.a;
setTimeout(()=>{i++;load();},900);
}
}

document.getElementById("score").innerText=score;
}

function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="flex";
document.getElementById("final").innerText=score;
confetti();
}

function safe(id){
let a=document.getElementById(id);
a.currentTime=0;
a.play().catch(()=>{});
}

function confetti(){
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*100+"vw";
d.style.background=["#ff5252","#ffd740","#40c4ff","#69f0ae"][Math.floor(Math.random()*4)];
document.body.appendChild(d);
setTimeout(()=>d.remove(),2000);
}
}

</script>

</body>
</html>
