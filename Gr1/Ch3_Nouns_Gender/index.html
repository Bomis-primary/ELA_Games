<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Gender Mission</title>

<style>
*{box-sizing:border-box;font-family:"Comic Sans MS"}

body{
margin:0;
overflow:hidden;
background:linear-gradient(to top,#020111,#1b2a49,#2e3c6e);
color:white;
}

/* SCREEN */
.screen{
display:none;
width:100vw;
height:100vh;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.active{display:flex}

/* LOGO */
.logo{
width:70%;
max-width:320px;
}

/* LAYOUT */
.wrapper{
display:flex;
width:100vw;
height:100vh;
}

/* LEFT */
.left{
width:66%;
padding:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* RIGHT */
.right{
width:34%;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* MOON (FIXED POSITION) */
.moon{
position:absolute;
top:30px;
font-size:120px;
}

/* ROCKET (FIXED LANDING CONTROL) */
.rocket{
position:absolute;
bottom:80px;
font-size:60px;
transition:0.6s ease;
}

/* QUESTION */
.qbox{
background:white;
color:black;
padding:18px;
border-radius:18px;
width:90%;
max-width:420px;
text-align:center;
}

.option{
background:#fff;
margin:8px;
padding:12px;
border-radius:14px;
border:3px solid #2196f3;
cursor:pointer;
font-size:20px;
}

/* POPUP */
.popup{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
padding:15px;
border-radius:15px;
display:none;
font-size:20px;
}

.good{background:#00c853;color:white}
.bad{background:#d50000;color:white}
</style>
</head>

<body>

<!-- LOGO -->
<div class="screen active" id="logoScreen">
<img src="./assets/innovine-logo_Final.png" class="logo">
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">

<div class="wrapper">

<!-- LEFT -->
<div class="left">
<div class="qbox">
<h2 id="question"></h2>
<div id="options"></div>
</div>
</div>

<!-- RIGHT -->
<div class="right">

<div class="moon" id="moon">🌕</div>
<div class="rocket" id="rocket">🚀</div>
<div class="popup" id="popup"></div>

</div>

</div>
</div>

<!-- FINAL -->
<div class="screen" id="finalScreen">
<div style="background:white;color:black;padding:25px;border-radius:20px">
<h2>🌙 Mission Complete</h2>
<div id="scoreBoard"></div>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

/* FLOW */
setTimeout(()=>{
document.getElementById("logoScreen").classList.remove("active");
document.getElementById("gameScreen").classList.add("active");
startGame();
},5000);

/* DATA */
const level1=[
{q:"Boy",a:"Masculine"},
{q:"Girl",a:"Feminine"},
{q:"King",a:"Masculine"},
{q:"Queen",a:"Feminine"},
{q:"Man",a:"Masculine"}
];

const level2=[
{q:"Boy",a:"Girl",wrong:["Woman"]},
{q:"Mother",a:"Father",wrong:["Sister"]},
{q:"King",a:"Queen",wrong:["Princess"]},
{q:"Man",a:"Woman",wrong:["Girl"]},
{q:"Father",a:"Mother",wrong:["Sister"]}
];

let level=1;
let i=0;

/* FIX 1: correct total tracking */
let totalQuestions = level1.length + level2.length;
let scoreFirst=0;
let firstTry=true;

/* ROCKET POSITION (FIXED LIMIT) */
let rocketPos=80;
const moonLimit = 320; // FIX: landing cap (prevents overshoot)

/* START */
function startGame(){
loadQ();
}

/* LOAD */
function load(){

let data = level===1 ? level1 : level2;

if(i>=data.length){
if(level===1){
level=2;
i=0;
load();
return;
}
else{
launchLanding();
return;
}
}

let item=data[i];

document.getElementById("question").innerText =
level===1
? "Is '"+item.q+"' Masculine or Feminine?"
: "Find opposite gender of: "+item.q;

let box=document.getElementById("options");
box.innerHTML="";

if(level===1){
["Masculine","Feminine"].forEach(opt=>{
let d=document.createElement("div");
d.className="option";
d.innerText=opt;
d.onclick=()=>check(opt,item.a);
box.appendChild(d);
});
}
else{
let opts=[item.a,...item.wrong].sort(()=>Math.random()-0.5);

opts.forEach(opt=>{
let d=document.createElement("div");
d.className="option";
d.innerText=opt;
d.onclick=()=>check(opt,item.a);
box.appendChild(d);
});
}
}

/* CHECK */
function check(selected,correct){

let popup=document.getElementById("popup");
popup.style.display="block";

if(selected===correct){

if(firstTry) scoreFirst++;

popup.innerText="Correct 🚀";
popup.className="popup good";

/* FIX 2: rocket capped so it never goes above moon */
rocketPos = Math.min(rocketPos + 35, moonLimit);

}else{

popup.innerText="Wrong 🌊";
popup.className="popup bad";

rocketPos = Math.max(80, rocketPos - 20);
}

document.getElementById("rocket").style.bottom=rocketPos+"px";

setTimeout(()=>{
popup.style.display="none";
i++;
firstTry=true;
load();
},800);
}

/* LANDING (FIXED ALIGNMENT) */
function launchLanding(){

document.getElementById("options").innerHTML="";
document.getElementById("question").innerText="Landing on the Moon 🌕";

/* FIX 3: direct alignment to moon */
document.getElementById("rocket").style.bottom = moonLimit + "px";

setTimeout(()=>showScore(),1500);
}

/* SCOREBOARD FIXED */
function showScore(){

document.getElementById("gameScreen").classList.remove("active");
document.getElementById("finalScreen").classList.add("active");

/* FIX 4: correct denominator */
let correctOutOf = level1.length + level2.length;

let remark =
scoreFirst>=8 ? "Excellent 🌟":
scoreFirst>=6 ? "Good 👍":
"Keep Practicing 📘";

document.getElementById("scoreBoard").innerHTML=
`
<p><b>First Attempt Correct:</b> ${scoreFirst} / ${correctOutOf}</p>
<p><b>Remark:</b> ${remark}</p>
`;
}

load();

</script>

</body>
</html>
