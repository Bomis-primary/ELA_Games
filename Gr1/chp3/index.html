<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Gender Mission</title>

<style>
*{box-sizing:border-box;font-family:"Comic Sans MS"}

body{
margin:0;
overflow:hidden;
background:linear-gradient(to top,#020111,#1b2a49,#2e3c6e);
color:white;
}

/* SCREEN */
.screen{
display:none;
width:100vw;
height:100vh;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.active{display:flex}

/* LOGO */
.logo{
width:70%;
max-width:320px;
}

/* LAYOUT */
.wrapper{
display:flex;
width:100vw;
height:100vh;
}

/* LEFT */
.left{
width:66%;
padding:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* RIGHT */
.right{
width:34%;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* MOON */
.moon{
position:absolute;
top:30px;
font-size:120px;
}

/* ROCKET */
.rocket{
position:absolute;
bottom:80px;
font-size:60px;
transition:0.6s ease;
}

/* QUESTION */
.qbox{
background:white;
color:black;
padding:18px;
border-radius:18px;
width:90%;
max-width:420px;
text-align:center;
}

.option{
background:#fff;
margin:8px;
padding:12px;
border-radius:14px;
border:3px solid #2196f3;
cursor:pointer;
font-size:20px;
}

/* POPUP */
.popup{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
padding:15px;
border-radius:15px;
display:none;
font-size:20px;
}

.good{background:#00c853;color:white}
.bad{background:#d50000;color:white}

/* ⭐ TOP BAR (NEW) */
.topbar{
position:absolute;
top:10px;
left:10px;
right:10px;
display:flex;
justify-content:space-between;
font-size:18px;
font-weight:bold;
z-index:10;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="screen active" id="logoScreen">
<img src="ffc9d50f-6547-454f-b548-a68fa4adde37.png" class="logo">
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">

<div class="topbar">
<div>Question: <span id="qno">1</span></div>
<div>⏱ <span id="timer">30</span>s</div>
</div>

<div class="wrapper">

<div class="left">
<div class="qbox">
<h2 id="question"></h2>
<div id="options"></div>
</div>
</div>

<div class="right">
<div class="moon">🌕</div>
<div class="rocket" id="rocket">🚀</div>
<div class="popup" id="popup"></div>
</div>

</div>
</div>

<!-- FINAL -->
<div class="screen" id="finalScreen">
<div style="background:white;color:black;padding:25px;border-radius:20px">
<h2>🌌 Mission Complete</h2>
<div id="scoreBoard"></div>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<!-- SOUNDS -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* FLOW */
setTimeout(()=>{
document.getElementById("logoScreen").classList.remove("active");
document.getElementById("gameScreen").classList.add("active");
startGame();
},5000);

/* DATA */
const level1=[
{q:"Boy",a:"Masculine"},
{q:"Girl",a:"Feminine"},
{q:"King",a:"Masculine"},
{q:"Queen",a:"Feminine"},
{q:"Man",a:"Masculine"}
];

const level2=[
{q:"Boy",a:"Girl",wrong:["Woman"]},
{q:"Mother",a:"Father",wrong:["Sister"]},
{q:"King",a:"Queen",wrong:["Princess"]},
{q:"Man",a:"Woman",wrong:["Girl"]},
{q:"Father",a:"Mother",wrong:["Sister"]}
];

let level=1;
let i=0;

let totalQuestions = level1.length + level2.length;
let scoreFirst=0;
let rocketPos=80;
const moonLimit=320;

/* TIMER (NEW) */
let time=30;
let timerInterval;

/* START */
function startGame(){
startTimer();
load();
}

/* TIMER LOGIC */
function startTimer(){
timerInterval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;

if(time<=0){
nextQ();
}
},1000);
}

function resetTimer(){
time=30;
document.getElementById("timer").innerText=time;
}

/* LOAD */
function load(){

let data = level===1 ? level1 : level2;

if(i>=data.length){
if(level===1){
level=2;
i=0;
load();
return;
}else{
launchLanding();
return;
}
}

document.getElementById("qno").innerText=i+1;

let item=data[i];

document.getElementById("question").innerText =
level===1
? "Is '"+item.q+"' Masculine or Feminine?"
: "Find opposite gender of: "+item.q;

let box=document.getElementById("options");
box.innerHTML="";

if(level===1){
["Masculine","Feminine"].forEach(opt=>{
let d=document.createElement("div");
d.className="option";
d.innerText=opt;
d.onclick=()=>check(opt,item.a);
box.appendChild(d);
});
}else{
let opts=[item.a,...item.wrong].sort(()=>Math.random()-0.5);
opts.forEach(opt=>{
let d=document.createElement("div");
d.className="option";
d.innerText=opt;
d.onclick=()=>check(opt,item.a);
box.appendChild(d);
});
}

resetTimer();
}

/* ⭐ STAR CONFETTI */
function starBurst(x,y){
for(let i=0;i<15;i++){
let s=document.createElement("div");
s.innerHTML="⭐";
s.style.position="absolute";
s.style.left=x+"px";
s.style.top=y+"px";
s.style.fontSize="18px";
document.body.appendChild(s);

let dx=(Math.random()-0.5)*200;
let dy=(Math.random()-0.5)*200;

let t=0;
let anim=setInterval(()=>{
t++;
s.style.transform=`translate(${dx*t/20}px,${dy*t/20}px)`;
if(t>20){clearInterval(anim);s.remove();}
},20);
}
}

/* CHECK */
function check(selected,correct){

let popup=document.getElementById("popup");
popup.style.display="block";

if(selected===correct){

scoreFirst++;

popup.innerText="Correct 🚀";
popup.className="popup good";

document.getElementById("correctSound").play();

/* STAR CONFETTI */
starBurst(window.innerWidth/2,window.innerHeight/2);

rocketPos=Math.min(rocketPos+35,moonLimit);

}else{

popup.innerText="Wrong 🌊";
popup.className="popup bad";

document.getElementById("wrongSound").play();

rocketPos=Math.max(80,rocketPos-20);
}

document.getElementById("rocket").style.bottom=rocketPos+"px";

setTimeout(()=>{
popup.style.display="none";
i++;
load();
},800);
}

/* NEXT */
function nextQ(){
i++;
load();
}

/* LANDING */
function launchLanding(){

document.getElementById("options").innerHTML="";
document.getElementById("question").innerText="Landing on the Moon 🌕";

document.getElementById("rocket").style.bottom=moonLimit+"px";

setTimeout(showScore,1500);
}

/* SCOREBOARD (SPACE THEMES) */
function showScore(){

document.getElementById("gameScreen").classList.remove("active");
document.getElementById("finalScreen").classList.add("active");

let correctOutOf = totalQuestions;

let remark =
scoreFirst>=8 ? "🚀 Stellar Job, Astronaut!":
scoreFirst>=6 ? "🌙 Good Mission Control!":
"🪐 Keep Training, Space Cadet!";

document.getElementById("scoreBoard").innerHTML=
`
<p><b>First Attempt Correct:</b> ${scoreFirst} / ${correctOutOf}</p>
<p><b>Remark:</b> ${remark}</p>
`;
}

load();

</script>

</body>
</html>
