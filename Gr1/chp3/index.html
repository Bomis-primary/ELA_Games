<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Gender Mission</title>

<style>
*{box-sizing:border-box;font-family:"Comic Sans MS"}

body{
margin:0;
overflow:hidden;
background:linear-gradient(to top,#020111,#1b2a49,#2e3c6e);
color:white;
}

.screen{
display:none;
width:100vw;
height:100vh;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.active{display:flex}

.logo{
width:70%;
max-width:320px;
}

/* TITLE SCREEN */
.titleScreen{
background:rgba(0,0,0,0.6);
gap:20px;
}

.titleText{
font-size:28px;
font-weight:bold;
}

button{
padding:12px 25px;
border:none;
background:#ffeb3b;
color:black;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

/* LAYOUT */
.wrapper{
display:flex;
width:100vw;
height:100vh;
}

.left{
width:66%;
padding:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.right{
width:34%;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.moon{
position:absolute;
top:30px;
font-size:120px;
}

.rocket{
position:absolute;
bottom:80px;
font-size:60px;
transition:0.6s ease;
}

.qbox{
background:white;
color:black;
padding:18px;
border-radius:18px;
width:90%;
max-width:420px;
text-align:center;
}

.option{
background:#fff;
margin:8px;
padding:12px;
border-radius:14px;
border:3px solid #2196f3;
cursor:pointer;
font-size:20px;
}

.popup{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
padding:15px;
border-radius:15px;
display:none;
font-size:20px;
}

.good{background:#00c853;color:white}
.bad{background:#d50000;color:white}

.topbar{
position:absolute;
top:10px;
left:10px;
right:10px;
display:flex;
justify-content:space-between;
font-size:18px;
font-weight:bold;
z-index:10;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="screen active" id="logoScreen">
<img src="assets/innovine-logo.png" class="logo">
</div>

<!-- TITLE -->
<div class="screen titleScreen" id="titleScreen">
<div class="titleText">🚀 Rocket Gender Mission</div>
<button onclick="startGame()">Start Mission</button>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">

<div class="topbar">
<div>Question: <span id="qno">1</span></div>
<div>⏱ <span id="timer">30</span>s</div>
</div>

<div class="wrapper">

<div class="left">
<div class="qbox">
<h2 id="question"></h2>
<div id="options"></div>
</div>
</div>

<div class="right">
<div class="moon">🌕</div>
<div class="rocket" id="rocket">🚀</div>
<div class="popup" id="popup"></div>
</div>

</div>
</div>

<!-- FINAL -->
<div class="screen" id="finalScreen">
<div style="background:white;color:black;padding:25px;border-radius:20px">
<h2>🌌 Mission Complete</h2>
<div id="scoreBoard"></div>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<script>

/* FLOW */
setTimeout(()=>{
document.getElementById("logoScreen").classList.remove("active");
document.getElementById("titleScreen").classList.add("active");
},5000);

/* ⭐ BASE LEVEL DATA */
const level1Base=[
{q:"Boy",a:"Masculine"},
{q:"Girl",a:"Feminine"},
{q:"King",a:"Masculine"},
{q:"Queen",a:"Feminine"},
{q:"Man",a:"Masculine"},
{q:"Prince",a:"Masculine"},
{q:"Princess",a:"Feminine"},
{q:"Father",a:"Masculine"},
{q:"Mother",a:"Feminine"},
{q:"Brother",a:"Masculine"}
];

const level2Base=[
{q:"Boy",a:"Girl",wrong:["Woman"]},
{q:"Mother",a:"Father",wrong:["Sister"]},
{q:"King",a:"Queen",wrong:["Princess"]},
{q:"Man",a:"Woman",wrong:["Girl"]},
{q:"Father",a:"Mother",wrong:["Sister"]},
{q:"Hero",a:"Heroine",wrong:["Queen"]},
{q:"Actor",a:"Actress",wrong:["Princess"]},
{q:"Uncle",a:"Aunt",wrong:["Mother"]},
{q:"Son",a:"Daughter",wrong:["Girl"]},
{q:"Wizard",a:"Witch",wrong:["Queen"]}
];

/* ⭐ SHUFFLE FIX (NEW ADDITION ONLY) */
function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

const level1 = shuffle([...level1Base]);
const level2 = shuffle([...level2Base]);

let level=1;
let i=0;

let scoreFirst=0;
let rocketPos=80;
const moonLimit=320;

let time=30;
let timerInterval;

/* START */
function startGame(){
document.getElementById("titleScreen").classList.remove("active");
document.getElementById("gameScreen").classList.add("active");
startTimer();
load();
}

/* TIMER */
function startTimer(){
timerInterval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0){i++;load();}
},1000);
}

function resetTimer(){
time=30;
document.getElementById("timer").innerText=time;
}

/* LOAD */
function load(){

let data = level===1 ? level1 : level2;

if(i>=data.length){
if(level===1){
level=2;
i=0;
load();
return;
}else{
launchLanding();
return;
}
}

document.getElementById("qno").innerText=i+1;

let item=data[i];

document.getElementById("question").innerText =
level===1
? "Is '"+item.q+"' Masculine or Feminine?"
: "Find opposite gender of: "+item.q;

let box=document.getElementById("options");
box.innerHTML="";

if(level===1){
["Masculine","Feminine"].forEach(opt=>{
let d=document.createElement("div");
d.className="option";
d.innerText=opt;
d.onclick=()=>check(opt,item.a);
box.appendChild(d);
});
}else{
let opts=[item.a,...item.wrong].sort(()=>Math.random()-0.5);
opts.forEach(opt=>{
let d=document.createElement("div");
d.className="option";
d.innerText=opt;
d.onclick=()=>check(opt,item.a);
box.appendChild(d);
});
}

resetTimer();
}

/* CHECK */
function check(selected,correct){

let popup=document.getElementById("popup");
popup.style.display="block";

if(selected===correct){

scoreFirst++;
popup.innerText="Correct 🚀";
popup.className="popup good";

rocketPos=Math.min(rocketPos+35,moonLimit);

}else{

popup.innerText="Wrong 🌊";
popup.className="popup bad";

rocketPos=Math.max(80,rocketPos-20);
}

document.getElementById("rocket").style.bottom=rocketPos+"px";

setTimeout(()=>{
popup.style.display="none";
i++;
load();
},800);
}

/* LANDING */
function launchLanding(){
document.getElementById("options").innerHTML="";
document.getElementById("question").innerText="Landing on the Moon 🌕";
document.getElementById("rocket").style.bottom=moonLimit+"px";
setTimeout(showScore,1500);
}

/* SCORE */
function showScore(){

document.getElementById("gameScreen").classList.remove("active");
document.getElementById("finalScreen").classList.add("active");

let remark =
scoreFirst>=8 ? "🚀 Stellar Astronaut!" :
scoreFirst>=6 ? "🌙 Good Space Pilot!" :
"🪐 Keep Training Cadet!";

document.getElementById("scoreBoard").innerHTML=
`<p><b>Score:</b> ${scoreFirst}</p>
<p><b>Remark:</b> ${remark}</p>`;
}

load();

</script>

</body>
</html>
